<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Complete Financial Reports | Opening/Closing Balance with Full Color Export</title>

  <!-- CSS libs -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --purple-1: #6f42c1;
      --purple-2: #5a32b5;
      --income-green: #059669;
      --expense-red: #dc2626;
      --balance-positive: #10b981;
      --balance-negative: #ef4444;
      --opening-blue: #3b82f6;
      --closing-gold: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { 
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto; 
      padding: 24px 20px;
    }
    .report-container { max-width: 1500px; margin: 0 auto; }
    .report-card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .report-header {
      background: linear-gradient(135deg, var(--purple-1), var(--purple-2));
      padding: 24px 32px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      padding: 24px 32px;
      background: #ffffff;
      border-bottom: 1px solid #e9edf2;
    }
    .stat-card {
      background: #fafbff;
      border-radius: 20px;
      padding: 16px 20px;
      border: 1px solid #edf2f7;
    }
    .stat-number {
      font-size: 32px;
      font-weight: 800;
      margin-top: 8px;
    }
    .income-color { color: #059669; }
    .expense-color { color: #dc2626; }
    .filter-bar {
      padding: 20px 32px;
      background: white;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      border-bottom: 1px solid #eef2f8;
    }
    .filter-group { min-width: 150px; }
    .btn-purple {
      background: var(--purple-1);
      border: none;
      color: white;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 500;
    }
    .report-type-selector {
      display: flex;
      gap: 12px;
      padding: 16px 32px;
      background: #f9fafc;
      border-bottom: 1px solid #eef2f8;
      flex-wrap: wrap;
    }
    .report-type-btn {
      padding: 8px 24px;
      border-radius: 40px;
      border: 1px solid #dee2e8;
      background: white;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .report-type-btn.active {
      background: var(--purple-1);
      color: white;
      border-color: var(--purple-1);
    }
    .bank-balances {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 32px;
      padding: 16px;
      background: #f8fafd;
      border-radius: 24px;
    }
    .bank-balance-item {
      background: white;
      padding: 12px 20px;
      border-radius: 16px;
      min-width: 170px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border: 1px solid #eef2f8;
    }
    .report-table-wrapper {
      padding: 20px 32px;
      overflow-x: auto;
    }
    .report-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 20px;
      overflow: hidden;
    }
    .report-table th {
      background: #f8fafc;
      padding: 16px 18px;
      font-weight: 600;
      color: #1f2a44;
      border-bottom: 2px solid #e9edf2;
    }
    .report-table td {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f3f9;
    }
    .income-text { color: #059669 !important; font-weight: 700; }
    .expense-text { color: #dc2626 !important; font-weight: 700; }
    .positive-balance-text { color: #10b981 !important; font-weight: 800; }
    .negative-balance-text { color: #ef4444 !important; font-weight: 800; }
    .opening-text { color: #3b82f6 !important; font-weight: 600; }
    .closing-text { color: #f59e0b !important; font-weight: 800; }
    .view-details-btn {
      background: transparent;
      border: 1px solid #cbd5e1;
      border-radius: 30px;
      padding: 5px 16px;
      font-size: 12px;
      transition: all 0.2s;
    }
    .view-details-btn:hover {
      background: var(--purple-1);
      color: white;
      border-color: var(--purple-1);
    }
    .export-group {
      padding: 16px 32px 32px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .footer-note {
      background: #fafcff;
      padding: 14px 32px;
      border-top: 1px solid #eef2f8;
      font-size: 12px;
      color: #5f6f90;
    }
    @media print {
      body { background: white; }
      .filter-bar, .export-group, .report-type-selector, .no-print { display: none; }
    }
    .color-legend {
      display: inline-flex;
      gap: 20px;
      margin-left: 20px;
      font-size: 11px;
    }
  </style>
</head>
<body>
<div class="report-container">
  <div class="report-card">
    <div class="report-header">
      <h2><i class="fa fa-chart-line"></i> Financial Intelligence Suite</h2>
      <div class="d-flex gap-3 align-items-center">
        <div class="nav-buttons">
          <button id="backBtn" class="btn btn-sm btn-outline-light"><i class="fa fa-arrow-left"></i></button>
          <button id="homeBtn" class="btn btn-sm btn-outline-light"><i class="fa fa-home"></i></button>
          <button id="transactionBtn" class="btn btn-sm btn-outline-light"><i class="fa fa-money-bill-wave"></i></button>
        </div>
        <div id="userInitials" class="bg-white bg-opacity-20 rounded-circle px-3 py-1 fw-bold">U</div>
        <span id="usernameDisplay" class="fw-semibold">User</span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Logout</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label"><i class="fa fa-arrow-up"></i> TOTAL INCOME</div><div id="totalIncomeStat" class="stat-number income-color">$0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fa fa-arrow-down"></i> TOTAL EXPENSES</div><div id="totalExpenseStat" class="stat-number expense-color">$0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fa fa-scale-balanced"></i> NET BALANCE</div><div id="netBalanceStat" class="stat-number">$0</div><button id="toggleBalanceBtn" class="border-0 bg-transparent"><i class="fa fa-eye-slash"></i></button></div>
      <div class="stat-card"><div class="stat-label"><i class="fa fa-list-check"></i> TRANSACTIONS</div><div id="txnCountStat" class="stat-number">0</div></div>
    </div>

    <div id="bankBalancesContainer" class="bank-balances"></div>

    <div class="report-type-selector">
      <div class="report-type-btn" data-report-type="bank"><i class="fa fa-building-columns"></i> Bank-wise</div>
      <div class="report-type-btn" data-report-type="category"><i class="fa fa-tags"></i> Category-wise</div>
      <div class="report-type-btn active" data-report-type="monthly"><i class="fa fa-calendar-week"></i> Monthly O/C Balance</div>
      <div class="report-type-btn" data-report-type="trend"><i class="fa fa-chart-line"></i> Trend Analysis</div>
    </div>

    <div class="filter-bar">
      <div class="filter-group"><label>Date Filter</label><select id="dateFilterSelect" class="form-select form-select-sm"><option value="all">All Dates</option><option value="today">Today</option><option value="week">This Week</option><option value="month">This Month</option><option value="year">This Year</option><option value="custom">Custom Range</option></select></div>
      <div id="customRangeDiv" style="display:none;" class="d-flex gap-2"><input type="date" id="startDateInput" class="form-control form-control-sm"><input type="date" id="endDateInput" class="form-control form-control-sm"></div>
      <div class="filter-group"><label>Type</label><select id="typeFilterSelect" class="form-select form-select-sm"><option value="all">All</option><option value="income">Income Only</option><option value="expense">Expense Only</option></select></div>
      <div class="filter-group"><label>Bank</label><select id="bankFilterSelect" class="form-select form-select-sm"><option value="all">All Banks</option></select></div>
      <div><button id="applyFilterBtn" class="btn btn-purple btn-sm">Apply</button><button id="resetFilterBtn" class="btn btn-outline-secondary btn-sm ms-2">Reset</button></div>
    </div>

    <div class="report-table-wrapper">
      <table class="report-table" id="dynamicReportTable">
        <thead id="reportHeader"><tr><th>Loading...</th></tr></thead>
        <tbody id="reportBody"><tr><td class="text-center py-5"><i class="fa fa-spinner fa-spin"></i> Loading data...</td></tr></tbody>
      </table>
    </div>

    <div class="export-group">
      <button id="exportPDFBtn" class="btn btn-outline-danger"><i class="fa fa-file-pdf"></i> PDF (Color)</button>
      <button id="exportExcelBtn" class="btn btn-outline-success"><i class="fa fa-file-excel"></i> Excel (Color)</button>
      <button id="printReportBtn" class="btn btn-outline-primary"><i class="fa fa-print"></i> Print</button>
    </div>
    <div class="footer-note">
      <i class="fa fa-palette"></i> 
      <span style="color:#059669;">■ Green = Income / Positive</span> 
      <span style="color:#dc2626;">■ Red = Expense / Negative</span>
      <span style="color:#3b82f6;">■ Blue = Opening Balance</span>
      <span style="color:#f59e0b;">■ Gold = Closing Balance</span>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="detailsModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header bg-light"><h5 class="modal-title" id="modalTitle">Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="modalTransactionList"></div><div class="modal-footer"><button id="modalExportPdfBtn" class="btn btn-sm btn-outline-danger">Export PDF</button><button id="modalExportExcelBtn" class="btn btn-sm btn-outline-success">Export Excel</button><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button></div></div></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = { apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A", authDomain: "budget-app-1365f.firebaseapp.com", projectId: "budget-app-1365f", storageBucket: "budget-app-1365f.appspot.com", messagingSenderId: "1036194450411", appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // DOM elements
  const reportHeader = document.getElementById("reportHeader"), reportBody = document.getElementById("reportBody");
  const dateFilterSelect = document.getElementById("dateFilterSelect"), startDateInput = document.getElementById("startDateInput"), endDateInput = document.getElementById("endDateInput"), customRangeDiv = document.getElementById("customRangeDiv");
  const typeFilterSelect = document.getElementById("typeFilterSelect"), bankFilterSelect = document.getElementById("bankFilterSelect");
  const applyFilterBtn = document.getElementById("applyFilterBtn"), resetFilterBtn = document.getElementById("resetFilterBtn");
  const totalIncomeStat = document.getElementById("totalIncomeStat"), totalExpenseStat = document.getElementById("totalExpenseStat"), netBalanceStat = document.getElementById("netBalanceStat"), txnCountStat = document.getElementById("txnCountStat");
  const toggleBalanceBtn = document.getElementById("toggleBalanceBtn"), exportPDFBtn = document.getElementById("exportPDFBtn"), exportExcelBtn = document.getElementById("exportExcelBtn"), printReportBtn = document.getElementById("printReportBtn");
  const logoutBtn = document.getElementById("logoutBtn"), usernameDisplay = document.getElementById("usernameDisplay"), userInitials = document.getElementById("userInitials");
  const backBtn = document.getElementById("backBtn"), homeBtn = document.getElementById("homeBtn"), transactionBtn = document.getElementById("transactionBtn");
  const bankBalancesContainer = document.getElementById("bankBalancesContainer");
  const modal = new bootstrap.Modal(document.getElementById('detailsModal'));
  const modalTitle = document.getElementById("modalTitle"), modalTransactionList = document.getElementById("modalTransactionList");
  const modalExportPdfBtn = document.getElementById("modalExportPdfBtn"), modalExportExcelBtn = document.getElementById("modalExportExcelBtn");

  let allTransactions = [], filteredTransactions = [], currentUser = null, balanceVisible = true, currentReportType = 'monthly', currentModalTransactions = [];
  let coaBanks = ["Axis Bank", "BOM", "HDFC", "ICICI", "SBI"];

  const formatUSD = (v) => `$${v.toFixed(2)}`;
  const getIncome = (t) => parseFloat(t.INCOME) || 0;
  const getExpense = (t) => parseFloat(t.EXPENSE) || 0;
  const escapeHtml = (s) => { if(!s) return ""; return s.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); };
  const formatDate = (d) => d ? new Date(d).toLocaleDateString() : "N/A";

  async function loadCOABanks() {
    if(!currentUser) return;
    try { const q = query(collection(db, "users", currentUser.uid, "chartOfAccounts"), where("category", "in", ["Bank", "Cash"])); const snap = await getDocs(q); if(snap.size) coaBanks = snap.docs.map(d => d.data().name); } catch(e) {}
    bankFilterSelect.innerHTML = '<option value="all">All Banks</option>' + coaBanks.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
  }

  async function loadTransactions() {
    try { const q = query(collection(db, "users", currentUser.uid, "transactions"), orderBy("DATE", "desc")); const snap = await getDocs(q); allTransactions = snap.docs.map(d => ({ id: d.id, ...d.data() })); applyFiltersAndRender(); } 
    catch(e) { reportBody.innerHTML = '<tr><td class="text-danger">Error loading data</td></tr>'; }
  }

  function dateFilter(tx, val, sDate, eDate) {
    if(!tx.DATE) return false; const d = new Date(tx.DATE), now = new Date();
    if(val === 'today') return d.toDateString() === now.toDateString();
    if(val === 'week') { const start = new Date(now); start.setDate(now.getDate() - now.getDay()); const end = new Date(start); end.setDate(start.getDate()+7); return d >= start && d < end; }
    if(val === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if(val === 'year') return d.getFullYear() === now.getFullYear();
    if(val === 'custom' && sDate && eDate) { const s = new Date(sDate), e = new Date(eDate); e.setHours(23,59,59); return d >= s && d <= e; }
    return true;
  }

  function applyFiltersAndRender() {
    let temp = [...allTransactions];
    const dateVal = dateFilterSelect.value;
    let cStart = null, cEnd = null;
    if(dateVal === 'custom' && startDateInput.value && endDateInput.value) { cStart = startDateInput.value; cEnd = endDateInput.value; }
    temp = temp.filter(t => dateFilter(t, dateVal, cStart, cEnd));
    const typeVal = typeFilterSelect.value;
    if(typeVal !== 'all') temp = temp.filter(t => t.TYPE === typeVal);
    const bankVal = bankFilterSelect.value;
    if(bankVal !== 'all') temp = temp.filter(t => (t.BANK_NAME || t.MODE || "") === bankVal);
    filteredTransactions = temp;
    updateStatsAndBalances();
    generateReportByType();
  }

  function updateStatsAndBalances() {
    let inc = 0, exp = 0;
    filteredTransactions.forEach(t => { inc += getIncome(t); exp += getExpense(t); });
    const net = inc - exp;
    totalIncomeStat.innerText = formatUSD(inc);
    totalExpenseStat.innerText = formatUSD(exp);
    netBalanceStat.innerHTML = balanceVisible ? formatUSD(net) : '••••';
    netBalanceStat.className = `stat-number ${net >= 0 ? 'income-color' : 'expense-color'}`;
    txnCountStat.innerText = filteredTransactions.length;
    
    const bankMap = new Map();
    filteredTransactions.forEach(t => { const b = t.BANK_NAME || t.MODE || "Other"; bankMap.set(b, (bankMap.get(b)||0) + (getIncome(t)-getExpense(t))); });
    bankBalancesContainer.innerHTML = '';
    for(let [b, bal] of bankMap) {
      const div = document.createElement('div'); div.className = "bank-balance-item";
      div.innerHTML = `<div><strong>${escapeHtml(b)}</strong></div><div class="${bal>=0?'positive-balance-text':'negative-balance-text'} fw-bold">${balanceVisible ? formatUSD(bal) : '••••'}</div>`;
      bankBalancesContainer.appendChild(div);
    }
  }

  function generateReportByType() {
    if(currentReportType === 'bank') generateBankReport();
    else if(currentReportType === 'category') generateCategoryReport();
    else if(currentReportType === 'monthly') generateMonthlyOCReport();
    else if(currentReportType === 'trend') generateTrendReport();
  }

  function generateBankReport() {
    reportHeader.innerHTML = `<tr><th>Bank Name</th><th style="text-align:right;">Total Income</th><th style="text-align:right;">Total Expenses</th><th style="text-align:right;">Net Balance</th><th style="text-align:center;">Actions</th></tr>`;
    const map = new Map();
    filteredTransactions.forEach(t => { const b = t.BANK_NAME || t.MODE || "Other"; if(!map.has(b)) map.set(b, {inc:0, exp:0}); let d = map.get(b); d.inc += getIncome(t); d.exp += getExpense(t); });
    let html = '';
    for(let [bank, d] of map) { const net = d.inc - d.exp;
      html += `<tr><td><i class="fa fa-university me-2"></i>${escapeHtml(bank)}</td><td style="text-align:right;" class="income-text">${balanceVisible ? formatUSD(d.inc) : '••••'}</td><td style="text-align:right;" class="expense-text">${balanceVisible ? formatUSD(d.exp) : '••••'}</td><td style="text-align:right;" class="${net>=0?'positive-balance-text':'negative-balance-text'}">${balanceVisible ? formatUSD(net) : '••••'}</td><td style="text-align:center;"><button class="view-details-btn bank-detail" data-bank="${escapeHtml(bank)}"><i class="fa fa-eye"></i> Details</button></td></tr>`;
    }
    if(html === "") html = '<tr><td colspan="5" class="text-center">No data</td></tr>';
    reportBody.innerHTML = html;
    attachBankDetailEvents();
  }

  function generateCategoryReport() {
    reportHeader.innerHTML = `<tr><th>Category</th><th style="text-align:right;">Total Income</th><th style="text-align:right;">Total Expenses</th><th style="text-align:right;">Net Balance</th><th style="text-align:center;">Actions</th></tr>`;
    const map = new Map();
    filteredTransactions.forEach(t => { const cat = t.ACCOUNT_HEADER || "Uncategorized"; if(!map.has(cat)) map.set(cat, {inc:0, exp:0}); let d = map.get(cat); d.inc += getIncome(t); d.exp += getExpense(t); });
    let html = '';
    for(let [cat, d] of map) { const net = d.inc - d.exp;
      html += `<tr><td><i class="fa fa-tag me-2"></i>${escapeHtml(cat)}</td><td style="text-align:right;" class="income-text">${balanceVisible ? formatUSD(d.inc) : '••••'}</td><td style="text-align:right;" class="expense-text">${balanceVisible ? formatUSD(d.exp) : '••••'}</td><td style="text-align:right;" class="${net>=0?'positive-balance-text':'negative-balance-text'}">${balanceVisible ? formatUSD(net) : '••••'}</td><td style="text-align:center;"><button class="view-details-btn cat-detail" data-cat="${escapeHtml(cat)}"><i class="fa fa-eye"></i> Details</button></td></tr>`;
    }
    if(html === "") html = '<tr><td colspan="5">No data</td></tr>';
    reportBody.innerHTML = html;
    attachCategoryDetailEvents();
  }

  // MONTHLY OPENING & CLOSING BALANCE REPORT with full color coding
  function generateMonthlyOCReport() {
    reportHeader.innerHTML = `<tr><th>Month</th><th style="text-align:right;">Opening Balance</th><th style="text-align:right;">Total Income</th><th style="text-align:right;">Total Expenses</th><th style="text-align:right;">Net Addon</th><th style="text-align:right;">Closing Balance</th><th style="text-align:center;">Actions</th></tr>`;
    const monthMap = new Map();
    for(let tx of filteredTransactions) {
      if(!tx.DATE) continue;
      const d = new Date(tx.DATE);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const name = d.toLocaleString('default', { month:'long', year:'numeric' });
      if(!monthMap.has(key)) monthMap.set(key, { name, inc:0, exp:0, txs:[] });
      let m = monthMap.get(key);
      m.inc += getIncome(tx);
      m.exp += getExpense(tx);
      m.txs.push(tx);
    }
    const sorted = Array.from(monthMap.keys()).sort();
    let running = 0;
    let html = '';
    for(let key of sorted) {
      const m = monthMap.get(key);
      const addon = m.inc - m.exp;
      const opening = running;
      const closing = opening + addon;
      html += `<tr>
        <td><strong>${escapeHtml(m.name)}</strong></td>
        <td style="text-align:right;" class="opening-text">${balanceVisible ? formatUSD(opening) : '••••'}</td>
        <td style="text-align:right;" class="income-text">${balanceVisible ? formatUSD(m.inc) : '••••'}</td>
        <td style="text-align:right;" class="expense-text">${balanceVisible ? formatUSD(m.exp) : '••••'}</td>
        <td style="text-align:right;" class="${addon>=0?'income-text':'expense-text'}">${balanceVisible ? formatUSD(addon) : '••••'}</td>
        <td style="text-align:right;" class="closing-text fw-bold">${balanceVisible ? formatUSD(closing) : '••••'}</td>
        <td style="text-align:center;"><button class="view-details-btn month-detail" data-monthkey="${key}" data-monthname="${escapeHtml(m.name)}"><i class="fa fa-list"></i> View</button></td>
      </tr>`;
      running = closing;
    }
    if(html === "") html = '<tr><td colspan="7" class="text-center">No monthly data</td></tr>';
    reportBody.innerHTML = html;
    document.querySelectorAll('.month-detail').forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.getAttribute('data-monthkey');
        const name = btn.getAttribute('data-monthname');
        const data = monthMap.get(key);
        if(data) showModalTransactions(data.txs, `📅 ${name} Transactions`);
      });
    });
  }

  function generateTrendReport() {
    reportHeader.innerHTML = `<tr><th>Period</th><th style="text-align:right;">Income Trend</th><th style="text-align:right;">Expense Trend</th><th style="text-align:right;">Net Trend</th><th>Insight</th></tr>`;
    const monthMap = new Map();
    filteredTransactions.forEach(tx => {
      if(!tx.DATE) return;
      const d = new Date(tx.DATE);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(!monthMap.has(key)) monthMap.set(key, { inc:0, exp:0 });
      let m = monthMap.get(key);
      m.inc += getIncome(tx);
      m.exp += getExpense(tx);
    });
    const sorted = Array.from(monthMap.keys()).sort().slice(-6);
    let html = '';
    for(let key of sorted) {
      const m = monthMap.get(key);
      const net = m.inc - m.exp;
      const insight = net >= 0 ? '📈 Profitable' : '📉 Deficit';
      html += `<tr>
        <td>${key}</td>
        <td style="text-align:right;" class="income-text">${balanceVisible ? formatUSD(m.inc) : '••••'}</td>
        <td style="text-align:right;" class="expense-text">${balanceVisible ? formatUSD(m.exp) : '••••'}</td>
        <td style="text-align:right;" class="${net>=0?'positive-balance-text':'negative-balance-text'}">${balanceVisible ? formatUSD(net) : '••••'}</td>
        <td><span class="badge bg-light">${insight}</span></td>
      </tr>`;
    }
    if(html === "") html = '<tr><td colspan="5">Insufficient trend data</td></tr>';
    reportBody.innerHTML = html;
  }

  function attachBankDetailEvents() { document.querySelectorAll('.bank-detail').forEach(btn => { btn.addEventListener('click', () => { const bank = btn.getAttribute('data-bank'); const txs = filteredTransactions.filter(t => (t.BANK_NAME || t.MODE || "") === bank); showModalTransactions(txs, `🏦 ${bank} Transactions`); }); }); }
  function attachCategoryDetailEvents() { document.querySelectorAll('.cat-detail').forEach(btn => { btn.addEventListener('click', () => { const cat = btn.getAttribute('data-cat'); const txs = filteredTransactions.filter(t => (t.ACCOUNT_HEADER || "Uncategorized") === cat); showModalTransactions(txs, `📂 Category: ${cat}`); }); }); }

  function showModalTransactions(txs, title) {
    currentModalTransactions = txs;
    modalTitle.innerText = title;
    if(!txs.length) modalTransactionList.innerHTML = '<p class="text-muted">No transactions</p>';
    else {
      let h = `<div>`;
      txs.forEach(t => {
        const amt = getIncome(t) || getExpense(t);
        const sign = getIncome(t) ? '+' : '-';
        const cls = getIncome(t) ? 'income-text' : 'expense-text';
        h += `<div class="d-flex justify-content-between border-bottom p-2"><div><strong>${escapeHtml(t.DESCRIPTION || 'No description')}</strong><br><small>${escapeHtml(t.BANK_NAME || '')} | ${escapeHtml(t.ACCOUNT_HEADER || '')}</small></div><div class="text-end"><span class="${cls} fw-bold">${sign} ${balanceVisible ? formatUSD(amt) : '••••'}</span><br><small>${formatDate(t.DATE)}</small></div></div>`;
      });
      h += `</div>`;
      modalTransactionList.innerHTML = h;
    }
    modal.show();
  }

  // COLORED PDF EXPORT with Opening/Closing Balance colors preserved
  function exportToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape');
    doc.setFontSize(18); doc.setTextColor(111, 66, 193); doc.text(`Financial Report - ${currentReportType.toUpperCase()}`, 14, 18);
    doc.setFontSize(10); doc.setTextColor(100); doc.text(`Generated: ${new Date().toLocaleString()} | User: ${currentUser?.email || ''}`, 14, 28);
    
    const headers = [];
    document.querySelectorAll("#reportHeader th").forEach(th => headers.push(th.innerText));
    
    const tableData = [];
    const rows = document.querySelectorAll("#reportBody tr");
    rows.forEach(tr => {
      const cells = tr.querySelectorAll("td");
      if(cells.length && !cells[0].innerText.includes("No data") && !cells[0].innerText.includes("Insufficient")) {
        const rowCells = [];
        cells.forEach((cell, idx) => {
          if(idx < headers.length) {
            let text = cell.innerText;
            let color = null;
            if(cell.classList.contains('income-text')) color = [5, 150, 105];
            else if(cell.classList.contains('expense-text')) color = [220, 38, 38];
            else if(cell.classList.contains('positive-balance-text')) color = [16, 185, 129];
            else if(cell.classList.contains('negative-balance-text')) color = [239, 68, 68];
            else if(cell.classList.contains('opening-text')) color = [59, 130, 246];
            else if(cell.classList.contains('closing-text')) color = [245, 158, 11];
            rowCells.push({ content: text, color: color });
          }
        });
        if(rowCells.length) tableData.push(rowCells);
      }
    });
    
    if(tableData.length) {
      doc.autoTable({
        head: [headers],
        body: tableData.map(row => row.map(cell => cell.content)),
        headStyles: { fillColor: [111, 66, 193], textColor: [255,255,255], fontSize: 10 },
        bodyStyles: { fontSize: 9 },
        columnStyles: { 0: { cellWidth: 45 }, 1: { cellWidth: 35, halign: 'right' }, 2: { cellWidth: 35, halign: 'right' }, 3: { cellWidth: 35, halign: 'right' }, 4: { cellWidth: 35, halign: 'right' }, 5: { cellWidth: 35, halign: 'right' } },
        didDrawCell: (data) => {
          const rowIndex = data.row.index;
          if(rowIndex < tableData.length) {
            const cellData = tableData[rowIndex][data.column.index];
            if(cellData && cellData.color) {
              doc.setTextColor(...cellData.color);
              const text = cellData.content;
              const x = data.cell.x + data.cell.padding('left');
              const y = data.cell.y + data.cell.padding('top') + data.cell.lineHeight / 2;
              doc.text(text, x, y);
              doc.setTextColor(0);
            }
          }
        },
        startY: 35
      });
      doc.save(`report_${currentReportType}_${new Date().toISOString().slice(0,10)}.pdf`);
    } else Swal.fire("No data", "Nothing to export", "info");
  }

  // COLORED EXCEL EXPORT with full color support for Opening/Closing Balance
  function exportToExcel() {
    const headers = [];
    document.querySelectorAll("#reportHeader th").forEach(th => headers.push(th.innerText));
    
    const wsData = [headers];
    const styleMap = [];
    
    const rows = document.querySelectorAll("#reportBody tr");
    rows.forEach(tr => {
      const cells = tr.querySelectorAll("td");
      if(cells.length && !cells[0].innerText.includes("No data") && !cells[0].innerText.includes("Insufficient")) {
        const rowData = [];
        const rowStyles = [];
        cells.forEach((cell, idx) => {
          if(idx < headers.length) {
            let value = cell.innerText;
            let style = {};
            if(cell.classList.contains('income-text')) style = { font: { color: { rgb: "059669" }, bold: true }, fill: { fgColor: { rgb: "E8F5E9" } } };
            else if(cell.classList.contains('expense-text')) style = { font: { color: { rgb: "DC2626" }, bold: true }, fill: { fgColor: { rgb: "FFEBEE" } } };
            else if(cell.classList.contains('positive-balance-text')) style = { font: { color: { rgb: "10B981" }, bold: true }, fill: { fgColor: { rgb: "E0F2FE" } } };
            else if(cell.classList.contains('negative-balance-text')) style = { font: { color: { rgb: "EF4444" }, bold: true }, fill: { fgColor: { rgb: "FFE4E4" } } };
            else if(cell.classList.contains('opening-text')) style = { font: { color: { rgb: "3B82F6" }, bold: true } };
            else if(cell.classList.contains('closing-text')) style = { font: { color: { rgb: "F59E0B" }, bold: true } };
            rowData.push(value);
            rowStyles.push(style);
          }
        });
        if(rowData.length) {
          wsData.push(rowData);
          styleMap.push(rowStyles);
        }
      }
    });
    
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    
    // Apply column widths
    ws['!cols'] = headers.map(() => ({ wch: 18 }));
    
    // Apply styles to header
    for(let i = 0; i < headers.length; i++) {
      const cellRef = XLSX.utils.encode_cell({ r: 0, c: i });
      if(!ws[cellRef]) ws[cellRef] = { t: 's', v: headers[i] };
      ws[cellRef].s = { fill: { fgColor: { rgb: "6F42C1" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 11 } };
    }
    
    // Apply styles to data rows
    for(let r = 0; r < styleMap.length; r++) {
      for(let c = 0; c < styleMap[r].length; c++) {
        if(Object.keys(styleMap[r][c]).length > 0) {
          const cellRef = XLSX.utils.encode_cell({ r: r + 1, c: c });
          if(!ws[cellRef]) ws[cellRef] = { t: 's', v: wsData[r+1][c] };
          ws[cellRef].s = styleMap[r][c];
        }
      }
    }
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, `Report_${currentReportType}`);
    XLSX.writeFile(wb, `report_${currentReportType}_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  function exportModalContent() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(modalTitle.innerText, 14, 18);
    const data = [["Date","Description","Bank","Category","Type","Amount"]];
    currentModalTransactions.forEach(t => { data.push([formatDate(t.DATE), t.DESCRIPTION || "-", t.BANK_NAME || "-", t.ACCOUNT_HEADER || "-", t.TYPE || "-", (getIncome(t)||getExpense(t)).toFixed(2)]); });
    doc.autoTable({ head: [data[0]], body: data.slice(1), startY: 30 });
    doc.save(`details.pdf`);
  }

  function exportModalExcel() {
    const sheet = [["Date","Description","Bank","Category","Type","Amount"]];
    currentModalTransactions.forEach(t => { sheet.push([formatDate(t.DATE), t.DESCRIPTION, t.BANK_NAME, t.ACCOUNT_HEADER, t.TYPE, (getIncome(t)||getExpense(t))]); });
    const ws = XLSX.utils.aoa_to_sheet(sheet);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Details");
    XLSX.writeFile(wb, `transaction_details.xlsx`);
  }

  dateFilterSelect.addEventListener('change', () => customRangeDiv.style.display = dateFilterSelect.value === 'custom' ? 'flex' : 'none');
  applyFilterBtn.addEventListener('click', applyFiltersAndRender);
  resetFilterBtn.addEventListener('click', () => { dateFilterSelect.value = 'all'; typeFilterSelect.value = 'all'; bankFilterSelect.value = 'all'; startDateInput.value = ''; endDateInput.value = ''; customRangeDiv.style.display = 'none'; applyFiltersAndRender(); });
  toggleBalanceBtn.addEventListener('click', () => { balanceVisible = !balanceVisible; const icon = toggleBalanceBtn.querySelector('i'); icon.className = balanceVisible ? "fa fa-eye-slash" : "fa fa-eye"; updateStatsAndBalances(); generateReportByType(); });
  exportPDFBtn.addEventListener('click', exportToPDF);
  exportExcelBtn.addEventListener('click', exportToExcel);
  printReportBtn.addEventListener('click', () => window.print());
  modalExportPdfBtn.addEventListener('click', exportModalContent);
  modalExportExcelBtn.addEventListener('click', exportModalExcel);
  backBtn.addEventListener('click', () => window.history.back());
  homeBtn.addEventListener('click', () => window.location.href = "home.html");
  transactionBtn.addEventListener('click', () => window.location.href = "transactions.html");
  
  document.querySelectorAll('.report-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.report-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentReportType = btn.getAttribute('data-report-type');
      generateReportByType();
    });
  });
  
  logoutBtn.addEventListener('click', () => signOut(auth).then(()=>window.location.href="index.html"));
  
  onAuthStateChanged(auth, async (user) => {
    if(user) {
      currentUser = user;
      usernameDisplay.innerText = user.displayName || user.email.split('@')[0];
      userInitials.innerText = (user.displayName? user.displayName[0] : user.email[0]).toUpperCase();
      await loadCOABanks();
      await loadTransactions();
    } else { Swal.fire({ title: "Login required", text: "Redirecting", icon: "info" }).then(()=> window.location.href="index.html"); }
  });
</script>
