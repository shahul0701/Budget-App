<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Xero‑Style Balance Sheet & Cash Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f4f6;
      color: #111827;
      line-height: 1.5;
      padding: 16px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header {
      background: #fff;
      padding: 12px 20px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo i { font-size: 24px; background: linear-gradient(135deg, #1e40af, #3b82f6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo span { font-weight: 800; font-size: 1.2rem; color: #1e293b; }
    .user-area { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      padding: 4px 12px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
    }
    #userInitials {
      background: #1e40af;
      color: white;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    #homeBtn, #logoutBtn {
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 6px 16px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #homeBtn { background: #0f172a; }
    #logoutBtn { background: #ef4444; }
    .controls-panel {
      background: white;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      border: 1px solid #e2e8f0;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #6b7280; }
    select, input, .ctrl-btn {
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: white;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }
    .ctrl-btn { background: #1e40af; color: white; border: none; }
    .comparison-panel {
      background: #f8fafc;
      border-radius: 16px;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 20px;
      border: 1px solid #e2e8f0;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #1e40af;
      border-bottom: 2px solid #1e40af;
      margin-bottom: -2px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .period-header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-radius: 20px;
      padding: 14px 20px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid #334155;
    }
    .period-badge {
      background: rgba(255,255,255,0.12);
      border-radius: 40px;
      padding: 6px 16px;
      color: white;
      font-weight: 500;
      font-size: 0.85rem;
    }
    .period-badge i { margin-right: 8px; color: #60a5fa; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15); }
    .kpi-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .kpi-value { font-size: 1.8rem; font-weight: 800; }
    .kpi-trend { font-size: 0.7rem; margin-top: 8px; }
    .trend-up { color: #10b981; }
    .trend-down { color: #ef4444; }
    .bs-section {
      background: white;
      border-radius: 20px;
      margin-bottom: 28px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }
    .bs-header {
      background: #f9fafb;
      padding: 14px 20px;
      font-weight: 800;
      border-bottom: 2px solid #e2e8f0;
    }
    .bs-body { padding: 0 20px; }
    .bs-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .bs-subgroup {
      margin-left: 20px;
      border-left: 2px solid #e2e8f0;
      padding-left: 16px;
    }
    .bs-total {
      font-weight: 800;
      border-top: 2px solid #e2e8f0;
      margin-top: 8px;
      padding: 12px 0;
    }
    .amount { font-family: monospace; font-weight: 600; text-align: right; }
    .positive { color: #10b981; }
    .negative { color: #ef4444; }
    .export-bar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 24px;
    }
    .btn-icon {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }
    .chart-container {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 28px;
      border: 1px solid #e2e8f0;
    }
    .loading-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 1000; justify-content: center; align-items: center;
    }
    .loading-content {
      background: white; padding: 30px; border-radius: 24px; text-align: center;
    }
    .balance-validation {
      padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 20px;
    }
    .balance-valid { background: #d4edda; color: #155724; }
    .balance-invalid { background: #f8d7da; color: #721c24; }
    @media (max-width: 768px) {
      .kpi-value { font-size: 1.4rem; }
      .bs-item { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><i class="fas fa-chart-line"></i><span>FinLedger Pro</span></div>
    <div class="user-area">
      <div class="user-badge"><div id="userInitials">U</div><span id="username">User</span></div>
      <button id="homeBtn"><i class="fas fa-home"></i> Home</button>
      <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls-panel">
    <div class="filter-group"><label>REPORTING PERIOD</label>
      <select id="reportPeriod">
        <option value="month">This Month</option><option value="lastMonth">Last Month</option>
        <option value="quarter">This Quarter</option><option value="year">This Year</option>
        <option value="lastYear">Last Year</option><option value="custom">Custom Range</option>
      </select>
    </div>
    <div id="customDateRange" style="display:none; gap:10px; flex-wrap:wrap;">
      <div class="filter-group"><label>FROM</label><input type="date" id="startDate"></div>
      <div class="filter-group"><label>TO</label><input type="date" id="endDate"></div>
    </div>
    <div class="filter-group"><label>CHART TYPE</label><select id="chartType"><option value="bar">Bar</option><option value="pie">Pie</option></select></div>
    <button id="generateBtn" class="ctrl-btn"><i class="fas fa-sync-alt"></i> Update</button>
  </div>

  <div class="comparison-panel">
    <div class="filter-group"><label>COMPARE WITH</label>
      <select id="comparisonType">
        <option value="none">No Comparison</option>
        <option value="previousPeriod">Previous Period (same length)</option>
        <option value="previousMonth">Previous Month</option>
        <option value="previousQuarter">Previous Quarter</option>
        <option value="previousYear">Previous Year</option>
        <option value="samePeriodLastYear">Same Period Last Year</option>
        <option value="twoQuartersBack">Two Quarters Back</option>
        <option value="twoYearsBack">Two Years Back</option>
        <option value="custom">Custom Range</option>
      </select>
    </div>
    <div id="customComparisonRange" style="display:none; gap:10px;">
      <div class="filter-group"><label>FROM</label><input type="date" id="compareStartDate"></div>
      <div class="filter-group"><label>TO</label><input type="date" id="compareEndDate"></div>
    </div>
  </div>

  <!-- Period header -->
  <div class="period-header">
    <div class="period-badge"><i class="fas fa-calendar-alt"></i> Current: <span id="currentPeriodLabel">-</span></div>
    <div class="period-badge" id="prev1Wrapper" style="display:none;"><i class="fas fa-calendar-week"></i> Previous: <span id="prev1PeriodLabel">-</span></div>
    <div class="period-badge" id="prev2Wrapper" style="display:none;"><i class="fas fa-calendar-minus"></i> Prior‑Previous: <span id="prev2PeriodLabel">-</span></div>
  </div>

  <div class="export-bar">
    <button id="exportExcel" class="btn-icon"><i class="fas fa-file-excel"></i> Excel</button>
    <button id="exportPDF" class="btn-icon"><i class="fas fa-file-pdf"></i> PDF</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="balance">Balance Sheet</button>
    <button class="tab-btn" data-tab="cashflow">Cash Flow Statement</button>
  </div>

  <!-- Balance Sheet Tab -->
  <div id="balanceSheetTab" class="tab-content active">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label"><i class="fas fa-building"></i> Total Assets</div><div class="kpi-value" id="bsTotalAssets">₹0</div><div class="kpi-trend" id="bsAssetsTrend"></div></div>
      <div class="kpi-card"><div class="kpi-label"><i class="fas fa-credit-card"></i> Total Liabilities</div><div class="kpi-value" id="bsTotalLiabilities">₹0</div><div class="kpi-trend" id="bsLiabTrend"></div></div>
      <div class="kpi-card"><div class="kpi-label"><i class="fas fa-chart-pie"></i> Total Equity</div><div class="kpi-value" id="bsTotalEquity">₹0</div><div class="kpi-trend" id="bsEqTrend"></div></div>
    </div>
    <div id="bsValidation" class="balance-validation"></div>
    <div class="chart-container"><canvas id="bsChart"></canvas></div>
    <div class="bs-section"><div class="bs-header"><i class="fas fa-landmark"></i> Assets</div><div id="assetsBreakdown" class="bs-body"></div></div>
    <div class="bs-section"><div class="bs-header"><i class="fas fa-hand-holding-usd"></i> Liabilities</div><div id="liabilitiesBreakdown" class="bs-body"></div></div>
    <div class="bs-section"><div class="bs-header"><i class="fas fa-chart-line"></i> Equity</div><div id="equityBreakdown" class="bs-body"></div></div>
  </div>

  <!-- Cash Flow Tab -->
  <div id="cashflowTab" class="tab-content">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label"><i class="fas fa-chart-line"></i> Net Cash Flow</div><div class="kpi-value" id="cfNetCash">₹0</div><div class="kpi-trend" id="cfTrend"></div></div>
      <div class="kpi-card"><div class="kpi-label"><i class="fas fa-store"></i> Operating Cash Flow</div><div class="kpi-value" id="cfOperating">₹0</div></div>
      <div class="kpi-card"><div class="kpi-label"><i class="fas fa-chart-simple"></i> Investing Cash Flow</div><div class="kpi-value" id="cfInvesting">₹0</div></div>
    </div>
    <div class="chart-container"><canvas id="cfChart"></canvas></div>
    <div class="bs-section"><div class="bs-header"><i class="fas fa-chart-line"></i> Cash Flow Statement (Direct Method)</div>
      <div id="cashflowBreakdown" class="bs-body"></div>
    </div>
  </div>
</div>
<div id="loadingModal" class="loading-modal"><div class="loading-content"><i class="fas fa-spinner fa-spin fa-3x"></i><p>Generating Report...</p></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.appspot.com",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentUser = null;
  let currentPeriod = { start: null, end: null, text: "" };
  let prev1Period = null, prev2Period = null;
  let currentBS = null, prev1BS = null, prev2BS = null;
  let currentCF = null, prev1CF = null, prev2CF = null;
  let showThree = false;
  let bsChart, cfChart;

  function formatINR(amt) { return `₹${amt.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`; }
  function formatPeriod(start, end) { return `${start.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})} – ${end.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}`; }
  function formatDateShort(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

  function getDateRange(periodType, customStart=null, customEnd=null) {
    const today = new Date();
    let start, end;
    if (periodType === 'month') { start = new Date(today.getFullYear(), today.getMonth(), 1); end = new Date(today.getFullYear(), today.getMonth()+1, 0); }
    else if (periodType === 'lastMonth') { start = new Date(today.getFullYear(), today.getMonth()-1, 1); end = new Date(today.getFullYear(), today.getMonth(), 0); }
    else if (periodType === 'quarter') { const q = Math.floor(today.getMonth()/3); start = new Date(today.getFullYear(), q*3, 1); end = new Date(today.getFullYear(), (q+1)*3, 0); }
    else if (periodType === 'year') { start = new Date(today.getFullYear(), 0, 1); end = new Date(today.getFullYear(), 11, 31); }
    else if (periodType === 'lastYear') { start = new Date(today.getFullYear()-1, 0, 1); end = new Date(today.getFullYear()-1, 11, 31); }
    else { start = new Date(customStart); end = new Date(customEnd); }
    start.setHours(0,0,0,0); end.setHours(23,59,59,999);
    return { start, end };
  }

  function getComparisonRange(mainStart, mainEnd, compType, customStart=null, customEnd=null) {
    if (compType === 'none') return null;
    if (compType === 'previousPeriod') {
      const duration = mainEnd - mainStart;
      const prevEnd = new Date(mainStart.getTime() - 1);
      const prevStart = new Date(prevEnd.getTime() - duration);
      return { start: prevStart, end: prevEnd };
    }
    if (compType === 'previousMonth') {
      let start = new Date(mainStart); start.setDate(1); start.setMonth(start.getMonth()-1);
      let end = new Date(start.getFullYear(), start.getMonth()+1, 0);
      return { start, end };
    }
    if (compType === 'previousQuarter') {
      let start = new Date(mainStart);
      let quarterStartMonth = Math.floor(start.getMonth()/3)*3;
      start = new Date(start.getFullYear(), quarterStartMonth-3, 1);
      let end = new Date(start.getFullYear(), start.getMonth()+3, 0);
      return { start, end };
    }
    if (compType === 'previousYear') {
      let start = new Date(mainStart); start.setFullYear(start.getFullYear()-1);
      let end = new Date(mainEnd); end.setFullYear(end.getFullYear()-1);
      return { start, end };
    }
    if (compType === 'samePeriodLastYear') {
      let start = new Date(mainStart); start.setFullYear(start.getFullYear()-1);
      let end = new Date(mainEnd); end.setFullYear(end.getFullYear()-1);
      return { start, end };
    }
    if (compType === 'twoQuartersBack') {
      let start = new Date(mainStart);
      let quarterStartMonth = Math.floor(start.getMonth()/3)*3;
      start = new Date(start.getFullYear(), quarterStartMonth-6, 1);
      let end = new Date(start.getFullYear(), start.getMonth()+3, 0);
      return { start, end };
    }
    if (compType === 'twoYearsBack') {
      let start = new Date(mainStart); start.setFullYear(start.getFullYear()-2);
      let end = new Date(mainEnd); end.setFullYear(end.getFullYear()-2);
      return { start, end };
    }
    if (compType === 'custom' && customStart && customEnd) {
      return { start: new Date(customStart), end: new Date(customEnd) };
    }
    return null;
  }

  async function fetchTransactions(start, end) {
    if (!currentUser) return [];
    try {
      const q = collection(db, "users", currentUser.uid, "transactions");
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(tx => {
        if (!tx.DATE) return false;
        let d = tx.DATE.toDate ? tx.DATE.toDate() : new Date(tx.DATE);
        return d >= start && d <= end;
      });
    } catch(e) { console.error(e); return []; }
  }

  async function loadCOA() {
    if (!currentUser) return {};
    try {
      const snap = await getDocs(collection(db, "users", currentUser.uid, "chartOfAccounts"));
      const map = {};
      snap.forEach(doc => {
        const data = doc.data();
        map[data.name] = { type: data.type, category: data.category };
      });
      return map;
    } catch(e) { return {}; }
  }

  function classifyAccount(name, coaInfo) {
    if (coaInfo && coaInfo.type) return coaInfo.type;
    const lower = name.toLowerCase();
    if (lower.includes('bank') || lower.includes('cash') || lower.includes('sbi') || lower.includes('axis') || lower.includes('hdfc')) return 'Asset';
    if (lower.includes('loan') || lower.includes('payable') || lower.includes('credit')) return 'Liability';
    if (lower.includes('equity') || lower.includes('capital') || lower.includes('retained')) return 'Equity';
    if (lower.includes('sale') || lower.includes('revenue') || lower.includes('income')) return 'Income';
    if (lower.includes('expense') || lower.includes('cost') || lower.includes('salary') || lower.includes('petrol')) return 'Expense';
    return 'Expense';
  }

  function isBankAccount(name, coaInfo) {
    if (coaInfo && coaInfo.type === 'Asset' && coaInfo.category === 'Bank') return true;
    const lower = name.toLowerCase();
    return lower.includes('bank') || lower.includes('cash') || lower.includes('sbi') || lower.includes('axis');
  }

  function computeBalanceSheet(transactions, coaMap) {
    let banks = {}, otherAssets = {}, liabilities = {}, equity = {};
    transactions.forEach(tx => {
      const acc = tx.ACCOUNT_HEADER || "Uncategorized";
      const inc = parseFloat(tx.INCOME) || 0;
      const exp = parseFloat(tx.EXPENSE) || 0;
      const net = inc - exp;
      if (net === 0) return;
      const coaInfo = coaMap[acc];
      const type = classifyAccount(acc, coaInfo);
      if (type === 'Asset') {
        if (isBankAccount(acc, coaInfo)) {
          banks[acc] = (banks[acc] || 0) + net;
        } else {
          otherAssets[acc] = (otherAssets[acc] || 0) + net;
        }
      } else if (type === 'Liability') {
        liabilities[acc] = (liabilities[acc] || 0) + net;
      } else if (type === 'Equity') {
        equity[acc] = (equity[acc] || 0) + net;
      } else if (type === 'Income') {
        equity[acc] = (equity[acc] || 0) + net;
      } else if (type === 'Expense') {
        equity[acc] = (equity[acc] || 0) - Math.abs(net);
      }
    });
    return { banks, otherAssets, liabilities, equity };
  }

  function computeCashFlow(transactions, coaMap) {
    let operating = 0, investing = 0, financing = 0;
    transactions.forEach(tx => {
      const inc = parseFloat(tx.INCOME) || 0;
      const exp = parseFloat(tx.EXPENSE) || 0;
      const net = inc - exp;
      const acc = tx.ACCOUNT_HEADER || "Uncategorized";
      const coaInfo = coaMap[acc];
      const type = classifyAccount(acc, coaInfo);
      const lower = acc.toLowerCase();
      if (type === 'Income' || type === 'Expense') {
        operating += net;
      } else if (lower.includes('asset') && (lower.includes('purchase') || lower.includes('equipment'))) {
        investing -= Math.abs(net);
      } else if (lower.includes('loan') || lower.includes('capital') || lower.includes('dividend')) {
        financing += net;
      } else if (type === 'Asset' && net < 0) {
        investing += net;
      } else if (type === 'Liability' && net > 0) {
        financing += net;
      }
    });
    return { operating, investing, financing, netCash: operating + investing + financing };
  }

  async function loadAllPeriods() {
    const periodType = document.getElementById("reportPeriod").value;
    const customStart = document.getElementById("startDate").value, customEnd = document.getElementById("endDate").value;
    const { start, end } = getDateRange(periodType, customStart, customEnd);
    currentPeriod = { start, end, text: formatPeriod(start, end) };
    const compType = document.getElementById("comparisonType").value;
    showThree = (compType === 'twoQuartersBack' || compType === 'twoYearsBack');
    const compRange = getComparisonRange(start, end, compType, document.getElementById("compareStartDate").value, document.getElementById("compareEndDate").value);
    
    const allTxs = await fetchTransactions(new Date(2000,0,1), new Date(2100,0,1));
    const coaMap = await loadCOA();
    
    function getDataForRange(range) {
      const filtered = allTxs.filter(tx => {
        let d = tx.DATE.toDate ? tx.DATE.toDate() : new Date(tx.DATE);
        return d >= range.start && d <= range.end;
      });
      const bs = computeBalanceSheet(filtered, coaMap);
      const cf = computeCashFlow(filtered, coaMap);
      return { bs, cf, text: formatPeriod(range.start, range.end) };
    }
    
    currentBS = computeBalanceSheet(allTxs.filter(tx => {
      let d = tx.DATE.toDate ? tx.DATE.toDate() : new Date(tx.DATE);
      return d >= start && d <= end;
    }), coaMap);
    currentCF = computeCashFlow(allTxs.filter(tx => {
      let d = tx.DATE.toDate ? tx.DATE.toDate() : new Date(tx.DATE);
      return d >= start && d <= end;
    }), coaMap);
    
    if (compRange) {
      const p1 = getDataForRange(compRange);
      prev1Period = { bs: p1.bs, cf: p1.cf, text: p1.text };
      if (showThree) {
        const compRange2 = getComparisonRange(compRange.start, compRange.end, compType, document.getElementById("compareStartDate").value, document.getElementById("compareEndDate").value);
        if (compRange2) {
          const p2 = getDataForRange(compRange2);
          prev2Period = { bs: p2.bs, cf: p2.cf, text: p2.text };
        } else prev2Period = null;
      } else prev2Period = null;
    } else { prev1Period = null; prev2Period = null; }
    renderPeriodHeader();
    renderBalanceSheet();
    renderCashFlow();
    renderCharts();
  }

  function renderPeriodHeader() {
    document.getElementById("currentPeriodLabel").innerHTML = currentPeriod.text;
    if (prev1Period) {
      document.getElementById("prev1Wrapper").style.display = "flex";
      document.getElementById("prev1PeriodLabel").innerHTML = prev1Period.text;
    } else document.getElementById("prev1Wrapper").style.display = "none";
    if (prev2Period && showThree) {
      document.getElementById("prev2Wrapper").style.display = "flex";
      document.getElementById("prev2PeriodLabel").innerHTML = prev2Period.text;
    } else document.getElementById("prev2Wrapper").style.display = "none";
  }

  function renderBalanceSheet() {
    if (!currentBS) return;
    const curr = currentBS;
    const p1 = prev1Period?.bs, p2 = prev2Period?.bs;
    const totalAssets = (Object.values(curr.banks).reduce((a,b)=>a+b,0) + Object.values(curr.otherAssets).reduce((a,b)=>a+b,0));
    const totalLiab = Object.values(curr.liabilities).reduce((a,b)=>a+b,0);
    const totalEq = Object.values(curr.equity).reduce((a,b)=>a+b,0);
    const balanced = Math.abs(totalAssets - (totalLiab + totalEq)) < 0.01;
    document.getElementById("bsTotalAssets").innerHTML = formatINR(totalAssets);
    document.getElementById("bsTotalLiabilities").innerHTML = formatINR(totalLiab);
    document.getElementById("bsTotalEquity").innerHTML = formatINR(totalEq);
    const validationDiv = document.getElementById("bsValidation");
    validationDiv.innerHTML = balanced ? '<i class="fas fa-check-circle"></i> Balance Sheet Balanced ✓' : '<i class="fas fa-exclamation-triangle"></i> Out of Balance! Assets ≠ Liabilities + Equity';
    validationDiv.className = balanced ? "balance-validation balance-valid" : "balance-validation balance-invalid";
    if (p1) {
      const p1Assets = (Object.values(p1.banks).reduce((a,b)=>a+b,0) + Object.values(p1.otherAssets).reduce((a,b)=>a+b,0));
      const change = ((totalAssets - p1Assets)/p1Assets*100).toFixed(1);
      document.getElementById("bsAssetsTrend").innerHTML = `<span class="${change>=0?'trend-up':'trend-down'}"><i class="fas ${change>=0?'fa-arrow-up':'fa-arrow-down'}"></i> ${Math.abs(change)}% vs prev</span>`;
    } else document.getElementById("bsAssetsTrend").innerHTML = "";
    // Assets breakdown
    const assetsContainer = document.getElementById("assetsBreakdown");
    let assetsHtml = `<div class="bs-item"><div><strong>Bank Accounts</strong></div><div class="amount positive">${formatINR(Object.values(curr.banks).reduce((a,b)=>a+b,0))}</div></div>`;
    for (let [name, val] of Object.entries(curr.banks)) {
      assetsHtml += `<div class="bs-item" style="margin-left:20px;"><div>${name}</div><div class="amount positive">${formatINR(val)}</div></div>`;
    }
    assetsHtml += `<div class="bs-item"><div><strong>Other Assets</strong></div><div class="amount positive">${formatINR(Object.values(curr.otherAssets).reduce((a,b)=>a+b,0))}</div></div>`;
    for (let [name, val] of Object.entries(curr.otherAssets)) {
      assetsHtml += `<div class="bs-item" style="margin-left:20px;"><div>${name}</div><div class="amount positive">${formatINR(val)}</div></div>`;
    }
    assetsHtml += `<div class="bs-item bs-total"><div><strong>Total Assets</strong></div><div class="amount positive">${formatINR(totalAssets)}</div></div>`;
    assetsContainer.innerHTML = assetsHtml;
    // Liabilities
    let liabHtml = '';
    for (let [name, val] of Object.entries(curr.liabilities)) liabHtml += `<div class="bs-item"><div>${name}</div><div class="amount negative">${formatINR(val)}</div></div>`;
    liabHtml += `<div class="bs-item bs-total"><div><strong>Total Liabilities</strong></div><div class="amount negative">${formatINR(totalLiab)}</div></div>`;
    document.getElementById("liabilitiesBreakdown").innerHTML = liabHtml;
    // Equity
    let eqHtml = '';
    for (let [name, val] of Object.entries(curr.equity)) eqHtml += `<div class="bs-item"><div>${name}</div><div class="amount ${val>=0?'positive':'negative'}">${formatINR(val)}</div></div>`;
    eqHtml += `<div class="bs-item bs-total"><div><strong>Total Equity</strong></div><div class="amount ${totalEq>=0?'positive':'negative'}">${formatINR(totalEq)}</div></div>`;
    document.getElementById("equityBreakdown").innerHTML = eqHtml;
  }

  function renderCashFlow() {
    if (!currentCF) return;
    const curr = currentCF;
    const p1 = prev1Period?.cf, p2 = prev2Period?.cf;
    document.getElementById("cfNetCash").innerHTML = formatINR(curr.netCash);
    document.getElementById("cfOperating").innerHTML = formatINR(curr.operating);
    document.getElementById("cfInvesting").innerHTML = formatINR(curr.investing);
    if (p1) {
      const change = ((curr.netCash - p1.netCash)/Math.abs(p1.netCash||1)*100).toFixed(1);
      document.getElementById("cfTrend").innerHTML = `<span class="${change>=0?'trend-up':'trend-down'}"><i class="fas ${change>=0?'fa-arrow-up':'fa-arrow-down'}"></i> ${Math.abs(change)}% vs prev</span>`;
    } else document.getElementById("cfTrend").innerHTML = "";
    let cfHtml = `<div class="bs-item"><div><strong>Cash Flow from Operating Activities</strong></div><div class="amount ${curr.operating>=0?'positive':'negative'}">${formatINR(curr.operating)}</div></div>`;
    cfHtml += `<div class="bs-item"><div><strong>Cash Flow from Investing Activities</strong></div><div class="amount ${curr.investing>=0?'positive':'negative'}">${formatINR(curr.investing)}</div></div>`;
    cfHtml += `<div class="bs-item"><div><strong>Cash Flow from Financing Activities</strong></div><div class="amount ${curr.financing>=0?'positive':'negative'}">${formatINR(curr.financing)}</div></div>`;
    cfHtml += `<div class="bs-item bs-total"><div><strong>Net Cash Flow</strong></div><div class="amount ${curr.netCash>=0?'positive':'negative'}">${formatINR(curr.netCash)}</div></div>`;
    document.getElementById("cashflowBreakdown").innerHTML = cfHtml;
  }

  function renderCharts() {
    if (!currentBS || !currentCF) return;
    const ctx1 = document.getElementById("bsChart").getContext("2d");
    if (bsChart) bsChart.destroy();
    const totalAssets = (Object.values(currentBS.banks).reduce((a,b)=>a+b,0) + Object.values(currentBS.otherAssets).reduce((a,b)=>a+b,0));
    const totalLiab = Object.values(currentBS.liabilities).reduce((a,b)=>a+b,0);
    const totalEq = Object.values(currentBS.equity).reduce((a,b)=>a+b,0);
    bsChart = new Chart(ctx1, {
      type: document.getElementById("chartType").value,
      data: { labels: ["Assets", "Liabilities", "Equity"], datasets: [{ data: [totalAssets, totalLiab, totalEq], backgroundColor: ["#10b981", "#ef4444", "#3b82f6"] }] },
      options: { responsive: true, plugins: { tooltip: { callbacks: { label: ctx => `${ctx.label}: ${formatINR(ctx.raw)}` } } } }
    });
    const ctx2 = document.getElementById("cfChart").getContext("2d");
    if (cfChart) cfChart.destroy();
    cfChart = new Chart(ctx2, {
      type: 'bar',
      data: { labels: ["Operating", "Investing", "Financing"], datasets: [{ data: [currentCF.operating, currentCF.investing, currentCF.financing], backgroundColor: ["#10b981", "#f59e0b", "#3b82f6"] }] },
      options: { responsive: true, plugins: { tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${formatINR(ctx.raw)}` } } } }
    });
  }

  function exportToExcel() {
    if (!currentBS || !currentCF) {
      Swal.fire("No Data", "Please generate a report first.", "warning");
      return;
    }
    const activeTab = document.querySelector(".tab-content.active").id;
    const wsData = [];
    if (activeTab === "balanceSheetTab") {
      wsData.push(["Balance Sheet", currentPeriod.text]);
      wsData.push([]);
      wsData.push(["Assets"]);
      wsData.push(["Bank Accounts", (Object.values(currentBS.banks).reduce((a,b)=>a+b,0))]);
      for (let [n,v] of Object.entries(currentBS.banks)) wsData.push([`  ${n}`, v]);
      wsData.push(["Other Assets", (Object.values(currentBS.otherAssets).reduce((a,b)=>a+b,0))]);
      for (let [n,v] of Object.entries(currentBS.otherAssets)) wsData.push([`  ${n}`, v]);
      wsData.push(["Total Assets", (Object.values(currentBS.banks).reduce((a,b)=>a+b,0)+Object.values(currentBS.otherAssets).reduce((a,b)=>a+b,0))]);
      wsData.push([]);
      wsData.push(["Liabilities"]);
      for (let [n,v] of Object.entries(currentBS.liabilities)) wsData.push([n, v]);
      wsData.push(["Total Liabilities", Object.values(currentBS.liabilities).reduce((a,b)=>a+b,0)]);
      wsData.push([]);
      wsData.push(["Equity"]);
      for (let [n,v] of Object.entries(currentBS.equity)) wsData.push([n, v]);
      wsData.push(["Total Equity", Object.values(currentBS.equity).reduce((a,b)=>a+b,0)]);
    } else {
      wsData.push(["Cash Flow Statement", currentPeriod.text]);
      wsData.push([]);
      wsData.push(["Operating", currentCF.operating]);
      wsData.push(["Investing", currentCF.investing]);
      wsData.push(["Financing", currentCF.financing]);
      wsData.push(["Net Cash Flow", currentCF.netCash]);
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsData), activeTab === "balanceSheetTab" ? "Balance Sheet" : "Cash Flow");
    XLSX.writeFile(wb, `${activeTab === "balanceSheetTab" ? "Balance_Sheet" : "Cash_Flow"}_${currentPeriod.text.replace(/[^a-z0-9]/gi,'_')}.xlsx`);
    Swal.fire("Success", "Excel exported", "success");
  }

  function exportToPDF() {
    if (!currentBS || !currentCF) {
      Swal.fire("No Data", "Please generate a report first.", "warning");
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    doc.setFillColor(30,64,175); doc.rect(0,0,297,45,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(22);
    const activeTab = document.querySelector(".tab-content.active").id;
    const title = activeTab === "balanceSheetTab" ? "BALANCE SHEET" : "CASH FLOW STATEMENT";
    doc.text(title,148,20,{align:'center'});
    doc.setFontSize(10); doc.text(`Period: ${currentPeriod.text}`,148,32,{align:'center'});
    if (prev1Period) doc.text(`Compared to: ${prev1Period.text}`,148,38,{align:'center'});
    doc.setTextColor(0,0,0);
    let tableData = [];
    if (activeTab === "balanceSheetTab") {
      tableData = [
        ["Assets", "Amount"],
        ["Bank Accounts", (Object.values(currentBS.banks).reduce((a,b)=>a+b,0))],
        ...Object.entries(currentBS.banks).map(([n,v]) => [`  ${n}`, v]),
        ["Other Assets", (Object.values(currentBS.otherAssets).reduce((a,b)=>a+b,0))],
        ...Object.entries(currentBS.otherAssets).map(([n,v]) => [`  ${n}`, v]),
        ["Total Assets", (Object.values(currentBS.banks).reduce((a,b)=>a+b,0)+Object.values(currentBS.otherAssets).reduce((a,b)=>a+b,0))],
        [],
        ["Liabilities", ""],
        ...Object.entries(currentBS.liabilities).map(([n,v]) => [n, v]),
        ["Total Liabilities", Object.values(currentBS.liabilities).reduce((a,b)=>a+b,0)],
        [],
        ["Equity", ""],
        ...Object.entries(currentBS.equity).map(([n,v]) => [n, v]),
        ["Total Equity", Object.values(currentBS.equity).reduce((a,b)=>a+b,0)]
      ];
    } else {
      tableData = [
        ["Cash Flow", "Amount"],
        ["Operating", currentCF.operating],
        ["Investing", currentCF.investing],
        ["Financing", currentCF.financing],
        ["Net Cash Flow", currentCF.netCash]
      ];
    }
    doc.autoTable({ startY: 50, head: [[""]], body: tableData, theme: 'grid', styles: { fontSize: 8 } });
    doc.save(`${activeTab === "balanceSheetTab" ? "Balance_Sheet" : "Cash_Flow"}_${new Date().toISOString().slice(0,10)}.pdf`);
    Swal.fire("Success", "PDF generated", "success");
  }

  function setDefaultDates() {
    const today = new Date();
    document.getElementById("startDate").value = formatDateShort(new Date(today.getFullYear(), today.getMonth(), 1));
    document.getElementById("endDate").value = formatDateShort(new Date(today.getFullYear(), today.getMonth()+1, 0));
    document.getElementById("compareStartDate").value = formatDateShort(new Date(today.getFullYear(), today.getMonth()-1, 1));
    document.getElementById("compareEndDate").value = formatDateShort(new Date(today.getFullYear(), today.getMonth(), 0));
  }

  document.getElementById("reportPeriod").addEventListener("change",()=>{ document.getElementById("customDateRange").style.display = document.getElementById("reportPeriod").value==="custom"?"flex":"none"; });
  document.getElementById("comparisonType").addEventListener("change",()=>{ document.getElementById("customComparisonRange").style.display = document.getElementById("comparisonType").value==="custom"?"flex":"none"; });
  document.getElementById("generateBtn").addEventListener("click", async () => { const loading = document.getElementById("loadingModal"); loading.style.display="flex"; await loadAllPeriods(); loading.style.display="none"; });
  document.getElementById("exportExcel").addEventListener("click", exportToExcel);
  document.getElementById("exportPDF").addEventListener("click", exportToPDF);
  document.getElementById("chartType").addEventListener("change", renderCharts);
  document.getElementById("homeBtn").addEventListener("click",()=>{ window.location.href="home.html"; });
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      const activeId = btn.dataset.tab + "Tab";
      document.getElementById(activeId).classList.add("active");
      if (activeId === "balanceSheetTab") {
        renderBalanceSheet();
        if (bsChart) bsChart.update();
      } else {
        renderCashFlow();
        if (cfChart) cfChart.update();
      }
    });
  });
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      const name = user.displayName || user.email?.split('@')[0] || "User";
      document.getElementById("username").innerHTML = name;
      document.getElementById("userInitials").innerHTML = name.charAt(0).toUpperCase();
      setDefaultDates();
      const loading = document.getElementById("loadingModal");
      loading.style.display = "flex";
      await loadAllPeriods();
      loading.style.display = "none";
    } else window.location.href = "index.html";
  });
  document.getElementById("logoutBtn").addEventListener("click", async () => { await signOut(auth); window.location.href = "index.html"; });
</script>
</body>
