<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Financial Statements | Balance Sheet & Cash Flow</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f8;
            color: #1e293b;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f2b3d, #1a4a6f);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        .logo i {
            font-size: 28px;
            color: #60a5fa;
        }
        .logo span {
            font-weight: 800;
            font-size: 1.3rem;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
        }
        #userInitials {
            background: #3b82f6;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        button {
            background: #ef4444;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .btn-secondary {
            background: #3b82f6;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Filter Panel */
        .filter-panel {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: space-between;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 160px;
        }
        .filter-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
        }
        select, input {
            padding: 10px 16px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 0.85rem;
            background: white;
            cursor: pointer;
        }
        .btn-primary {
            background: #1e40af;
            padding: 10px 24px;
        }

        /* Comparison Panel */
        .comparison-panel {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            border: 1px solid #e2e8f0;
        }
        .period-header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 16px;
            padding: 14px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .period-badge {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .period-badge i {
            margin-right: 8px;
            color: #60a5fa;
        }

        /* Export Bar */
        .export-bar {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 24px;
        }
        .export-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .export-btn:hover {
            border-color: #1e40af;
            color: #1e40af;
            transform: translateY(-1px);
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15);
        }
        .kpi-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .kpi-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
        }
        .kpi-trend {
            font-size: 0.7rem;
            margin-top: 8px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .trend-up { color: #10b981; font-weight: 600; }
        .trend-down { color: #ef4444; font-weight: 600; }

        /* Financial Tables */
        .statement-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .card-header {
            background: #f9fafb;
            padding: 16px 24px;
            border-bottom: 2px solid #e2e8f0;
        }
        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .financial-table {
            width: 100%;
            border-collapse: collapse;
        }
        .financial-table th {
            text-align: left;
            padding: 12px 16px;
            background: #f8fafc;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }
        .financial-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.8rem;
        }
        .financial-table tr:hover {
            background: #fefce8;
        }
        .amount {
            text-align: right;
            font-family: monospace;
            font-weight: 600;
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .total-row {
            background: #fefce8;
            font-weight: 800;
            border-top: 2px solid #e2e8f0;
        }
        .section-title td {
            background: #f1f5f9;
            font-weight: 800;
            font-size: 0.85rem;
        }
        .sub-item td:first-child {
            padding-left: 40px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: #1e40af;
            color: white;
            border-color: #1e40af;
        }
        .footer-note {
            padding: 12px 24px;
            background: #fafcff;
            font-size: 0.7rem;
            color: #64748b;
            border-top: 1px solid #edf2f8;
            text-align: right;
        }
        .loading-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
        }
        @media (max-width: 768px) {
            body { padding: 12px; }
            .kpi-value { font-size: 1.3rem; }
            .financial-table th, .financial-table td { padding: 8px 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            <span>FinVision Pro</span>
        </div>
        <div class="user-area">
            <div class="user-badge">
                <div id="userInitials">U</div>
                <span id="username">User</span>
            </div>
            <button id="logoutBtn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-group">
                <label><i class="fas fa-calendar"></i> BASE PERIOD</label>
                <select id="basePeriod">
                    <option value="month" selected>This Month</option>
                    <option value="lastMonth">Last Month</option>
                    <option value="quarter">This Quarter</option>
                    <option value="year">This Year</option>
                    <option value="custom">Custom Range</option>
                </select>
            </div>
            <div id="customBaseDiv" style="display:none; display: flex; gap: 10px;">
                <div class="filter-group"><label>FROM</label><input type="date" id="baseStart"></div>
                <div class="filter-group"><label>TO</label><input type="date" id="baseEnd"></div>
            </div>
            <button id="updateBtn" class="btn-primary"><i class="fas fa-sync-alt"></i> Update</button>
        </div>
    </div>

    <!-- Comparison Panel - Multi Period (Up to 3 Comparisons) -->
    <div class="comparison-panel">
        <div class="filter-group">
            <label><i class="fas fa-chart-line"></i> COMPARE 1</label>
            <select id="comp1Type">
                <option value="none">None</option>
                <option value="previousPeriod">Previous Period (Same Length)</option>
                <option value="previousMonth">Previous Month</option>
                <option value="previousQuarter">Previous Quarter</option>
                <option value="previousYear">Previous Year</option>
                <option value="custom">Custom Range</option>
            </select>
        </div>
        <div id="customComp1Div" style="display:none; display: flex; gap: 8px;">
            <input type="date" id="comp1Start" placeholder="Start">
            <input type="date" id="comp1End" placeholder="End">
        </div>
        
        <div class="filter-group">
            <label><i class="fas fa-chart-line"></i> COMPARE 2</label>
            <select id="comp2Type">
                <option value="none">None</option>
                <option value="previousPeriod">Previous Period</option>
                <option value="previousMonth">Previous Month</option>
                <option value="previousQuarter">Previous Quarter</option>
                <option value="previousYear">Previous Year</option>
                <option value="twoYearsBack">Two Years Back</option>
                <option value="custom">Custom Range</option>
            </select>
        </div>
        <div id="customComp2Div" style="display:none; display: flex; gap: 8px;">
            <input type="date" id="comp2Start" placeholder="Start">
            <input type="date" id="comp2End" placeholder="End">
        </div>
        
        <div class="filter-group">
            <label><i class="fas fa-chart-line"></i> COMPARE 3</label>
            <select id="comp3Type">
                <option value="none">None</option>
                <option value="previousYear">Previous Year</option>
                <option value="twoYearsBack">Two Years Back</option>
                <option value="custom">Custom Range</option>
            </select>
        </div>
        <div id="customComp3Div" style="display:none; display: flex; gap: 8px;">
            <input type="date" id="comp3Start" placeholder="Start">
            <input type="date" id="comp3End" placeholder="End">
        </div>
    </div>

    <!-- Period Labels -->
    <div class="period-header">
        <div class="period-badge"><i class="fas fa-calendar-alt"></i> Current: <span id="currentLabel">-</span></div>
        <div class="period-badge" id="comp1LabelWrapper" style="display:none;"><i class="fas fa-calendar-week"></i> Comparison 1: <span id="comp1Label">-</span></div>
        <div class="period-badge" id="comp2LabelWrapper" style="display:none;"><i class="fas fa-calendar-minus"></i> Comparison 2: <span id="comp2Label">-</span></div>
        <div class="period-badge" id="comp3LabelWrapper" style="display:none;"><i class="fas fa-calendar-minus"></i> Comparison 3: <span id="comp3Label">-</span></div>
    </div>

    <!-- Export Bar -->
    <div class="export-bar">
        <button id="exportExcelBtn" class="export-btn"><i class="fas fa-file-excel"></i> Export Excel</button>
        <button id="exportPDFBtn" class="export-btn"><i class="fas fa-file-pdf"></i> Export PDF</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="bs">📊 Balance Sheet</button>
        <button class="tab" data-tab="cf">💰 Cash Flow Statement</button>
    </div>

    <!-- Balance Sheet Panel -->
    <div id="bsPanel" class="statement-card">
        <div class="card-header">
            <h3><i class="fas fa-balance-scale"></i> Balance Sheet</h3>
        </div>
        <div style="overflow-x: auto;">
            <table class="financial-table" id="bsTable">
                <thead id="bsHeader"></thead>
                <tbody id="bsBody"></tbody>
            </table>
        </div>
        <div class="footer-note">Assets = Liabilities + Equity | Based on Chart of Accounts & Transactions</div>
    </div>

    <!-- Cash Flow Panel -->
    <div id="cfPanel" class="statement-card" style="display: none;">
        <div class="card-header">
            <h3><i class="fas fa-money-bill-wave"></i> Cash Flow Statement (Indirect Method)</h3>
        </div>
        <div style="overflow-x: auto;">
            <table class="financial-table" id="cfTable">
                <thead id="cfHeader"></thead>
                <tbody id="cfBody"></tbody>
            </table>
        </div>
        <div class="footer-note">Net Income + Non-cash Adjustments + Changes in Working Capital</div>
    </div>
</div>

<div id="loadingModal" class="loading-modal"><div class="loading-content"><i class="fas fa-spinner fa-spin fa-3x"></i><p>Loading Financial Data...</p></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
        authDomain: "budget-app-1365f.firebaseapp.com",
        projectId: "budget-app-1365f",
        storageBucket: "budget-app-1365f.appspot.com",
        messagingSenderId: "1036194450411",
        appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allTransactions = [];
    let chartOfAccounts = [];

    function formatCurrency(amt) {
        return `₹${amt.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function formatNumberRaw(amt) {
        return amt.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatDateShort(d) {
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function formatPeriod(start, end) {
        return `${start.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})} – ${end.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}`;
    }

    function getDateRange(option, customStart = null, customEnd = null) {
        const today = new Date();
        let start, end;
        if (option === 'month') {
            start = new Date(today.getFullYear(), today.getMonth(), 1);
            end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
        } else if (option === 'lastMonth') {
            start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            end = new Date(today.getFullYear(), today.getMonth(), 0);
        } else if (option === 'quarter') {
            const q = Math.floor(today.getMonth() / 3);
            start = new Date(today.getFullYear(), q * 3, 1);
            end = new Date(today.getFullYear(), (q + 1) * 3, 0);
        } else if (option === 'year') {
            start = new Date(today.getFullYear(), 0, 1);
            end = new Date(today.getFullYear(), 11, 31);
        } else if (option === 'previousYear') {
            start = new Date(today.getFullYear() - 1, 0, 1);
            end = new Date(today.getFullYear() - 1, 11, 31);
        } else if (option === 'twoYearsBack') {
            start = new Date(today.getFullYear() - 2, 0, 1);
            end = new Date(today.getFullYear() - 2, 11, 31);
        } else if (option === 'previousPeriod' && customStart && customEnd) {
            // For dynamic previous period based on base range
            const duration = customEnd - customStart;
            const prevEnd = new Date(customStart.getTime() - 1);
            const prevStart = new Date(prevEnd.getTime() - duration);
            return { start: prevStart, end: prevEnd };
        } else {
            start = new Date(customStart);
            end = new Date(customEnd);
        }
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);
        return { start, end };
    }

    function getComparisonRange(baseStart, baseEnd, compType, customStart = null, customEnd = null) {
        if (compType === 'none') return null;
        if (compType === 'previousPeriod') {
            const duration = baseEnd - baseStart;
            const prevEnd = new Date(baseStart.getTime() - 1);
            const prevStart = new Date(prevEnd.getTime() - duration);
            return { start: prevStart, end: prevEnd };
        }
        if (compType === 'previousMonth') {
            let start = new Date(baseStart);
            start.setDate(1);
            start.setMonth(start.getMonth() - 1);
            let end = new Date(start.getFullYear(), start.getMonth() + 1, 0);
            return { start, end };
        }
        if (compType === 'previousQuarter') {
            let start = new Date(baseStart);
            let quarterStartMonth = Math.floor(start.getMonth() / 3) * 3;
            start = new Date(start.getFullYear(), quarterStartMonth - 3, 1);
            let end = new Date(start.getFullYear(), start.getMonth() + 3, 0);
            return { start, end };
        }
        if (compType === 'previousYear') {
            let start = new Date(baseStart);
            start.setFullYear(start.getFullYear() - 1);
            let end = new Date(baseEnd);
            end.setFullYear(end.getFullYear() - 1);
            return { start, end };
        }
        if (compType === 'twoYearsBack') {
            let start = new Date(baseStart);
            start.setFullYear(start.getFullYear() - 2);
            let end = new Date(baseEnd);
            end.setFullYear(end.getFullYear() - 2);
            return { start, end };
        }
        if (compType === 'custom' && customStart && customEnd) {
            return { start: new Date(customStart), end: new Date(customEnd) };
        }
        return null;
    }

    async function loadFirebaseData() {
        if (!currentUser) return;
        const accSnap = await getDocs(collection(db, "users", currentUser.uid, "chartOfAccounts"));
        chartOfAccounts = accSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        const txSnap = await getDocs(collection(db, "users", currentUser.uid, "transactions"));
        allTransactions = txSnap.docs.map(doc => {
            const d = doc.data();
            return {
                id: doc.id,
                ACCOUNT_HEADER: d.ACCOUNT_HEADER || "Uncategorized",
                EXPENSE: Number(d.EXPENSE || 0),
                INCOME: Number(d.INCOME || 0),
                DATE: d.DATE ? (d.DATE.toDate ? d.DATE.toDate() : new Date(d.DATE)) : null
            };
        }).filter(t => t.DATE && !isNaN(t.DATE));
    }

    function getAccountTypeMap() {
        const map = new Map();
        chartOfAccounts.forEach(acc => map.set(acc.name, acc.type));
        return map;
    }

    async function fetchTransactionsForRange(start, end) {
        return allTransactions.filter(tx => tx.DATE >= start && tx.DATE <= end);
    }

    function processPeriodTotals(transactions) {
        const typeMap = getAccountTypeMap();
        const balances = new Map();
        for (const tx of transactions) {
            const acc = tx.ACCOUNT_HEADER;
            if (!balances.has(acc)) balances.set(acc, { debit: 0, credit: 0 });
            const bal = balances.get(acc);
            bal.debit += tx.EXPENSE;
            bal.credit += tx.INCOME;
        }
        const assets = [], liabilities = [], equity = [], income = [], expenses = [];
        for (let [name, { debit, credit }] of balances.entries()) {
            let type = typeMap.get(name) || "Expense";
            const net = credit - debit;
            const entry = { name, balance: net };
            if (type === "Asset") assets.push(entry);
            else if (type === "Liability") liabilities.push(entry);
            else if (type === "Equity") equity.push(entry);
            else if (type === "Income") income.push(entry);
            else expenses.push(entry);
        }
        const totalIncome = income.reduce((s,i)=> s + i.balance, 0);
        const totalExpense = expenses.reduce((s,e)=> s + e.balance, 0);
        const netIncome = totalIncome - totalExpense;
        return { assets, liabilities, equity, netIncome, totalIncome, totalExpense };
    }

    async function loadReport() {
        const loading = document.getElementById("loadingModal");
        loading.style.display = "flex";
        try {
            const baseOption = document.getElementById("basePeriod").value;
            let baseStart, baseEnd;
            if (baseOption === "custom") {
                baseStart = new Date(document.getElementById("baseStart").value);
                baseEnd = new Date(document.getElementById("baseEnd").value);
            } else {
                const range = getDateRange(baseOption);
                baseStart = range.start;
                baseEnd = range.end;
            }
            baseEnd.setHours(23,59,59,999);
            
            const baseTransactions = await fetchTransactionsForRange(baseStart, baseEnd);
            const baseTotals = processPeriodTotals(baseTransactions);
            
            const comps = [];
            const compTypes = ['comp1', 'comp2', 'comp3'];
            for (let i = 0; i < compTypes.length; i++) {
                const type = document.getElementById(`${compTypes[i]}Type`).value;
                if (type !== 'none') {
                    let compStart, compEnd;
                    if (type === 'custom') {
                        compStart = new Date(document.getElementById(`${compTypes[i]}Start`).value);
                        compEnd = new Date(document.getElementById(`${compTypes[i]}End`).value);
                    } else {
                        const range = getComparisonRange(baseStart, baseEnd, type, null, null);
                        if (range) {
                            compStart = range.start;
                            compEnd = range.end;
                        }
                    }
                    if (compStart && compEnd) {
                        compEnd.setHours(23,59,59,999);
                        const compTransactions = await fetchTransactionsForRange(compStart, compEnd);
                        const compTotals = processPeriodTotals(compTransactions);
                        comps.push({ label: formatPeriod(compStart, compEnd), totals: compTotals });
                        document.getElementById(`${compTypes[i]}Label`).innerText = formatPeriod(compStart, compEnd);
                        document.getElementById(`${compTypes[i]}LabelWrapper`).style.display = "flex";
                    } else {
                        document.getElementById(`${compTypes[i]}LabelWrapper`).style.display = "none";
                    }
                } else {
                    document.getElementById(`${compTypes[i]}LabelWrapper`).style.display = "none";
                }
            }
            
            document.getElementById("currentLabel").innerHTML = formatPeriod(baseStart, baseEnd);
            
            renderBalanceSheet(baseTotals, comps);
            renderCashFlow(baseTotals, comps);
            
            Swal.fire("Success", "Financial statements updated", "success");
        } catch(err) {
            Swal.fire("Error", err.message, "error");
        } finally {
            loading.style.display = "none";
        }
    }

    function renderBalanceSheet(current, comparisons) {
        const headers = ["Account"];
        headers.push("Current Period");
        comparisons.forEach((c, idx) => headers.push(`Comparison ${idx+1}`));
        
        const thead = document.getElementById("bsHeader");
        thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
        
        const mergeSection = (items, sectionName) => {
            let rows = '';
            const allNames = new Set([...items.map(i=>i.name), ...comparisons.flatMap(c=>c.totals.assets.map(a=>a.name))]);
            for (let name of allNames) {
                const curr = items.find(i=>i.name===name)?.balance || 0;
                let row = `<tr class="sub-item"><td>${name}</td><td class="amount">${formatCurrency(curr)}</td>`;
                for (let comp of comparisons) {
                    const compVal = comp.totals.assets.find(a=>a.name===name)?.balance || 0;
                    row += `<td class="amount">${formatCurrency(compVal)}</td>`;
                }
                row += `</tr>`;
                rows += row;
            }
            const totalCurr = items.reduce((s,i)=>s+i.balance,0);
            let totalRow = `<tr class="total-row"><td><strong>Total ${sectionName}</strong></td><td class="amount"><strong>${formatCurrency(totalCurr)}</strong></td>`;
            for (let comp of comparisons) {
                const totalComp = comp.totals.assets.reduce((s,a)=>s+a.balance,0);
                totalRow += `<td class="amount"><strong>${formatCurrency(totalComp)}</strong></td>`;
            }
            totalRow += `</tr>`;
            return rows + totalRow;
        };
        
        const assetsRows = mergeSection(current.assets, "ASSETS");
        const liabilitiesRows = mergeSection(current.liabilities, "LIABILITIES");
        const equityWithNet = [...current.equity, { name: "Net Income (Retained)", balance: current.netIncome }];
        let equityRows = '';
        for (let item of equityWithNet) {
            let row = `<tr class="sub-item"><td>${item.name}</td><td class="amount">${formatCurrency(item.balance)}</td>`;
            for (let comp of comparisons) {
                const compEq = [...comp.totals.equity, { name: "Net Income (Retained)", balance: comp.totals.netIncome }];
                const compVal = compEq.find(e=>e.name===item.name)?.balance || 0;
                row += `<td class="amount">${formatCurrency(compVal)}</td>`;
            }
            row += `</tr>`;
            equityRows += row;
        }
        const totalEquityCurr = equityWithNet.reduce((s,i)=>s+i.balance,0);
        let equityTotalRow = `<tr class="total-row"><td><strong>Total EQUITY</strong></td><td class="amount"><strong>${formatCurrency(totalEquityCurr)}</strong></td>`;
        for (let comp of comparisons) {
            const compEq = [...comp.totals.equity, { name: "Net Income (Retained)", balance: comp.totals.netIncome }];
            const totalComp = compEq.reduce((s,i)=>s+i.balance,0);
            equityTotalRow += `<td class="amount"><strong>${formatCurrency(totalComp)}</strong></td>`;
        }
        equityTotalRow += `</tr>`;
        
        const bsHtml = assetsRows + 
            `<tr class="section-title"><td colspan="${headers.length}"><strong>LIABILITIES & EQUITY</strong></td></tr>` +
            liabilitiesRows + equityRows + equityTotalRow;
        document.getElementById("bsBody").innerHTML = bsHtml;
    }
    
    function renderCashFlow(current, comparisons) {
        const headers = ["Cash Flow Category"];
        headers.push("Current Period");
        comparisons.forEach((c, idx) => headers.push(`Comparison ${idx+1}`));
        
        document.getElementById("cfHeader").innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
        
        const wcDeltaCur = (current.liabilities.reduce((s,l)=>s+l.balance,0) - current.assets.reduce((s,a)=>s+a.balance,0));
        const operatingCur = current.netIncome + wcDeltaCur;
        
        let rows = `<tr class="section-title"><td colspan="${headers.length}">Operating Activities</td></tr>`;
        rows += `<tr><td>Net Income</td><td class="amount">${formatCurrency(current.netIncome)}</td>`;
        for (let comp of comparisons) {
            rows += `<td class="amount">${formatCurrency(comp.totals.netIncome)}</td>`;
        }
        rows += `</tr>`;
        
        rows += `<tr><td>Working Capital Adjustments</td><td class="amount">${formatCurrency(wcDeltaCur)}</td>`;
        for (let comp of comparisons) {
            const wcDeltaComp = (comp.totals.liabilities.reduce((s,l)=>s+l.balance,0) - comp.totals.assets.reduce((s,a)=>s+a.balance,0));
            rows += `<td class="amount">${formatCurrency(wcDeltaComp)}</td>`;
        }
        rows += `</tr>`;
        
        rows += `<tr class="total-row"><td><strong>Net Cash from Operations</strong></td><td class="amount"><strong>${formatCurrency(operatingCur)}</strong></td>`;
        for (let comp of comparisons) {
            const wcDeltaComp = (comp.totals.liabilities.reduce((s,l)=>s+l.balance,0) - comp.totals.assets.reduce((s,a)=>s+a.balance,0));
            const operatingComp = comp.totals.netIncome + wcDeltaComp;
            rows += `<td class="amount"><strong>${formatCurrency(operatingComp)}</strong></td>`;
        }
        rows += `</tr>`;
        
        rows += `<tr class="section-title"><td colspan="${headers.length}">Investing & Financing</td></tr>`;
        rows += `<tr><td colspan="${headers.length}" style="text-align:center; color:#64748b;">Net cash flow from investing/financing activities: 0.00 (placeholder)</td></tr>`;
        rows += `<tr class="total-row"><td><strong>Net Cash Flow</strong></td><td class="amount"><strong>${formatCurrency(operatingCur)}</strong></td>`;
        for (let comp of comparisons) {
            const wcDeltaComp = (comp.totals.liabilities.reduce((s,l)=>s+l.balance,0) - comp.totals.assets.reduce((s,a)=>s+a.balance,0));
            const operatingComp = comp.totals.netIncome + wcDeltaComp;
            rows += `<td class="amount"><strong>${formatCurrency(operatingComp)}</strong></td>`;
        }
        rows += `</tr>`;
        
        document.getElementById("cfBody").innerHTML = rows;
    }

    function exportToExcel() {
        const tables = document.querySelectorAll(".financial-table");
        const wb = XLSX.utils.book_new();
        tables.forEach((table, idx) => {
            const ws = XLSX.utils.table_to_sheet(table, { raw: true });
            XLSX.utils.book_append_sheet(wb, ws, idx === 0 ? "Balance_Sheet" : "Cash_Flow");
        });
        XLSX.writeFile(wb, `Financial_Statements_${new Date().toISOString().slice(0,10)}.xlsx`);
        Swal.fire("Exported", "Excel file downloaded", "success");
    }

    async function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        doc.setFillColor(30,64,175);
        doc.rect(0,0,297,40,'F');
        doc.setTextColor(255,255,255);
        doc.setFontSize(20);
        doc.text("FINANCIAL STATEMENTS", 148, 20, { align: 'center' });
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 148, 32, { align: 'center' });
        doc.setTextColor(0,0,0);
        
        let yPos = 50;
        const tables = document.querySelectorAll(".financial-table");
        for (let i = 0; i < tables.length; i++) {
            if (i > 0) doc.addPage();
            doc.setFontSize(14);
            doc.text(i === 0 ? "Balance Sheet" : "Cash Flow Statement", 148, yPos, { align: 'center' });
            const tableData = [];
            const rows = tables[i].querySelectorAll("tr");
            rows.forEach(row => {
                const rowData = [];
                row.querySelectorAll("th, td").forEach(cell => {
                    rowData.push(cell.innerText.trim());
                });
                if (rowData.length) tableData.push(rowData);
            });
            doc.autoTable({
                startY: yPos + 10,
                head: [tableData[0]],
                body: tableData.slice(1),
                theme: 'grid',
                headStyles: { fillColor: [30,64,175], textColor: [255,255,255], fontSize: 8 },
                bodyStyles: { fontSize: 7 },
                columnStyles: { 0: { cellWidth: 60 } }
            });
        }
        doc.save(`Financial_Reports_${new Date().toISOString().slice(0,10)}.pdf`);
        Swal.fire("Exported", "PDF downloaded", "success");
    }

    // Event Listeners
    document.getElementById("basePeriod").addEventListener("change", () => {
        document.getElementById("customBaseDiv").style.display = document.getElementById("basePeriod").value === "custom" ? "flex" : "none";
    });
    document.getElementById("comp1Type").addEventListener("change", () => {
        document.getElementById("customComp1Div").style.display = document.getElementById("comp1Type").value === "custom" ? "flex" : "none";
    });
    document.getElementById("comp2Type").addEventListener("change", () => {
        document.getElementById("customComp2Div").style.display = document.getElementById("comp2Type").value === "custom" ? "flex" : "none";
    });
    document.getElementById("comp3Type").addEventListener("change", () => {
        document.getElementById("customComp3Div").style.display = document.getElementById("comp3Type").value === "custom" ? "flex" : "none";
    });
    
    document.getElementById("updateBtn").addEventListener("click", loadReport);
    document.getElementById("exportExcelBtn").addEventListener("click", exportToExcel);
    document.getElementById("exportPDFBtn").addEventListener("click", exportToPDF);
    
    document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            document.getElementById("bsPanel").style.display = tab.dataset.tab === "bs" ? "block" : "none";
            document.getElementById("cfPanel").style.display = tab.dataset.tab === "cf" ? "block" : "none";
        });
    });
    
    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }
        currentUser = user;
        document.getElementById("username").innerHTML = user.displayName || user.email?.split('@')[0] || "User";
        document.getElementById("userInitials").innerHTML = (user.displayName || user.email?.charAt(0) || "U").charAt(0).toUpperCase();
        await loadFirebaseData();
        await loadReport();
        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await signOut(auth);
            window.location.href = "index.html";
        });
    });
</script>
