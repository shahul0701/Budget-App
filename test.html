                            });
                        } catch (error) {
                            console.error('Error recording login session:', error);
                        }
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            // Load files when user and path change
            useEffect(() => {
                if (user) {
                    loadFiles();
                }
            }, [user, currentPath]);

            // Update filtered data when formData or filters change
            useEffect(() => {
                if (formData.length > 0) {
                    filterManager.current = new FilterManager(formData, formFields);
                    Object.keys(filters).forEach(fieldId => {
                        filterManager.current.setFilter(fieldId, filters[fieldId]);
                    });
                    
                    let filtered = filterManager.current.applyFilters();
                    
                    // Apply search
                    if (searchText) {
                        filtered = filtered.filter(row => {
                            return Object.values(row).some(val => 
                                String(val).toLowerCase().includes(searchText.toLowerCase())
                            );
                        });
                    }
                    
                    // Apply sort
                    if (sortConfig.field) {
                        filtered.sort((a, b) => {
                            const aVal = a[sortConfig.field] || '';
                            const bVal = b[sortConfig.field] || '';
                            
                            if (sortConfig.direction === 'asc') {
                                return aVal > bVal ? 1 : -1;
                            } else {
                                return aVal < bVal ? 1 : -1;
                            }
                        });
                    }
                    
                    setFilteredData(filtered);
                    
                    // Update summary statistics
                    calculateSummaryStats(filtered);
                } else {
                    setFilteredData([]);
                }
            }, [formData, filters, sortConfig, searchText]);

            // Calculate summary statistics
            const calculateSummaryStats = (data) => {
                const stats = {};
                
                formFields.forEach(field => {
                    if (field.type === 'number' || field.type === 'currency' || field.type === 'percentage') {
                        const values = data.map(row => parseFloat(row[field.id])).filter(v => !isNaN(v));
                        
                        if (values.length > 0) {
                            stats[field.id] = {
                                sum: values.reduce((a, b) => a + b, 0),
                                avg: values.reduce((a, b) => a + b, 0) / values.length,
                                min: Math.min(...values),
                                max: Math.max(...values),
                                count: values.length
                            };
                        }
                    }
                });
                
                setSummaryStats(stats);
            };

            // Load files from Firebase
            const loadFiles = async () => {
                if (!user) return;

                try {
                    const path = currentPath.join('/');
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    const snapshot = await filesRef
                        .where('path', '==', path)
                        .get();
                    
                    const fileList = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    setFiles(fileList);
                } catch (error) {
                    showToast('error', 'Error loading files: ' + error.message);
                }
            };

            // Show toast notification
            const showToast = (type, message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, type, message }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 5000);
            };

            // Create new file/folder
            const createNewFile = async () => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!newFileName.trim()) {
                    showToast('error', 'Please enter a name');
                    return;
                }

                try {
                    const path = currentPath.join('/');
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    
                    const fileData = {
                        name: newFileName,
                        path: path,
                        type: newFileType,
                        uid: user.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (newFileType === 'form') {
                        fileData.fields = [];
                        fileData.data = [];
                        fileData.formulas = {};
                        fileData.conditionalFormats = [];
                        fileData.dataValidations = {};
                    }

                    await filesRef.add(fileData);
                    
                    setShowNewFileModal(false);
                    setNewFileName('');
                    loadFiles();
                    showToast('success', `${newFileType === 'folder' ? 'Folder' : 'Form'} created successfully!`);
                } catch (error) {
                    showToast('error', 'Error creating: ' + error.message);
                }
            };

            // Delete file/folder
            const deleteFile = async (file, e) => {
                e.stopPropagation();
                
                if (!user) return;
                if (!window.confirm(`Are you sure you want to delete "${file.name}"?`)) return;

                try {
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    await filesRef.doc(file.id).delete();
                    
                    loadFiles();
                    showToast('success', 'Deleted successfully!');
                } catch (error) {
                    showToast('error', 'Error deleting: ' + error.message);
                }
            };

            // Open file/folder
            const openFile = (file) => {
                if (file.type === 'folder') {
                    setCurrentPath([...currentPath, file.name]);
                } else if (file.type === 'form') {
                    setSelectedFile(file);
                    setFormFields(file.fields || []);
                    setFormData(file.data || []);
                    setFormulas(file.formulas || {});
                    setConditionalFormats(file.conditionalFormats || []);
                    setDataValidations(file.dataValidations || {});
                    setFormMode('view');
                    setActiveTab('data');
                    setShowFormBuilder(true);
                    setFilters({});
                    setSortConfig({ field: null, direction: 'asc' });
                    setSearchText('');
                }
            };

            // Navigate up
            const navigateUp = () => {
                if (currentPath.length > 1) {
                    setCurrentPath(currentPath.slice(0, -1));
                }
            };

            // Handle drag start for field types
            const handleDragStart = (e, fieldType) => {
                if (formMode === 'edit') {
                    dragField.current = fieldType;
                    e.dataTransfer.setData('text/plain', fieldType);
                } else {
                    e.preventDefault();
                }
            };

            // Handle drag over for dropzone
            const handleDragOver = (e) => {
                if (formMode === 'edit') {
                    e.preventDefault();
                    setIsDraggingOver(true);
                }
            };

            // Handle drop for form builder
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDraggingOver(false);
                
                if (formMode === 'edit' && dragField.current) {
                    const newField = {
                        id: Date.now() + Math.random(),
                        type: dragField.current,
                        label: `${dragField.current.charAt(0).toUpperCase() + dragField.current.slice(1)} Field`,
                        required: false,
                        options: dragField.current === 'select' ? ['Option 1', 'Option 2', 'Option 3'] : []
                    };
                    
                    setFormFields([...formFields, newField]);
                    dragField.current = null;
                }
            };

            // Update field
            const updateField = (index, updates) => {
                const newFields = [...formFields];
                newFields[index] = { ...newFields[index], ...updates };
                setFormFields(newFields);
            };

            // Delete field
            const deleteField = (index) => {
                if (window.confirm('Delete this field?')) {
                    const newFields = formFields.filter((_, i) => i !== index);
                    setFormFields(newFields);
                }
            };

            // Save form structure
            const saveFormStructure = async () => {
                if (!user || !selectedFile) return;

                try {
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    await filesRef.doc(selectedFile.id).update({
                        fields: formFields,
                        formulas: formulas,
                        conditionalFormats: conditionalFormats,
                        dataValidations: dataValidations,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setSelectedFile({ ...selectedFile, fields: formFields, formulas, conditionalFormats, dataValidations });
                    showToast('success', 'Form structure saved!');
                    setFormMode('view');
                } catch (error) {
                    showToast('error', 'Error saving form: ' + error.message);
                }
            };

            // Save form data
            const saveFormData = async (formDataToSave) => {
                if (!user || !selectedFile) return;

                try {
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    
                    // Apply data validations
                    let isValid = true;
                    Object.keys(dataValidations).forEach(fieldId => {
                        const validation = dataValidations[fieldId];
                        const value = formDataToSave[fieldId];
                        
                        if (validation.required && !value) {
                            isValid = false;
                            showToast('error', `${validation.fieldName} is required`);
                        }
                        
                        if (validation.type === 'number' && value) {
                            const num = parseFloat(value);
                            if (validation.min && num < validation.min) {
                                isValid = false;
                                showToast('error', `${validation.fieldName} must be at least ${validation.min}`);
                            }
                            if (validation.max && num > validation.max) {
                                isValid = false;
                                showToast('error', `${validation.fieldName} must be at most ${validation.max}`);
                            }
                        }
                    });
                    
                    if (!isValid) return;
                    
                    // Apply formulas
                    const processedData = { ...formDataToSave };
                    Object.keys(formulas).forEach(fieldId => {
                        if (formulas[fieldId]) {
                            const result = FormulaParser.evaluate(
                                formulas[fieldId], 
                                [...formData, processedData], 
                                formData.length,
                                formFields
                            );
                            processedData[fieldId] = result;
                        }
                    });
                    
                    const newRecord = { 
                        ...processedData, 
                        id: Date.now(),
                        uid: user.uid,
                        createdAt: new Date().toISOString()
                    };
                    
                    const newData = [...formData, newRecord];
                    
                    await filesRef.doc(selectedFile.id).update({
                        data: newData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(newData);
                    setSelectedFile({ ...selectedFile, data: newData });
                    
                    // Apply conditional formatting
                    applyConditionalFormatting(newData);
                    
                    showToast('success', 'Data saved!');
                } catch (error) {
                    console.error('Error saving data:', error);
                    showToast('error', 'Error saving data: ' + error.message);
                }
            };

            // Update form data
            const updateFormData = async (updatedRecord) => {
                if (!user || !selectedFile) return;

                try {
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    
                    // Apply formulas to updated record
                    const processedRecord = { ...updatedRecord };
                    Object.keys(formulas).forEach(fieldId => {
                        if (formulas[fieldId]) {
                            const result = FormulaParser.evaluate(
                                formulas[fieldId], 
                                formData.map(r => r.id === updatedRecord.id ? processedRecord : r),
                                formData.findIndex(r => r.id === updatedRecord.id),
                                formFields
                            );
                            processedRecord[fieldId] = result;
                        }
                    });
                    
                    const newData = formData.map(record => 
                        record.id === updatedRecord.id ? { 
                            ...processedRecord,
                            updatedAt: new Date().toISOString()
                        } : record
                    );
                    
                    await filesRef.doc(selectedFile.id).update({
                        data: newData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(newData);
                    setSelectedFile({ ...selectedFile, data: newData });
                    setEditingRecord(null);
                    
                    // Apply conditional formatting
                    applyConditionalFormatting(newData);
                    
                    showToast('success', 'Data updated!');
                } catch (error) {
                    console.error('Error updating data:', error);
                    showToast('error', 'Error updating data: ' + error.message);
                }
            };

            // Delete form data
            const deleteFormData = async (recordId) => {
                if (!user || !selectedFile) return;
                if (!window.confirm('Delete this record?')) return;

                try {
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    const newData = formData.filter(record => record.id !== recordId);
                    
                    await filesRef.doc(selectedFile.id).update({
                        data: newData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(newData);
                    setSelectedFile({ ...selectedFile, data: newData });
                    showToast('success', 'Data deleted!');
                } catch (error) {
                    showToast('error', 'Error deleting data: ' + error.message);
                }
            };

            // Upload file
            const uploadFile = async (file) => {
                if (!user) return;

                try {
                    const path = currentPath.join('/');
                    const storageRef = storage.ref().child(`users/${user.uid}/${path}/${file.name}`);
                    await storageRef.put(file);
                    
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    const fileData = {
                        name: file.name,
                        path: path,
                        type: 'file',
                        size: file.size,
                        contentType: file.type,
                        uid: user.uid,
                        storagePath: `users/${user.uid}/${path}/${file.name}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    await filesRef.add(fileData);
                    loadFiles();
                    showToast('success', 'File uploaded!');
                } catch (error) {
                    showToast('error', 'Error uploading: ' + error.message);
                }
            };

            // Handle file selection for upload
            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadFile(file);
                }
            };

            // Apply conditional formatting
            const applyConditionalFormatting = (data) => {
                // This would apply CSS classes based on conditions
                // For now, just log
                console.log('Applying conditional formatting', conditionalFormats, data);
            };

            // Export to CSV
            const exportToCSV = () => {
                const headers = formFields.map(f => f.label).join(',');
                const rows = filteredData.map(row => {
                    return formFields.map(field => {
                        const value = row[field.id] || '';
                        return `"${String(value).replace(/"/g, '""')}"`;
                    }).join(',');
                });
                
                const csv = [headers, ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${selectedFile?.name || 'export'}.csv`;
                a.click();
                URL.revokeObjectURL(url);
                
                showToast('success', 'Exported to CSV');
            };

            // Export to Excel (XLSX simulation)
            const exportToExcel = () => {
                // For demo, just export as CSV with .xlsx extension
                exportToCSV();
                showToast('info', 'Note: This is a CSV file with .xlsx extension for demo');
            };

            // Import from CSV
            const importFromCSV = (csvText) => {
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim());
                
                const newData = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    
                    const values = lines[i].split(',').map(v => v.replace(/^"|"$/g, '').trim());
                    const row = { id: Date.now() + i };
                    
                    headers.forEach((header, index) => {
                        const field = formFields.find(f => f.label === header);
                        if (field) {
                            row[field.id] = values[index];
                        }
                    });
                    
                    newData.push(row);
                }
                
                return newData;
            };

            // Handle paste from Excel
            const handleExcelPaste = async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    const newData = importFromCSV(text);
                    
                    // Merge with existing data
                    const mergedData = [...formData, ...newData];
                    
                    // Save to Firebase
                    const filesRef = db.collection('users').doc(user.uid).collection('tables');
                    await filesRef.doc(selectedFile.id).update({
                        data: mergedData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(mergedData);
                    showToast('success', `Imported ${newData.length} rows from clipboard`);
                } catch (error) {
                    showToast('error', 'Error pasting: ' + error.message);
                }
            };

            // Create pivot table
            const createPivotTable = () => {
                setShowPivotTable(!showPivotTable);
            };

            // Create chart
            const createChart = () => {
                setShowChart(!showChart);
            };

            // Record macro
            const startMacroRecording = () => {
                setRecordingMacro(true);
                setMacroSteps([]);
                showToast('info', 'Recording macro...');
            };

            const stopMacroRecording = () => {
                setRecordingMacro(false);
                if (macroSteps.length > 0) {
                    const macroName = prompt('Enter macro name:');
                    if (macroName) {
                        setMacros([...macros, { name: macroName, steps: [...macroSteps] }]);
                        showToast('success', `Macro "${macroName}" saved`);
                    }
                }
                setMacroSteps([]);
            };

            // Render input field based on type
            const renderInputField = (field, value, onChange, disabled = false) => {
                const commonProps = {
                    value: value || '',
                    onChange: (e) => onChange(field.id, field.type === 'checkbox' ? e.target.checked : e.target.value),
                    className: "w-full p-2 border rounded focus:ring-2 focus:ring-blue-500",
                    disabled: disabled,
                    required: field.required && !disabled
                };

                switch (field.type) {
                    case 'text':
                    case 'email':
                    case 'tel':
                        return <input type={field.type} {...commonProps} />;
                    
                    case 'number':
                        return <input type="number" {...commonProps} />;
                    
                    case 'currency':
                        return (
                            <div className="relative">
                                <span className="absolute left-3 top-2 text-gray-500">$</span>
                                <input type="number" {...commonProps} className="pl-7 w-full p-2 border rounded" />
                            </div>
                        );
                    
                    case 'percentage':
                        return (
                            <div className="relative">
                                <input type="number" {...commonProps} step="0.01" min="0" max="100" />
                                <span className="absolute right-3 top-2 text-gray-500">%</span>
                            </div>
                        );
                    
                    case 'date':
                        return <input type="date" {...commonProps} />;
                    
                    case 'time':
                        return <input type="time" {...commonProps} />;
                    
                    case 'checkbox':
                        return (
                            <input
                                type="checkbox"
                                checked={value || false}
                                onChange={(e) => onChange(field.id, e.target.checked)}
                                className="h-5 w-5"
                                disabled={disabled}
                            />
                        );
                    
                    case 'select':
                        return (
                            <select {...commonProps}>
                                <option value="">Select...</option>
                                {(field.options || []).map((opt, i) => (
                                    <option key={i} value={opt}>{opt}</option>
                                ))}
                            </select>
                        );
                    
                    case 'yesno':
                        return (
                            <select {...commonProps}>
                                <option value="">Select...</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        );
                    
                    case 'textarea':
                        return <textarea {...commonProps} rows="4" />;
                    
                    case 'color':
                        return <input type="color" {...commonProps} className="w-full p-1 border rounded h-10" />;
                    
                    case 'range':
                        return (
                            <input
                                type="range"
                                value={value || 50}
                                onChange={(e) => onChange(field.id, e.target.value)}
                                className="w-full"
                                min="0"
                                max="100"
                                disabled={disabled}
                            />
                        );
                    
                    case 'formula':
                        return (
                            <div className="relative">
                                <span className="absolute left-3 top-2 text-blue-500 font-bold">=</span>
                                <input
                                    type="text"
                                    value={value || ''}
                                    onChange={(e) => onChange(field.id, e.target.value)}
                                    className="w-full pl-7 p-2 border rounded font-mono text-sm"
                                    placeholder="=SUM([Field1], [Field2])"
                                    disabled={disabled}
                                />
                            </div>
                        );
                    
                    default:
                        return null;
                }
            };

            // Render filter dropdown
            const renderFilterDropdown = (field) => {
                if (showFilterDropdown !== field.id) return null;
                
                const uniqueValues = [...new Set(formData.map(row => row[field.id]))].filter(v => v != null);
                
                return (
                    <div className="filter-dropdown" ref={filterRef}>
                        <input
                            type="text"
                            className="filter-search"
                            placeholder="Search..."
                            onChange={(e) => {
                                // Filter values based on search
                            }}
                        />
                        
                        <div className="max-h-40 overflow-y-auto">
                            {uniqueValues.map(value => (
                                <label key={value} className="filter-option">
                                    <input
                                        type="checkbox"
                                        checked={filters[field.id]?.includes(value) || false}
                                        onChange={(e) => {
                                            const currentFilters = filters[field.id] || [];
                                            let newFilters;
                                            
                                            if (e.target.checked) {
                                                newFilters = [...currentFilters, value];
                                            } else {
                                                newFilters = currentFilters.filter(v => v !== value);
                                            }
                                            
                                            setFilters({ ...filters, [field.id]: newFilters });
                                        }}
                                    />
                                    <span>{String(value) || '(blank)'}</span>
                                </label>
                            ))}
                        </div>
                        
                        <div className="filter-actions">
                            <button
                                className="filter-btn clear"
                                onClick={() => {
                                    const newFilters = { ...filters };
                                    delete newFilters[field.id];
                                    setFilters(newFilters);
                                    setShowFilterDropdown(null);
                                }}
                            >
                                Clear
                            </button>
                            <button
                                className="filter-btn apply"
                                onClick={() => setShowFilterDropdown(null)}
                            >
                                Apply
                            </button>
                        </div>
                    </div>
                );
            };

            // Render data table
            const renderDataTable = () => {
                return (
                    <div className="excel-container">
                        <div className="excel-toolbar">
                            <div className="excel-toolbar-group">
                                <button className="excel-toolbar-btn" onClick={() => setActiveTab('form')}>
                                    <i className="fas fa-wpforms"></i>
                                    Form View
                                </button>
                                <button className="excel-toolbar-btn active">
                                    <i className="fas fa-table"></i>
                                    Table View
                                </button>
                            </div>
                            
                            <div className="excel-toolbar-group">
                                <button className="excel-toolbar-btn" onClick={exportToCSV}>
                                    <i className="fas fa-file-csv"></i>
                                    Export CSV
                                </button>
                                <button className="excel-toolbar-btn" onClick={exportToExcel}>
                                    <i className="fas fa-file-excel"></i>
                                    Export Excel
                                </button>
                                <button className="excel-toolbar-btn" onClick={handleExcelPaste}>
                                    <i className="fas fa-paste"></i>
                                    Paste from Excel
                                </button>
                            </div>
                            
                            <div className="excel-toolbar-group">
                                <button className="excel-toolbar-btn" onClick={createPivotTable}>
                                    <i className="fas fa-chart-pivot"></i>
                                    Pivot Table
                                </button>
                                <button className="excel-toolbar-btn" onClick={createChart}>
                                    <i className="fas fa-chart-bar"></i>
                                    Chart
                                </button>
                            </div>
                            
                            <div className="excel-toolbar-group">
                                {!recordingMacro ? (
                                    <button className="excel-toolbar-btn" onClick={startMacroRecording}>
                                        <i className="fas fa-circle text-red-500"></i>
                                        Record Macro
                                    </button>
                                ) : (
                                    <button className="excel-toolbar-btn" onClick={stopMacroRecording}>
                                        <i className="fas fa-stop text-red-500"></i>
                                        Stop Recording
                                    </button>
                                )}
                            </div>
                            
                            <div className="flex-1">
                                <input
                                    type="text"
                                    placeholder="Search all fields..."
                                    className="w-full p-1 px-3 border rounded"
                                    value={searchText}
                                    onChange={(e) => setSearchText(e.target.value)}
                                />
                            </div>
                        </div>
                        
                        {/* Formula Bar */}
                        <div className="formula-bar">
                            <span className="formula-label">fx</span>
                            <input
                                type="text"
                                className="formula-input"
                                placeholder="Enter formula (e.g., =SUM([Amount]))"
                                value={formulas['selected'] || ''}
                                onChange={(e) => {
                                    // Handle formula input
                                }}
                            />
                            <span className="formula-help">Use [Field Name] to reference fields</span>
                        </div>
                        
                        {/* Summary Cards */}
                        {Object.keys(summaryStats).length > 0 && (
                            <div className="summary-cards p-4">
                                {Object.entries(summaryStats).map(([fieldId, stats]) => {
                                    const field = formFields.find(f => f.id === fieldId);
                                    return (
                                        <div key={fieldId} className="summary-card">
                                            <div className="label">{field?.label}</div>
                                            <div className="value">
                                                {field?.type === 'currency' ? '$' : ''}
                                                {stats.sum.toLocaleString()}
                                            </div>
                                            <div className="change">
                                                Avg: {field?.type === 'currency' ? '$' : ''}{stats.avg.toFixed(2)} | 
                                                Count: {stats.count}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        
                        {/* Data Table */}
                        <div className="excel-table-container" ref={tableRef}>
                            <table className="excel-table">
                                <thead>
                                    <tr>
                                        {formFields.map(field => (
                                            <th key={field.id}>
                                                <div className="column-header-content">
                                                    <span>{field.label}</span>
                                                    <div>
                                                        <i 
                                                            className={`fas fa-filter filter-indicator ${filters[field.id] ? 'text-blue-600' : 'text-gray-400'}`}
                                                            onClick={() => setShowFilterDropdown(
                                                                showFilterDropdown === field.id ? null : field.id
                                                            )}
                                                        ></i>
                                                        {sortConfig.field === field.id && (
                                                            <i className={`fas fa-sort-${sortConfig.direction === 'asc' ? 'up' : 'down'} ml-1`}></i>
                                                        )}
                                                    </div>
                                                </div>
                                                {renderFilterDropdown(field)}
                                            </th>
                                        ))}
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map((row, rowIndex) => (
                                        <tr key={row.id}>
                                            {formFields.map(field => {
                                                const value = row[field.id];
                                                let displayValue = value;
                                                
                                                // Format based on field type
                                                if (field.type === 'currency' && value) {
                                                    displayValue = `$${parseFloat(value).toFixed(2)}`;
                                                } else if (field.type === 'percentage' && value) {
                                                    displayValue = `${value}%`;
                                                } else if (field.type === 'date' && value) {
                                                    displayValue = new Date(value).toLocaleDateString();
                                                } else if (field.type === 'checkbox') {
                                                    displayValue = value ? '✓' : '✗';
                                                }
                                                
                                                return (
                                                    <td key={field.id}
                                                        onDoubleClick={() => {
                                                            // Enable inline editing
                                                        }}
                                                    >
                                                        {displayValue}
                                                    </td>
                                                );
                                            })}
                                            <td>
                                                <div className="form-data-actions">
                                                    <button 
                                                        className="data-action-btn edit"
                                                        onClick={() => {
                                                            setEditingRecord(row);
                                                            setActiveTab('form');
                                                        }}
                                                    >
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button 
                                                        className="data-action-btn delete"
                                                        onClick={() => deleteFormData(row.id)}
                                                    >
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        
                        {/* Pivot Table */}
                        {showPivotTable && (
                            <div className="pivot-container">
                                <h3 className="font-bold mb-4">Pivot Table</h3>
                                <div className="pivot-fields">
                                    <div className="pivot-field-group">
                                        <h4>Rows</h4>
                                        {formFields.map(field => (
                                            <div key={field.id} className="pivot-field-item" draggable>
                                                <i className="fas fa-grip-vertical text-gray-400"></i>
                                                {field.label}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="pivot-field-group">
                                        <h4>Columns</h4>
                                    </div>
                                    <div className="pivot-field-group">
                                        <h4>Values</h4>
                                    </div>
                                    <div className="pivot-field-group">
                                        <h4>Filters</h4>
                                    </div>
                                </div>
                                <p className="text-gray-500 text-center py-4">
                                    Drag fields to create pivot table (demo feature)
                                </p>
                            </div>
                        )}
                        
                        {/* Chart */}
                        {showChart && (
                            <div className="chart-container">
                                <h3 className="font-bold mb-4">Chart Visualization</h3>
                                <div className="chart-controls">
                                    <select 
                                        className="p-2 border rounded"
                                        value={chartType}
                                        onChange={(e) => setChartType(e.target.value)}
                                    >
                                        <option value="bar">Bar Chart</option>
                                        <option value="line">Line Chart</option>
                                        <option value="pie">Pie Chart</option>
                                        <option value="doughnut">Doughnut Chart</option>
                                    </select>
                                    <select className="p-2 border rounded">
                                        <option>Select X Axis</option>
                                        {formFields.map(f => (
                                            <option key={f.id}>{f.label}</option>
                                        ))}
                                    </select>
                                    <select className="p-2 border rounded">
                                        <option>Select Y Axis</option>
                                        {formFields.filter(f => f.type === 'number' || f.type === 'currency').map(f => (
                                            <option key={f.id}>{f.label}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="h-64 bg-gray-100 rounded flex items-center justify-center">
                                    <p className="text-gray-500">
                                        <i className="fas fa-chart-bar text-4xl mb-2 block"></i>
                                        Chart preview (demo)
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // Loading state
            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-center">
                            <i className="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                            <p className="text-gray-600">Loading...</p>
                        </div>
                    </div>
                );
            }

            // Login screen
            if (!user) {
                return (
                    <div className="login-container">
                        <h2 className="text-2xl font-bold mb-6">Welcome to Excel-Style Data Manager</h2>
                        <p className="text-gray-600 mb-6">Please sign in to access your spreadsheets</p>
                        
                        <button 
                            onClick={() => auth.signInAnonymously()}
                            className="login-btn mb-4"
                        >
                            <i className="fas fa-user-secret mr-2"></i>
                            Sign in Anonymously (Demo)
                        </button>
                        
                        <div className="relative my-6">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-gray-300"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-2 bg-white text-gray-500">Or test with demo account</span>
                            </div>
                        </div>
                        
                        <button 
                            onClick={() => auth.signInWithEmailAndPassword('demo@gmail.com', 'password123')}
                            className="login-btn bg-purple-600 hover:bg-purple-700"
                        >
                            <i className="fas fa-user mr-2"></i>
                            Sign in as demo@gmail.com
                        </button>
                    </div>
                );
            }

            // Main app
            return (
                <div className="container mx-auto p-4 max-w-7xl">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 rounded-lg shadow-lg mb-6">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center gap-3">
                                    <i className="fas fa-file-excel"></i>
                                    Excel-Style Form Builder & Data Manager
                                </h1>
                                <p className="mt-2 opacity-90">Create forms, analyze data with Excel-like features</p>
                            </div>
                            
                            <div className="user-info">
                                <div className="text-right">
                                    <div className="font-medium">
                                        {user.email || (user.isAnonymous ? 'Anonymous User' : user.uid)}
                                    </div>
                                    <div className="user-email">
                                        {isAdmin && <span className="ml-2 bg-yellow-400 text-gray-800 px-2 py-0.5 rounded text-xs">Admin</span>}
                                    </div>
                                </div>
                                <button onClick={() => auth.signOut()} className="logout-btn">
                                    <i className="fas fa-sign-out-alt mr-1"></i>
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* File Explorer */}
                    <div className="file-explorer">
                        <div className="file-explorer-header">
                            <div className="file-explorer-breadcrumb">
                                {currentPath.map((item, index) => (
                                    <React.Fragment key={index}>
                                        {index > 0 && <i className="fas fa-chevron-right text-gray-400 text-sm"></i>}
                                        <span 
                                            className={`breadcrumb-item ${index === currentPath.length - 1 ? 'active' : ''}`}
                                            onClick={() => setCurrentPath(currentPath.slice(0, index + 1))}
                                        >
                                            <i className={`fas ${index === 0 ? 'fa-home' : 'fa-folder'}`}></i>
                                            {item}
                                        </span>
                                    </React.Fragment>
                                ))}
                            </div>
                            
                            <div className="flex gap-2">
                                {currentPath.length > 1 && (
                                    <button onClick={navigateUp} className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
                                        <i className="fas fa-arrow-up mr-1"></i>Up
                                    </button>
                                )}
                                
                                <button onClick={() => setShowNewFileModal(true)} className="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">
                                    <i className="fas fa-plus mr-1"></i>New
                                </button>
                                
                                <button onClick={() => fileInputRef.current.click()} className="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600">
                                    <i className="fas fa-upload mr-1"></i>Upload
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" />
                            </div>
                        </div>
                        
                        {/* File Grid */}
                        <div className="file-grid">
                            {files.map(file => (
                                <div key={file.id} className="file-item" onClick={() => openFile(file)}>
                                    <div className="file-actions">
                                        <button className="file-action-btn delete" onClick={(e) => deleteFile(file, e)}>
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                    
                                    <div className={`file-icon ${file.type}`}>
                                        <i className={`fas ${
                                            file.type === 'folder' ? 'fa-folder' :
                                            file.type === 'form' ? 'fa-file-excel' :
                                            'fa-file'
                                        }`}></i>
                                    </div>
                                    
                                    <div className="file-name">{file.name}</div>
                                    
                                    {file.type === 'form' && file.fields && (
                                        <div className="text-xs text-gray-500 text-center mt-2">
                                            {file.fields.length} fields • {file.data?.length || 0} records
                                        </div>
                                    )}
                                </div>
                            ))}
                            
                            {files.length === 0 && (
                                <div className="col-span-full text-center py-12 text-gray-500">
                                    <i className="fas fa-folder-open text-5xl mb-4 opacity-50"></i>
                                    <p>This folder is empty</p>
                                    <p className="text-sm mt-2">Create a new spreadsheet to get started</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* New File Modal */}
                    <div className={`modal ${showNewFileModal ? 'active' : ''}`}>
                        <div className="modal-content" style={{ maxWidth: '500px' }}>
                            <div className="modal-header">
                                <h2 className="text-xl font-bold">Create New Spreadsheet</h2>
                                <button className="modal-close" onClick={() => setShowNewFileModal(false)}>
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">Type</label>
                                <div className="flex gap-4">
                                    <label className="flex items-center gap-2">
                                        <input type="radio" value="folder" checked={newFileType === 'folder'} onChange={(e) => setNewFileType(e.target.value)} />
                                        <i className="fas fa-folder text-yellow-500"></i> Folder
                                    </label>
                                    <label className="flex items-center gap-2">
                                        <input type="radio" value="form" checked={newFileType === 'form'} onChange={(e) => setNewFileType(e.target.value)} />
                                        <i className="fas fa-file-excel text-green-500"></i> Spreadsheet
                                    </label>
                                </div>
                            </div>
                            
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">Name</label>
                                <input type="text" value={newFileName} onChange={(e) => setNewFileName(e.target.value)}
                                    className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                    placeholder={`Enter ${newFileType} name`} />
                            </div>
                            
                            <div className="flex justify-end gap-2">
                                <button onClick={() => setShowNewFileModal(false)} className="px-4 py-2 border rounded hover:bg-gray-100">
                                    Cancel
                                </button>
                                <button onClick={createNewFile} className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                                    Create
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Form Builder/Viewer Modal */}
                    <div className={`modal ${showFormBuilder ? 'active' : ''}`}>
                        <div className="modal-content" style={{ maxWidth: '1200px' }}>
                            <div className="modal-header">
                                <h2 className="text-xl font-bold flex items-center gap-2">
                                    <i className="fas fa-file-excel text-green-500"></i>
                                    {selectedFile?.name}
                                    {formMode === 'edit' && <span className="edit-badge">Edit Mode</span>}
                                </h2>
                                <button className="modal-close" onClick={() => {
                                    setShowFormBuilder(false);
                                    setSelectedFile(null);
                                    setFormFields([]);
                                    setFormData([]);
                                    setFormMode('view');
                                    setFilters({});
                                    setShowPivotTable(false);
                                    setShowChart(false);
                                }}>
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            {/* Mode Toggle */}
                            <div className="mode-toggle">
                                <button className={`mode-btn ${formMode === 'view' ? 'active' : ''}`} onClick={() => setFormMode('view')}>
                                    <i className="fas fa-eye mr-1"></i>View Data
                                </button>
                                <button className={`mode-btn ${formMode === 'edit' ? 'active' : ''}`} onClick={() => setFormMode('edit')}>
                                    <i className="fas fa-edit mr-1"></i>Edit Structure
                                </button>
                            </div>
                            
                            {/* Tabs */}
                            <div className="tab-buttons">
                                <button className={`tab-button ${activeTab === 'data' ? 'active' : ''}`} onClick={() => setActiveTab('data')}>
                                    <i className="fas fa-table mr-1"></i>Data Table ({filteredData.length})
                                </button>
                                <button className={`tab-button ${activeTab === 'form' ? 'active' : ''}`} onClick={() => setActiveTab('form')}>
                                    <i className="fas fa-wpforms mr-1"></i>Form Entry
                                </button>
                                <button className={`tab-button ${activeTab === 'structure' ? 'active' : ''}`} onClick={() => setActiveTab('structure')}>
                                    <i className="fas fa-cog mr-1"></i>Structure
                                </button>
                            </div>
                            
                            {activeTab === 'data' && renderDataTable()}
                            
                            {activeTab === 'form' && (
                                <div className="form-view">
                                    {formMode === 'edit' ? (
                                        <div className="text-center py-10 text-gray-500">
                                            <i className="fas fa-edit text-4xl mb-3"></i>
                                            <p>Switch to View Data mode to enter records</p>
                                        </div>
                                    ) : (
                                        <>
                                            <h3 className="text-lg font-bold mb-4">Enter New Record</h3>
                                            <FormDataEntry 
                                                fields={formFields}
                                                onSave={saveFormData}
                                                renderInputField={renderInputField}
                                            />
                                        </>
                                    )}
                                </div>
                            )}
                            
                            {activeTab === 'structure' && formMode === 'edit' && (
                                <div>
                                    {/* Field Types Palette */}
                                    <div className="mb-6">
                                        <h3 className="text-sm font-medium text-gray-700 mb-2">
                                            Drag & Drop Fields
                                        </h3>
                                        <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2">
                                            {fieldTypes.map(type => (
                                                <div key={type.value}
                                                    draggable
                                                    onDragStart={(e) => handleDragStart(e, type.value)}
                                                    className="p-2 bg-gray-100 rounded text-center cursor-move hover:bg-gray-200">
                                                    <i className={`fas fa-${type.icon} block text-lg mb-1`}></i>
                                                    <span className="text-xs">{type.label}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* Form Builder Dropzone */}
                                    <div className={`dropzone ${isDraggingOver ? 'drag-over' : ''}`}
                                        onDragOver={handleDragOver}
                                        onDragLeave={() => setIsDraggingOver(false)}
                                        onDrop={handleDrop}>
                                        
                                        {formFields.length === 0 ? (
                                            <>
                                                <i className="fas fa-cloud-upload-alt"></i>
                                                <p className="text-gray-600">Drag and drop fields here to build your spreadsheet structure</p>
                                            </>
                                        ) : (
                                            formFields.map((field, index) => (
                                                <div key={field.id} className="form-field">
                                                    <div className="field-actions">
                                                        <button className="field-action-btn delete" onClick={() => deleteField(index)}>
                                                            <i className="fas fa-trash"></i>
                                                        </button>
                                                    </div>
                                                    
                                                    <div className="field-label">
                                                        <input type="text" value={field.label}
                                                            onChange={(e) => updateField(index, { label: e.target.value })}
                                                            placeholder="Field Label" />
                                                        <label className="flex items-center gap-1 text-sm">
                                                            <input type="checkbox" checked={field.required}
                                                                onChange={(e) => updateField(index, { required: e.target.checked })} />
                                                            Required
                                                        </label>
                                                    </div>
                                                    
                                                    <div className="field-type-selector">
                                                        <select value={field.type} onChange={(e) => updateField(index, { type: e.target.value })}>
                                                            {fieldTypes.map(ft => (
                                                                <option key={ft.value} value={ft.value}>{ft.label}</option>
                                                            ))}
                                                        </select>
                                                    </div>
                                                    
                                                    {field.type === 'select' && (
                                                        <div className="mt-2">
                                                            <label className="text-sm text-gray-600">Options (comma-separated)</label>
                                                            <input type="text" value={field.options?.join(', ') || ''}
                                                                onChange={(e) => updateField(index, { 
                                                                    options: e.target.value.split(',').map(opt => opt.trim()) 
                                                                })}
                                                                className="w-full p-2 border rounded mt-1"
                                                                placeholder="Option 1, Option 2, Option 3" />
                                                        </div>
                                                    )}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    
                                    {/* Form Actions */}
                                    <div className="flex justify-between mt-4">
                                        <button onClick={() => setFormFields([])} className="px-4 py-2 text-red-600 border border-red-600 rounded hover:bg-red-50">
                                            Clear All Fields
                                        </button>
                                        <button onClick={saveFormStructure} className="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                                            <i className="fas fa-save mr-1"></i>Save Structure
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Edit Record Modal */}
                    {editingRecord && (
                        <div className="modal active">
                            <div className="modal-content" style={{ maxWidth: '600px' }}>
                                <div className="modal-header">
                                    <h2 className="text-xl font-bold">Edit Record</h2>
                                    <button className="modal-close" onClick={() => setEditingRecord(null)}>
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                                
                                <FormDataEntry 
                                    fields={formFields}
                                    initialData={editingRecord}
                                    onSave={updateFormData}
                                    renderInputField={renderInputField}
                                    isEditing
                                />
                            </div>
                        </div>
                    )}

                    {/* Toast Notifications */}
                    <div className="toast-container">
                        {toasts.map(toast => (
                            <Toast key={toast.id} message={toast.message} type={toast.type}
                                onClose={() => setToasts(prev => prev.filter(t => t.id !== toast.id))} />
                        ))}
                    </div>
                </div>
            );
        }

        // Form Data Entry Component
        const FormDataEntry = ({ fields, initialData = {}, onSave, renderInputField, isEditing = false }) => {
            const [formData, setFormData] = useState(initialData);

            const handleFieldChange = (fieldId, value) => {
                setFormData({ ...formData, [fieldId]: value });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                
                // Validate required fields
                let isValid = true;
                fields.forEach(field => {
                    if (field.required && !formData[field.id]) {
                        isValid = false;
                        alert(`${field.label} is required`);
                    }
                });
                
                if (isValid) {
                    onSave(formData);
                    if (!isEditing) {
                        setFormData({});
                    }
                }
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    {fields.map(field => (
                        <div key={field.id} className="form-field-view">
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                {field.label}
                                {field.required && <span className="text-red-500 ml-1">*</span>}
                                {field.type === 'formula' && <span className="macro-badge">Formula</span>}
                            </label>
                            {renderInputField(field, formData[field.id], handleFieldChange, false)}
                            {field.type === 'formula' && (
                                <p className="text-xs text-gray-500 mt-1">
                                    Use =SUM([Field1], [Field2]) or =AVERAGE([Field])
                                </p>
                            )}
                        </div>
                    ))}
                    
                    {fields.length > 0 && (
                        <div className="flex justify-end gap-2 pt-4">
                            <button type="submit" className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                                {isEditing ? 'Update' : 'Save'} Record
                            </button>
                        </div>
                    )}
                </form>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
