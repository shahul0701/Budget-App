        // Formula Parser Class
        class FormulaParser {
            static evaluate(formula, data, rowIndex, fields) {
                if (!formula || !formula.startsWith('=')) return formula;
                
                try {
                    // Remove the '='
                    const expr = formula.substring(1).trim();
                    
                    // Handle different functions
                    if (expr.toUpperCase().startsWith('SUM')) {
                        return this.handleSum(expr, data, fields);
                    } else if (expr.toUpperCase().startsWith('AVERAGE')) {
                        return this.handleAverage(expr, data, fields);
                    } else if (expr.toUpperCase().startsWith('COUNT')) {
                        return this.handleCount(expr, data, fields);
                    } else if (expr.toUpperCase().startsWith('MAX')) {
                        return this.handleMax(expr, data, fields);
                    } else if (expr.toUpperCase().startsWith('MIN')) {
                        return this.handleMin(expr, data, fields);
                    } else if (expr.toUpperCase().startsWith('IF')) {
                        return this.handleIf(expr, data, rowIndex, fields);
                    } else if (expr.toUpperCase().startsWith('CONCAT')) {
                        return this.handleConcat(expr, data, rowIndex, fields);
                    } else {
                        // Simple arithmetic
                        return this.evaluateArithmetic(expr, data, rowIndex, fields);
                    }
                } catch (error) {
                    console.error('Formula error:', error);
                    return '#ERROR!';
                }
            }
            
            static handleSum(expr, data, fields) {
                const range = this.parseRange(expr);
                let sum = 0;
                
                if (range.column) {
                    // Sum a specific column across all rows
                    data.forEach(row => {
                        const val = parseFloat(row[range.column]) || 0;
                        sum += val;
                    });
                } else if (range.start && range.end) {
                    // Sum a range of cells (simplified)
                    // You can expand this for more complex ranges
                }
                
                return sum;
            }
            
            static handleAverage(expr, data, fields) {
                const range = this.parseRange(expr);
                let sum = 0;
                let count = 0;
                
                if (range.column) {
                    data.forEach(row => {
                        const val = parseFloat(row[range.column]);
                        if (!isNaN(val)) {
                            sum += val;
                            count++;
                        }
                    });
                }
                
                return count > 0 ? (sum / count).toFixed(2) : 0;
            }
            
            static handleCount(expr, data, fields) {
                const range = this.parseRange(expr);
                let count = 0;
                
                if (range.column) {
                    data.forEach(row => {
                        if (row[range.column] !== undefined && row[range.column] !== '') {
                            count++;
                        }
                    });
                }
                
                return count;
            }
            
            static handleMax(expr, data, fields) {
                const range = this.parseRange(expr);
                let max = -Infinity;
                
                if (range.column) {
                    data.forEach(row => {
                        const val = parseFloat(row[range.column]);
                        if (!isNaN(val) && val > max) {
                            max = val;
                        }
                    });
                }
                
                return max !== -Infinity ? max : 0;
            }
            
            static handleMin(expr, data, fields) {
                const range = this.parseRange(expr);
                let min = Infinity;
                
                if (range.column) {
                    data.forEach(row => {
                        const val = parseFloat(row[range.column]);
                        if (!isNaN(val) && val < min) {
                            min = val;
                        }
                    });
                }
                
                return min !== Infinity ? min : 0;
            }
            
            static handleIf(expr, data, rowIndex, fields) {
                // Format: =IF(condition, value_if_true, value_if_false)
                const match = expr.match(/IF\((.+?),(.+?),(.+)\)/i);
                if (match) {
                    const condition = match[1].trim();
                    const trueVal = match[2].trim();
                    const falseVal = match[3].trim();
                    
                    // Evaluate condition (simplified)
                    const conditionResult = this.evaluateCondition(condition, data, rowIndex, fields);
                    
                    return conditionResult ? this.evaluateValue(trueVal, data, rowIndex, fields) : 
                                           this.evaluateValue(falseVal, data, rowIndex, fields);
                }
                return '#ERROR!';
            }
            
            static handleConcat(expr, data, rowIndex, fields) {
                const match = expr.match(/CONCAT\((.+)\)/i);
                if (match) {
                    const args = match[1].split(',').map(arg => arg.trim());
                    return args.map(arg => this.evaluateValue(arg, data, rowIndex, fields)).join('');
                }
                return '#ERROR!';
            }
            
            static evaluateArithmetic(expr, data, rowIndex, fields) {
                // Replace field references with values
                let evalExpr = expr;
                
                // Find all field references (e.g., [Field Name])
                const fieldMatches = expr.match(/\[(.*?)\]/g);
                if (fieldMatches) {
                    fieldMatches.forEach(match => {
                        const fieldName = match.slice(1, -1);
                        const value = data[rowIndex]?.[fieldName];
                        
                        if (value !== undefined) {
                            const numValue = parseFloat(value);
                            evalExpr = evalExpr.replace(match, isNaN(numValue) ? '0' : numValue);
                        } else {
                            evalExpr = evalExpr.replace(match, '0');
                        }
                    });
                }
                
                // Evaluate safely
                try {
                    // eslint-disable-next-line no-new-func
                    const result = new Function('return ' + evalExpr)();
                    return isNaN(result) ? '#VALUE!' : result;
                } catch {
                    return '#ERROR!';
                }
            }
            
            static parseRange(expr) {
                // Parse something like SUM(A1:A10) or SUM([Column Name])
                const rangeMatch = expr.match(/\((.*?)\)/);
                if (rangeMatch) {
                    const range = rangeMatch[1];
                    
                    // Check if it's a column reference
                    const columnMatch = range.match(/\[(.*?)\]/);
                    if (columnMatch) {
                        return { column: columnMatch[1] };
                    }
                    
                    // Check if it's a cell range (simplified)
                    const cellRangeMatch = range.match(/([A-Z]+)(\d+):([A-Z]+)(\d+)/);
                    if (cellRangeMatch) {
                        return {
                            start: { col: cellRangeMatch[1], row: parseInt(cellRangeMatch[2]) },
                            end: { col: cellRangeMatch[3], row: parseInt(cellRangeMatch[4]) }
                        };
                    }
                }
                return {};
            }
            
            static evaluateCondition(condition, data, rowIndex, fields) {
                // Simple condition evaluation
                const operators = ['==', '!=', '>=', '<=', '>', '<'];
                
                for (const op of operators) {
                    if (condition.includes(op)) {
                        const parts = condition.split(op);
                        const left = this.evaluateValue(parts[0].trim(), data, rowIndex, fields);
                        const right = this.evaluateValue(parts[1].trim(), data, rowIndex, fields);
                        
                        switch (op) {
                            case '==': return left == right;
                            case '!=': return left != right;
                            case '>=': return parseFloat(left) >= parseFloat(right);
                            case '<=': return parseFloat(left) <= parseFloat(right);
                            case '>': return parseFloat(left) > parseFloat(right);
                            case '<': return parseFloat(left) < parseFloat(right);
                        }
                    }
                }
                
                return false;
            }
            
            static evaluateValue(value, data, rowIndex, fields) {
                // Check if it's a field reference
                const fieldMatch = value.match(/\[(.*?)\]/);
                if (fieldMatch) {
                    return data[rowIndex]?.[fieldMatch[1]] || '';
                }
                
                // Check if it's a number
                if (!isNaN(parseFloat(value))) {
                    return parseFloat(value);
                }
                
                // Return as string
                return value.replace(/^['"]|['"]$/g, '');
            }
        }

        // Filter Manager Class
        class FilterManager {
            constructor(data, fields) {
                this.data = data;
                this.fields = fields;
                this.filters = {};
            }
            
            setFilter(fieldId, filterValues) {
                if (filterValues && filterValues.length > 0) {
                    this.filters[fieldId] = filterValues;
                } else {
                    delete this.filters[fieldId];
                }
            }
            
            applyFilters() {
                if (Object.keys(this.filters).length === 0) {
                    return this.data;
                }
                
                return this.data.filter(row => {
                    for (const [fieldId, filterValues] of Object.entries(this.filters)) {
                        const value = String(row[fieldId] || '').toLowerCase();
                        if (!filterValues.some(fv => value.includes(String(fv).toLowerCase()))) {
                            return false;
                        }
                    }
                    return true;
                });
            }
            
            clearFilters() {
                this.filters = {};
            }
            
            getActiveFilters() {
                return this.filters;
            }
        }
