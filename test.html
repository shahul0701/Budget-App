<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InventoryHub Ultra | Advanced Inventory Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #06b6d4;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --orange: #f97316;
      --teal: #14b8a6;
      --dark: #0f172a;
      --gray: #64748b;
      --light: #f8fafc;
      --border: #e2e8f0;
      --radius: 16px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
      --glow: 0 0 20px rgba(99,102,241,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      color: #1e293b;
      min-height: 100vh;
    }

    .app-container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Animated Header */
    .app-header {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      padding: 1.2rem 2rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      margin-bottom: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border: 1px solid rgba(99,102,241,0.1);
      position: relative;
      overflow: hidden;
    }

    .app-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899, #f97316);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      box-shadow: 0 8px 20px rgba(99,102,241,0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .brand h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .brand span {
      font-size: 0.7rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.82rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all 0.3s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::after {
      width: 300px;
      height: 300px;
    }

    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
    .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; box-shadow: 0 4px 15px rgba(245,158,11,0.3); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
    .btn-info { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
    .btn-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; }
    .btn-outline { background: white; border: 2px solid var(--border); }
    .btn-sm { padding: 6px 12px; font-size: 0.72rem; border-radius: 8px; }
    .btn-xs { padding: 4px 8px; font-size: 0.65rem; border-radius: 6px; }

    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    /* Back Button */
    .back-btn {
      background: white;
      border: 2px solid var(--border);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
      transition: all 0.3s;
      font-size: 0.9rem;
      box-shadow: var(--shadow);
    }

    .back-btn.show { display: inline-flex; }
    .back-btn:hover { background: #f1f5f9; border-color: var(--primary); }

    /* Enhanced Tab Navigation */
    .tab-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 0.6rem;
      background: white;
      border-radius: var(--radius);
      margin-bottom: 1.2rem;
      box-shadow: var(--shadow);
      flex-wrap: wrap;
      border: 1px solid var(--border);
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 0.82rem;
      color: var(--gray);
      cursor: pointer;
      white-space: nowrap;
      border-radius: 10px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .tab-btn i {
      font-size: 1rem;
      transition: all 0.3s;
    }

    .tab-btn:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    .tab-btn:hover i {
      transform: scale(1.2);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      box-shadow: 0 8px 20px rgba(99,102,241,0.3);
    }

    .tab-badge {
      background: #ef4444;
      color: white;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 700;
      animation: pulse 2s infinite;
    }

    /* Main Content */
    .main-content {
      background: white;
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: var(--shadow);
      min-height: 500px;
      border: 1px solid var(--border);
    }

    /* Enhanced Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      margin-bottom: 1.8rem;
    }

    .stat-card {
      background: white;
      padding: 1.5rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
    }

    .stat-card .stat-icon-wrapper {
      width: 50px;
      height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      margin: 0.3rem 0;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: var(--gray);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .trend {
      font-size: 0.7rem;
      margin-top: 0.3rem;
      font-weight: 600;
    }

    .trend-up { color: var(--success); }
    .trend-down { color: var(--danger); }

    /* Category Icons Grid */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .category-card {
      background: white;
      padding: 1.2rem;
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      box-shadow: var(--shadow);
    }

    .category-card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .category-card .cat-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .category-card .cat-name {
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }

    .category-card .cat-count {
      font-size: 0.7rem;
      color: var(--gray);
      font-weight: 500;
    }

    /* Grid Layouts */
    .grid-2col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .grid-3col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #fafbfc;
      padding: 1.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .card:hover {
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Enhanced Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      padding: 14px 12px;
      text-align: left;
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #1e293b;
      white-space: nowrap;
      border-bottom: 2px solid #cbd5e1;
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid #f1f5f9;
    }

    tbody tr {
      transition: all 0.2s;
    }

    tbody tr:hover {
      background: #f8fafc;
      transform: scale(1.002);
    }

    .badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    .badge-pink { background: #fce7f3; color: #9d174d; }

    .progress-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      min-width: 80px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .bg-success { background: linear-gradient(135deg, #10b981, #059669); }
    .bg-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .bg-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .bg-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .bg-info { background: linear-gradient(135deg, #06b6d4, #0891b2); }

    /* Enhanced Forms */
    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.82rem;
      margin-bottom: 5px;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 0.88rem;
      transition: all 0.3s;
      background: white;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    /* Icon Picker */
    .icon-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: #f8fafc;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
    }

    .icon-picker .icon-option {
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .icon-picker .icon-option:hover {
      border-color: var(--primary);
      background: #eef2ff;
      transform: scale(1.1);
    }

    .icon-picker .icon-option.selected {
      border-color: var(--primary);
      background: #eef2ff;
      box-shadow: 0 0 10px rgba(99,102,241,0.2);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      max-width: 700px;
      width: 95%;
      max-height: 85vh;
      overflow-y: auto;
      animation: modalSlide 0.4s ease;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
    }

    @keyframes modalSlide {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.3;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    .search-box input {
      padding-left: 40px;
    }

    .product-icon-cell {
      font-size: 1.8rem;
      text-align: center;
    }

    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .fw-bold { font-weight: 700; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .text-center { text-align: center; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .grid-2col { grid-template-columns: 1fr; }
      .grid-3col { grid-template-columns: 1fr; }
      .category-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon"><i class="fas fa-cubes"></i></div>
        <div>
          <h1>InventoryHub Ultra</h1>
          <span id="companyInfo">Advanced Inventory System</span>
        </div>
      </div>
      <div class="header-actions">
        <span style="font-weight:600;font-size:0.85rem;background:#f1f5f9;padding:8px 16px;border-radius:20px;" id="userDisplay">
          <i class="fas fa-user-circle"></i> Admin
        </span>
        <button class="btn btn-danger btn-sm" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
      </div>
    </header>

    <!-- Back Button -->
    <button class="back-btn" id="backBtn" onclick="goBack()">
      <i class="fas fa-arrow-left"></i> Back to Previous
    </button>

    <!-- Tab Navigation -->
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</button>
      <button class="tab-btn" data-tab="products"><i class="fas fa-boxes"></i> Products <span class="tab-badge" id="prodCount">0</span></button>
      <button class="tab-btn" data-tab="categories"><i class="fas fa-th-large"></i> Categories</button>
      <button class="tab-btn" data-tab="stock-in"><i class="fas fa-download"></i> Stock In</button>
      <button class="tab-btn" data-tab="stock-out"><i class="fas fa-upload"></i> Stock Out</button>
      <button class="tab-btn" data-tab="suppliers"><i class="fas fa-truck"></i> Suppliers</button>
      <button class="tab-btn" data-tab="purchase"><i class="fas fa-file-invoice"></i> Purchase Orders</button>
      <button class="tab-btn" data-tab="bills"><i class="fas fa-receipt"></i> Bills</button>
      <button class="tab-btn" data-tab="warehouse"><i class="fas fa-warehouse"></i> Warehouse</button>
      <button class="tab-btn" data-tab="reports"><i class="fas fa-chart-bar"></i> Reports</button>
      <button class="tab-btn" data-tab="settings"><i class="fas fa-cog"></i> Settings</button>
    </nav>

    <!-- Main Content -->
    <div class="main-content" id="mainContent"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, orderBy, limit, Timestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
      authDomain: "budget-app-1365f.firebaseapp.com",
      projectId: "budget-app-1365f",
      storageBucket: "budget-app-1365f.firebasestorage.app",
      messagingSenderId: "1036194450411",
      appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const companySession = JSON.parse(sessionStorage.getItem('activeCompany'));
    if (!companySession || !sessionStorage.getItem('companyAuth')) {
      window.location.href = "dashboard.html";
    }

    const COMPANY = companySession;
    let currentTab = 'dashboard';
    let tabHistory = ['dashboard'];
    let productsCache = [];
    let suppliersCache = [];
    let warehousesCache = [];
    let categoriesCache = [];

    // Category icons mapping
    const categoryIcons = {
      'Electronics': '📱', 'Food': '🍔', 'Clothing': '👕', 'Furniture': '🪑',
      'Office Supplies': '📎', 'Medical': '💊', 'Automotive': '🚗', 'Books': '📚',
      'Sports': '⚽', 'Toys': '🧸', 'Beauty': '💄', 'Jewelry': '💍',
      'Hardware': '🔧', 'Garden': '🌱', 'Pet Supplies': '🐾', 'Beverages': '🥤',
      'Dairy': '🥛', 'Bakery': '🍞', 'Meat': '🥩', 'Seafood': '🐟',
      'Fruits': '🍎', 'Vegetables': '🥕', 'Cleaning': '🧹', 'Stationery': '✏️',
      'General': '📦', 'Uncategorized': '📋'
    };

    function getCategoryIcon(category) {
      return categoryIcons[category] || '📦';
    }

    // Initialize
    function init() {
      document.getElementById('userDisplay').innerHTML = `<i class="fas fa-user-circle"></i> ${COMPANY.userEmail || 'Admin'}`;
      document.getElementById('companyInfo').textContent = `${COMPANY.name} | ${COMPANY.type} | Advanced Inventory`;
      setupTabs();
      loadTab('dashboard');
      refreshAllCaches();
    }

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          navigateToTab(this.dataset.tab);
        });
      });
    }

    function navigateToTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tabBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (tabBtn) tabBtn.classList.add('active');
      if (tabHistory[tabHistory.length - 1] !== tab) tabHistory.push(tab);
      updateBackButton();
      loadTab(tab);
    }

    function goBack() {
      if (tabHistory.length > 1) {
        tabHistory.pop();
        const prev = tabHistory[tabHistory.length - 1];
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab-btn[data-tab="${prev}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        updateBackButton();
        loadTab(prev);
      }
    }

    function updateBackButton() {
      document.getElementById('backBtn').classList.toggle('show', tabHistory.length > 1);
    }

    async function refreshAllCaches() {
      const [prodSnap, suppSnap, wareSnap] = await Promise.all([
        getDocs(query(collection(db, 'products'), where('companyId', '==', COMPANY.id))),
        getDocs(query(collection(db, 'suppliers'), where('companyId', '==', COMPANY.id))),
        getDocs(query(collection(db, 'warehouses'), where('companyId', '==', COMPANY.id)))
      ]);
      productsCache = [];
      prodSnap.forEach(d => productsCache.push({ id: d.id, ...d.data() }));
      suppliersCache = [];
      suppSnap.forEach(d => suppliersCache.push({ id: d.id, ...d.data() }));
      warehousesCache = [];
      wareSnap.forEach(d => warehousesCache.push({ id: d.id, ...d.data() }));
      
      categoriesCache = [...new Set(productsCache.map(p => p.category || 'Uncategorized'))];
      document.getElementById('prodCount').textContent = productsCache.length;
    }

    function loadTab(tab) {
      currentTab = tab;
      const c = document.getElementById('mainContent');
      switch(tab) {
        case 'dashboard': renderDashboard(c); break;
        case 'products': renderProducts(c); break;
        case 'categories': renderCategories(c); break;
        case 'stock-in': renderStockIn(c); break;
        case 'stock-out': renderStockOut(c); break;
        case 'suppliers': renderSuppliers(c); break;
        case 'purchase': renderPurchase(c); break;
        case 'bills': renderBills(c); break;
        case 'warehouse': renderWarehouse(c); break;
        case 'reports': renderReports(c); break;
        case 'settings': renderSettings(c); break;
      }
    }

    function displayProducts(products) {

        const val = (p.stock||0)*(p.costPrice||0);
        const status = (p.stock||0)===0?'danger':(p.stock||0)<=(p.reorderLevel||10)?'warning':'success';
        return `<tr>
          <td class="product-icon-cell">${getCategoryIcon(p.category)}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.sku||'-'}</td>
          <td><span class="badge badge-info"><i class="fas fa-tag"></i> ${p.category||'General'}</span></td>
          <td>${p.unit||'pcs'}</td>
          <td><strong>${p.stock||0}</strong></td>
          <td>₹${(p.costPrice||0).toFixed(2)}</td>
          <td>₹${(p.sellingPrice||0).toFixed(2)}</td>
          <td>₹${val.toFixed(2)}</td>
          <td><span class="badge badge-${status}">${status==='danger'?'❌ Out':status==='warning'?'⚠️ Low':'✅ OK'}</span></td>
          <td style="display:flex;gap:4px;">
            <button class="btn btn-xs btn-info" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>

    async function saveProduct(editId) {
      const name = document.getElementById('pName')?.value.trim();
      if (!name) return alert('Product name required!');
      const data = {
        name, sku: document.getElementById('pSKU')?.value||'',
        category: document.getElementById('pCat')?.value||'General',
        unit: document.getElementById('pUnit')?.value||'pcs',
        costPrice: parseFloat(document.getElementById('pCost')?.value)||0,
        sellingPrice: parseFloat(document.getElementById('pSell')?.value)||0,
        stock: parseInt(document.getElementById('pStock')?.value)||0,
        reorderLevel: parseInt(document.getElementById('pReorder')?.value)||10,
        description: document.getElementById('pDesc')?.value||'',
        companyId: COMPANY.id, updatedAt: Timestamp.now()
      };
      if (editId) { await updateDoc(doc(db, 'products', editId), data); }
      else { data.createdAt = Timestamp.now(); await addDoc(collection(db, 'products'), data); }
      closeModal();
      await refreshAllCaches();
      loadTab('products');

    window.editProduct = (id) => showProductForm(id);
    window.deleteProduct = async (id) => {

    };

    window.exportCSV = () => {

      productsCache.forEach(p => csv += `"${p.name}","${p.sku}","${p.category}","${p.unit}",${p.stock},${p.costPrice},${p.sellingPrice},${(p.stock||0)*(p.costPrice||0)}\n`);
      const b = new Blob([csv],{type:'text/csv'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'inventory.csv'; a.click();
    };

        const name = document.getElementById('sName')?.value.trim();
        if (!name) return alert('Name required!');
        const data = { name, contactPerson: document.getElementById('sContact')?.value||'', email: document.getElementById('sEmail')?.value||'', phone: document.getElementById('sPhone')?.value||'', gst: document.getElementById('sGST')?.value||'', paymentTerms: document.getElementById('sTerms')?.value||'', rating: parseInt(document.getElementById('sRating')?.value)||3, companyId: COMPANY.id, updatedAt: Timestamp.now() };
        if (editId) { await updateDoc(doc(db, 'suppliers', editId), data); }
        else { data.createdAt = Timestamp.now(); await addDoc(collection(db, 'suppliers'), data); }
        closeModal(); await refreshAllCaches(); loadTab('suppliers');
      });
    };
    window.editSupplier = (id) => showSupplierForm(id);
    window.deleteSupplier = async (id) => { if(confirm('Delete?')) { await deleteDoc(doc(db, 'suppliers', id)); await refreshAllCaches(); loadTab('suppliers'); } };

    // ==================== PURCHASE ORDERS & BILLS ====================
    async function renderPurchase(c) {
      await refreshAllCaches();
      c.innerHTML = `<div class="card"><h3>📋 Purchase Orders</h3><div class="form-row mt-1"><div class="form-group"><label>Supplier *</label><select class="form-control" id="poSupplier"><option value="">-- Select --</option>${suppliersCache.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div><div class="form-group"><label>Date</label><input type="date" class="form-control" id="poDate"></div></div><div id="poItems"><div class="form-row" style="margin-bottom:6px;"><select class="form-control"><option value="">Product</option>${productsCache.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><input type="number" class="form-control" placeholder="Qty" min="1"><input type="number" step="0.01" class="form-control" placeholder="Unit Price"></div></div><button class="btn btn-sm btn-info" onclick="addPOItem()"><i class="fas fa-plus"></i> Add Item</button><button class="btn btn-primary mt-2" id="createPO">Create PO</button></div><div class="card mt-2"><h4>PO List</h4><div id="poList"></div></div>`;
      document.getElementById('poDate').valueAsDate = new Date();
      document.getElementById('createPO').addEventListener('click', async () => {
        const sid = document.getElementById('poSupplier').value;
        if (!sid) return alert('Select supplier');
        const items = [];
        document.querySelectorAll('#poItems .form-row').forEach(row => {
          const sel = row.querySelector('select'); const inputs = row.querySelectorAll('input');
          if(sel?.value && inputs[0]?.value) items.push({ productId: sel.value, productName: productsCache.find(p=>p.id===sel.value)?.name||'', quantity: parseInt(inputs[0].value), unitPrice: parseFloat(inputs[1]?.value)||0 });
        });
        if(!items.length) return alert('Add items');
        const total = items.reduce((s,i)=>s+(i.quantity*i.unitPrice),0);
        const supplier = suppliersCache.find(s=>s.id===sid);
        await addDoc(collection(db, 'purchaseOrders'), { supplierId: sid, supplierName: supplier?.name||'', items, total, status: 'pending', orderDate: document.getElementById('poDate').value, companyId: COMPANY.id, createdAt: Timestamp.now() });
        alert('PO created!'); loadTab('purchase');
      });
      window.addPOItem = () => { const d = document.createElement('div'); d.className='form-row'; d.style.marginBottom='6px'; d.innerHTML = `<select class="form-control"><option value="">Product</option>${productsCache.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><input type="number" class="form-control" placeholder="Qty" min="1"><input type="number" step="0.01" class="form-control" placeholder="Unit Price">`; document.getElementById('poItems').appendChild(d); };
      loadPOList();
    }

    async function loadPOList() {
      const snap = await getDocs(query(collection(db, 'purchaseOrders'), where('companyId','==',COMPANY.id), orderBy('createdAt','desc')));
      const el = document.getElementById('poList');
      if(el) el.innerHTML = snap.empty ? '<div class="empty-state">No POs</div>' : `<table><thead><tr><th>PO #</th><th>Supplier</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr></thead><tbody>${snap.docs.map(d=>{const po=d.data();return `<tr><td>#PO-${d.id.slice(-6)}</td><td>${po.supplierName}</td><td>${po.items?.length||0}</td><td>₹${po.total?.toLocaleString()}</td><td><span class="badge badge-${po.status==='received'?'success':'warning'}">${po.status}</span></td><td>${po.status==='pending'?`<button class="btn btn-xs btn-success" onclick="receivePO('${d.id}')">✅ Receive</button>`:'✅ Done'}</td></tr>`;}).join('')}</tbody></table>`;
    }

    window.receivePO = async (poId) => {
      const poDoc = await getDoc(doc(db, 'purchaseOrders', poId));
      const po = poDoc.data();
      for(const item of po.items||[]) {
        const product = productsCache.find(p=>p.id===item.productId);
        if(product) { await updateDoc(doc(db, 'products', item.productId), { stock: (product.stock||0)+item.quantity }); await addDoc(collection(db, 'stockMovements'), { productId: item.productId, productName: item.productName, type: 'in', quantity: item.quantity, supplierName: po.supplierName, reference: `PO-${poId.slice(-6)}`, companyId: COMPANY.id, timestamp: Timestamp.now() }); }
      }
      await updateDoc(doc(db, 'purchaseOrders', poId), { status: 'received' });
      await refreshAllCaches();
      alert('PO received!'); loadTab('purchase');
    };

    async function renderBills(c) {
      await refreshAllCaches();
      c.innerHTML = `<div class="card"><h3>🧾 Bills</h3><div class="form-row mt-1"><div class="form-group"><label>Supplier *</label><select class="form-control" id="billSupplier"><option value="">-- Select --</option>${suppliersCache.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div><div class="form-group"><label>Bill #</label><input class="form-control" id="billNo"></div><div class="form-group"><label>Date</label><input type="date" class="form-control" id="billDate"></div></div><div id="billItems"></div><button class="btn btn-sm btn-info" onclick="addBillItem()"><i class="fas fa-plus"></i> Add Line</button><div class="form-row mt-2"><div class="form-group"><label>Total ₹</label><input class="form-control" id="billTotal" readonly></div><div class="form-group"><label>Paid ₹</label><input type="number" step="0.01" class="form-control" id="billPaid" value="0"></div></div><button class="btn btn-primary mt-2" id="saveBill">💾 Save Bill</button></div><div class="card mt-2"><h4>Bills List</h4><div id="billsList"></div></div>`;
      document.getElementById('billDate').valueAsDate = new Date();
      document.getElementById('saveBill').addEventListener('click', async () => {
        const sid = document.getElementById('billSupplier').value;
        if(!sid) return alert('Select supplier');
        const items = [];
        document.querySelectorAll('#billItems .form-row').forEach(row => { const inputs = row.querySelectorAll('input'); if(inputs[0]?.value) items.push({ description: inputs[0].value, amount: parseFloat(inputs[1]?.value)||0 }); });
        const total = parseFloat(document.getElementById('billTotal').value);
        const paid = parseFloat(document.getElementById('billPaid').value);
        const supplier = suppliersCache.find(s=>s.id===sid);
        await addDoc(collection(db, 'bills'), { supplierId: sid, supplierName: supplier?.name||'', billNo: document.getElementById('billNo').value, billDate: document.getElementById('billDate').value, items, total, paid, balance: total-paid, status: paid>=total?'paid':paid>0?'partial':'pending', companyId: COMPANY.id, createdAt: Timestamp.now() });
        alert('Bill saved!'); loadTab('bills');
      });
      window.addBillItem = () => { const d = document.createElement('div'); d.className='form-row'; d.style.marginBottom='6px'; d.innerHTML = `<input class="form-control" placeholder="Description"><input type="number" step="0.01" class="form-control bill-amt" placeholder="Amount ₹" oninput="updateBillTotal()">`; document.getElementById('billItems').appendChild(d); };
      window.updateBillTotal = () => { let t=0; document.querySelectorAll('.bill-amt').forEach(e=>t+=parseFloat(e.value)||0); document.getElementById('billTotal').value=t.toFixed(2); };
      loadBillsList();
    }

    async function loadBillsList() {
      const snap = await getDocs(query(collection(db, 'bills'), where('companyId','==',COMPANY.id), orderBy('createdAt','desc')));
      const el = document.getElementById('billsList');
      if(el) el.innerHTML = snap.empty ? '<div class="empty-state">No bills</div>' : `<table><thead><tr><th>Bill #</th><th>Supplier</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th></tr></thead><tbody>${snap.docs.map(d=>{const b=d.data();return `<tr><td>${b.billNo||'-'}</td><td>${b.supplierName}</td><td>₹${b.total?.toLocaleString()}</td><td>₹${b.paid?.toLocaleString()}</td><td>₹${b.balance?.toLocaleString()}</td><td><span class="badge badge-${b.status==='paid'?'success':b.status==='partial'?'warning':'danger'}">${b.status}</span></td></tr>`;}).join('')}</tbody></table>`;
    }

    // ==================== WAREHOUSE ====================
    async function renderWarehouse(c) {
      await refreshAllCaches();
      const allW = warehousesCache.length ? warehousesCache : [{ id: 'main', name: 'Main Warehouse', location: 'Default', capacity: 'Unlimited' }];
      c.innerHTML = `<div class="card-header"><h3><i class="fas fa-warehouse"></i> Warehouses</h3><button class="btn btn-primary" onclick="addWarehouseForm()"><i class="fas fa-plus"></i> Add</button></div><div class="grid-3col">${allW.map(w => { const stock = productsCache.filter(p=>(p.warehouse||'Main')===w.name).reduce((s,p)=>s+(p.stock||0),0); const count = productsCache.filter(p=>(p.warehouse||'Main')===w.name).length; return `<div class="card text-center"><h3>🏭 ${w.name}</h3><p>📍 ${w.location||'N/A'}</p><p>📦 ${count} products</p><p>📊 Stock: <strong>${stock}</strong></p>${w.id!=='main'?`<button class="btn btn-xs btn-danger" onclick="deleteWarehouse('${w.id}')"><i class="fas fa-trash"></i></button>`:'<span class="badge badge-info">Default</span>'}</div>`; }).join('')}</div>`;
    }

    window.addWarehouseForm = () => {
      document.getElementById('modalContent').innerHTML = `<h3>➕ Add Warehouse</h3><div class="form-row"><div class="form-group"><label>Name *</label><input class="form-control" id="wName"></div><div class="form-group"><label>Location</label><input class="form-control" id="wLocation"></div></div><button class="btn btn-primary" id="saveW">Save</button><button class="btn btn-outline mt-1" onclick="closeModal()">Cancel</button>`;
      document.getElementById('modalOverlay').classList.add('active');
      document.getElementById('saveW').addEventListener('click', async () => {
        const name = document.getElementById('wName')?.value.trim();
        if(!name) return alert('Name required');
        await addDoc(collection(db, 'warehouses'), { name, location: document.getElementById('wLocation')?.value||'', companyId: COMPANY.id, createdAt: Timestamp.now() });
        closeModal(); await refreshAllCaches(); loadTab('warehouse');
      });
    };
    window.deleteWarehouse = async (id) => { if(confirm('Delete?')) { await deleteDoc(doc(db, 'warehouses', id)); await refreshAllCaches(); loadTab('warehouse'); } };

    // ==================== REPORTS & SETTINGS ====================
    async function renderReports(c) {
      await refreshAllCaches();
      const totalValue = productsCache.reduce((s,p)=>s+((p.stock||0)*(p.costPrice||0)),0);
      c.innerHTML = `<div class="stats-row"><div class="stat-card"><div class="value">₹${totalValue.toLocaleString()}</div><div class="label">Total Value</div></div><div class="stat-card"><div class="value">${productsCache.length}</div><div class="label">Total SKUs</div></div></div><div class="grid-2col"><div class="card"><h3>📊 Category Value</h3><canvas id="valChart" height="200"></canvas></div><div class="card"><h3>📈 Stock Status</h3><canvas id="statusChart" height="200"></canvas></div></div>`;
      const cats = categoriesCache;
      const catVals = cats.map(c=>productsCache.filter(p=>(p.category||'Uncategorized')===c).reduce((s,p)=>s+(p.stock||0)*(p.costPrice||0),0));
      const ctx1 = document.getElementById('valChart')?.getContext('2d');
      if(ctx1) new Chart(ctx1, { type: 'bar', data: { labels: cats, datasets: [{ label: 'Value ₹', data: catVals, backgroundColor: '#6366f1' }] } });
      const ctx2 = document.getElementById('statusChart')?.getContext('2d');
      if(ctx2) new Chart(ctx2, { type: 'pie', data: { labels: ['Healthy','Low','Out'], datasets: [{ data: [productsCache.filter(p=>(p.stock||0)>(p.reorderLevel||10)).length, productsCache.filter(p=>(p.stock||0)>0&&(p.stock||0)<=(p.reorderLevel||10)).length, productsCache.filter(p=>(p.stock||0)===0).length], backgroundColor: ['#10b981','#f59e0b','#ef4444'] }] } });
    }

    function renderSettings(c) {
      c.innerHTML = `<div class="card"><h3><i class="fas fa-cog"></i> Settings</h3><p><strong>Company:</strong> ${COMPANY.name} | <strong>Type:</strong> ${COMPANY.type}</p><button class="btn btn-danger mt-2" onclick="resetAll()"><i class="fas fa-trash"></i> Reset All Data</button><button class="btn btn-outline mt-1" onclick="window.location.href='dashboard.html'">🏠 Back</button></div>`;
    }

    window.resetAll = async () => {
      if(confirm('DELETE ALL DATA?')) {
        for(const col of ['products','suppliers','stockMovements','purchaseOrders','bills','warehouses']) {
          const snap = await getDocs(query(collection(db, col), where('companyId','==',COMPANY.id)));
          snap.forEach(async d => await deleteDoc(d.ref));
        }
        await refreshAllCaches(); alert('Cleared!'); loadTab('dashboard');
      }
    };

    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target === document.getElementById('modalOverlay')) closeModal(); });
    window.closeModal = closeModal;
    window.navigateToTab = navigateToTab;
    window.goBack = goBack;
    window.handleLogout = () => { sessionStorage.clear(); window.location.href = "dashboard.html"; };

    init();
  </script>
</body>
</html>
