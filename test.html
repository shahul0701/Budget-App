<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetFlow | Company Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      max-width: 500px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
    }

    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      background: #f8fafc;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      color: #64748b;
    }

    .tab.active {
      background: white;
      color: #667eea;
      border-bottom: 3px solid #667eea;
    }

    .form-container {
      padding: 2rem;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #334155;
      font-size: 0.85rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 6px;
    }

    .success-msg {
      color: #10b981;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      padding: 10px;
      background: #d1fae5;
      border-radius: 8px;
    }

    .company-list {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 1rem;
    }

    .company-card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .company-card:hover {
      border-color: #667eea;
      transform: translateX(5px);
      background: white;
    }

    .company-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #1e293b;
    }

    .company-type {
      font-size: 0.75rem;
      color: #667eea;
      margin-top: 4px;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    hr {
      margin: 1rem 0;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>🏢 BudgetFlow</h1>
      <p>Company Management System</p>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">🔐 Company Login</button>
      <button class="tab" onclick="switchTab('signup')">✨ Create Company</button>
    </div>

    <div class="form-container">
      <!-- Login Form - Shows ONLY companies created by the current user -->
      <div id="loginForm" class="form active">
        <h3 style="margin-bottom: 1.5rem;">Your Companies</h3>
        <div id="companyList">
          <div class="loading">Loading your companies...</div>
        </div>
      </div>

      <!-- Signup Form - Create new company for current user -->
      <div id="signupForm" class="form">
        <h3 style="margin-bottom: 1.5rem;">Register New Company</h3>
        <div class="input-group">
          <label>Company Name *</label>
          <input type="text" id="companyName" placeholder="Enter company name">
        </div>
        <div class="input-group">
          <label>Company Type</label>
          <select id="companyType">
            <option value="Startup">🚀 Startup</option>
            <option value="Agency">🎨 Agency</option>
            <option value="Retail">🛍️ Retail</option>
            <option value="Manufacturing">🏭 Manufacturing</option>
            <option value="Tech">💻 Tech</option>
            <option value="Other">📌 Other</option>
          </select>
        </div>
        <div class="input-group">
          <label>Company Password *</label>
          <input type="password" id="signupPassword" placeholder="Create strong password">
        </div>
        <div class="input-group">
          <label>Confirm Password *</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>
        <div class="input-group">
          <label>Company Details (Optional)</label>
          <textarea rows="3" id="companyDetails" placeholder="Address, VAT, etc..."></textarea>
        </div>
        <button class="btn-primary" onclick="createCompany()">✅ Create Company</button>
        <div id="signupMessage"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, getDocs, addDoc, where, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
    measurementId: "G-YFFJL2H54X"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentCompanies = [];

  // Get or create user from localStorage (simple user tracking without login page)
  function initializeUser() {
    let userId = localStorage.getItem('budgetflow_userId');
    let userName = localStorage.getItem('budgetflow_userName');
    
    if (!userId) {
      // Create a new anonymous user
      userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      userName = 'User_' + Math.floor(Math.random() * 10000);
      localStorage.setItem('budgetflow_userId', userId);
      localStorage.setItem('budgetflow_userName', userName);
    }
    
    currentUser = {
      id: userId,
      name: userName
    };
    
    // Update header to show current user
    const header = document.querySelector('.header p');
    if (header) {
      header.innerHTML = `Welcome, ${userName} • Your private companies only`;
    }
  }

  window.switchTab = function(tab) {
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const tabs = document.querySelectorAll('.tab');
    
    if (tab === 'login') {
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      tabs[0].classList.add('active');
      tabs[1].classList.remove('active');
      loadUserCompanies(); // Load ONLY this user's companies
    } else {
      loginForm.classList.remove('active');
      signupForm.classList.add('active');
      tabs[0].classList.remove('active');
      tabs[1].classList.add('active');
    }
  };

  // Load ONLY companies created by this user
  async function loadUserCompanies() {
    if (!currentUser) return;
    
    const companyListDiv = document.getElementById('companyList');
    companyListDiv.innerHTML = '<div class="loading">Loading your companies...</div>';
    
    try {
      // Query companies where userId matches current user's ID
      const companiesRef = collection(db, 'companies');
      const userCompaniesQuery = query(companiesRef, where("userId", "==", currentUser.id));
      const querySnapshot = await getDocs(userCompaniesQuery);
      
      if (querySnapshot.empty) {
        companyListDiv.innerHTML = `
          <div style="text-align: center; padding: 2rem;">
            <p style="color: #64748b;">📭 You haven't created any companies yet.</p>
            <p style="color: #64748b; font-size: 0.85rem;">Switch to "Create Company" to get started.</p>
          </div>
        `;
        return;
      }
      
      currentCompanies = [];
      let html = '<div class="company-list">';
      querySnapshot.forEach((doc) => {
        const company = doc.data();
        const companyId = doc.id;
        currentCompanies.push({ id: companyId, ...company });
        html += `
          <div class="company-card" onclick="showPasswordPrompt('${companyId}', '${escapeHtml(company.companyName)}', '${escapeHtml(company.companyType)}')">
            <div class="company-name">🏢 ${escapeHtml(company.companyName)}</div>
            <div class="company-type">${escapeHtml(company.companyType || 'Business')}</div>
          </div>
        `;
      });
      html += '</div>';
      companyListDiv.innerHTML = html;
      
    } catch (error) {
      console.error("Error loading companies:", error);
      companyListDiv.innerHTML = `
        <div style="text-align: center; padding: 2rem; color: #dc2626;">
          ❌ Error loading your companies. Please refresh.
        </div>
      `;
    }
  }

  window.showPasswordPrompt = function(companyId, companyName, companyType) {
    const company = currentCompanies.find(c => c.id === companyId);
    if (!company) return;
    
    const password = prompt(`Enter password for "${companyName}":`);
    if (password === null) return;
    
    if (password === company.password) {
      // Save company info to session storage
      sessionStorage.setItem('currentCompany', JSON.stringify({
        id: companyId,
        name: companyName,
        type: companyType
      }));
      sessionStorage.setItem('isLoggedIn', 'true');
      
      alert(`✅ Access granted to ${companyName}!`);
      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    } else {
      alert('❌ Incorrect password! Access denied.');
    }
  };

  window.createCompany = async function() {
    if (!currentUser) {
      alert('Error: User not found. Please refresh the page.');
      return;
    }
    
    const companyName = document.getElementById('companyName').value.trim();
    const companyType = document.getElementById('companyType').value;
    const password = document.getElementById('signupPassword').value.trim();
    const confirmPw = document.getElementById('confirmPassword').value.trim();
    const details = document.getElementById('companyDetails').value;
    const messageDiv = document.getElementById('signupMessage');
    
    if (!companyName) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Company name required</div>';
      return;
    }
    if (!password) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Password required</div>';
      return;
    }
    if (password !== confirmPw) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Passwords do not match!</div>';
      return;
    }
    if (password.length < 6) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Password must be at least 6 characters</div>';
      return;
    }
    
    try {
      // Check if this user already has a company with same name
      const companiesRef = collection(db, 'companies');
      const userCompanyQuery = query(
        companiesRef, 
        where("userId", "==", currentUser.id), 
        where("companyName", "==", companyName)
      );
      const existingCheck = await getDocs(userCompanyQuery);
      
      if (!existingCheck.empty) {
        messageDiv.innerHTML = '<div class="error-msg">❌ You already have a company with this name!</div>';
        return;
      }
      
      // Create company with userId to link it to current user
      const docRef = await addDoc(collection(db, 'companies'), {
        companyName: companyName,
        companyType: companyType,
        password: password,
        details: details,
        userId: currentUser.id,
        userIdentifier: currentUser.id,
        createdAt: new Date().toISOString(),
        createdTimestamp: Date.now()
      });
      
      messageDiv.innerHTML = '<div class="success-msg">✅ Company created successfully! It will appear in your companies list.</div>';
      
      // Clear form
      document.getElementById('companyName').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('companyDetails').value = '';
      
      // Switch back to login tab after 2 seconds
      setTimeout(() => {
        switchTab('login');
        messageDiv.innerHTML = '';
      }, 2000);
      
    } catch (error) {
      console.error("Error creating company:", error);
      messageDiv.innerHTML = '<div class="error-msg">❌ Error creating company. Please try again.</div>';
    }
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Initialize user and load companies
  initializeUser();
  loadUserCompanies();
</script>
</body>
</html>
