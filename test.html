<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetFlow | Company Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .user-info {
      background: #f1f5f9;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
    }

    .user-name {
      font-weight: 600;
      color: #334155;
      font-size: 0.9rem;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: #dc2626;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
    }

    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      background: #f8fafc;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      color: #64748b;
    }

    .tab.active {
      background: white;
      color: #667eea;
      border-bottom: 3px solid #667eea;
    }

    .form-container {
      padding: 2rem;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #334155;
      font-size: 0.85rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #10b981;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 0.95rem;
      transition: transform 0.2s;
      margin-top: 10px;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-edit {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      margin-right: 8px;
    }

    .btn-edit:hover {
      background: #d97706;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 6px;
    }

    .success-msg {
      color: #10b981;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      padding: 10px;
      background: #d1fae5;
      border-radius: 8px;
    }

    .company-list {
      max-height: 400px;
      overflow-y: auto;
      margin-top: 1rem;
    }

    .company-card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: all 0.2s;
    }

    .company-card:hover {
      border-color: #667eea;
      background: white;
    }

    .company-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .company-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #1e293b;
    }

    .company-actions {
      display: flex;
      gap: 8px;
    }

    .company-type {
      font-size: 0.75rem;
      color: #667eea;
      margin-top: 4px;
      display: inline-block;
      background: #eef2ff;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .company-details {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e2e8f0;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    hr {
      margin: 1rem 0;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h3 {
      font-size: 1.25rem;
      color: #1e293b;
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #64748b;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>🏢 BudgetFlow</h1>
      <p>Manage Your Companies</p>
    </div>
    
    <!-- User Info Bar -->
    <div id="userInfoBar" class="user-info">
      <div class="user-name">
        <i class="emoji">👤</i> Welcome, <span id="currentUserName">Loading...</span>
      </div>
      <button class="logout-btn" onclick="logoutUser()">Logout</button>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('companies')">🏢 My Companies</button>
      <button class="tab" onclick="switchTab('create')">✨ Create Company</button>
    </div>

    <div class="form-container">
      <!-- Companies List -->
      <div id="companiesForm" class="form active">
        <h3 style="margin-bottom: 1.5rem;">Your Companies</h3>
        <div id="companyList">
          <div class="loading">Loading your companies...</div>
        </div>
      </div>

      <!-- Create Company Form -->
      <div id="createForm" class="form">
        <h3 style="margin-bottom: 1.5rem;">Register New Company</h3>
        <div class="input-group">
          <label>Company Name *</label>
          <input type="text" id="companyName" placeholder="Enter company name">
        </div>
        <div class="input-group">
          <label>Company Type</label>
          <select id="companyType">
            <option value="Startup">🚀 Startup</option>
            <option value="Agency">🎨 Agency</option>
            <option value="Retail">🛍️ Retail</option>
            <option value="Manufacturing">🏭 Manufacturing</option>
            <option value="Tech">💻 Tech</option>
            <option value="Other">📌 Other</option>
          </select>
        </div>
        <div class="input-group">
          <label>Company Password *</label>
          <input type="password" id="signupPassword" placeholder="Create strong password">
        </div>
        <div class="input-group">
          <label>Confirm Password *</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>
        <div class="input-group">
          <label>Company Details (Optional)</label>
          <textarea rows="3" id="companyDetails" placeholder="Address, VAT, etc..."></textarea>
        </div>
        <button class="btn-primary" onclick="createCompany()">✅ Create Company</button>
        <div id="signupMessage"></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Company Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Edit Company</h3>
      <button class="close-modal" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="input-group">
      <label>Company Name</label>
      <input type="text" id="editCompanyName">
    </div>
    <div class="input-group">
      <label>Company Type</label>
      <select id="editCompanyType">
        <option value="Startup">🚀 Startup</option>
        <option value="Agency">🎨 Agency</option>
        <option value="Retail">🛍️ Retail</option>
        <option value="Manufacturing">🏭 Manufacturing</option>
        <option value="Tech">💻 Tech</option>
        <option value="Other">📌 Other</option>
      </select>
    </div>
    <div class="input-group">
      <label>Company Details</label>
      <textarea rows="3" id="editCompanyDetails"></textarea>
    </div>
    <div class="input-group">
      <label>New Password (leave blank to keep current)</label>
      <input type="password" id="editCompanyPassword" placeholder="Enter new password">
    </div>
    <button class="btn-primary" onclick="updateCompany()">💾 Update Company</button>
    <div id="editMessage"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, getDocs, addDoc, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
    measurementId: "G-YFFJL2H54X"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentCompanies = [];
  let editingCompanyId = null;

  // Get current logged in user from session storage
  function getCurrentUser() {
    const userData = sessionStorage.getItem('budgetflow_user');
    if (userData) {
      currentUser = JSON.parse(userData);
      document.getElementById('currentUserName').textContent = currentUser.fullName || currentUser.email;
      return true;
    }
    return false;
  }

  // Check if user is logged in
  if (!getCurrentUser()) {
    alert('Please login first!');
    window.location.href = 'index.html';
  }

  window.switchTab = function(tab) {
    const companiesForm = document.getElementById('companiesForm');
    const createForm = document.getElementById('createForm');
    const tabs = document.querySelectorAll('.tab');
    
    if (tab === 'companies') {
      companiesForm.classList.add('active');
      createForm.classList.remove('active');
      tabs[0].classList.add('active');
      tabs[1].classList.remove('active');
      loadUserCompanies();
    } else {
      companiesForm.classList.remove('active');
      createForm.classList.add('active');
      tabs[0].classList.remove('active');
      tabs[1].classList.add('active');
      // Clear create form
      document.getElementById('companyName').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('companyDetails').value = '';
      document.getElementById('signupMessage').innerHTML = '';
    }
  };

  // Load ONLY companies created by current user
  async function loadUserCompanies() {
    if (!currentUser) return;
    
    const companyListDiv = document.getElementById('companyList');
    companyListDiv.innerHTML = '<div class="loading">Loading your companies...</div>';
    
    try {
      const companiesRef = collection(db, 'companies');
      const userCompaniesQuery = query(companiesRef, where("userId", "==", currentUser.id));
      const querySnapshot = await getDocs(userCompaniesQuery);
      
      if (querySnapshot.empty) {
        companyListDiv.innerHTML = `
          <div class="empty-state">
            <i>📭</i>
            <p>You haven't created any companies yet.</p>
            <p style="font-size: 0.85rem; margin-top: 8px;">Click "Create Company" to get started.</p>
          </div>
        `;
        return;
      }
      
      currentCompanies = [];
      let html = '<div class="company-list">';
      querySnapshot.forEach((doc) => {
        const company = doc.data();
        const companyId = doc.id;
        currentCompanies.push({ id: companyId, ...company });
        html += `
          <div class="company-card">
            <div class="company-header">
              <div>
                <div class="company-name">🏢 ${escapeHtml(company.companyName)}</div>
                <div class="company-type">${escapeHtml(company.companyType || 'Business')}</div>
              </div>
              <div class="company-actions">
                <button class="btn-edit" onclick="editCompany('${companyId}')">✏️ Edit</button>
                <button class="btn-danger" onclick="deleteCompany('${companyId}', '${escapeHtml(company.companyName)}')">🗑️ Delete</button>
              </div>
            </div>
            ${company.details ? `<div class="company-details">📝 ${escapeHtml(company.details)}</div>` : ''}
            <div class="company-details" style="margin-top: 8px; border-top: none;">
              📅 Created: ${new Date(company.createdAt).toLocaleDateString()}
            </div>
          </div>
        `;
      });
      html += '</div>';
      companyListDiv.innerHTML = html;
      
    } catch (error) {
      console.error("Error loading companies:", error);
      companyListDiv.innerHTML = `
        <div style="text-align: center; padding: 2rem; color: #dc2626;">
          ❌ Error loading your companies. Please refresh.
        </div>
      `;
    }
  }

  // Edit company
  window.editCompany = function(companyId) {
    const company = currentCompanies.find(c => c.id === companyId);
    if (!company) return;
    
    editingCompanyId = companyId;
    document.getElementById('editCompanyName').value = company.companyName;
    document.getElementById('editCompanyType').value = company.companyType;
    document.getElementById('editCompanyDetails').value = company.details || '';
    document.getElementById('editCompanyPassword').value = '';
    document.getElementById('editMessage').innerHTML = '';
    
    document.getElementById('editModal').classList.add('active');
  };

  // Update company
  window.updateCompany = async function() {
    const companyName = document.getElementById('editCompanyName').value.trim();
    const companyType = document.getElementById('editCompanyType').value;
    const details = document.getElementById('editCompanyDetails').value;
    const newPassword = document.getElementById('editCompanyPassword').value;
    const messageDiv = document.getElementById('editMessage');
    
    if (!companyName) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Company name required</div>';
      return;
    }
    
    try {
      const companyRef = doc(db, 'companies', editingCompanyId);
      const updateData = {
        companyName: companyName,
        companyType: companyType,
        details: details,
        updatedAt: new Date().toISOString()
      };
      
      if (newPassword && newPassword.length >= 6) {
        updateData.password = newPassword;
      }
      
      await updateDoc(companyRef, updateData);
      
      messageDiv.innerHTML = '<div class="success-msg">✅ Company updated successfully!</div>';
      
      setTimeout(() => {
        closeEditModal();
        loadUserCompanies();
      }, 1500);
      
    } catch (error) {
      console.error("Error updating company:", error);
      messageDiv.innerHTML = '<div class="error-msg">❌ Error updating company</div>';
    }
  };

  // Delete company
  window.deleteCompany = async function(companyId, companyName) {
    const confirmDelete = confirm(`Are you sure you want to delete "${companyName}"?\n\nThis action cannot be undone!`);
    
    if (!confirmDelete) return;
    
    try {
      const companyRef = doc(db, 'companies', companyId);
      await deleteDoc(companyRef);
      
      alert(`✅ "${companyName}" has been deleted successfully!`);
      loadUserCompanies();
      
    } catch (error) {
      console.error("Error deleting company:", error);
      alert('❌ Error deleting company. Please try again.');
    }
  };

  window.closeEditModal = function() {
    document.getElementById('editModal').classList.remove('active');
    editingCompanyId = null;
  };

  // Create new company
  window.createCompany = async function() {
    if (!currentUser) {
      alert('Please login first!');
      return;
    }
    
    const companyName = document.getElementById('companyName').value.trim();
    const companyType = document.getElementById('companyType').value;
    const password = document.getElementById('signupPassword').value.trim();
    const confirmPw = document.getElementById('confirmPassword').value.trim();
    const details = document.getElementById('companyDetails').value;
    const messageDiv = document.getElementById('signupMessage');
    
    if (!companyName) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Company name required</div>';
      return;
    }
    if (!password) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Password required</div>';
      return;
    }
    if (password !== confirmPw) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Passwords do not match!</div>';
      return;
    }
    if (password.length < 6) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Password must be at least 6 characters</div>';
      return;
    }
    
    try {
      const companiesRef = collection(db, 'companies');
      const userCompanyQuery = query(
        companiesRef, 
        where("userId", "==", currentUser.id), 
        where("companyName", "==", companyName)
      );
      const existingCheck = await getDocs(userCompanyQuery);
      
      if (!existingCheck.empty) {
        messageDiv.innerHTML = '<div class="error-msg">❌ You already have a company with this name!</div>';
        return;
      }
      
      await addDoc(collection(db, 'companies'), {
        companyName: companyName,
        companyType: companyType,
        password: password,
        details: details,
        userId: currentUser.id,
        userEmail: currentUser.email,
        createdAt: new Date().toISOString(),
        createdTimestamp: Date.now()
      });
      
      messageDiv.innerHTML = '<div class="success-msg">✅ Company created successfully!</div>';
      
      document.getElementById('companyName').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('companyDetails').value = '';
      
      setTimeout(() => {
        switchTab('companies');
        messageDiv.innerHTML = '';
      }, 2000);
      
    } catch (error) {
      console.error("Error creating company:", error);
      messageDiv.innerHTML = '<div class="error-msg">❌ Error creating company. Please try again.</div>';
    }
  };

  window.logoutUser = function() {
    sessionStorage.removeItem('budgetflow_user');
    sessionStorage.removeItem('currentCompany');
    sessionStorage.removeItem('isLoggedIn');
    window.location.href = 'index.html';
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Load companies on page load
  loadUserCompanies();

  // Close modal when clicking outside
  window.onclick = function(event) {
    const modal = document.getElementById('editModal');
    if (event.target === modal) {
      closeEditModal();
    }
  };
</script>
</body>
</html>
