<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>StockFlow Pro | Advanced Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --primary-light: #818cf8;
            --success: #10b981; --success-light: #34d399;
            --warning: #f59e0b; --warning-light: #fbbf24;
            --danger: #ef4444; --danger-light: #f87171;
            --info: #06b6d4; --info-light: #22d3ee;
            --dark: #0f172a; --gray-800: #1e293b; --gray-600: #475569;
            --gray-400: #94a3b8; --gray-200: #e2e8f0; --gray-100: #f1f5f9;
            --light: #f8fafc; --white: #ffffff;
            --radius-sm: 8px; --radius: 14px; --radius-lg: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 40px -8px rgba(0,0,0,0.15);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #f8fafc 100%);
            color: var(--gray-800);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Glassmorphism Header */
        .header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 18px 28px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            flex-wrap: wrap;
            gap: 14px;
            position: sticky;
            top: 16px;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            box-shadow: 0 8px 20px rgba(99,102,241,0.35);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .brand h1 {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .brand span { font-size: 11px; color: var(--gray-400); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13px;
            border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
            transition: var(--transition); white-space: nowrap; letter-spacing: 0.3px;
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            background: rgba(255,255,255,0.3); border-radius: 50%;
            transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s;
        }
        .btn:active::after { width: 300px; height: 300px; }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #d97706); color: var(--gray-800); }
        .btn-info { background: linear-gradient(135deg, var(--info), #0891b2); color: white; }
        .btn-outline { background: white; border: 2px solid var(--gray-200); color: var(--gray-800); }
        .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 6px; }
        .btn-xs { padding: 4px 10px; font-size: 10px; border-radius: 5px; }
        .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; border-radius: 50%; }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-xl); }

        /* Tab Navigation */
        .tabs-container {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            padding: 8px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .tabs {
            display: flex; gap: 4px; flex-wrap: nowrap;
        }

        .tab {
            padding: 12px 22px; border: none; background: transparent;
            font-weight: 600; font-size: 13px; cursor: pointer;
            border-radius: var(--radius-sm); transition: var(--transition);
            white-space: nowrap; color: var(--gray-600); display: flex; align-items: center; gap: 7px;
        }
        .tab i { font-size: 15px; }
        .tab:hover { background: var(--gray-100); color: var(--primary); }
        .tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: var(--shadow); }

        /* Content */
        .content {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-lg);
            min-height: 500px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px; margin-bottom: 24px;
        }

        .stat-card {
            background: var(--white);
            padding: 18px 20px; border-radius: var(--radius);
            cursor: pointer; transition: var(--transition);
            border: 1px solid var(--gray-200);
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 4px; height: 100%; transition: var(--transition);
        }
        .stat-card:nth-child(1)::before { background: var(--primary); }
        .stat-card:nth-child(2)::before { background: var(--success); }
        .stat-card:nth-child(3)::before { background: var(--warning); }
        .stat-card:nth-child(4)::before { background: var(--danger); }
        .stat-card:nth-child(5)::before { background: #8b5cf6; }
        .stat-card:nth-child(6)::before { background: var(--info); }
        .stat-card:nth-child(7)::before { background: #ec4899; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
        .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 26px; font-weight: 800; }
        .stat-card .stat-label { font-size: 12px; color: var(--gray-400); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        /* Tables */
        .table-responsive { overflow-x: auto; border-radius: var(--radius-sm); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 13px 12px; text-align: left; font-weight: 700; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; color: var(--gray-600);
            border-bottom: 2px solid var(--gray-200); white-space: nowrap; position: sticky; top: 0;
        }
        td { padding: 11px 12px; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
        tr:hover { background: linear-gradient(135deg, #f8fafc, #f1f5f9); }
        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 4px; letter-spacing: 0.3px;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-purple { background: #ede9fe; color: #5b21b6; }

        /* Forms */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 5px; font-size: 12px; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control {
            width: 100%; padding: 10px 14px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
            font-size: 13px; transition: var(--transition); background: var(--light);
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); background: white; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.6);
            backdrop-filter: blur(8px); justify-content: center; align-items: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white; border-radius: var(--radius-lg); padding: 28px;
            max-width: 650px; width: 100%; max-height: 85vh; overflow-y: auto;
            box-shadow: var(--shadow-xl); animation: modalIn 0.3s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 18px; }

        /* Cards */
        .card { background: white; padding: 20px; border-radius: var(--radius); border: 1px solid var(--gray-200); margin-bottom: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .card-header h3 { font-size: 16px; font-weight: 700; }

        .item-row { background: var(--light); padding: 12px; border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--gray-200); }
        .success-msg { background: #d1fae5; border: 1px solid #10b981; padding: 12px 16px; border-radius: var(--radius-sm); color: #065f46; font-weight: 600; margin: 12px 0; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .text-muted { color: var(--gray-400); font-size: 12px; }

        @media (max-width: 768px) {
            .app-container { padding: 8px; }
            .header { padding: 14px 16px; flex-direction: column; text-align: center; }
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-card { padding: 14px; }
            .stat-card .stat-value { font-size: 20px; }
            .form-row-3 { grid-template-columns: 1fr; }
            .tab { padding: 10px 14px; font-size: 11px; }
            .tab i { font-size: 12px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .btn { padding: 8px 14px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-cubes"></i></div>
                <div>
                    <h1>StockFlow Pro</h1>
                    <span id="companyInfo">Inventory Management</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <span id="userDisplay" style="font-weight:600;font-size:13px;background:var(--gray-100);padding:8px 16px;border-radius:20px;"></span>
                <button class="btn btn-outline btn-sm" onclick="window.print()"><i class="fas fa-print"></i></button>
                <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Exit</button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs-container">
            <nav class="tabs" id="tabNav">
                <button class="tab active" data-tab="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</button>
                <button class="tab" data-tab="products"><i class="fas fa-boxes"></i> Products</button>
                <button class="tab" data-tab="suppliers"><i class="fas fa-truck"></i> Suppliers</button>
                <button class="tab" data-tab="stock-in"><i class="fas fa-download"></i> Stock In</button>
                <button class="tab" data-tab="stock-out"><i class="fas fa-upload"></i> Stock Out</button>
                <button class="tab" data-tab="purchase-orders"><i class="fas fa-file-invoice"></i> Purchase Orders</button>
                <button class="tab" data-tab="bills"><i class="fas fa-receipt"></i> Bills</button>
                <button class="tab" data-tab="reports"><i class="fas fa-chart-bar"></i> Reports</button>
            </nav>
        </div>

        <!-- Main Content -->
        <main class="content" id="mainContent"></main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
            authDomain: "budget-app-1365f.firebaseapp.com",
            projectId: "budget-app-1365f",
            storageBucket: "budget-app-1365f.firebasestorage.app",
            messagingSenderId: "1036194450411",
            appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const companyData = JSON.parse(sessionStorage.getItem('activeCompany'));
        if (!companyData || !sessionStorage.getItem('companyAuth')) {
            window.location.href = "dashboard.html";
        }

        const COMPANY = companyData;
        let productsData = [];
        let suppliersData = [];

        document.getElementById('userDisplay').innerHTML = `<i class="fas fa-user-circle"></i> ${COMPANY.userEmail || 'Admin'}`;
        document.getElementById('companyInfo').textContent = `${COMPANY.name} | ${COMPANY.type}`;

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                switchTab(this.getAttribute('data-tab'));
            });
        });

        refreshAllData().then(() => loadTab('dashboard'));

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.tab[data-tab="${tabName}"]`);
            if (activeTab) activeTab.classList.add('active');
            refreshAllData().then(() => loadTab(tabName));
        }
        window.switchTab = switchTab;

        async function refreshAllData() {
            try {
                const [prodSnap, suppSnap] = await Promise.all([
                    getDocs(query(collection(db, 'products'), where('companyId', '==', COMPANY.id))),
                    getDocs(query(collection(db, 'suppliers'), where('companyId', '==', COMPANY.id)))
                ]);
                productsData = []; prodSnap.forEach(d => productsData.push({ id: d.id, ...d.data() }));
                suppliersData = []; suppSnap.forEach(d => suppliersData.push({ id: d.id, ...d.data() }));
            } catch(e) { console.error(e); }
        }

        function loadTab(tab) {
            const c = document.getElementById('mainContent');
            if (!c) return;
            switch(tab) {
                case 'dashboard': loadDashboard(c); break;
                case 'products': loadProducts(c); break;
                case 'suppliers': loadSuppliers(c); break;
                case 'stock-in': loadStockIn(c); break;
                case 'stock-out': loadStockOut(c); break;
                case 'purchase-orders': loadPurchaseOrders(c); break;
                case 'bills': loadBills(c); break;
                case 'reports': loadReports(c); break;
            }
        }

        // ==================== DOWNLOAD FUNCTIONS ====================
        window.downloadPDF = function(title, headers, data, filename) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16); doc.text(title, 14, 20);
            doc.setFontSize(10); doc.text(`Company: ${COMPANY.name} | Date: ${new Date().toLocaleDateString()}`, 14, 28);
            doc.autoTable({ head: [headers], body: data, startY: 35, styles: { fontSize: 8 }, headStyles: { fillColor: [99, 102, 241] } });
            doc.save(filename + '.pdf');
        };

        window.downloadExcel = function(data, headers, filename) {
            const ws = XLSX.utils.json_to_sheet(data, { header: headers });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
            XLSX.writeFile(wb, filename + '.xlsx');
        };

        window.downloadCSV = function(data, headers, filename) {
            let csv = headers.join(',') + '\n';
            data.forEach(row => csv += headers.map(h => `"${row[h]||''}"`).join(',') + '\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename + '.csv'; a.click();
        };

        // ==================== DASHBOARD ====================
        async function loadDashboard(c) {
            const totalProducts = productsData.length;
            const totalStock = productsData.reduce((s,p)=>s+(p.stock||0),0);
            const totalValue = productsData.reduce((s,p)=>s+((p.stock||0)*(p.costPrice||0)),0);
            const lowStock = productsData.filter(p=>(p.stock||0)<=(p.reorderLevel||10)).length;
            let poCount=0, billCount=0;
            try {
                const [ps,bs] = await Promise.all([getDocs(query(collection(db,'purchaseOrders'),where('companyId','==',COMPANY.id))), getDocs(query(collection(db,'bills'),where('companyId','==',COMPANY.id)))]);
                poCount=ps.size; billCount=bs.size;
            } catch(e) {}

            c.innerHTML = `
                <h2 style="font-size:20px;font-weight:800;margin-bottom:20px;">📊 Business Overview</h2>
                <div class="stats-grid">
                    ${[{icon:'📦',val:totalProducts,label:'Products',color:'primary'},{icon:'📊',val:totalStock.toLocaleString(),label:'Stock Units',color:'success'},{icon:'💰',val:'₹'+totalValue.toLocaleString(),label:'Value',color:'warning'},{icon:'⚠️',val:lowStock,label:'Low Stock',color:'danger'},{icon:'🚚',val:suppliersData.length,label:'Suppliers',color:'purple'},{icon:'📋',val:poCount,label:'POs',color:'info'},{icon:'🧾',val:billCount,label:'Bills',color:'pink'}].map(s=>`
                    <div class="stat-card" onclick="switchTab('${s.label.toLowerCase().replace(' ','-')}')">
                        <div class="stat-icon">${s.icon}</div>
                        <div class="stat-value">${s.val}</div>
                        <div class="stat-label">${s.label}</div>
                    </div>`).join('')}
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="card"><h3>📊 Stock Distribution</h3><canvas id="dashChart" height="200"></canvas></div>
                    <div class="card"><h3>⚠️ Low Stock Items</h3>
                        <div class="table-responsive"><table><thead><tr><th>Product</th><th>Stock</th><th>Status</th></tr></thead><tbody>
                            ${productsData.filter(p=>(p.stock||0)<=(p.reorderLevel||10)).slice(0,6).map(p=>`<tr><td>${p.name}</td><td>${p.stock||0}</td><td><span class="badge badge-${p.stock===0?'danger':'warning'}">${p.stock===0?'Out':'Low'}</span></td></tr>`).join('')||'<tr><td colspan="3">✅ All stocked!</td></tr>'}
                        </tbody></table></div>
                    </div>
                </div>`;
            setTimeout(()=>{
                const ctx=document.getElementById('dashChart')?.getContext('2d');
                if(ctx) new Chart(ctx,{type:'doughnut',data:{labels:['Healthy','Low','Out of Stock'],datasets:[{data:[productsData.filter(p=>(p.stock||0)>10).length,productsData.filter(p=>(p.stock||0)>0&&(p.stock||0)<=10).length,productsData.filter(p=>(p.stock||0)===0).length],backgroundColor:['#10b981','#f59e0b','#ef4444']}]}});
            },300);
        }

        // ==================== PRODUCTS ====================
        function loadProducts(c) {
            c.innerHTML = `
                <div class="card-header"><h2>📦 Products (${productsData.length})</h2>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <input type="text" class="form-control" placeholder="🔍 Search..." oninput="searchProds()" id="searchInput" style="min-width:180px;">
                        <button class="btn btn-primary" onclick="showProductForm()"><i class="fas fa-plus"></i> Add</button>
                        <button class="btn btn-success btn-sm" onclick="exportProducts('pdf')"><i class="fas fa-file-pdf"></i> PDF</button>
                        <button class="btn btn-info btn-sm" onclick="exportProducts('excel')"><i class="fas fa-file-excel"></i> Excel</button>
                        <button class="btn btn-outline btn-sm" onclick="exportProducts('csv')"><i class="fas fa-file-csv"></i> CSV</button>
                    </div>
                </div>
                <div class="table-responsive"><table><thead><tr><th>Name</th><th>SKU</th><th>Category</th><th>Stock</th><th>Cost ₹</th><th>Sell ₹</th><th>Supplier</th><th>Actions</th></tr></thead><tbody id="prodBody"></tbody></table></div>`;
            displayProducts(productsData);
        }

        function displayProducts(prods) {
            const tbody = document.getElementById('prodBody');
            if(!tbody) return;

                <div class="card" style="margin-top:16px;">
                    <h3>Complete Stock Report</h3>
                    <button class="btn btn-success btn-sm" onclick="downloadPDF('Stock Report',['Name','SKU','Category','Stock','Cost','Value','Status'],productsData.map(p=>[p.name,p.sku||'',p.category||'General',p.stock||0,'₹'+(p.costPrice||0),'₹'+((p.stock||0)*(p.costPrice||0)),(p.stock||0)>10?'Healthy':(p.stock||0)>0?'Low':'Out']),'stock-report')"><i class="fas fa-file-pdf"></i> Download PDF</button>
                    <button class="btn btn-info btn-sm" onclick="downloadExcel(productsData.map(p=>({Name:p.name,SKU:p.sku,Category:p.category,Stock:p.stock,Cost:p.costPrice,Value:(p.stock||0)*(p.costPrice||0)})),['Name','SKU','Category','Stock','Cost','Value'],'stock-report')" style="margin-left:8px;"><i class="fas fa-file-excel"></i> Download Excel</button>
                </div>`;
            setTimeout(()=>{
                const ctx1=document.getElementById('repChart1')?.getContext('2d');
                if(ctx1) new Chart(ctx1,{type:'bar',data:{labels:cats,datasets:[{label:'Value ₹',data:cats.map(c=>productsData.filter(p=>(p.category||'General')===c).reduce((s,p)=>s+((p.stock||0)*(p.costPrice||0)),0)),backgroundColor:'#6366f1'}]}});
                const ctx2=document.getElementById('repChart2')?.getContext('2d');
                if(ctx2) new Chart(ctx2,{type:'pie',data:{labels:['Healthy','Low','Out'],datasets:[{data:[productsData.filter(p=>(p.stock||0)>10).length,productsData.filter(p=>(p.stock||0)>0&&(p.stock||0)<=10).length,productsData.filter(p=>(p.stock||0)===0).length],backgroundColor:['#10b981','#f59e0b','#ef4444']}]}});
            },300);
        }

        // Utilities
        window.closeModal = () => document.getElementById('modalOverlay').classList.remove('active');
        document.getElementById('modalOverlay').addEventListener('click', function(e) { if(e.target === this) closeModal(); });
        window.logout = () => { sessionStorage.clear(); window.location.href = "dashboard.html"; };
    </script>
</body>
</html>
