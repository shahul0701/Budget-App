<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BudgetFlow | Company Secure Login</title>
  <!-- Google Fonts & simple CSS reset -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Firebase SDKs (modular) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, push, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

    // Firebase config (provided)
    const firebaseConfig = {
      apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
      authDomain: "budget-app-1365f.firebaseapp.com",
      databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "budget-app-1365f",
      storageBucket: "budget-app-1365f.firebasestorage.app",
      messagingSenderId: "1036194450411",
      appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
      measurementId: "G-YFFJL2H54X"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    // Make db and helpers globally accessible for inline handlers (clean)
    window.db = db;
    window.ref = ref;
    window.get = get;
    window.set = set;
    window.push = push;
    window.update = update;
    window.child = child;
    window.query = query;
    window.orderByChild = orderByChild;
    window.equalTo = equalTo;

    console.log("Firebase initialized");
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* main card container */
    .app-container {
      max-width: 1300px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header */
    .header {
      background: #1e293b;
      color: white;
      padding: 1.5rem 2rem;
    }
    .header h1 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.3px;
    }
    .header p {
      opacity: 0.8;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* main content flex */
    .main-dashboard {
      display: flex;
      flex-wrap: wrap;
      min-height: 550px;
    }

    /* SIDEBAR (company panel) */
    .company-sidebar {
      background: #f8fafc;
      width: 320px;
      border-right: 1px solid #e2e8f0;
      padding: 1.8rem 1.2rem;
    }
    .company-sidebar h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .company-list {
      list-style: none;
      margin-top: 8px;
      max-height: 320px;
      overflow-y: auto;
    }
    .company-item {
      background: white;
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }
    .company-item:hover {
      border-color: #94a3b8;
      background: #ffffff;
      transform: translateX(3px);
    }
    .company-name {
      font-weight: 700;
      color: #0f172a;
      font-size: 1rem;
    }
    .company-type {
      font-size: 0.7rem;
      background: #eef2ff;
      display: inline-block;
      padding: 2px 8px;
      border-radius: 30px;
      margin-top: 6px;
      color: #1e40af;
    }
    .create-company-btn {
      margin-top: 24px;
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    .create-company-btn:hover {
      background: #2563eb;
      transform: scale(0.98);
    }

    /* RIGHT PANEL (forms & dashboard) */
    .content-panel {
      flex: 1;
      padding: 2rem;
      background: white;
    }

    /* forms card */
    .form-card {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 28px;
      padding: 1.8rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #eef2ff;
    }
    .form-title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      color: #0f172a;
    }
    .input-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #334155;
      font-size: 0.85rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      font-size: 0.9rem;
      transition: 0.2s;
      background: #fefefe;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .btn-primary {
      background: #0f172a;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #1e293b;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
      padding: 10px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }
    .error-msg {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 6px;
    }
    .success-msg {
      color: #10b981;
      font-size: 0.8rem;
      margin-top: 8px;
      text-align: center;
    }

    /* Dashboard view */
    .dashboard-view {
      animation: fadeIn 0.25s ease;
    }
    .welcome-banner {
      background: linear-gradient(110deg, #eef2ff, #ffffff);
      padding: 1.5rem;
      border-radius: 28px;
      margin-bottom: 2rem;
    }
    .user-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
    }
    .user-card {
      background: #f1f5f9;
      border-radius: 24px;
      padding: 1rem 1.2rem;
      width: calc(33% - 1rem);
      min-width: 200px;
      border-left: 5px solid #3b82f6;
    }
    .user-name {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .user-role {
      font-size: 0.7rem;
      color: #475569;
      margin-top: 4px;
    }
    .add-user-section {
      margin-top: 28px;
      background: #f9f9ff;
      padding: 1.2rem;
      border-radius: 28px;
    }
    .flex-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .flex-row .input-group {
      flex: 1;
      margin-bottom: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }
    hr {
      margin: 20px 0;
    }
    .back-btn {
      background: none;
      border: none;
      color: #3b82f6;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    @media (max-width: 760px) {
      .main-dashboard { flex-direction: column; }
      .company-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e2e8f0; }
      .user-card { width: 100%; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>🏢 BudgetFlow Workspace</h1>
    <p>Company‑based access | Secure company password & user profiles</p>
  </div>
  <div class="main-dashboard">
    <!-- LEFT: Company list & creation -->
    <div class="company-sidebar" id="companySidebar">
      <h3>📋 Companies</h3>
      <div id="companyListContainer">
        <ul class="company-list" id="companyListUl">
          <li style="color:#64748b; text-align:center;">Loading companies...</li>
        </ul>
      </div>
      <button class="create-company-btn" id="openCreateCompanyBtn">➕ Create new company</button>
    </div>

    <!-- RIGHT PANEL: dynamic views (login, create company, dashboard) -->
    <div class="content-panel" id="contentPanel">
      <!-- default: company selection / login view -->
      <div id="dynamicView"></div>
    </div>
  </div>
</div>

<script type="module">
  // -------- GLOBALS ----------
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, push, update, query, orderByChild, equalTo, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
    measurementId: "G-YFFJL2H54X"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // references
  const companiesRef = ref(db, 'companies');
  
  // Helper: show view in content panel
  function renderView(componentHtml, afterRenderCallback = null) {
    const panel = document.getElementById('dynamicView');
    panel.innerHTML = componentHtml;
    if (afterRenderCallback) afterRenderCallback();
  }
  
  // ---------- 1. Load company list and display in sidebar + trigger default message ----------
  async function loadCompanyList() {
    const snapshot = await get(companiesRef);
    const companies = snapshot.val();
    const container = document.getElementById('companyListUl');
    if (!container) return;
    if (!companies || Object.keys(companies).length === 0) {
      container.innerHTML = '<li style="color:#64748b; text-align:center;">✨ No companies yet. Create one!</li>';
      return;
    }
    let html = '';
    for (const [compId, compData] of Object.entries(companies)) {
      html += `
        <li class="company-item" data-id="${compId}" data-name="${escapeHtml(compData.companyName)}" data-type="${escapeHtml(compData.companyType || 'General')}" data-password="${compData.password || ''}">
          <div class="company-name">🏢 ${escapeHtml(compData.companyName)}</div>
          <div class="company-type">${escapeHtml(compData.companyType || 'Business')}</div>
        </li>
      `;
    }
    container.innerHTML = html;
    // attach click events to each company item
    document.querySelectorAll('.company-item').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const compId = el.getAttribute('data-id');
        const compName = el.getAttribute('data-name');
        const compType = el.getAttribute('data-type');
        const storedPw = el.getAttribute('data-password');
        showCompanyLogin(compId, compName, compType, storedPw);
      });
    });
  }
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  // ---------- 2. Show password login for selected company ----------
  function showCompanyLogin(companyId, companyName, companyType, correctPassword) {
    renderView(`
      <div class="form-card">
        <button class="back-btn" id="backToCompanyListBtn">← Back to companies</button>
        <div class="form-title">🔐 Access: ${escapeHtml(companyName)}</div>
        <p style="margin-bottom: 16px; color:#475569;">Type: <strong>${escapeHtml(companyType)}</strong> — Enter password to continue</p>
        <div class="input-group">
          <label>Company password</label>
          <input type="password" id="companyPasswordInput" placeholder="Enter password" autocomplete="off">
        </div>
        <div id="loginError" class="error-msg"></div>
        <button class="btn-primary" id="submitCompanyPasswordBtn">Unlock Dashboard</button>
      </div>
    `, () => {
      document.getElementById('backToCompanyListBtn').addEventListener('click', () => {
        // just show default selection hint
        showDefaultCompanySelectionMessage();
      });
      document.getElementById('submitCompanyPasswordBtn').addEventListener('click', async () => {
        const enteredPw = document.getElementById('companyPasswordInput').value;
        if (!enteredPw) {
          document.getElementById('loginError').innerText = 'Password required';
          return;
        }
        if (enteredPw === correctPassword) {
          // password correct -> load dashboard with users & profile
          await loadCompanyDashboard(companyId, companyName);
        } else {
          document.getElementById('loginError').innerText = '❌ Incorrect password. Access denied.';
        }
      });
    });
  }
  
  // ---------- 3. DASHBOARD: show users list, profile, add new user (with password & name) ----------
  async function loadCompanyDashboard(companyId, companyName) {
    // fetch users from subcollection: companies/{companyId}/users
    const usersRef = ref(db, `companies/${companyId}/users`);
    const usersSnapshot = await get(usersRef);
    const users = usersSnapshot.val() || {};
    const usersArray = Object.entries(users).map(([uid, uData]) => ({ id: uid, ...uData }));
    
    renderView(`
      <div class="dashboard-view">
        <button class="back-btn" id="dashboardBackToCompanies">← Switch Company</button>
        <div class="welcome-banner">
          <h2 style="margin-bottom: 6px;">📊 ${escapeHtml(companyName)} Dashboard</h2>
          <p>Secure company workspace | Manage users & profiles</p>
        </div>
        
        <h3>👥 User Profiles & Passwords</h3>
        <div id="usersListContainer" class="user-grid">
          ${usersArray.length === 0 ? '<p style="color:gray;">No users yet. Add first user below.</p>' : ''}
          ${usersArray.map(user => `
            <div class="user-card">
              <div class="user-name">👤 ${escapeHtml(user.fullName || user.name || 'Unnamed')}</div>
              <div class="user-role">🔑 password: ${escapeHtml(user.password || '****')}</div>
              <div style="font-size:12px; margin-top:8px;">📧 ${escapeHtml(user.email || 'no email')}</div>
            </div>
          `).join('')}
        </div>
        
        <div class="add-user-section">
          <h4>➕ Add new user (profile with password)</h4>
          <div class="flex-row">
            <div class="input-group" style="flex:2">
              <label>Full name</label>
              <input type="text" id="newUserName" placeholder="e.g., Olivia Chen">
            </div>
            <div class="input-group" style="flex:2">
              <label>Email</label>
              <input type="email" id="newUserEmail" placeholder="user@example.com">
            </div>
            <div class="input-group" style="flex:1.5">
              <label>Password (profile pass)</label>
              <input type="text" id="newUserPassword" placeholder="secret">
            </div>
            <div style="margin-bottom: 6px;">
              <button class="btn-primary" id="addUserBtn" style="width:auto; padding: 12px 24px;">➕ Add User</button>
            </div>
          </div>
          <div id="addUserFeedback" class="success-msg"></div>
        </div>
        <hr />
        <div style="font-size:0.75rem; text-align:center; color:#94a3b8;">✅ Company-level protection enforced</div>
      </div>
    `, () => {
      document.getElementById('dashboardBackToCompanies').addEventListener('click', () => {
        showDefaultCompanySelectionMessage();
        loadCompanyList(); // refresh sidebar just in case
      });
      // add user logic
      const addBtn = document.getElementById('addUserBtn');
      const feedback = document.getElementById('addUserFeedback');
      addBtn.addEventListener('click', async () => {
        const fullName = document.getElementById('newUserName').value.trim();
        const email = document.getElementById('newUserEmail').value.trim();
        const userPw = document.getElementById('newUserPassword').value.trim();
        if (!fullName || !userPw) {
          feedback.innerText = '❌ Name and password are required.';
          feedback.style.color = '#dc2626';
          return;
        }
        const newUserRef = push(ref(db, `companies/${companyId}/users`));
        await set(newUserRef, {
          fullName: fullName,
          email: email || '',
          password: userPw,
          createdAt: Date.now()
        });
        feedback.innerText = `✅ User "${fullName}" added successfully!`;
        feedback.style.color = '#10b981';
        // reset inputs
        document.getElementById('newUserName').value = '';
        document.getElementById('newUserEmail').value = '';
        document.getElementById('newUserPassword').value = '';
        // refresh dashboard to show updated list
        setTimeout(() => loadCompanyDashboard(companyId, companyName), 800);
      });
    });
  }
  
  // ---------- 4. Show default message (when no company selected) ----------
  function showDefaultCompanySelectionMessage() {
    renderView(`
      <div class="form-card" style="text-align:center;">
        <div style="font-size: 3rem;">🏢</div>
        <h3 style="margin: 16px 0 8px;">Select a company from the left</h3>
        <p style="color:#475569;">Or create a new company to get started.</p>
        <button id="inlineCreateCompanyBtn" class="btn-primary" style="margin-top: 20px; background:#3b82f6;">➕ Create New Company</button>
      </div>
    `, () => {
      const inlineBtn = document.getElementById('inlineCreateCompanyBtn');
      if (inlineBtn) inlineBtn.addEventListener('click', () => showCreateCompanyForm());
    });
  }
  
  // ---------- 5. CREATE NEW COMPANY FORM (company details + company type + set company password) ----------
  function showCreateCompanyForm() {
    renderView(`
      <div class="form-card">
        <button class="back-btn" id="cancelCreateBtn">← Cancel</button>
        <div class="form-title">🏭 Register New Company</div>
        <div class="input-group">
          <label>Company Name *</label>
          <input type="text" id="newCompanyName" placeholder="e.g., Alpha Corp">
        </div>
        <div class="input-group">
          <label>Company Type</label>
          <select id="newCompanyType">
            <option value="Startup">🚀 Startup</option>
            <option value="Agency">🎨 Agency</option>
            <option value="Retail">🛍️ Retail</option>
            <option value="Manufacturing">🏭 Manufacturing</option>
            <option value="Tech">💻 Tech</option>
            <option value="Other">📌 Other</option>
          </select>
        </div>
        <div class="input-group">
          <label>Company Password (required for login) *</label>
          <input type="password" id="newCompanyPassword" placeholder="Set strong password">
          <div class="error-msg" id="companyPwError"></div>
        </div>
        <div class="input-group">
          <label>Extra details (address / VAT)</label>
          <textarea rows="2" id="companyDetails" placeholder="Optional details..."></textarea>
        </div>
        <button class="btn-primary" id="confirmCreateCompanyBtn">✅ Create Company & Save</button>
        <div id="createCompanyFeedback" class="success-msg"></div>
      </div>
    `, () => {
      document.getElementById('cancelCreateBtn').addEventListener('click', () => {
        showDefaultCompanySelectionMessage();
      });
      document.getElementById('confirmCreateCompanyBtn').addEventListener('click', async () => {
        const compName = document.getElementById('newCompanyName').value.trim();
        const compType = document.getElementById('newCompanyType').value;
        const compPassword = document.getElementById('newCompanyPassword').value.trim();
        const details = document.getElementById('companyDetails').value;
        if (!compName) {
          document.getElementById('createCompanyFeedback').innerText = 'Company name required';
          document.getElementById('createCompanyFeedback').style.color = '#dc2626';
          return;
        }
        if (!compPassword) {
          document.getElementById('createCompanyFeedback').innerText = 'Please set a company password';
          document.getElementById('createCompanyFeedback').style.color = '#dc2626';
          return;
        }
        // check duplicate company name?
        const snapshot = await get(companiesRef);
        const existing = snapshot.val();
        let duplicate = false;
        if (existing) {
          for (let key in existing) {
            if (existing[key].companyName?.toLowerCase() === compName.toLowerCase()) {
              duplicate = true;
              break;
            }
          }
        }
        if (duplicate) {
          document.getElementById('createCompanyFeedback').innerText = 'Company name already exists. Choose another.';
          document.getElementById('createCompanyFeedback').style.color = '#dc2626';
          return;
        }
        // create new company entry
        const newCompanyRef = push(companiesRef);
        await set(newCompanyRef, {
          companyName: compName,
          companyType: compType,
          password: compPassword,
          details: details,
          createdAt: Date.now()
        });
        // also create a default admin user for this company? (optional: first user)
        const defaultUserRef = push(ref(db, `companies/${newCompanyRef.key}/users`));
        await set(defaultUserRef, {
          fullName: "Admin Manager",
          email: "admin@" + compName.replace(/\s/g,'') + ".local",
          password: "admin123",
          role: "owner"
        });
        document.getElementById('createCompanyFeedback').innerHTML = '✅ Company created! You can now select it from left list.';
        document.getElementById('createCompanyFeedback').style.color = '#10b981';
        // refresh company list in sidebar and reset view to selection
        await loadCompanyList();
        setTimeout(() => {
          showDefaultCompanySelectionMessage();
        }, 1300);
      });
    });
  }
  
  // ---------- Event Listeners for sidebar buttons ----------
  document.getElementById('openCreateCompanyBtn').addEventListener('click', () => {
    showCreateCompanyForm();
  });
  
  // initial load: show default company selection message and load company list
  window.addEventListener('DOMContentLoaded', async () => {
    await loadCompanyList();
    showDefaultCompanySelectionMessage();
  });
  
  // export reload for user additions etc
  window.loadCompanyList = loadCompanyList;
</script>
</body>
</html>
