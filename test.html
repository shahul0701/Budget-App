<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetFlow | Company Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .user-info {
      background: #f1f5f9;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
      gap: 10px;
    }

    .user-name {
      font-weight: 600;
      color: #334155;
      font-size: 0.9rem;
    }

    .company-badge {
      background: #667eea;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .logout-btn, .back-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .back-btn {
      background: #64748b;
    }

    .logout-btn:hover, .back-btn:hover {
      transform: translateY(-1px);
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
      overflow-x: auto;
    }

    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      background: #f8fafc;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s;
      color: #64748b;
      white-space: nowrap;
    }

    .tab.active {
      background: white;
      color: #667eea;
      border-bottom: 3px solid #667eea;
    }

    .form-container {
      padding: 2rem;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #334155;
      font-size: 0.85rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #10b981;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 0.95rem;
      transition: transform 0.2s;
      margin-top: 10px;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-edit {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      margin-right: 8px;
    }

    .btn-edit:hover {
      background: #d97706;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 6px;
    }

    .success-msg {
      color: #10b981;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      padding: 10px;
      background: #d1fae5;
      border-radius: 8px;
    }

    .company-list {
      max-height: 500px;
      overflow-y: auto;
      margin-top: 1rem;
    }

    .company-card {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      transition: all 0.2s;
    }

    .company-card:hover {
      border-color: #667eea;
      background: white;
      transform: translateX(5px);
    }

    .company-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .company-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #1e293b;
    }

    .company-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .company-type {
      font-size: 0.75rem;
      color: #667eea;
      margin-top: 4px;
      display: inline-block;
      background: #eef2ff;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .company-details {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e2e8f0;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h3 {
      font-size: 1.25rem;
      color: #1e293b;
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #64748b;
    }

    /* Dashboard Styles */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .dashboard-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

    .dashboard-card h3 {
      font-size: 0.9rem;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .dashboard-card .amount {
      font-size: 28px;
      font-weight: bold;
    }

    .transactions-list {
      background: #f8fafc;
      border-radius: 12px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    .transaction-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    .transaction-income {
      color: #10b981;
    }

    .transaction-expense {
      color: #ef4444;
    }

    .company-password-btn {
      background: #64748b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>🏢 BudgetFlow</h1>
      <p>Company Management System</p>
    </div>
    
    <!-- User Info Bar -->
    <div id="userInfoBar" class="user-info">
      <div class="user-name">
        <i class="fas fa-user"></i> Welcome, <span id="currentUserName">Loading...</span>
      </div>
      <div>
        <span id="activeCompanyBadge" class="company-badge" style="display: none;"></span>
        <button class="back-btn" id="backToCompaniesBtn" style="display: none;" onclick="backToCompanies()">← Back to Companies</button>
        <button class="logout-btn" onclick="logoutUser()">Logout</button>
      </div>
    </div>
    
    <!-- Company Management Tabs -->
    <div id="managementTabs" class="tabs">
      <button class="tab active" onclick="showManagementPage('companies')">🏢 My Companies</button>
      <button class="tab" onclick="showManagementPage('create')">✨ Create Company</button>
    </div>

    <!-- Company Management Pages -->
    <div class="form-container">
      <!-- Companies List Page -->
      <div id="companiesPage" class="page active">
        <h3 style="margin-bottom: 1.5rem;">Your Companies</h3>
        <div id="companyList">
          <div class="loading">Loading your companies...</div>
        </div>
      </div>

      <!-- Create Company Page -->
      <div id="createPage" class="page">
        <h3 style="margin-bottom: 1.5rem;">Register New Company</h3>
        <div class="input-group">
          <label>Company Name *</label>
          <input type="text" id="companyName" placeholder="Enter company name">
        </div>
        <div class="input-group">
          <label>Company Type</label>
          <select id="companyType">
            <option value="Startup">🚀 Startup</option>
            <option value="Agency">🎨 Agency</option>
            <option value="Retail">🛍️ Retail</option>
            <option value="Manufacturing">🏭 Manufacturing</option>
            <option value="Tech">💻 Tech</option>
            <option value="Other">📌 Other</option>
          </select>
        </div>
        <div class="input-group">
          <label>Company Password *</label>
          <input type="password" id="signupPassword" placeholder="Create strong password (min 6 chars)">
        </div>
        <div class="input-group">
          <label>Confirm Password *</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>
        <div class="input-group">
          <label>Company Details (Optional)</label>
          <textarea rows="3" id="companyDetails" placeholder="Address, VAT, etc..."></textarea>
        </div>
        <button class="btn-primary" onclick="createCompany()">✅ Create Company</button>
        <div id="signupMessage"></div>
      </div>
    </div>

    <!-- Company Dashboard Page (shown when company is accessed) -->
    <div id="dashboardPage" class="page">
      <div class="form-container">
        <h2 id="dashboardCompanyName" style="margin-bottom: 20px;"></h2>
        
        <div class="dashboard-grid">
          <div class="dashboard-card">
            <h3>Total Balance</h3>
            <div class="amount" id="dashboardBalance">$0</div>
          </div>
          <div class="dashboard-card">
            <h3>Total Income</h3>
            <div class="amount" id="dashboardIncome">$0</div>
          </div>
          <div class="dashboard-card">
            <h3>Total Expenses</h3>
            <div class="amount" id="dashboardExpenses">$0</div>
          </div>
        </div>

        <h3 style="margin-bottom: 15px;">Recent Transactions</h3>
        <div class="transactions-list" id="dashboardTransactions">
          <p style="text-align: center; color: #64748b;">No transactions yet</p>
        </div>

        <h3 style="margin: 20px 0 15px;">Add Transaction</h3>
        <div class="input-group">
          <select id="transactionType" style="width: auto; display: inline-block; width: 48%; margin-right: 4%;">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <input type="number" id="transactionAmount" placeholder="Amount" style="width: 48%; display: inline-block;">
        </div>
        <div class="input-group">
          <input type="text" id="transactionDesc" placeholder="Description">
        </div>
        <button class="btn-primary" onclick="addTransaction()">Add Transaction</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Company Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Edit Company</h3>
      <button class="close-modal" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="input-group">
      <label>Company Name</label>
      <input type="text" id="editCompanyName">
    </div>
    <div class="input-group">
      <label>Company Type</label>
      <select id="editCompanyType">
        <option value="Startup">🚀 Startup</option>
        <option value="Agency">🎨 Agency</option>
        <option value="Retail">🛍️ Retail</option>
        <option value="Manufacturing">🏭 Manufacturing</option>
        <option value="Tech">💻 Tech</option>
        <option value="Other">📌 Other</option>
      </select>
    </div>
    <div class="input-group">
      <label>Company Details</label>
      <textarea rows="3" id="editCompanyDetails"></textarea>
    </div>
    <div class="input-group">
      <label>New Password (leave blank to keep current)</label>
      <input type="password" id="editCompanyPassword" placeholder="Enter new password (min 6 chars)">
    </div>
    <button class="btn-primary" onclick="updateCompany()">💾 Update Company</button>
    <div id="editMessage"></div>
  </div>
</div>

<!-- Access Company Modal -->
<div id="accessModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Access Company Dashboard</h3>
      <button class="close-modal" onclick="closeAccessModal()">&times;</button>
    </div>
    <div class="input-group">
      <label>Enter Company Password</label>
      <input type="password" id="accessPassword" placeholder="Enter password to access dashboard">
    </div>
    <button class="btn-primary" onclick="verifyAndAccess()">🔓 Access Dashboard</button>
    <div id="accessMessage"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, getDocs, addDoc, where, doc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
    measurementId: "G-YFFJL2H54X"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentUser = null;
  let currentCompanies = [];
  let selectedCompany = null;
  let companyTransactions = [];
  let editingCompanyId = null;

  // Check authentication
  auth.onAuthStateChanged((user) => {
    if (user) {
      currentUser = {
        id: user.uid,
        email: user.email,
        displayName: user.displayName || user.email.split('@')[0]
      };
      document.getElementById('currentUserName').textContent = currentUser.displayName;
      loadUserCompanies();
    } else {
      window.location.href = 'index.html';
    }
  });

  // Show management pages
  window.showManagementPage = function(page) {
    document.getElementById('companiesPage').classList.remove('active');
    document.getElementById('createPage').classList.remove('active');
    document.getElementById(page + 'Page').classList.add('active');
    
    const tabs = document.querySelectorAll('#managementTabs .tab');
    tabs.forEach(tab => tab.classList.remove('active'));
    if (page === 'companies') tabs[0].classList.add('active');
    else tabs[1].classList.add('active');
    
    if (page === 'companies') loadUserCompanies();
  };

  // Load companies
  async function loadUserCompanies() {
    if (!currentUser) return;
    
    const companyListDiv = document.getElementById('companyList');
    companyListDiv.innerHTML = '<div class="loading">Loading your companies...</div>';
    
    try {
      const companiesRef = collection(db, 'companies');
      const userCompaniesQuery = query(companiesRef, where("userId", "==", currentUser.id));
      const querySnapshot = await getDocs(userCompaniesQuery);
      
      if (querySnapshot.empty) {
        companyListDiv.innerHTML = `
          <div class="empty-state">
            <i>📭</i>
            <p>You haven't created any companies yet.</p>
            <p style="font-size: 0.85rem; margin-top: 8px;">Click "Create Company" to get started.</p>
          </div>
        `;
        return;
      }
      
      currentCompanies = [];
      let html = '<div class="company-list">';
      querySnapshot.forEach((doc) => {
        const company = doc.data();
        const companyId = doc.id;
        currentCompanies.push({ id: companyId, ...company, transactions: company.transactions || [] });
        html += `
          <div class="company-card">
            <div class="company-header">
              <div>
                <div class="company-name">🏢 ${escapeHtml(company.companyName)}</div>
                <div class="company-type">${escapeHtml(company.companyType || 'Business')}</div>
              </div>
              <div class="company-actions">
                <button class="btn-edit" onclick="editCompany('${companyId}')">✏️ Edit</button>
                <button class="company-password-btn" onclick="accessCompany('${companyId}', '${escapeHtml(company.companyName)}')">🔑 Access</button>
                <button class="btn-danger" onclick="deleteCompany('${companyId}', '${escapeHtml(company.companyName)}')">🗑️ Delete</button>
              </div>
            </div>
            ${company.details ? `<div class="company-details">📝 ${escapeHtml(company.details)}</div>` : ''}
          </div>
        `;
      });
      html += '</div>';
      companyListDiv.innerHTML = html;
      
    } catch (error) {
      console.error("Error:", error);
      companyListDiv.innerHTML = '<div class="error-msg">❌ Error loading companies</div>';
    }
  }

  // Access company
  window.accessCompany = function(companyId, companyName) {
    selectedCompany = currentCompanies.find(c => c.id === companyId);
    if (!selectedCompany) return;
    
    document.getElementById('accessPassword').value = '';
    document.getElementById('accessMessage').innerHTML = '';
    document.getElementById('accessModal').classList.add('active');
  };

  window.verifyAndAccess = function() {
    const enteredPassword = document.getElementById('accessPassword').value;
    const messageDiv = document.getElementById('accessMessage');
    
    if (!enteredPassword) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Please enter the password</div>';
      return;
    }
    
    if (enteredPassword === selectedCompany.password) {
      closeAccessModal();
      loadCompanyDashboard(selectedCompany);
    } else {
      messageDiv.innerHTML = '<div class="error-msg">❌ Incorrect password!</div>';
    }
  };

  // Load company dashboard
  async function loadCompanyDashboard(company) {
    document.getElementById('dashboardCompanyName').innerHTML = `<i class="fas fa-building"></i> ${company.companyName} Dashboard`;
    document.getElementById('activeCompanyBadge').style.display = 'inline-block';
    document.getElementById('activeCompanyBadge').innerHTML = `<i class="fas fa-building"></i> ${company.companyName}`;
    document.getElementById('backToCompaniesBtn').style.display = 'inline-block';
    document.getElementById('managementTabs').style.display = 'none';
    document.getElementById('companiesPage').classList.remove('active');
    document.getElementById('createPage').classList.remove('active');
    document.getElementById('dashboardPage').classList.add('active');
    
    // Load transactions
    companyTransactions = company.transactions || [];
    updateDashboard();
  }

  function updateDashboard() {
    const totalIncome = companyTransactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
    const totalExpenses = companyTransactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
    const balance = totalIncome - totalExpenses;
    
    document.getElementById('dashboardBalance').textContent = `$${balance.toFixed(2)}`;
    document.getElementById('dashboardIncome').textContent = `$${totalIncome.toFixed(2)}`;
    document.getElementById('dashboardExpenses').textContent = `$${totalExpenses.toFixed(2)}`;
    
    const transactionsDiv = document.getElementById('dashboardTransactions');
    if (companyTransactions.length === 0) {
      transactionsDiv.innerHTML = '<p style="text-align: center; color: #64748b;">No transactions yet</p>';
    } else {
      transactionsDiv.innerHTML = companyTransactions.slice().reverse().map(t => `
        <div class="transaction-item">
          <span>${escapeHtml(t.description)}</span>
          <span class="${t.type === 'income' ? 'transaction-income' : 'transaction-expense'}">
            ${t.type === 'income' ? '+' : '-'}$${t.amount.toFixed(2)}
          </span>
        </div>
      `).join('');
    }
  }

  window.addTransaction = async function() {
    const type = document.getElementById('transactionType').value;
    const amount = parseFloat(document.getElementById('transactionAmount').value);
    const description = document.getElementById('transactionDesc').value.trim();
    
    if (!amount || amount <= 0) {
      alert('Please enter a valid amount');
      return;
    }
    if (!description) {
      alert('Please enter a description');
      return;
    }
    
    const transaction = {
      type: type,
      amount: amount,
      description: description,
      date: new Date().toISOString()
    };
    
    companyTransactions.push(transaction);
    
    try {
      const companyRef = doc(db, 'companies', selectedCompany.id);
      await updateDoc(companyRef, {
        transactions: companyTransactions
      });
      
      document.getElementById('transactionAmount').value = '';
      document.getElementById('transactionDesc').value = '';
      updateDashboard();
      alert('Transaction added successfully!');
    } catch (error) {
      console.error("Error:", error);
      alert('Error adding transaction');
    }
  };

  window.backToCompanies = function() {
    document.getElementById('activeCompanyBadge').style.display = 'none';
    document.getElementById('backToCompaniesBtn').style.display = 'none';
    document.getElementById('managementTabs').style.display = 'flex';
    document.getElementById('dashboardPage').classList.remove('active');
    document.getElementById('companiesPage').classList.add('active');
    loadUserCompanies();
    selectedCompany = null;
    companyTransactions = [];
  };

  window.editCompany = function(companyId) {
    const company = currentCompanies.find(c => c.id === companyId);
    if (!company) return;
    
    editingCompanyId = companyId;
    document.getElementById('editCompanyName').value = company.companyName;
    document.getElementById('editCompanyType').value = company.companyType;
    document.getElementById('editCompanyDetails').value = company.details || '';
    document.getElementById('editCompanyPassword').value = '';
    document.getElementById('editMessage').innerHTML = '';
    document.getElementById('editModal').classList.add('active');
  };

  window.updateCompany = async function() {
    const companyName = document.getElementById('editCompanyName').value.trim();
    const companyType = document.getElementById('editCompanyType').value;
    const details = document.getElementById('editCompanyDetails').value;
    const newPassword = document.getElementById('editCompanyPassword').value;
    const messageDiv = document.getElementById('editMessage');
    
    if (!companyName) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Company name required</div>';
      return;
    }
    
    try {
      const companyRef = doc(db, 'companies', editingCompanyId);
      const updateData = {
        companyName: companyName,
        companyType: companyType,
        details: details,
        updatedAt: new Date().toISOString()
      };
      
      if (newPassword && newPassword.length >= 6) {
        updateData.password = newPassword;
      } else if (newPassword && newPassword.length < 6) {
        messageDiv.innerHTML = '<div class="error-msg">❌ Password must be at least 6 characters</div>';
        return;
      }
      
      await updateDoc(companyRef, updateData);
      messageDiv.innerHTML = '<div class="success-msg">✅ Company updated successfully!</div>';
      
      setTimeout(() => {
        closeEditModal();
        loadUserCompanies();
      }, 1500);
    } catch (error) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Error updating company</div>';
    }
  };

  window.deleteCompany = async function(companyId, companyName) {
    if (confirm(`Are you sure you want to delete "${companyName}"? This cannot be undone!`)) {
      try {
        await deleteDoc(doc(db, 'companies', companyId));
        alert('Company deleted successfully!');
        loadUserCompanies();
      } catch (error) {
        alert('Error deleting company');
      }
    }
  };

  window.createCompany = async function() {
    const companyName = document.getElementById('companyName').value.trim();
    const companyType = document.getElementById('companyType').value;
    const password = document.getElementById('signupPassword').value.trim();
    const confirmPw = document.getElementById('confirmPassword').value.trim();
    const details = document.getElementById('companyDetails').value;
    const messageDiv = document.getElementById('signupMessage');
    
    if (!companyName || !password) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Company name and password required</div>';
      return;
    }
    if (password !== confirmPw) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Passwords do not match</div>';
      return;
    }
    if (password.length < 6) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Password must be at least 6 characters</div>';
      return;
    }
    
    try {
      await addDoc(collection(db, 'companies'), {
        companyName: companyName,
        companyType: companyType,
        password: password,
        details: details,
        userId: currentUser.id,
        userEmail: currentUser.email,
        createdAt: new Date().toISOString(),
        transactions: []
      });
      
      messageDiv.innerHTML = '<div class="success-msg">✅ Company created successfully!</div>';
      document.getElementById('companyName').value = '';
      document.getElementById('signupPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('companyDetails').value = '';
      
      setTimeout(() => {
        showManagementPage('companies');
        messageDiv.innerHTML = '';
      }, 2000);
    } catch (error) {
      messageDiv.innerHTML = '<div class="error-msg">❌ Error creating company</div>';
    }
  };

  window.logoutUser = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  };

  window.closeEditModal = function() {
    document.getElementById('editModal').classList.remove('active');
  };

  window.closeAccessModal = function() {
    document.getElementById('accessModal').classList.remove('active');
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  window.onclick = function(event) {
    if (event.target === document.getElementById('editModal')) closeEditModal();
    if (event.target === document.getElementById('accessModal')) closeAccessModal();
  };
</script>
</body>
</html>
