<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Explorer & Form Builder with Firebase Rules</title>
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.9/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        /* [Previous styles remain the same] */
        .file-explorer {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        
        .file-explorer-header {
            background: #f9fafb;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-explorer-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #4b5563;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .breadcrumb-item:hover {
            background: #e5e7eb;
        }
        
        .breadcrumb-item.active {
            background: #3b82f6;
            color: white;
        }
        
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            padding: 16px;
            min-height: 300px;
        }
        
        .file-item {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: white;
        }
        
        .file-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-color: #3b82f6;
        }
        
        .file-item.selected {
            border: 2px solid #3b82f6;
            background: #f0f9ff;
        }
        
        .file-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 12px;
            color: #6b7280;
        }
        
        .file-icon.folder {
            color: #fbbf24;
        }
        
        .file-icon.form {
            color: #3b82f6;
        }
        
        .file-name {
            font-weight: 500;
            text-align: center;
            word-break: break-word;
        }
        
        .file-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .file-item:hover .file-actions {
            opacity: 1;
        }
        
        .file-action-btn {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .file-action-btn:hover {
            background: #f3f4f6;
        }
        
        .file-action-btn.delete:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .dropzone {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f9fafb;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .dropzone.drag-over {
            border-color: #3b82f6;
            background: #f0f9ff;
        }
        
        .dropzone i {
            font-size: 48px;
            color: #9ca3af;
            margin-bottom: 16px;
        }
        
        .form-field {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            position: relative;
        }
        
        .form-field:hover {
            border-color: #3b82f6;
        }
        
        .field-label {
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .field-label input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
        }
        
        .field-type-selector {
            margin-bottom: 12px;
        }
        
        .field-type-selector select {
            padding: 4px 8px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            background: white;
        }
        
        .field-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
        }
        
        .field-action-btn {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .field-action-btn:hover {
            background: #f3f4f6;
        }
        
        .field-action-btn.delete:hover {
            background: #ef4444;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-close {
            cursor: pointer;
            font-size: 20px;
            color: #9ca3af;
        }
        
        .modal-close:hover {
            color: #4b5563;
        }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1001;
        }
        
        .toast {
            background: white;
            border-radius: 8px;
            padding: 12px 20px;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        
        .toast.success {
            border-left: 4px solid #10b981;
        }
        
        .toast.error {
            border-left: 4px solid #ef4444;
        }
        
        .toast.info {
            border-left: 4px solid #3b82f6;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .form-data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .form-data-table th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .form-data-table td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .form-data-table tr:hover {
            background: #f9fafb;
        }
        
        .form-data-actions {
            display: flex;
            gap: 8px;
        }
        
        .data-action-btn {
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .data-action-btn.edit:hover {
            background: #3b82f6;
            color: white;
        }
        
        .data-action-btn.delete:hover {
            background: #ef4444;
            color: white;
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .login-container h2 {
            margin-bottom: 20px;
            color: #1f2937;
        }
        
        .login-btn {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        
        .login-btn:hover {
            background: #2563eb;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-email {
            color: #4b5563;
            font-size: 14px;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
            authDomain: "budget-app-1365f.firebaseapp.com",
            projectId: "budget-app-1365f",
            storageBucket: "budget-app-1365f.firebasestorage.app",
            messagingSenderId: "1036194450411",
            appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
            measurementId: "G-YFFJL2H54X"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // Toast Component
        const Toast = ({ message, type, onClose }) => (
            <div className={`toast ${type}`}>
                <i className={`fas ${
                    type === 'success' ? 'fa-check-circle text-green-500' :
                    type === 'error' ? 'fa-exclamation-circle text-red-500' :
                    'fa-info-circle text-blue-500'
                }`}></i>
                <span>{message}</span>
                <button onClick={onClose} className="ml-4 text-gray-400 hover:text-gray-600">
                    <i className="fas fa-times"></i>
                </button>
            </div>
        );

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPath, setCurrentPath] = useState(['My Files']);
            const [files, setFiles] = useState([]);
            const [selectedFile, setSelectedFile] = useState(null);
            const [showNewFileModal, setShowNewFileModal] = useState(false);
            const [showFormBuilder, setShowFormBuilder] = useState(false);
            const [formFields, setFormFields] = useState([]);
            const [formData, setFormData] = useState([]);
            const [editingRecord, setEditingRecord] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [isDraggingOver, setIsDraggingOver] = useState(false);
            const [newFileType, setNewFileType] = useState('form');
            const [newFileName, setNewFileName] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            
            const dragField = useRef(null);
            const fileInputRef = useRef(null);

            const fieldTypes = [
                { value: 'text', label: 'Text', icon: 'font' },
                { value: 'number', label: 'Number', icon: 'hashtag' },
                { value: 'email', label: 'Email', icon: 'envelope' },
                { value: 'tel', label: 'Phone', icon: 'phone' },
                { value: 'date', label: 'Date', icon: 'calendar' },
                { value: 'time', label: 'Time', icon: 'clock' },
                { value: 'checkbox', label: 'Checkbox', icon: 'square-check' },
                { value: 'select', label: 'Dropdown', icon: 'caret-down' },
                { value: 'textarea', label: 'Text Area', icon: 'align-left' },
                { value: 'yesno', label: 'Yes/No', icon: 'circle-question' },
                { value: 'color', label: 'Color', icon: 'palette' },
                { value: 'range', label: 'Range', icon: 'sliders' }
            ];

            // Monitor auth state
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        setUser(user);
                        
                        // Check if user is admin
                        const token = await user.getIdTokenResult();
                        setIsAdmin(
                            token.claims.admin === true || 
                            token.claims.isAdmin === true || 
                            user.email === 'shahulsha254@gmail.com'
                        );
                        
                        // Record login session (for loginSessions collection)
                        try {
                            await db.collection('loginSessions').add({
                                uid: user.uid,
                                email: user.email,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                                userAgent: navigator.userAgent
                            });
                        } catch (error) {
                            console.error('Error recording login session:', error);
                        }
                        
                        // Record login history
                        try {
                            await db.collection('loginHistory').add({
                                uid: user.uid,
                                email: user.email,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                                action: 'login'
                            });
                        } catch (error) {
                            console.error('Error recording login history:', error);
                        }
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            // Load files when user and path change
            useEffect(() => {
                if (user) {
                    loadFiles();
                }
            }, [user, currentPath]);

            // Anonymous sign in (for demo purposes)
            const signInAnonymously = async () => {
                try {
                    setLoading(true);
                    await auth.signInAnonymously();
                    showToast('success', 'Signed in successfully!');
                } catch (error) {
                    showToast('error', 'Sign in failed: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            // Sign in with email (for testing)
            const signInWithEmail = async (email, password) => {
                try {
                    setLoading(true);
                    await auth.signInWithEmailAndPassword(email, password);
                    showToast('success', 'Signed in successfully!');
                } catch (error) {
                    showToast('error', 'Sign in failed: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            // Sign out
            const signOut = async () => {
                try {
                    if (user) {
                        // Record logout in history
                        await db.collection('loginHistory').add({
                            uid: user.uid,
                            email: user.email,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            action: 'logout'
                        });
                    }
                    
                    await auth.signOut();
                    setCurrentPath(['My Files']);
                    setFiles([]);
                    setSelectedFile(null);
                    setShowFormBuilder(false);
                    showToast('success', 'Signed out successfully!');
                } catch (error) {
                    showToast('error', 'Sign out failed: ' + error.message);
                }
            };

            // Get user-specific collection reference
            const getUserCollection = (collectionName) => {
                if (!user) throw new Error('User not authenticated');
                return db.collection('users').doc(user.uid).collection(collectionName);
            };

            // Load files from Firebase (now under user's subcollection)
            const loadFiles = async () => {
                if (!user) return;

                try {
                    const path = currentPath.join('/');
                    const filesRef = getUserCollection('tables'); // Using 'tables' collection for file explorer
                    const snapshot = await filesRef
                        .where('path', '==', path)
                        .get();
                    
                    const fileList = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    
                    setFiles(fileList);
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Check your Firebase rules.');
                    } else {
                        showToast('error', 'Error loading files: ' + error.message);
                    }
                }
            };

            // Show toast notification
            const showToast = (type, message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, type, message }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 5000);
            };

            // Create new file/folder (now under user's subcollection)
            const createNewFile = async () => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!newFileName.trim()) {
                    showToast('error', 'Please enter a name');
                    return;
                }

                try {
                    const path = currentPath.join('/');
                    const filesRef = getUserCollection('tables');
                    
                    const fileData = {
                        name: newFileName,
                        path: path,
                        type: newFileType,
                        uid: user.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };

                    if (newFileType === 'form') {
                        fileData.fields = [];
                        fileData.data = [];
                    }

                    await filesRef.add(fileData);
                    
                    setShowNewFileModal(false);
                    setNewFileName('');
                    loadFiles();
                    showToast('success', `${newFileType === 'folder' ? 'Folder' : 'Form'} created successfully!`);
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Check your Firebase rules.');
                    } else {
                        showToast('error', 'Error creating: ' + error.message);
                    }
                }
            };

            // Delete file/folder (now under user's subcollection)
            const deleteFile = async (file, e) => {
                e.stopPropagation();
                
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!window.confirm(`Are you sure you want to delete "${file.name}"?`)) {
                    return;
                }

                try {
                    const filesRef = getUserCollection('tables');
                    await filesRef.doc(file.id).delete();
                    
                    // If it's a folder, also delete all contents (handled by security rules)
                    if (file.type === 'folder') {
                        const folderPath = [...currentPath, file.name].join('/');
                        const contents = await filesRef
                            .where('path', '>=', folderPath)
                            .where('path', '<', folderPath + '\uf8ff')
                            .get();
                        
                        const batch = db.batch();
                        contents.docs.forEach(doc => batch.delete(doc.ref));
                        await batch.commit();
                    }
                    
                    loadFiles();
                    showToast('success', 'Deleted successfully!');
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Only the owner can delete files.');
                    } else {
                        showToast('error', 'Error deleting: ' + error.message);
                    }
                }
            };

            // Open file/folder
            const openFile = (file) => {
                if (file.type === 'folder') {
                    setCurrentPath([...currentPath, file.name]);
                } else if (file.type === 'form') {
                    setSelectedFile(file);
                    setFormFields(file.fields || []);
                    setFormData(file.data || []);
                    setShowFormBuilder(true);
                }
            };

            // Navigate up
            const navigateUp = () => {
                if (currentPath.length > 1) {
                    setCurrentPath(currentPath.slice(0, -1));
                }
            };

            // Handle drag start for field types
            const handleDragStart = (e, fieldType) => {
                dragField.current = fieldType;
                e.dataTransfer.setData('text/plain', fieldType);
            };

            // Handle drag over for dropzone
            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDraggingOver(true);
            };

            // Handle drag leave for dropzone
            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDraggingOver(false);
            };

            // Handle drop for form builder
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDraggingOver(false);
                
                if (dragField.current) {
                    const newField = {
                        id: Date.now() + Math.random(),
                        type: dragField.current,
                        label: `${dragField.current.charAt(0).toUpperCase() + dragField.current.slice(1)} Field`,
                        required: false,
                        options: dragField.current === 'select' ? ['Option 1', 'Option 2', 'Option 3'] : []
                    };
                    
                    setFormFields([...formFields, newField]);
                    dragField.current = null;
                }
            };

            // Update field
            const updateField = (index, updates) => {
                const newFields = [...formFields];
                newFields[index] = { ...newFields[index], ...updates };
                setFormFields(newFields);
            };

            // Delete field
            const deleteField = (index) => {
                if (window.confirm('Delete this field?')) {
                    const newFields = formFields.filter((_, i) => i !== index);
                    setFormFields(newFields);
                }
            };

            // Save form structure (now under user's subcollection)
            const saveFormStructure = async () => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!selectedFile) return;

                try {
                    const filesRef = getUserCollection('tables');
                    await filesRef.doc(selectedFile.id).update({
                        fields: formFields,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    showToast('success', 'Form structure saved!');
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Only the owner can modify this form.');
                    } else {
                        showToast('error', 'Error saving form: ' + error.message);
                    }
                }
            };

            // Save form data (now under user's subcollection)
            const saveFormData = async (formData) => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!selectedFile) return;

                try {
                    const filesRef = getUserCollection('tables');
                    const currentData = selectedFile.data || [];
                    const newData = [...currentData, { 
                        ...formData, 
                        id: Date.now(),
                        uid: user.uid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }];
                    
                    await filesRef.doc(selectedFile.id).update({
                        data: newData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(newData);
                    setSelectedFile({ ...selectedFile, data: newData });
                    showToast('success', 'Data saved!');
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Only the owner can add data.');
                    } else {
                        showToast('error', 'Error saving data: ' + error.message);
                    }
                }
            };

            // Update form data (now under user's subcollection)
            const updateFormData = async (updatedRecord) => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!selectedFile) return;

                try {
                    const filesRef = getUserCollection('tables');
                    const newData = formData.map(record => 
                        record.id === updatedRecord.id ? updatedRecord : record
                    );
                    
                    await filesRef.doc(selectedFile.id).update({
                        data: newData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(newData);
                    setSelectedFile({ ...selectedFile, data: newData });
                    setEditingRecord(null);
                    showToast('success', 'Data updated!');
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Only the owner can update data.');
                    } else {
                        showToast('error', 'Error updating data: ' + error.message);
                    }
                }
            };

            // Delete form data (now under user's subcollection)
            const deleteFormData = async (recordId) => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                if (!window.confirm('Delete this record?')) return;

                try {
                    const filesRef = getUserCollection('tables');
                    const newData = formData.filter(record => record.id !== recordId);
                    
                    await filesRef.doc(selectedFile.id).update({
                        data: newData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setFormData(newData);
                    setSelectedFile({ ...selectedFile, data: newData });
                    showToast('success', 'Data deleted!');
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Only the owner can delete data.');
                    } else {
                        showToast('error', 'Error deleting data: ' + error.message);
                    }
                }
            };

            // Upload file (now under user's subcollection with proper path)
            const uploadFile = async (file) => {
                if (!user) {
                    showToast('error', 'Please sign in first');
                    return;
                }

                try {
                    const path = currentPath.join('/');
                    // Use user-specific storage path
                    const storageRef = storage.ref().child(`users/${user.uid}/${path}/${file.name}`);
                    await storageRef.put(file);
                    
                    const filesRef = getUserCollection('tables');
                    const fileData = {
                        name: file.name,
                        path: path,
                        type: 'file',
                        size: file.size,
                        contentType: file.type,
                        uid: user.uid,
                        storagePath: `users/${user.uid}/${path}/${file.name}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    await filesRef.add(fileData);
                    loadFiles();
                    showToast('success', 'File uploaded!');
                } catch (error) {
                    if (error.code === 'permission-denied') {
                        showToast('error', 'Permission denied. Only the owner can upload files.');
                    } else {
                        showToast('error', 'Error uploading: ' + error.message);
                    }
                }
            };

            // Handle file selection for upload
            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadFile(file);
                }
            };

            // Render input field based on type
            const renderInputField = (field, value, onChange) => {
                switch (field.type) {
                    case 'text':
                    case 'email':
                    case 'tel':
                        return (
                            <input
                                type={field.type}
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                required={field.required}
                            />
                        );
                    
                    case 'number':
                        return (
                            <input
                                type="number"
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                required={field.required}
                            />
                        );
                    
                    case 'date':
                        return (
                            <input
                                type="date"
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                required={field.required}
                            />
                        );
                    
                    case 'time':
                        return (
                            <input
                                type="time"
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                required={field.required}
                            />
                        );
                    
                    case 'checkbox':
                        return (
                            <input
                                type="checkbox"
                                checked={value || false}
                                onChange={(e) => onChange(e.target.checked)}
                                className="h-5 w-5"
                            />
                        );
                    
                    case 'select':
                        return (
                            <select
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                required={field.required}
                            >
                                <option value="">Select...</option>
                                {(field.options || []).map((opt, i) => (
                                    <option key={i} value={opt}>{opt}</option>
                                ))}
                            </select>
                        );
                    
                    case 'yesno':
                        return (
                            <select
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                required={field.required}
                            >
                                <option value="">Select...</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        );
                    
                    case 'textarea':
                        return (
                            <textarea
                                value={value || ''}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                rows="4"
                                required={field.required}
                            />
                        );
                    
                    case 'color':
                        return (
                            <input
                                type="color"
                                value={value || '#3b82f6'}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full p-2 border rounded h-10"
                            />
                        );
                    
                    case 'range':
                        return (
                            <input
                                type="range"
                                value={value || 50}
                                onChange={(e) => onChange(e.target.value)}
                                className="w-full"
                                min="0"
                                max="100"
                            />
                        );
                    
                    default:
                        return null;
                }
            };

            // Loading state
            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-center">
                            <i className="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                            <p className="text-gray-600">Loading...</p>
                        </div>
                    </div>
                );
            }

            // Login screen
            if (!user) {
                return (
                    <div className="login-container">
                        <h2 className="text-2xl font-bold mb-6">Welcome to File Explorer</h2>
                        <p className="text-gray-600 mb-6">Please sign in to access your files</p>
                        
                        <button 
                            onClick={signInAnonymously}
                            className="login-btn mb-4"
                        >
                            <i className="fas fa-user-secret mr-2"></i>
                            Sign in Anonymously (Demo)
                        </button>
                        
                        <div className="relative my-6">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-gray-300"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-2 bg-white text-gray-500">Or test with admin</span>
                            </div>
                        </div>
                        
                        <button 
                            onClick={() => signInWithEmail('shahulsha254@gmail.com', 'password123')}
                            className="login-btn bg-purple-600 hover:bg-purple-700"
                        >
                            <i className="fas fa-crown mr-2"></i>
                            Sign in as Admin (Demo)
                        </button>
                        
                        <p className="text-xs text-gray-400 mt-6">
                            Note: For demo purposes only. In production, use proper authentication.
                        </p>
                    </div>
                );
            }

            // Main app
            return (
                <div className="container mx-auto p-4 max-w-6xl">
                    {/* Header with user info */}
                    <div className="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 rounded-lg shadow-lg mb-6">
                        <div className="flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center gap-3">
                                    <i className="fas fa-folder-open"></i>
                                    File Explorer & Form Builder
                                </h1>
                                <p className="mt-2 opacity-90">Create forms, manage data, and organize your files</p>
                            </div>
                            
                            <div className="user-info">
                                <div className="text-right">
                                    <div className="font-medium">
                                        {user.email || user.isAnonymous ? 'Anonymous User' : user.uid}
                                    </div>
                                    <div className="user-email">
                                        {user.email && <span>{user.email}</span>}
                                        {isAdmin && <span className="ml-2 bg-yellow-400 text-gray-800 px-2 py-0.5 rounded text-xs">Admin</span>}
                                    </div>
                                </div>
                                <button onClick={signOut} className="logout-btn">
                                    <i className="fas fa-sign-out-alt mr-1"></i>
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* File Explorer */}
                    <div className="file-explorer">
                        <div className="file-explorer-header">
                            <div className="file-explorer-breadcrumb">
                                {currentPath.map((item, index) => (
                                    <React.Fragment key={index}>
                                        {index > 0 && <i className="fas fa-chevron-right text-gray-400 text-sm"></i>}
                                        <span 
                                            className={`breadcrumb-item ${index === currentPath.length - 1 ? 'active' : ''}`}
                                            onClick={() => setCurrentPath(currentPath.slice(0, index + 1))}
                                        >
                                            <i className={`fas ${index === 0 ? 'fa-home' : 'fa-folder'}`}></i>
                                            {item}
                                        </span>
                                    </React.Fragment>
                                ))}
                            </div>
                            
                            <div className="flex gap-2">
                                {currentPath.length > 1 && (
                                    <button 
                                        onClick={navigateUp}
                                        className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300"
                                    >
                                        <i className="fas fa-arrow-up mr-1"></i>Up
                                    </button>
                                )}
                                
                                <button 
                                    onClick={() => setShowNewFileModal(true)}
                                    className="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600"
                                >
                                    <i className="fas fa-plus mr-1"></i>New
                                </button>
                                
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600"
                                >
                                    <i className="fas fa-upload mr-1"></i>Upload
                                </button>
                                <input 
                                    type="file" 
                                    ref={fileInputRef}
                                    onChange={handleFileSelect}
                                    className="hidden"
                                />
                            </div>
                        </div>
                        
                        {/* File Grid */}
                        <div className="file-grid">
                            {files.map(file => (
                                <div 
                                    key={file.id}
                                    className={`file-item ${selectedFile?.id === file.id ? 'selected' : ''}`}
                                    onClick={() => openFile(file)}
                                >
                                    <div className="file-actions">
                                        <button 
                                            className="file-action-btn delete"
                                            onClick={(e) => deleteFile(file, e)}
                                        >
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                    
                                    <div className={`file-icon ${file.type}`}>
                                        <i className={`fas ${
                                            file.type === 'folder' ? 'fa-folder' :
                                            file.type === 'form' ? 'fa-wpforms' :
                                            'fa-file'
                                        }`}></i>
                                    </div>
                                    
                                    <div className="file-name">{file.name}</div>
                                    
                                    {file.type === 'file' && file.size && (
                                        <div className="text-xs text-gray-500 text-center mt-2">
                                            {(file.size / 1024).toFixed(1)} KB
                                        </div>
                                    )}
                                    
                                    {file.type === 'form' && file.fields && (
                                        <div className="text-xs text-gray-500 text-center mt-2">
                                            {file.fields.length} fields • {file.data?.length || 0} records
                                        </div>
                                    )}
                                </div>
                            ))}
                            
                            {files.length === 0 && (
                                <div className="col-span-full text-center py-12 text-gray-500">
                                    <i className="fas fa-folder-open text-5xl mb-4 opacity-50"></i>
                                    <p>This folder is empty</p>
                                    <p className="text-sm mt-2">Create a new folder or form to get started</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* New File Modal */}
                    <div className={`modal ${showNewFileModal ? 'active' : ''}`}>
                        <div className="modal-content">
                            <div className="modal-header">
                                <h2 className="text-xl font-bold">Create New</h2>
                                <button 
                                    className="modal-close"
                                    onClick={() => setShowNewFileModal(false)}
                                >
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Type
                                </label>
                                <div className="flex gap-4">
                                    <label className="flex items-center gap-2">
                                        <input
                                            type="radio"
                                            value="folder"
                                            checked={newFileType === 'folder'}
                                            onChange={(e) => setNewFileType(e.target.value)}
                                        />
                                        <i className="fas fa-folder text-yellow-500"></i>
                                        Folder
                                    </label>
                                    <label className="flex items-center gap-2">
                                        <input
                                            type="radio"
                                            value="form"
                                            checked={newFileType === 'form'}
                                            onChange={(e) => setNewFileType(e.target.value)}
                                        />
                                        <i className="fas fa-wpforms text-blue-500"></i>
                                        Form
                                    </label>
                                </div>
                            </div>
                            
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Name
                                </label>
                                <input
                                    type="text"
                                    value={newFileName}
                                    onChange={(e) => setNewFileName(e.target.value)}
                                    className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500"
                                    placeholder={`Enter ${newFileType} name`}
                                />
                            </div>
                            
                            <div className="flex justify-end gap-2">
                                <button
                                    onClick={() => setShowNewFileModal(false)}
                                    className="px-4 py-2 border rounded hover:bg-gray-100"
                                >
                                    Cancel
                                </button>
                                <button
                                    onClick={createNewFile}
                                    className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                                >
                                    Create
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Form Builder Modal */}
                    <div className={`modal ${showFormBuilder ? 'active' : ''}`}>
                        <div className="modal-content" style={{ maxWidth: '900px' }}>
                            <div className="modal-header">
                                <h2 className="text-xl font-bold flex items-center gap-2">
                                    <i className="fas fa-wpforms text-blue-500"></i>
                                    {selectedFile?.name}
                                </h2>
                                <button 
                                    className="modal-close"
                                    onClick={() => {
                                        setShowFormBuilder(false);
                                        setSelectedFile(null);
                                        setFormFields([]);
                                        setFormData([]);
                                    }}
                                >
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            {/* Tabs */}
                            <div className="flex border-b mb-4">
                                <button
                                    className="px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600"
                                >
                                    Form Builder
                                </button>
                                <button
                                    className="px-4 py-2 font-medium text-gray-600 hover:text-blue-600"
                                    onClick={() => {
                                        // Switch to data view
                                    }}
                                >
                                    Data ({formData.length})
                                </button>
                            </div>
                            
                            {/* Field Types */}
                            <div className="mb-6">
                                <h3 className="text-sm font-medium text-gray-700 mb-2">
                                    Drag & Drop Fields
                                </h3>
                                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2">
                                    {fieldTypes.map(type => (
                                        <div
                                            key={type.value}
                                            draggable
                                            onDragStart={(e) => handleDragStart(e, type.value)}
                                            className="p-2 bg-gray-100 rounded text-center cursor-move hover:bg-gray-200"
                                        >
                                            <i className={`fas fa-${type.icon} block text-lg mb-1`}></i>
                                            <span className="text-xs">{type.label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Form Builder Dropzone */}
                            <div 
                                className={`dropzone ${isDraggingOver ? 'drag-over' : ''}`}
                                onDragOver={handleDragOver}
                                onDragLeave={handleDragLeave}
                                onDrop={handleDrop}
                            >
                                {formFields.length === 0 ? (
                                    <>
                                        <i className="fas fa-cloud-upload-alt"></i>
                                        <p className="text-gray-600">Drag and drop fields here to build your form</p>
                                    </>
                                ) : (
                                    formFields.map((field, index) => (
                                        <div key={field.id} className="form-field">
                                            <div className="field-actions">
                                                <button 
                                                    className="field-action-btn delete"
                                                    onClick={() => deleteField(index)}
                                                >
                                                    <i className="fas fa-trash"></i>
                                                </button>
                                            </div>
                                            
                                            <div className="field-label">
                                                <input
                                                    type="text"
                                                    value={field.label}
                                                    onChange={(e) => updateField(index, { label: e.target.value })}
                                                    placeholder="Field Label"
                                                />
                                                <label className="flex items-center gap-1 text-sm">
                                                    <input
                                                        type="checkbox"
                                                        checked={field.required}
                                                        onChange={(e) => updateField(index, { required: e.target.checked })}
                                                    />
                                                    Required
                                                </label>
                                            </div>
                                            
                                            <div className="field-type-selector">
                                                <select
                                                    value={field.type}
                                                    onChange={(e) => updateField(index, { type: e.target.value })}
                                                >
                                                    {fieldTypes.map(ft => (
                                                        <option key={ft.value} value={ft.value}>
                                                            {ft.label}
                                                        </option>
                                                    ))}
                                                </select>
                                            </div>
                                            
                                            {field.type === 'select' && (
                                                <div className="mt-2">
                                                    <label className="text-sm text-gray-600">Options (comma-separated)</label>
                                                    <input
                                                        type="text"
                                                        value={field.options?.join(', ') || ''}
                                                        onChange={(e) => updateField(index, { 
                                                            options: e.target.value.split(',').map(opt => opt.trim()) 
                                                        })}
                                                        className="w-full p-2 border rounded mt-1"
                                                        placeholder="Option 1, Option 2, Option 3"
                                                    />
                                                </div>
                                            )}
                                            
                                            {/* Field Preview */}
                                            <div className="mt-3 pt-3 border-t">
                                                <div className="text-sm text-gray-500 mb-2">Preview:</div>
                                                {renderInputField(field, '', () => {})}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                            
                            {/* Form Actions */}
                            <div className="flex justify-between mt-4">
                                <div>
                                    <button
                                        onClick={() => setFormFields([])}
                                        className="px-4 py-2 text-red-600 border border-red-600 rounded hover:bg-red-50"
                                    >
                                        Clear All Fields
                                    </button>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={saveFormStructure}
                                        className="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600"
                                    >
                                        <i className="fas fa-save mr-1"></i>Save Form
                                    </button>
                                </div>
                            </div>
                            
                            {/* Data Entry Section */}
                            {formFields.length > 0 && (
                                <div className="mt-6 pt-6 border-t">
                                    <h3 className="text-lg font-bold mb-4">Enter Data</h3>
                                    
                                    <FormDataEntry 
                                        fields={formFields}
                                        onSave={saveFormData}
                                        renderInputField={renderInputField}
                                    />
                                    
                                    {/* Data Table */}
                                    {formData.length > 0 && (
                                        <div className="mt-6">
                                            <h4 className="font-medium mb-3">Saved Data ({formData.length} records)</h4>
                                            <div className="overflow-x-auto">
                                                <table className="form-data-table">
                                                    <thead>
                                                        <tr>
                                                            {formFields.map(field => (
                                                                <th key={field.id}>{field.label}</th>
                                                            ))}
                                                            <th>Actions</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {formData.map(record => (
                                                            <tr key={record.id}>
                                                                {formFields.map(field => (
                                                                    <td key={field.id}>
                                                                        {field.type === 'checkbox' 
                                                                            ? (record[field.id] ? '✓' : '✗')
                                                                            : record[field.id] || '-'}
                                                                    </td>
                                                                ))}
                                                                <td>
                                                                    <div className="form-data-actions">
                                                                        <button 
                                                                            className="data-action-btn edit"
                                                                            onClick={() => setEditingRecord(record)}
                                                                        >
                                                                            <i className="fas fa-edit"></i>
                                                                        </button>
                                                                        <button 
                                                                            className="data-action-btn delete"
                                                                            onClick={() => deleteFormData(record.id)}
                                                                        >
                                                                            <i className="fas fa-trash"></i>
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Edit Record Modal */}
                    {editingRecord && (
                        <div className="modal active">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h2 className="text-xl font-bold">Edit Record</h2>
                                    <button 
                                        className="modal-close"
                                        onClick={() => setEditingRecord(null)}
                                    >
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                                
                                <FormDataEntry 
                                    fields={formFields}
                                    initialData={editingRecord}
                                    onSave={updateFormData}
                                    renderInputField={renderInputField}
                                    isEditing
                                />
                            </div>
                        </div>
                    )}

                    {/* Toast Notifications */}
                    <div className="toast-container">
                        {toasts.map(toast => (
                            <Toast
                                key={toast.id}
                                message={toast.message}
                                type={toast.type}
                                onClose={() => setToasts(prev => prev.filter(t => t.id !== toast.id))}
                            />
                        ))}
                    </div>
                </div>
            );
        }

        // Form Data Entry Component
        const FormDataEntry = ({ fields, initialData = {}, onSave, renderInputField, isEditing = false }) => {
            const [formData, setFormData] = useState(initialData);

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave(formData);
                if (!isEditing) {
                    setFormData({});
                }
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    {fields.map(field => (
                        <div key={field.id}>
                            <label className="block text-sm font-medium text-gray-700 mb-1">
                                {field.label}
                                {field.required && <span className="text-red-500 ml-1">*</span>}
                            </label>
                            {renderInputField(field, formData[field.id], (value) => 
                                setFormData({ ...formData, [field.id]: value })
                            )}
                        </div>
                    ))}
                    
                    <div className="flex justify-end gap-2 pt-4">
                        <button
                            type="submit"
                            className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"
                        >
                            {isEditing ? 'Update' : 'Save'} Record
                        </button>
                    </div>
                </form>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
