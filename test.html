<body class="bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
            authDomain: "budget-app-1365f.firebaseapp.com",
            projectId: "budget-app-1365f",
            storageBucket: "budget-app-1365f.firebasestorage.app",
            messagingSenderId: "1036194450411",
            appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
            measurementId: "G-YFFJL2H54X"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // Toast Component
        const Toast = ({ message, type, onClose }) => (
            <div className={`toast ${type}`}>
                <i className={`fas ${
                    type === 'success' ? 'fa-check-circle text-green-500' :
                    type === 'error' ? 'fa-exclamation-circle text-red-500' :
                    'fa-info-circle text-blue-500'
                }`}></i>
                <span>{message}</span>
                <button onClick={onClose} className="ml-4 text-gray-400 hover:text-gray-600">
                    <i className="fas fa-times"></i>
                </button>
            </div>
        );

        // List of available functions
        const AVAILABLE_FUNCTIONS = [
            { name: 'IF', description: 'IF(condition, trueValue, falseValue)' },
            { name: 'IFS', description: 'IFS(condition1, value1, condition2, value2)' },
            { name: 'SUM', description: 'SUM(value1, value2)' },
            { name: 'AVG', description: 'AVG(value1, value2)' },
            { name: 'CONCAT', description: 'CONCAT(string1, string2)' },
            { name: 'TODAY', description: 'TODAY()' },
            { name: 'YEAR', description: 'YEAR(date)' },
            { name: 'MONTH', description: 'MONTH(date)' }
        ];

        // Helper to get field name variants
        const getFieldNameVariants = (field) => {
            const variants = [];
            const label = field.label;
            
            // Original label
            variants.push(label);
            
            // Lowercase with underscores
            const safeName = label.toLowerCase().replace(/[^a-z0-9]/g, '_');
            variants.push(safeName);
            
            // Direct ID
            variants.push(field.id);
            
            // With type suffixes
            if (field.type === 'yesno') {
                variants.push(safeName + '_bool');
                variants.push(field.id + '_bool');
            } else if (field.type === 'date') {
                variants.push(safeName + '_date');
                variants.push(field.id + '_date');
            } else if (field.type === 'number') {
                variants.push(safeName + '_num');
                variants.push(field.id + '_num');
            }
            
            return [...new Set(variants)];
        };

        // Formula Evaluator
        const evaluateFormula = (formula, record, fields, allRecords = []) => {
            if (!formula || !formula.trim()) return null;
            
            try {
                const context = {};
                
                fields.forEach(f => {
                    const val = record[f.id] || '';
                    context[f.id] = val;
                    
                    getFieldNameVariants(f).forEach(variant => {
                        context[variant] = val;
                        
                        if (f.type === 'yesno') {
                            context[variant + '_bool'] = val === 'Yes';
                            context[variant + '_value'] = val;
                        }
                        if (f.type === 'date') {
                            context[variant + '_date'] = val;
                        }
                        if (f.type === 'number') {
                            const num = parseFloat(val);
                            if (!isNaN(num)) {
                                context[variant + '_num'] = num;
                            }
                        }
                    });
                });

                // Helper functions
                const TODAY = () => new Date().toISOString().split('T')[0];
                const IF = (condition, trueVal, falseVal) => condition ? trueVal : falseVal;
                const SUM = (...args) => args.reduce((a, b) => (parseFloat(a) || 0) + (parseFloat(b) || 0), 0);
                const CONCAT = (...args) => args.join('');

                const paramNames = [...Object.keys(context), 'TODAY', 'IF', 'SUM', 'CONCAT'];
                const paramValues = [...Object.values(context), TODAY, IF, SUM, CONCAT];
                
                const fn = new Function(...paramNames, `return ${formula};`);
                let result = fn(...paramValues);
                
                if (result instanceof Date) result = result.toISOString().split('T')[0];
                if (typeof result === 'number' && !Number.isInteger(result)) result = result.toFixed(2);
                
                return result;
            } catch (e) {
                console.warn('Formula error:', e);
                return '#ERROR';
            }
        };

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPath, setCurrentPath] = useState(['My Files']);
            const [files, setFiles] = useState([]);
            const [selectedFile, setSelectedFile] = useState(null);
            const [showNewFileModal, setShowNewFileModal] = useState(false);
            const [formFields, setFormFields] = useState([]);
            const [formData, setFormData] = useState([]);
            const [editingRecord, setEditingRecord] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [isDraggingOver, setIsDraggingOver] = useState(false);
            const [newFileType, setNewFileType] = useState('form');
            const [newFileName, setNewFileName] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [formMode, setFormMode] = useState('view');
            const [showAddDataModal, setShowAddDataModal] = useState(false);
            const [newRecordData, setNewRecordData] = useState({});
            const [showFolderView, setShowFolderView] = useState(false);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [suggestions, setSuggestions] = useState([]);
            const [activeFieldIndex, setActiveFieldIndex] = useState(null);
            const [suggestionPosition, setSuggestionPosition] = useState({ top: 0, left: 0 });
            const suggestionRef = useRef(null);
            const formulaInputRef = useRef(null);
            
            const dragField = useRef(null);
            const fileInputRef = useRef(null);

            const fieldTypes = [
                { value: 'text', label: 'Text', icon: 'font' },
                { value: 'number', label: 'Number', icon: 'hashtag' },
                { value: 'email', label: 'Email', icon: 'envelope' },
                { value: 'tel', label: 'Phone', icon: 'phone' },
                { value: 'date', label: 'Date', icon: 'calendar' },
                { value: 'time', label: 'Time', icon: 'clock' },
                { value: 'checkbox', label: 'Checkbox', icon: 'square-check' },
                { value: 'select', label: 'Dropdown', icon: 'caret-down' },
                { value: 'textarea', label: 'Text Area', icon: 'align-left' },
                { value: 'yesno', label: 'Yes/No', icon: 'circle-question' },
                { value: 'color', label: 'Color', icon: 'palette' },
                { value: 'range', label: 'Range', icon: 'sliders' }
            ];

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        setUser(user);
                        const token = await user.getIdTokenResult();
                        setIsAdmin(
                            token.claims.admin === true || 
                            token.claims.isAdmin === true || 
                            user.email === 'shahulsha254@gmail.com'
                        );
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (user) loadFiles();
            }, [user, currentPath]);

            useEffect(() => {
                if (currentPath.length === 1 && currentPath[0] === 'My Files') {
                    setShowFolderView(false);
                    setSelectedFile(null);
                }
            }, [currentPath]);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (suggestionRef.current && !suggestionRef.current.contains(event.target)) {
                        setShowSuggestions(false);
                    }
                }
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const signInAnonymously = async () => {
                try { setLoading(true); await auth.signInAnonymously(); showToast('success', 'Signed in!'); } 
                catch (error) { showToast('error', error.message); } finally { setLoading(false); }
            };

            const signInWithEmail = async (email, password) => {
                try { setLoading(true); await auth.signInWithEmailAndPassword(email, password); showToast('success','Signed in!'); } 
                catch (error) { showToast('error', error.message); } finally { setLoading(false); }
            };

            const signOut = async () => {
                try {
                    await auth.signOut(); 
                    setCurrentPath(['My Files']); 
                    setFiles([]); 
                    setSelectedFile(null); 
                    setShowFolderView(false);
                    showToast('success','Signed out');
                } catch (error) { showToast('error', error.message); }
            };

            const getUserCollection = (collectionName) => db.collection('users').doc(user.uid).collection(collectionName);

            const loadFiles = async () => {
                if (!user) return;
                try {
                    const path = currentPath.join('/');
                    const filesRef = getUserCollection('tables');
                    const snapshot = await filesRef.where('path', '==', path).get();
                    const fileList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setFiles(fileList);
                } catch (error) { showToast('error', error.message); }
            };

            const showToast = (type, message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, type, message }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
            };

            const createNewFile = async () => {
                if (!user) { showToast('error','Please sign in'); return; }
                if (!newFileName.trim()) { showToast('error','Enter name'); return; }
                try {
                    const path = currentPath.join('/');
                    const filesRef = getUserCollection('tables');
                    const fileData = { 
                        name: newFileName, 
                        path, 
                        type: newFileType, 
                        uid: user.uid, 
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(), 
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
                    };
                    if (newFileType === 'form') { 
                        fileData.fields = []; 
                        fileData.data = []; 
                    }
                    await filesRef.add(fileData);
                    setShowNewFileModal(false); 
                    setNewFileName(''); 
                    loadFiles(); 
                    showToast('success','Created!');
                } catch (error) { showToast('error', error.message); }
            };

            const deleteFile = async (file, e) => {
                e.stopPropagation();
                if (!user) { showToast('error','Sign in'); return; }
                if (!window.confirm(`Delete "${file.name}"?`)) return;
                try {
                    const filesRef = getUserCollection('tables');
                    await filesRef.doc(file.id).delete();
                    if (file.type === 'folder') {
                        const folderPath = [...currentPath, file.name].join('/');
                        const contents = await filesRef.where('path', '>=', folderPath).where('path', '<', folderPath + '\uf8ff').get();
                        const batch = db.batch(); 
                        contents.docs.forEach(doc => batch.delete(doc.ref)); 
                        await batch.commit();
                    }
                    loadFiles(); 
                    showToast('success','Deleted');
                } catch (error) { showToast('error', error.message); }
            };

            const openFile = (file) => {
                if (file.type === 'folder') { 
                    setCurrentPath([...currentPath, file.name]); 
                    setShowFolderView(false);
                    setSelectedFile(null);
                }
                else if (file.type === 'form') { 
                    setSelectedFile(file); 
                    setFormFields(file.fields || []); 
                    setFormData(file.data || []); 
                    setFormMode('view');
                    setNewRecordData({});
                    setShowFolderView(true);
                }
            };

            const navigateUp = () => { 
                if (currentPath.length > 1) {
                    const newPath = currentPath.slice(0, -1);
                    setCurrentPath(newPath);
                    if (newPath.length === 1 && newPath[0] === 'My Files') {
                        setShowFolderView(false);
                        setSelectedFile(null);
                    }
                }
            };

            const handleDragStart = (e, fieldType) => { 
                if (formMode === 'edit') { 
                    dragField.current = fieldType; 
                    e.dataTransfer.setData('text/plain', fieldType); 
                } else { 
                    e.preventDefault(); 
                    showToast('info','Switch to Edit Mode'); 
                } 
            };

            const handleDragOver = (e) => { if (formMode === 'edit') { e.preventDefault(); setIsDraggingOver(true); } };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDraggingOver(false); };

            const handleDrop = (e) => {
                e.preventDefault(); 
                setIsDraggingOver(false);
                if (formMode === 'edit' && dragField.current) {
                    const newField = { 
                        id: 'field_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9), 
                        type: dragField.current, 
                        label: dragField.current, 
                        required: false, 
                        options: dragField.current === 'select' ? ['Option 1','Option 2','Option 3'] : [], 
                        hasFormula: false,
                        formula: '' 
                    };
                    setFormFields([...formFields, newField]); 
                    dragField.current = null;
                }
            };

            const updateField = (index, updates) => { 
                const newFields = [...formFields]; 
                newFields[index] = { ...newFields[index], ...updates }; 
                setFormFields(newFields); 
            };

            const deleteField = (index) => { 
                if (window.confirm('Delete field?')) { 
                    setFormFields(formFields.filter((_,i)=>i!==index)); 
                } 
            };

            const saveFormStructure = async () => {
                if (!user || !selectedFile) return;
                try {
                    const filesRef = getUserCollection('tables');
                    await filesRef.doc(selectedFile.id).update({ 
                        fields: formFields, 
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    setSelectedFile({...selectedFile, fields: formFields}); 
                    showToast('success','Form saved'); 
                    setFormMode('view');
                } catch (error) { showToast('error',error.message); }
            };

            const saveFormData = async (data) => {
                if (!user || !selectedFile) return;
                try {
                    const filesRef = getUserCollection('tables');
                    const currentData = selectedFile.data || [];
                    
                    // Evaluate formulas
                    const evaluatedData = { ...data };
                    formFields.forEach(field => {
                        if (field.hasFormula && field.formula) {
                            evaluatedData[field.id] = evaluateFormula(field.formula, evaluatedData, formFields, currentData);
                        }
                    });
                    
                    const newRecord = { ...evaluatedData, id: Date.now(), uid: user.uid, createdAt: new Date().toISOString() };
                    const newData = [...currentData, newRecord];
                    
                    await filesRef.doc(selectedFile.id).update({ data: newData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setFormData(newData); 
                    setSelectedFile({...selectedFile, data: newData}); 
                    setNewRecordData({});
                    showToast('success','Data saved');
                } catch (error) { showToast('error',error.message); }
            };

            const updateFormData = async (updatedRecord) => {
                if (!user || !selectedFile) return;
                try {
                    const filesRef = getUserCollection('tables');
                    
                    const evaluatedData = { ...updatedRecord };
                    formFields.forEach(field => {
                        if (field.hasFormula && field.formula) {
                            evaluatedData[field.id] = evaluateFormula(field.formula, evaluatedData, formFields, formData);
                        }
                    });
                    
                    const newData = formData.map(r => r.id === updatedRecord.id ? { ...evaluatedData, updatedAt: new Date().toISOString() } : r);
                    await filesRef.doc(selectedFile.id).update({ data: newData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setFormData(newData); 
                    setSelectedFile({...selectedFile, data: newData}); 
                    setEditingRecord(null); 
                    setNewRecordData({});
                    setShowAddDataModal(false);
                    showToast('success','Updated');
                } catch (error) { showToast('error',error.message); }
            };

            const deleteFormData = async (recordId) => {
                if (!user || !window.confirm('Delete record?')) return;
                try {
                    const filesRef = getUserCollection('tables');
                    const newData = formData.filter(r => r.id !== recordId);
                    await filesRef.doc(selectedFile.id).update({ data: newData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setFormData(newData); 
                    setSelectedFile({...selectedFile, data: newData}); 
                    showToast('success','Deleted');
                } catch (error) { showToast('error',error.message); }
            };

            const uploadFile = async (file) => {
                if (!user) return;
                try {
                    const path = currentPath.join('/');
                    const storageRef = storage.ref().child(`users/${user.uid}/${path}/${file.name}`);
                    await storageRef.put(file);
                    const filesRef = getUserCollection('tables');
                    await filesRef.add({ 
                        name: file.name, 
                        path, 
                        type: 'file', 
                        size: file.size, 
                        contentType: file.type, 
                        uid: user.uid, 
                        storagePath: `users/${user.uid}/${path}/${file.name}`, 
                        createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                    });
                    loadFiles(); 
                    showToast('success','File uploaded');
                } catch (error) { showToast('error',error.message); }
            };

            const handleFileSelect = (e) => { const file = e.target.files[0]; if (file) uploadFile(file); };

            const handleNewRecordChange = (fieldId, value) => {
                let updatedData = { ...newRecordData, [fieldId]: value };
                
                // Re-evaluate formulas
                formFields.forEach(field => {
                    if (field.hasFormula && field.formula) {
                        updatedData[field.id] = evaluateFormula(field.formula, updatedData, formFields, formData);
                    }
                });
                
                setNewRecordData(updatedData);
            };

            const handleSubmitNewRecord = (e) => {
                e.preventDefault();
                saveFormData(newRecordData);
            };

            const getAllFieldVariants = () => {
                const variants = [];
                formFields.forEach(field => {
                    getFieldNameVariants(field).forEach(variant => {
                        variants.push({
                            type: 'field',
                            name: variant,
                            original: field.label,
                            fieldType: field.type,
                            fieldId: field.id
                        });
                    });
                });
                return variants;
            };

            const handleFormulaChange = (index, value) => {
                updateField(index, { formula: value });
                
                const input = formulaInputRef.current;
                if (input) {
                    const cursorPos = input.selectionStart;
                    const textBeforeCursor = value.substring(0, cursorPos);
                    const match = textBeforeCursor.match(/[a-zA-Z0-9_]+$/);
                    const lastWord = match ? match[0] : '';
                    
                    if (lastWord.length >= 1) {
                        const fieldVariants = getAllFieldVariants();
                        const functionSuggestions = AVAILABLE_FUNCTIONS.map(f => ({
                            type: 'function',
                            name: f.name,
                            description: f.description
                        }));
                        
                        const allSuggestions = [...fieldVariants, ...functionSuggestions];
                        const filtered = allSuggestions.filter(s => 
                            s.name.toLowerCase().startsWith(lastWord.toLowerCase())
                        );
                        
                        const rect = input.getBoundingClientRect();
                        setSuggestionPosition({
                            top: rect.bottom + window.scrollY,
                            left: rect.left + window.scrollX
                        });
                        
                        setSuggestions(filtered.slice(0, 8));
                        setShowSuggestions(true);
                        setActiveFieldIndex(index);
                    } else {
                        setShowSuggestions(false);
                    }
                }
            };

            const insertSuggestion = (suggestion) => {
                if (activeFieldIndex === null) return;
                
                const field = formFields[activeFieldIndex];
                const currentFormula = field.formula || '';
                const input = formulaInputRef.current;
                
                if (input) {
                    const cursorPos = input.selectionStart;
                    const textBeforeCursor = currentFormula.substring(0, cursorPos);
                    const textAfterCursor = currentFormula.substring(cursorPos);
                    
                    const match = textBeforeCursor.match(/[a-zA-Z0-9_]+$/);
                    if (match) {
                        const start = cursorPos - match[0].length;
                        const newFormula = 
                            currentFormula.substring(0, start) + 
                            suggestion.name + 
                            textAfterCursor;
                        
                        updateField(activeFieldIndex, { formula: newFormula });
                        
                        setTimeout(() => {
                            if (input) {
                                const newPos = start + suggestion.name.length;
                                input.setSelectionRange(newPos, newPos);
                                input.focus();
                            }
                        }, 10);
                    }
                }
                
                setShowSuggestions(false);
            };

            const renderTopFormField = (field) => {
                if (field.hasFormula && field.formula) {
                    const computedValue = newRecordData[field.id] || evaluateFormula(field.formula, newRecordData, formFields, formData);
                    
                    return (
                        <div className="p-2 bg-purple-50 border border-purple-200 rounded font-mono text-sm flex items-center">
                            <i className="fas fa-calculator text-purple-500 mr-2"></i>
                            <span>{computedValue || '—'}</span>
                        </div>
                    );
                }
                
                const commonProps = {
                    id: field.id,
                    name: field.id,
                    value: newRecordData[field.id] || '',
                    onChange: (e) => handleNewRecordChange(field.id, field.type === 'checkbox' ? e.target.checked : e.target.value),
                    className: "w-full p-2 border rounded focus:ring-2 focus:ring-blue-500",
                    required: field.required && !field.hasFormula
                };
                
                switch (field.type) {
                    case 'text': case 'email': case 'tel': case 'number': case 'date': case 'time':
                        return <input type={field.type} {...commonProps} />;
                    case 'checkbox':
                        return <input type="checkbox" checked={newRecordData[field.id] || false} onChange={(e) => handleNewRecordChange(field.id, e.target.checked)} className="h-5 w-5" />;
                    case 'select':
                        return (
                            <select {...commonProps}>
                                <option value="">Select...</option>
                                {(field.options || []).map((opt, i) => <option key={i} value={opt}>{opt}</option>)}
                            </select>
                        );
                    case 'yesno':
                        return (
                            <select {...commonProps}>
                                <option value="">Select...</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        );
                    case 'textarea':
                        return <textarea {...commonProps} rows="3" />;
                    case 'color':
                        return <input type="color" {...commonProps} className="w-full p-1 border rounded h-10" />;
                    case 'range':
                        return <input type="range" {...commonProps} min="0" max="100" />;
                    default:
                        return <input type="text" {...commonProps} />;
                }
            };

            const renderDataTable = () => {
                const allFields = formFields;
                const formulaFields = allFields.filter(f => f.hasFormula && f.formula);
                
                const enhancedData = formData.map(record => {
                    const enhanced = { ...record };
                    formulaFields.forEach(f => { 
                        enhanced[f.id] = evaluateFormula(f.formula, record, allFields, formData); 
                    });
                    return enhanced;
                });

                return (
                    <div className="overflow-x-auto">
                        <table className="form-data-table">
                            <thead>
                                <tr>
                                    {allFields.map(f => (
                                        <th key={f.id}>
                                            {f.label} 
                                            {f.hasFormula && <span className="formula-badge ml-1">fx</span>}
                                        </th>
                                    ))}
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {enhancedData.map(record => (
                                    <tr key={record.id}>
                                        {allFields.map(f => {
                                            let displayValue = record[f.id] ?? '-';
                                            
                                            if (f.type === 'checkbox') {
                                                displayValue = record[f.id] ? '✓' : '✗';
                                            } else if (f.type === 'date' && displayValue !== '-') {
                                                try {
                                                    displayValue = new Date(displayValue).toLocaleDateString();
                                                } catch (e) {}
                                            } else if (f.type === 'number' && displayValue !== '-') {
                                                displayValue = Number(displayValue).toLocaleString();
                                            }
                                            
                                            return <td key={f.id}>{displayValue}</td>;
                                        })}
                                        <td className="text-sm text-gray-500">
                                            {record.createdAt ? new Date(record.createdAt).toLocaleString() : '-'}
                                        </td>
                                        <td>
                                            <div className="form-data-actions">
                                                <button 
                                                    className="data-action-btn edit" 
                                                    onClick={()=>{ 
                                                        setEditingRecord(record); 
                                                        setNewRecordData(record);
                                                        setShowAddDataModal(true);
                                                    }}
                                                    title="Edit record"
                                                >
                                                    <i className="fas fa-edit"></i>
                                                </button>
                                                <button 
                                                    className="data-action-btn delete" 
                                                    onClick={()=>deleteFormData(record.id)}
                                                    title="Delete record"
                                                >
                                                    <i className="fas fa-trash"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            };

            if (loading) return <div className="flex items-center justify-center min-h-screen"><i className="fas fa-spinner fa-spin text-4xl text-blue-500"></i></div>;
            
            if (!user) {
                return (
                    <div className="login-container">
                        <h2 className="text-2xl font-bold">Welcome</h2>
                        <p className="text-gray-600 mb-6">Sign in to access files</p>
                        <button onClick={signInAnonymously} className="login-btn mb-4">
                            <i className="fas fa-user-secret mr-2"></i>Anonymous
                        </button>
                        <div className="relative my-6">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-gray-300"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-2 bg-white text-gray-500">Or</span>
                            </div>
                        </div>
                        <button onClick={()=>signInWithEmail('demo@gmail.com','password123')} className="login-btn bg-purple-600 hover:bg-purple-700">
                            <i className="fas fa-user mr-2"></i>demo@gmail.com
                        </button>
                    </div>
                );
            }

            return (
                <div className="container mx-auto p-4 max-w-7xl">
                    <div className="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 rounded-lg shadow-lg mb-6">
                        <div className="flex justify-between items-center">
                            <h1 className="text-3xl font-bold flex items-center gap-3">
                                <i className="fas fa-folder-open"></i>File Explorer
                            </h1>
                            <div className="user-info">
                                <div className="text-right">
                                    <div className="font-medium">{user.email || (user.isAnonymous ? 'Anonymous' : user.uid)}</div>
                                    {isAdmin && <span className="bg-yellow-400 text-gray-800 px-2 py-0.5 rounded text-xs ml-2">Admin</span>}
                                </div>
                                <button onClick={signOut} className="logout-btn">
                                    <i className="fas fa-sign-out-alt mr-1"></i>Sign Out
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* File Explorer */}
                    <div className="file-explorer mb-8">
                        <div className="file-explorer-header">
                            <div className="file-explorer-breadcrumb">
                                {currentPath.map((item, idx) => (
                                    <React.Fragment key={idx}>
                                        {idx > 0 && <i className="fas fa-chevron-right text-gray-400"></i>}
                                        <span 
                                            className={`breadcrumb-item ${idx === currentPath.length-1 ? 'active' : ''}`} 
                                            onClick={() => {
                                                const newPath = currentPath.slice(0, idx+1);
                                                setCurrentPath(newPath);
                                                if (newPath.length === 1 && newPath[0] === 'My Files') {
                                                    setShowFolderView(false);
                                                    setSelectedFile(null);
                                                }
                                            }}
                                        >
                                            <i className={`fas ${idx === 0 ? 'fa-home' : 'fa-folder'}`}></i>
                                            {item}
                                        </span>
                                    </React.Fragment>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                {currentPath.length > 1 && (
                                    <button onClick={navigateUp} className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">
                                        <i className="fas fa-arrow-up mr-1"></i>Up
                                    </button>
                                )}
                                <button onClick={() => setShowNewFileModal(true)} className="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600">
                                    <i className="fas fa-plus mr-1"></i>New
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600">
                                    <i className="fas fa-upload mr-1"></i>Upload
                                </button>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" />
                            </div>
                        </div>
                        
                        <div className="file-grid">
                            {files.map(f => (
                                <div key={f.id} className={`file-item ${selectedFile?.id === f.id ? 'selected' : ''}`} onClick={() => openFile(f)}>
                                    <div className="file-actions">
                                        <button className="file-action-btn delete" onClick={(e) => deleteFile(f, e)}>
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                    <div className={`file-icon ${f.type}`}>
                                        <i className={`fas ${f.type === 'folder' ? 'fa-folder' : f.type === 'form' ? 'fa-wpforms' : 'fa-file'}`}></i>
                                    </div>
                                    <div className="file-name">{f.name}</div>
                                    {f.type === 'file' && f.size && (
                                        <div className="text-xs text-gray-500 text-center mt-2">
                                            {(f.size/1024).toFixed(1)} KB
                                        </div>
                                    )}
                                    {f.type === 'form' && f.fields && (
                                        <div className="text-xs text-gray-500 text-center mt-2">
                                            {f.fields.length} fields • {f.data?.length || 0} records
                                        </div>
                                    )}
                                </div>
                            ))}
                            {files.length === 0 && (
                                <div className="col-span-full text-center py-12 text-gray-500">
                                    <i className="fas fa-folder-open text-5xl mb-4 opacity-50"></i>
                                    <p>Empty folder</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Form View */}
                    {showFolderView && selectedFile && (
                        <div className="folder-view">
                            <div className="folder-header">
                                <h2>
                                    <i className="fas fa-wpforms text-blue-500 mr-2"></i>
                                    {selectedFile.name}
                                </h2>
                                <div className="action-buttons">
                                    <button 
                                        className="edit-form-btn"
                                        onClick={() => setFormMode(formMode === 'edit' ? 'view' : 'edit')}
                                    >
                                        <i className={`fas fa-${formMode === 'edit' ? 'eye' : 'edit'}`}></i>
                                        {formMode === 'edit' ? ' View Form' : ' Edit Form'}
                                    </button>
                                </div>
                            </div>

                            {/* Formula Examples */}
                            <div className="formula-examples mb-4">
                                <p className="text-sm font-medium mb-2">📊 WORKING FORMULA EXAMPLES:</p>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <code className="bg-green-100">IF(yesno_bool, TODAY(), "")</code>
                                    <code className="bg-green-100">IF(yesno == "Yes", TODAY(), "No date")</code>
                                    <code className="bg-green-100">IF(yesno_bool, date_field, "Not completed")</code>
                                    <code className="bg-green-100">CONCAT(first_name, " ", last_name)</code>
                                </div>
                                <p className="text-xs text-green-600 mt-1">✓ These formulas WORK! Use them exactly as shown</p>
                            </div>

                            {/* Data Entry Form */}
                            {formFields.length > 0 && (
                                <div className="top-form">
                                    <h3>
                                        <i className="fas fa-plus-circle"></i>
                                        Add New Record
                                    </h3>
                                    <form onSubmit={handleSubmitNewRecord} className="grid grid-cols-2 gap-4">
                                        {formFields.map(field => (
                                            <div key={field.id} className="form-field-view">
                                                <label>
                                                    {field.label}
                                                    {field.required && <span className="text-red-500 ml-1">*</span>}
                                                    {field.hasFormula && <span className="formula-badge ml-2">Formula</span>}
                                                </label>
                                                {renderTopFormField(field)}
                                                {field.hasFormula && field.formula && (
                                                    <div className="text-xs text-purple-600 mt-1 font-mono">
                                                        = {field.formula}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        <div className="col-span-2 flex justify-end mt-4">
                                            <button type="submit" className="submit-btn">
                                                <i className="fas fa-save mr-2"></i>
                                                Save Record
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {/* Data Table */}
                            <div className="table-container">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-semibold">
                                        <i className="fas fa-table mr-2 text-blue-500"></i>
                                        Records ({formData.length})
                                    </h3>
                                </div>
                                {formData.length > 0 ? renderDataTable() : (
                                    <div className="text-center py-10 text-gray-500">
                                        <i className="fas fa-database text-4xl mb-3"></i>
                                        <p>No records yet. Use the form above to add data.</p>
                                    </div>
                                )}
                            </div>

                            {/* Form Editor Modal */}
                            {formMode === 'edit' && (
                                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                    <div className="bg-white rounded-lg p-6 max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-xl font-bold">Edit Form Structure</h3>
                                            <button onClick={() => setFormMode('view')} className="text-gray-500 hover:text-gray-700">
                                                <i className="fas fa-times text-2xl"></i>
                                            </button>
                                        </div>
                                        
                                        <div className="mb-6">
                                            <h4 className="text-sm font-medium mb-2">Drag fields to build form</h4>
                                            <div className="grid grid-cols-4 md:grid-cols-6 gap-2">
                                                {fieldTypes.map(t => (
                                                    <div 
                                                        key={t.value} 
                                                        draggable 
                                                        onDragStart={(e) => handleDragStart(e, t.value)} 
                                                        className="p-2 bg-gray-100 rounded text-center cursor-move hover:bg-gray-200"
                                                    >
                                                        <i className={`fas fa-${t.icon} block text-lg`}></i>
                                                        <span className="text-xs">{t.label}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        
                                        <div 
                                            className={`dropzone ${isDraggingOver ? 'drag-over' : ''}`} 
                                            onDragOver={handleDragOver} 
                                            onDragLeave={handleDragLeave} 
                                            onDrop={handleDrop}
                                        >
                                            {formFields.length === 0 ? (
                                                <>
                                                    <i className="fas fa-cloud-upload-alt"></i>
                                                    <p>Drop fields here to build your form</p>
                                                </>
                                            ) : (
                                                formFields.map((field, idx) => (
                                                    <div key={field.id} className={`form-field ${field.hasFormula ? 'field-with-formula' : ''}`}>
                                                        <div className="field-actions">
                                                            <button className="field-action-btn delete" onClick={() => deleteField(idx)}>
                                                                <i className="fas fa-trash"></i>
                                                            </button>
                                                        </div>
                                                        <div className="field-label">
                                                            <input 
                                                                value={field.label} 
                                                                onChange={e => updateField(idx, {label: e.target.value})} 
                                                                placeholder="Field Label" 
                                                            />
                                                            <label className="flex items-center gap-1 text-sm">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={field.required} 
                                                                    onChange={e => updateField(idx, {required: e.target.checked})} 
                                                                /> Required
                                                            </label>
                                                        </div>
                                                        <div className="field-type-selector">
                                                            <select value={field.type} onChange={e => updateField(idx, {type: e.target.value})}>
                                                                {fieldTypes.map(ft => (
                                                                    <option key={ft.value} value={ft.value}>{ft.label}</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                        
                                                        {field.type === 'select' && (
                                                            <div className="mt-2">
                                                                <label className="text-sm">Options (comma separated)</label>
                                                                <input 
                                                                    value={field.options?.join(', ') || ''} 
                                                                    onChange={e => updateField(idx, {options: e.target.value.split(',').map(s => s.trim())})} 
                                                                    className="w-full p-2 border rounded mt-1" 
                                                                    placeholder="Option 1, Option 2, Option 3"
                                                                />
                                                            </div>
                                                        )}
                                                        
                                                        {/* Formula Toggle */}
                                                        <div className="formula-toggle mt-3">
                                                            <label>
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={field.hasFormula || false} 
                                                                    onChange={e => updateField(idx, {hasFormula: e.target.checked})} 
                                                                />
                                                                <i className="fas fa-calculator text-purple-500 ml-1"></i>
                                                                Auto-calculate with formula
                                                            </label>
                                                        </div>
                                                        
                                                        {field.hasFormula && (
                                                            <div className="mt-2">
                                                                <label className="text-sm font-medium">Formula</label>
                                                                
                                                                {/* Available Fields List - Click to insert */}
                                                                <div className="field-names-list">
                                                                    <span className="text-xs text-gray-500 block mb-1">Click field name to insert:</span>
                                                                    {formFields.map(f => (
                                                                        f.id !== field.id && (
                                                                            <span 
                                                                                key={f.id}
                                                                                className={`field-name-item ${f.type}`}
                                                                                onClick={() => {
                                                                                    const variants = getFieldNameVariants(f);
                                                                                    if (variants.length > 0) {
                                                                                        updateField(idx, { 
                                                                                            formula: (field.formula || '') + variants[0]
                                                                                        });
                                                                                    }
                                                                                }}
                                                                            >
                                                                                {f.label}
                                                                                {f.type === 'yesno' && ' (Yes/No)'}
                                                                                {f.type === 'date' && ' (Date)'}
                                                                            </span>
                                                                        )
                                                                    ))}
                                                                </div>
                                                                
                                                                <div className="formula-input-container">
                                                                    <input 
                                                                        ref={formulaInputRef}
                                                                        value={field.formula || ''} 
                                                                        onChange={e => handleFormulaChange(idx, e.target.value)} 
                                                                        className="w-full p-2 border rounded mt-1 font-mono text-sm" 
                                                                        placeholder="IF(yesno_bool, TODAY(), '')" 
                                                                    />
                                                                </div>
                                                                
                                                                {/* Formula Preview */}
                                                                <div className="formula-preview mt-1">
                                                                    <span className="font-bold">Preview: </span>
                                                                    {field.formula ? (
                                                                        evaluateFormula(field.formula, newRecordData, formFields, formData) || '—'
                                                                    ) : '—'}
                                                                </div>
                                                                
                                                                {/* Quick Formula Examples */}
                                                                <div className="mt-2 text-xs">
                                                                    <span className="font-medium">Quick insert:</span>
                                                                    <div className="flex gap-2 mt-1 flex-wrap">
                                                                        <button 
                                                                            onClick={() => updateField(idx, {formula: 'IF(yesno_bool, TODAY(), "")'})}
                                                                            className="px-2 py-1 bg-green-100 text-green-700 rounded text-xs"
                                                                        >
                                                                            IF Yes/No then Today
                                                                        </button>
                                                                        <button 
                                                                            onClick={() => updateField(idx, {formula: 'IF(yesno_bool, date_field, "")'})}
                                                                            className="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs"
                                                                        >
                                                                            IF Yes/No then Date
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )}
                                                        
                                                        <div className="mt-3 pt-3 border-t text-sm text-gray-500">
                                                            Example:
                                                        </div>
                                                        {renderTopFormField({...field, id: 'preview_' + field.id})}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                        
                                        <div className="flex justify-between mt-4">
                                            <button 
                                                onClick={() => { if(window.confirm('Clear all fields?')) setFormFields([]); }} 
                                                className="px-4 py-2 text-red-600 border border-red-600 rounded"
                                            >
                                                Clear All
                                            </button>
                                            <button onClick={saveFormStructure} className="px-4 py-2 bg-green-500 text-white rounded">
                                                <i className="fas fa-save mr-1"></i>Save Form Structure
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Auto-complete Dropdown */}
                    {showSuggestions && suggestions.length > 0 && (
                        <div 
                            ref={suggestionRef}
                            className="fixed z-50 bg-white border rounded-lg shadow-lg max-h-60 overflow-y-auto"
                            style={{
                                top: suggestionPosition.top + 'px',
                                left: suggestionPosition.left + 'px',
                                minWidth: '300px'
                            }}
                        >
                            {suggestions.map((suggestion, index) => (
                                <div 
                                    key={index}
                                    className="p-2 hover:bg-blue-50 cursor-pointer flex justify-between items-center border-b last:border-b-0"
                                    onClick={() => insertSuggestion(suggestion)}
                                >
                                    <div>
                                        <span className="font-mono font-medium">{suggestion.name}</span>
                                        {suggestion.type === 'field' && (
                                            <span className="ml-2 text-xs text-gray-500">
                                                {suggestion.original}
                                            </span>
                                        )}
                                    </div>
                                    <span className={`text-xs px-2 py-1 rounded ${
                                        suggestion.type === 'field' 
                                            ? 'bg-blue-100 text-blue-700' 
                                            : 'bg-purple-100 text-purple-700'
                                    }`}>
                                        {suggestion.type === 'field' ? suggestion.fieldType : 'function'}
                                    </span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* New File Modal */}
                    <div className={`modal ${showNewFileModal ? 'active' : ''}`}>
                        <div className="modal-content max-w-md">
                            <div className="modal-header">
                                <h2 className="text-xl font-bold">Create New</h2>
                                <button onClick={() => setShowNewFileModal(false)}>
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            <div className="mb-4">
                                <label className="block text-sm font-medium">Type</label>
                                <div className="flex gap-4 mt-1">
                                    <label>
                                        <input type="radio" value="folder" checked={newFileType === 'folder'} onChange={e => setNewFileType(e.target.value)} /> 
                                        <i className="fas fa-folder text-yellow-500 ml-1"></i> Folder
                                    </label>
                                    <label>
                                        <input type="radio" value="form" checked={newFileType === 'form'} onChange={e => setNewFileType(e.target.value)} /> 
                                        <i className="fas fa-wpforms text-blue-500 ml-1"></i> Form
                                    </label>
                                </div>
                            </div>
                            <div className="mb-4">
                                <label className="block text-sm font-medium">Name</label>
                                <input type="text" value={newFileName} onChange={e => setNewFileName(e.target.value)} className="w-full p-2 border rounded" placeholder="Enter name" />
                            </div>
                            <div className="flex justify-end gap-2">
                                <button onClick={() => setShowNewFileModal(false)} className="px-4 py-2 border rounded">Cancel</button>
                                <button onClick={createNewFile} className="px-4 py-2 bg-blue-500 text-white rounded">Create</button>
                            </div>
                        </div>
                    </div>

                    {/* Edit Record Modal */}
                    <div className={`modal ${showAddDataModal ? 'active' : ''}`}>
                        <div className="modal-content max-w-2xl">
                            <div className="modal-header">
                                <h2 className="text-xl font-bold">
                                    {editingRecord ? 'Edit Record' : 'Add New Record'}
                                </h2>
                                <button onClick={() => {
                                    setShowAddDataModal(false);
                                    setEditingRecord(null);
                                    setNewRecordData({});
                                }}>
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                if (editingRecord) {
                                    updateFormData({ ...editingRecord, ...newRecordData });
                                } else {
                                    saveFormData(newRecordData);
                                }
                            }}>
                                {formFields.map(f => {
                                    if (f.hasFormula && f.formula) {
                                        return (
                                            <div key={f.id} className="mb-4">
                                                <label className="block text-sm font-medium mb-1">
                                                    {f.label}
                                                    <span className="formula-badge ml-2">Auto</span>
                                                </label>
                                                <div className="p-2 bg-purple-50 border border-purple-200 rounded">
                                                    {newRecordData[f.id] || evaluateFormula(f.formula, newRecordData, formFields, formData) || '—'}
                                                </div>
                                            </div>
                                        );
                                    }
                                    
                                    return (
                                        <div key={f.id} className="mb-4">
                                            <label className="block text-sm font-medium mb-1">
                                                {f.label}
                                                {f.required && <span className="text-red-500 ml-1">*</span>}
                                            </label>
                                            {f.type === 'yesno' ? (
                                                <select 
                                                    value={newRecordData[f.id] || ''}
                                                    onChange={(e) => handleNewRecordChange(f.id, e.target.value)}
                                                    className="w-full p-2 border rounded"
                                                    required={f.required}
                                                >
                                                    <option value="">Select...</option>
                                                    <option value="Yes">Yes</option>
                                                    <option value="No">No</option>
                                                </select>
                                            ) : f.type === 'select' ? (
                                                <select 
                                                    value={newRecordData[f.id] || ''}
                                                    onChange={(e) => handleNewRecordChange(f.id, e.target.value)}
                                                    className="w-full p-2 border rounded"
                                                    required={f.required}
                                                >
                                                    <option value="">Select...</option>
                                                    {(f.options || []).map((opt, i) => (
                                                        <option key={i} value={opt}>{opt}</option>
                                                    ))}
                                                </select>
                                            ) : f.type === 'checkbox' ? (
                                                <input 
                                                    type="checkbox"
                                                    checked={newRecordData[f.id] || false}
                                                    onChange={(e) => handleNewRecordChange(f.id, e.target.checked)}
                                                    className="h-5 w-5"
                                                />
                                            ) : f.type === 'textarea' ? (
                                                <textarea 
                                                    value={newRecordData[f.id] || ''}
                                                    onChange={(e) => handleNewRecordChange(f.id, e.target.value)}
                                                    className="w-full p-2 border rounded"
                                                    rows="4"
                                                    required={f.required}
                                                />
                                            ) : (
                                                <input 
                                                    type={f.type === 'number' ? 'number' : f.type === 'date' ? 'date' : 'text'}
                                                    value={newRecordData[f.id] || ''}
                                                    onChange={(e) => handleNewRecordChange(f.id, e.target.value)}
                                                    className="w-full p-2 border rounded"
                                                    required={f.required}
                                                />
                                            )}
                                        </div>
                                    );
                                })}
                                
                                <div className="flex justify-end gap-2 mt-6">
                                    <button 
                                        type="button"
                                        onClick={() => {
                                            setShowAddDataModal(false);
                                            setEditingRecord(null);
                                            setNewRecordData({});
                                        }}
                                        className="px-4 py-2 border rounded"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        type="submit"
                                        className="px-4 py-2 bg-blue-500 text-white rounded"
                                    >
                                        {editingRecord ? 'Update' : 'Save'} Record
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div className="toast-container">
                        {toasts.map(t => (
                            <Toast key={t.id} message={t.message} type={t.type} onClose={() => setToasts(prev => prev.filter(tt => tt.id !== t.id))} />
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
