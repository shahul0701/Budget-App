<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Explorer & Form Builder with Formulas + Data Tables</title>
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.9/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        /* previous styles plus formula enhancements */
        .file-explorer { border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: white; }
        .file-explorer-header { background: #f9fafb; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .file-explorer-breadcrumb { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .breadcrumb-item { display: flex; align-items: center; gap: 4px; color: #4b5563; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
        .breadcrumb-item:hover { background: #e5e7eb; }
        .breadcrumb-item.active { background: #3b82f6; color: white; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; padding: 16px; min-height: 300px; }
        .file-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.2s; position: relative; background: white; }
        .file-item:hover { transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-color: #3b82f6; }
        .file-item.selected { border: 2px solid #3b82f6; background: #f0f9ff; }
        .file-icon { font-size: 48px; text-align: center; margin-bottom: 12px; color: #6b7280; }
        .file-icon.folder { color: #fbbf24; }
        .file-icon.form { color: #3b82f6; }
        .file-name { font-weight: 500; text-align: center; word-break: break-word; }
        .file-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
        .file-item:hover .file-actions { opacity: 1; }
        .file-action-btn { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .file-action-btn:hover { background: #f3f4f6; }
        .file-action-btn.delete:hover { background: #ef4444; color: white; border-color: #ef4444; }
        .dropzone { border: 2px dashed #d1d5db; border-radius: 8px; padding: 40px; text-align: center; background: #f9fafb; transition: all 0.2s; cursor: pointer; min-height: 200px; }
        .dropzone.drag-over { border-color: #3b82f6; background: #f0f9ff; }
        .dropzone i { font-size: 48px; color: #9ca3af; margin-bottom: 16px; }
        .form-field { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px; position: relative; }
        .form-field:hover { border-color: #3b82f6; }
        .field-label { font-weight: 500; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .field-label input { flex: 1; padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 4px; }
        .field-type-selector { margin-bottom: 12px; }
        .field-type-selector select { padding: 4px 8px; border: 1px solid #e5e7eb; border-radius: 4px; background: white; }
        .field-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
        .field-action-btn { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px 8px; cursor: pointer; transition: all 0.2s; }
        .field-action-btn:hover { background: #f3f4f6; }
        .field-action-btn.delete:hover { background: #ef4444; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb; }
        .modal-close { cursor: pointer; font-size: 20px; color: #9ca3af; }
        .modal-close:hover { color: #4b5563; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1001; }
        .toast { background: white; border-radius: 8px; padding: 12px 20px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease; }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #3b82f6; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .form-data-table { width: 100%; border-collapse: collapse; }
        .form-data-table th { background: #f9fafb; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e7eb; }
        .form-data-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        .form-data-table tr:hover { background: #f9fafb; }
        .form-data-actions { display: flex; gap: 8px; }
        .data-action-btn { padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .data-action-btn.edit:hover { background: #3b82f6; color: white; }
        .data-action-btn.delete:hover { background: #ef4444; color: white; }
        .login-container { max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .login-container h2 { margin-bottom: 20px; color: #1f2937; }
        .login-btn { background: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; width: 100%; }
        .login-btn:hover { background: #2563eb; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-email { color: #4b5563; font-size: 14px; }
        .logout-btn { background: #ef4444; color: white; padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .logout-btn:hover { background: #dc2626; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .tab-button { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .tab-button.active { background: #3b82f6; color: white; }
        .tab-button:not(.active) { background: #f3f4f6; color: #4b5563; }
        .tab-button:not(.active):hover { background: #e5e7eb; }
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 20px; padding: 4px; background: #f3f4f6; border-radius: 8px; width: fit-content; }
        .mode-btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .mode-btn.active { background: #3b82f6; color: white; }
        .mode-btn:not(.active) { color: #4b5563; }
        .form-view { padding: 20px; background: #f9fafb; border-radius: 8px; }
        .form-field-view { margin-bottom: 20px; }
        .form-field-view label { display: block; font-weight: 500; margin-bottom: 5px; color: #374151; }
        .form-field-view input, .form-field-view select, .form-field-view textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: white; }
        .form-field-view input[type="checkbox"] { width: auto; }
        .edit-badge { background: #10b981; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .formula-badge { background: #8b5cf6; color: white; padding: 2px 6px; border-radius: 12px; font-size: 10px; margin-left: 6px; }
        .formula-preview { background: #ede9fe; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; margin-top: 4px; color: #4c1d95; }
        .field-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .aggregate-row { background: #f3e8ff; padding: 8px; border-radius: 6px; margin: 8px 0; font-weight: 500; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
            authDomain: "budget-app-1365f.firebaseapp.com",
            projectId: "budget-app-1365f",
            storageBucket: "budget-app-1365f.firebasestorage.app",
            messagingSenderId: "1036194450411",
            appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
            measurementId: "G-YFFJL2H54X"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const storage = firebase.storage();
        const auth = firebase.auth();

        // Toast Component
        const Toast = ({ message, type, onClose }) => (
            <div className={`toast ${type}`}>
                <i className={`fas ${
                    type === 'success' ? 'fa-check-circle text-green-500' :
                    type === 'error' ? 'fa-exclamation-circle text-red-500' :
                    'fa-info-circle text-blue-500'
                }`}></i>
                <span>{message}</span>
                <button onClick={onClose} className="ml-4 text-gray-400 hover:text-gray-600">
                    <i className="fas fa-times"></i>
                </button>
            </div>
        );

        // Formula evaluation helper (safe, simple)
        const evaluateFormula = (formula, record, fields) => {
            if (!formula || !formula.trim()) return '';
            try {
                // Build a context with field values (by id and by label)
                const context = {};
                fields.forEach(f => {
                    const val = record[f.id] || '';
                    context[f.id] = val;
                    // also provide sanitized label as key (lowercase, no spaces)
                    const key = f.label.toLowerCase().replace(/\s/g, '_');
                    context[key] = val;
                    // numeric conversion if possible
                    if (!isNaN(parseFloat(val)) && isFinite(val)) context[f.id+'_num'] = parseFloat(val);
                });
                // add utility functions
                const sum = (arr) => arr.reduce((a,b)=>a+(parseFloat(b)||0),0);
                const avg = (arr) => arr.length? sum(arr)/arr.length:0;
                // eslint-disable-next-line no-new-func
                const fn = new Function(...Object.keys(context), 'sum','avg','return ' + formula);
                const result = fn(...Object.values(context), sum, avg);
                return (typeof result === 'number') ? result.toFixed(2) : result;
            } catch (e) {
                return '!ERROR';
            }
        };

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentPath, setCurrentPath] = useState(['My Files']);
            const [files, setFiles] = useState([]);
            const [selectedFile, setSelectedFile] = useState(null);
            const [showNewFileModal, setShowNewFileModal] = useState(false);
            const [showFormBuilder, setShowFormBuilder] = useState(false);
            const [formFields, setFormFields] = useState([]);
            const [formData, setFormData] = useState([]);
            const [editingRecord, setEditingRecord] = useState(null);
            const [toasts, setToasts] = useState([]);
            const [isDraggingOver, setIsDraggingOver] = useState(false);
            const [newFileType, setNewFileType] = useState('form');
            const [newFileName, setNewFileName] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [formMode, setFormMode] = useState('view');
            const [activeTab, setActiveTab] = useState('form');
            
            const dragField = useRef(null);
            const fileInputRef = useRef(null);

            // New: formula editing state
            const [editingFormulaForField, setEditingFormulaForField] = useState(null);

            const fieldTypes = [
                { value: 'text', label: 'Text', icon: 'font' },
                { value: 'number', label: 'Number', icon: 'hashtag' },
                { value: 'email', label: 'Email', icon: 'envelope' },
                { value: 'tel', label: 'Phone', icon: 'phone' },
                { value: 'date', label: 'Date', icon: 'calendar' },
                { value: 'time', label: 'Time', icon: 'clock' },
                { value: 'checkbox', label: 'Checkbox', icon: 'square-check' },
                { value: 'select', label: 'Dropdown', icon: 'caret-down' },
                { value: 'textarea', label: 'Text Area', icon: 'align-left' },
                { value: 'yesno', label: 'Yes/No', icon: 'circle-question' },
                { value: 'color', label: 'Color', icon: 'palette' },
                { value: 'range', label: 'Range', icon: 'sliders' },
                { value: 'formula', label: 'Formula', icon: 'square-root-variable' }  // NEW formula field
            ];

            // Monitor auth state
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        setUser(user);
                        const token = await user.getIdTokenResult();
                        setIsAdmin(
                            token.claims.admin === true || 
                            token.claims.isAdmin === true || 
                            user.email === 'shahulsha254@gmail.com'
                        );
                        try {
                            await db.collection('loginSessions').add({
                                uid: user.uid,
                                email: user.email,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                                userAgent: navigator.userAgent
                            });
                        } catch (error) { console.error(error); }
                        try {
                            await db.collection('loginHistory').add({
                                uid: user.uid,
                                email: user.email,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                                action: 'login'
                            });
                        } catch (error) { console.error(error); }
                    } else {
                        setUser(null);
                        setIsAdmin(false);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (user) loadFiles();
            }, [user, currentPath]);

            const signInAnonymously = async () => {
                try { setLoading(true); await auth.signInAnonymously(); showToast('success', 'Signed in!'); } 
                catch (error) { showToast('error', error.message); } finally { setLoading(false); }
            };
            const signInWithEmail = async (email, password) => {
                try { setLoading(true); await auth.signInWithEmailAndPassword(email, password); showToast('success','Signed in!'); } 
                catch (error) { showToast('error', error.message); } finally { setLoading(false); }
            };
            const signOut = async () => {
                try {
                    if (user) await db.collection('loginHistory').add({ uid: user.uid, email: user.email, timestamp: firebase.firestore.FieldValue.serverTimestamp(), action: 'logout' });
                    await auth.signOut(); setCurrentPath(['My Files']); setFiles([]); setSelectedFile(null); setShowFormBuilder(false); showToast('success','Signed out');
                } catch (error) { showToast('error', error.message); }
            };
            const getUserCollection = (collectionName) => db.collection('users').doc(user.uid).collection(collectionName);
            const loadFiles = async () => {
                if (!user) return;
                try {
                    const path = currentPath.join('/');
                    const filesRef = getUserCollection('tables');
                    const snapshot = await filesRef.where('path', '==', path).get();
                    const fileList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setFiles(fileList);
                } catch (error) { showToast('error', error.message); }
            };
            const showToast = (type, message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, type, message }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
            };
            const createNewFile = async () => {
                if (!user) { showToast('error','Please sign in'); return; }
                if (!newFileName.trim()) { showToast('error','Enter name'); return; }
                try {
                    const path = currentPath.join('/');
                    const filesRef = getUserCollection('tables');
                    const fileData = { name: newFileName, path, type: newFileType, uid: user.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (newFileType === 'form') { fileData.fields = []; fileData.data = []; }
                    await filesRef.add(fileData);
                    setShowNewFileModal(false); setNewFileName(''); loadFiles(); showToast('success','Created!');
                } catch (error) { showToast('error', error.message); }
            };
            const deleteFile = async (file, e) => {
                e.stopPropagation();
                if (!user) { showToast('error','Sign in'); return; }
                if (!window.confirm(`Delete "${file.name}"?`)) return;
                try {
                    const filesRef = getUserCollection('tables');
                    await filesRef.doc(file.id).delete();
                    if (file.type === 'folder') {
                        const folderPath = [...currentPath, file.name].join('/');
                        const contents = await filesRef.where('path', '>=', folderPath).where('path', '<', folderPath + '\uf8ff').get();
                        const batch = db.batch(); contents.docs.forEach(doc => batch.delete(doc.ref)); await batch.commit();
                    }
                    loadFiles(); showToast('success','Deleted');
                } catch (error) { showToast('error', error.message); }
            };
            const openFile = (file) => {
                if (file.type === 'folder') { setCurrentPath([...currentPath, file.name]); }
                else if (file.type === 'form') { setSelectedFile(file); setFormFields(file.fields || []); setFormData(file.data || []); setFormMode('view'); setActiveTab('form'); setShowFormBuilder(true); }
            };
            const navigateUp = () => { if (currentPath.length > 1) setCurrentPath(currentPath.slice(0, -1)); };
            const handleDragStart = (e, fieldType) => { if (formMode === 'edit') { dragField.current = fieldType; e.dataTransfer.setData('text/plain', fieldType); } else { e.preventDefault(); showToast('info','Switch to Edit Mode'); } };
            const handleDragOver = (e) => { if (formMode === 'edit') { e.preventDefault(); setIsDraggingOver(true); } };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDraggingOver(false); };
            const handleDrop = (e) => {
                e.preventDefault(); setIsDraggingOver(false);
                if (formMode === 'edit' && dragField.current) {
                    const newField = { id: Date.now() + Math.random(), type: dragField.current, label: `${dragField.current} field`, required: false, options: dragField.current === 'select' ? ['Option 1','Option 2','Option 3'] : [], formula: '' };
                    setFormFields([...formFields, newField]); dragField.current = null;
                }
            };
            const updateField = (index, updates) => { const newFields = [...formFields]; newFields[index] = { ...newFields[index], ...updates }; setFormFields(newFields); };
            const deleteField = (index) => { if (window.confirm('Delete field?')) { setFormFields(formFields.filter((_,i)=>i!==index)); } };
            const saveFormStructure = async () => {
                if (!user || !selectedFile) return;
                try {
                    const filesRef = getUserCollection('tables');
                    await filesRef.doc(selectedFile.id).update({ fields: formFields, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setSelectedFile({...selectedFile, fields: formFields}); showToast('success','Form saved'); setFormMode('view');
                } catch (error) { showToast('error',error.message); }
            };
            const saveFormData = async (data) => {
                if (!user || !selectedFile) return;
                try {
                    const filesRef = getUserCollection('tables');
                    const currentData = selectedFile.data || [];
                    const newRecord = { ...data, id: Date.now(), uid: user.uid, createdAt: new Date().toISOString() };
                    const newData = [...currentData, newRecord];
                    await filesRef.doc(selectedFile.id).update({ data: newData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setFormData(newData); setSelectedFile({...selectedFile, data: newData}); showToast('success','Data saved');
                } catch (error) { showToast('error',error.message); }
            };
            const updateFormData = async (updatedRecord) => {
                if (!user || !selectedFile) return;
                try {
                    const filesRef = getUserCollection('tables');
                    const newData = formData.map(r => r.id === updatedRecord.id ? { ...updatedRecord, updatedAt: new Date().toISOString() } : r);
                    await filesRef.doc(selectedFile.id).update({ data: newData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setFormData(newData); setSelectedFile({...selectedFile, data: newData}); setEditingRecord(null); showToast('success','Updated');
                } catch (error) { showToast('error',error.message); }
            };
            const deleteFormData = async (recordId) => {
                if (!user || !window.confirm('Delete record?')) return;
                try {
                    const filesRef = getUserCollection('tables');
                    const newData = formData.filter(r => r.id !== recordId);
                    await filesRef.doc(selectedFile.id).update({ data: newData, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    setFormData(newData); setSelectedFile({...selectedFile, data: newData}); showToast('success','Deleted');
                } catch (error) { showToast('error',error.message); }
            };
            const uploadFile = async (file) => {
                if (!user) return;
                try {
                    const path = currentPath.join('/');
                    const storageRef = storage.ref().child(`users/${user.uid}/${path}/${file.name}`);
                    await storageRef.put(file);
                    const filesRef = getUserCollection('tables');
                    await filesRef.add({ name: file.name, path, type: 'file', size: file.size, contentType: file.type, uid: user.uid, storagePath: `users/${user.uid}/${path}/${file.name}`, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    loadFiles(); showToast('success','File uploaded');
                } catch (error) { showToast('error',error.message); }
            };
            const handleFileSelect = (e) => { const file = e.target.files[0]; if (file) uploadFile(file); };

            // Enhanced renderInputField with formula support
            const renderInputField = (field, value, onChange, disabled = false) => {
                if (field.type === 'formula') {
                    // formula field: display computed value (read-only)
                    const computed = evaluateFormula(field.formula || '', { ...(editingRecord || {}), ...(value ? { [field.id]: value } : {}) }, formFields);
                    return (
                        <div className="flex items-center gap-2">
                            <input type="text" value={computed} disabled className="w-full p-2 border rounded bg-gray-100" readOnly />
                            <span className="text-xs text-purple-600"><i className="fas fa-calculator"></i></span>
                        </div>
                    );
                }
                const commonProps = { value: value || '', onChange: (e) => onChange(field.id, field.type === 'checkbox' ? e.target.checked : e.target.value), className: "w-full p-2 border rounded focus:ring-2 focus:ring-blue-500", disabled, required: field.required && !disabled };
                switch (field.type) {
                    case 'text': case 'email': case 'tel': return <input type={field.type} {...commonProps} />;
                    case 'number': return <input type="number" {...commonProps} />;
                    case 'date': return <input type="date" {...commonProps} />;
                    case 'time': return <input type="time" {...commonProps} />;
                    case 'checkbox': return <input type="checkbox" checked={value||false} onChange={(e)=>onChange(field.id, e.target.checked)} className="h-5 w-5" disabled={disabled} />;
                    case 'select': return <select {...commonProps}><option value="">Select...</option>{(field.options||[]).map((opt,i)=><option key={i} value={opt}>{opt}</option>)}</select>;
                    case 'yesno': return <select {...commonProps}><option value="">Select...</option><option value="Yes">Yes</option><option value="No">No</option></select>;
                    case 'textarea': return <textarea {...commonProps} rows="4" />;
                    case 'color': return <input type="color" {...commonProps} className="w-full p-2 border rounded h-10" />;
                    case 'range': return <input type="range" value={value||50} onChange={(e)=>onChange(field.id, e.target.value)} min="0" max="100" disabled={disabled} className="w-full" />;
                    default: return null;
                }
            };

            // Data table with formula columns
            const renderDataTable = () => {
                const allFields = formFields;
                const formulaFields = allFields.filter(f => f.type === 'formula');
                return (
                    <div className="overflow-x-auto">
                        <table className="form-data-table">
                            <thead>
                                <tr>
                                    {allFields.map(f => <th key={f.id}>{f.label} {f.type==='formula' && <span className="formula-badge">fx</span>}</th>)}
                                    <th>Created</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {formData.map(record => {
                                    const enhancedRecord = { ...record };
                                    // precompute formula fields for display
                                    formulaFields.forEach(f => { enhancedRecord[f.id] = evaluateFormula(f.formula || '', record, allFields); });
                                    return (
                                        <tr key={record.id}>
                                            {allFields.map(f => (
                                                <td key={f.id}>
                                                    {f.type === 'checkbox' ? (enhancedRecord[f.id] ? '✓' : '✗')
                                                     : f.type === 'formula' ? enhancedRecord[f.id] 
                                                     : enhancedRecord[f.id] ?? '-'}
                                                </td>
                                            ))}
                                            <td className="text-sm text-gray-500">{record.createdAt ? new Date(record.createdAt).toLocaleString() : '-'}</td>
                                            <td>
                                                <div className="form-data-actions">
                                                    <button className="data-action-btn edit" onClick={()=>{ setEditingRecord(record); setActiveTab('form'); setFormMode('view'); }}><i className="fas fa-edit"></i></button>
                                                    <button className="data-action-btn delete" onClick={()=>deleteFormData(record.id)}><i className="fas fa-trash"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                );
            };

            if (loading) return <div className="flex items-center justify-center min-h-screen"><i className="fas fa-spinner fa-spin text-4xl text-blue-500"></i></div>;
            if (!user) {
                return (
                    <div className="login-container">
                        <h2 className="text-2xl font-bold">Welcome</h2>
                        <p className="text-gray-600 mb-6">Sign in to access files</p>
                        <button onClick={signInAnonymously} className="login-btn mb-4"><i className="fas fa-user-secret mr-2"></i>Anonymous</button>
                        <div className="relative my-6"><div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-300"></div></div><div className="relative flex justify-center text-sm"><span className="px-2 bg-white text-gray-500">Or</span></div></div>
                        <button onClick={()=>signInWithEmail('demo@gmail.com','password123')} className="login-btn bg-purple-600 hover:bg-purple-700"><i className="fas fa-user mr-2"></i>demo@gmail.com</button>
                    </div>
                );
            }

            return (
                <div className="container mx-auto p-4 max-w-6xl">
                    <div className="bg-gradient-to-r from-blue-500 to-purple-600 text-white p-6 rounded-lg shadow-lg mb-6">
                        <div className="flex justify-between items-center">
                            <h1 className="text-3xl font-bold flex items-center gap-3"><i className="fas fa-folder-open"></i>File Explorer + Formulas</h1>
                            <div className="user-info">
                                <div className="text-right"><div className="font-medium">{user.email || (user.isAnonymous?'Anonymous':user.uid)}</div>{isAdmin && <span className="bg-yellow-400 text-gray-800 px-2 py-0.5 rounded text-xs ml-2">Admin</span>}</div>
                                <button onClick={signOut} className="logout-btn"><i className="fas fa-sign-out-alt mr-1"></i>Sign Out</button>
                            </div>
                        </div>
                    </div>

                    <div className="file-explorer">
                        <div className="file-explorer-header">
                            <div className="file-explorer-breadcrumb">
                                {currentPath.map((item,idx)=>(
                                    <React.Fragment key={idx}>
                                        {idx>0 && <i className="fas fa-chevron-right text-gray-400"></i>}
                                        <span className={`breadcrumb-item ${idx===currentPath.length-1?'active':''}`} onClick={()=>setCurrentPath(currentPath.slice(0,idx+1))}><i className={`fas ${idx===0?'fa-home':'fa-folder'}`}></i>{item}</span>
                                    </React.Fragment>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                {currentPath.length>1 && <button onClick={navigateUp} className="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300"><i className="fas fa-arrow-up mr-1"></i>Up</button>}
                                <button onClick={()=>setShowNewFileModal(true)} className="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600"><i className="fas fa-plus mr-1"></i>New</button>
                                <button onClick={()=>fileInputRef.current.click()} className="px-3 py-1 bg-green-500 text-white rounded hover:bg-green-600"><i className="fas fa-upload mr-1"></i>Upload</button>
                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" />
                            </div>
                        </div>
                        <div className="file-grid">
                            {files.map(f=>(
                                <div key={f.id} className={`file-item ${selectedFile?.id===f.id?'selected':''}`} onClick={()=>openFile(f)}>
                                    <div className="file-actions"><button className="file-action-btn delete" onClick={(e)=>deleteFile(f,e)}><i className="fas fa-trash"></i></button></div>
                                    <div className={`file-icon ${f.type}`}><i className={`fas ${f.type==='folder'?'fa-folder':f.type==='form'?'fa-wpforms':'fa-file'}`}></i></div>
                                    <div className="file-name">{f.name}</div>
                                    {f.type==='file' && f.size && <div className="text-xs text-gray-500 text-center mt-2">{(f.size/1024).toFixed(1)} KB</div>}
                                    {f.type==='form' && f.fields && <div className="text-xs text-gray-500 text-center mt-2">{f.fields.length} fields • {f.data?.length||0} records</div>}
                                </div>
                            ))}
                            {files.length===0 && <div className="col-span-full text-center py-12 text-gray-500"><i className="fas fa-folder-open text-5xl mb-4 opacity-50"></i><p>Empty folder</p></div>}
                        </div>
                    </div>

                    {/* New File Modal */}
                    <div className={`modal ${showNewFileModal?'active':''}`}>
                        <div className="modal-content max-w-md">
                            <div className="modal-header"><h2 className="text-xl font-bold">Create New</h2><button onClick={()=>setShowNewFileModal(false)}><i className="fas fa-times"></i></button></div>
                            <div className="mb-4"><label className="block text-sm font-medium">Type</label>
                                <div className="flex gap-4 mt-1">
                                    <label><input type="radio" value="folder" checked={newFileType==='folder'} onChange={e=>setNewFileType(e.target.value)} /> <i className="fas fa-folder text-yellow-500"></i> Folder</label>
                                    <label><input type="radio" value="form" checked={newFileType==='form'} onChange={e=>setNewFileType(e.target.value)} /> <i className="fas fa-wpforms text-blue-500"></i> Form</label>
                                </div>
                            </div>
                            <div className="mb-4"><label className="block text-sm font-medium">Name</label><input type="text" value={newFileName} onChange={e=>setNewFileName(e.target.value)} className="w-full p-2 border rounded" placeholder={`Enter name`} /></div>
                            <div className="flex justify-end gap-2"><button onClick={()=>setShowNewFileModal(false)} className="px-4 py-2 border rounded">Cancel</button><button onClick={createNewFile} className="px-4 py-2 bg-blue-500 text-white rounded">Create</button></div>
                        </div>
                    </div>

                    {/* Form Builder Modal */}
                    <div className={`modal ${showFormBuilder?'active':''}`}>
                        <div className="modal-content max-w-4xl">
                            <div className="modal-header">
                                <h2 className="text-xl font-bold"><i className="fas fa-wpforms text-blue-500 mr-2"></i>{selectedFile?.name}{formMode==='edit' && <span className="edit-badge ml-2">Edit Mode</span>}</h2>
                                <button onClick={()=>{ setShowFormBuilder(false); setSelectedFile(null); setFormFields([]); setFormData([]); setFormMode('view'); }}><i className="fas fa-times"></i></button>
                            </div>
                            <div className="mode-toggle">
                                <button className={`mode-btn ${formMode==='view'?'active':''}`} onClick={()=>setFormMode('view')}><i className="fas fa-eye mr-1"></i>View</button>
                                <button className={`mode-btn ${formMode==='edit'?'active':''}`} onClick={()=>setFormMode('edit')}><i className="fas fa-edit mr-1"></i>Edit</button>
                            </div>
                            <div className="tab-buttons">
                                <button className={`tab-button ${activeTab==='form'?'active':''}`} onClick={()=>setActiveTab('form')}><i className="fas fa-wpforms mr-1"></i>Form</button>
                                <button className={`tab-button ${activeTab==='data'?'active':''}`} onClick={()=>setActiveTab('data')}><i className="fas fa-table mr-1"></i>Data ({formData.length})</button>
                            </div>

                            {activeTab==='form' && (
                                <>
                                    {formMode==='edit' && (
                                        <>
                                            <div className="mb-6"><h3 className="text-sm font-medium mb-2">Drag fields (Formula now available)</h3>
                                                <div className="grid grid-cols-4 md:grid-cols-6 gap-2">
                                                    {fieldTypes.map(t=>(
                                                        <div key={t.value} draggable onDragStart={(e)=>handleDragStart(e, t.value)} className="p-2 bg-gray-100 rounded text-center cursor-move hover:bg-gray-200"><i className={`fas fa-${t.icon} block text-lg`}></i><span className="text-xs">{t.label}</span></div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className={`dropzone ${isDraggingOver?'drag-over':''}`} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
                                                {formFields.length===0 ? <><i className="fas fa-cloud-upload-alt"></i><p>Drop fields here</p></> : formFields.map((field,idx)=>(
                                                    <div key={field.id} className="form-field">
                                                        <div className="field-actions"><button className="field-action-btn delete" onClick={()=>deleteField(idx)}><i className="fas fa-trash"></i></button></div>
                                                        <div className="field-label"><input value={field.label} onChange={e=>updateField(idx,{label:e.target.value})} placeholder="Label" /><label className="flex items-center gap-1 text-sm"><input type="checkbox" checked={field.required} onChange={e=>updateField(idx,{required:e.target.checked})} /> Required</label></div>
                                                        <div className="field-type-selector"><select value={field.type} onChange={e=>updateField(idx,{type:e.target.value})}>{fieldTypes.map(ft=><option key={ft.value} value={ft.value}>{ft.label}</option>)}</select></div>
                                                        {field.type==='select' && <div className="mt-2"><label className="text-sm">Options (comma)</label><input value={field.options?.join(', ')||''} onChange={e=>updateField(idx,{options:e.target.value.split(',').map(s=>s.trim())})} className="w-full p-2 border rounded mt-1" /></div>}
                                                        {field.type==='formula' && <div className="mt-2"><label className="text-sm">Formula (e.g., field1_num + field2_num)</label><input value={field.formula||''} onChange={e=>updateField(idx,{formula:e.target.value})} className="w-full p-2 border rounded mt-1 font-mono" placeholder="price * quantity" /><div className="formula-preview">Preview: {evaluateFormula(field.formula||'', {}, formFields)||'—'}</div></div>}
                                                        <div className="mt-3 pt-3 border-t text-sm text-gray-500">Preview:</div>
                                                        {renderInputField(field, '', (id,val)=>{}, true)}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="flex justify-between mt-4">
                                                <button onClick={()=>{if(window.confirm('Clear all?')) setFormFields([]);}} className="px-4 py-2 text-red-600 border border-red-600 rounded">Clear Fields</button>
                                                <button onClick={saveFormStructure} className="px-4 py-2 bg-green-500 text-white rounded"><i className="fas fa-save mr-1"></i>Save Form</button>
                                            </div>
                                        </>
                                    )}
                                    {formMode==='view' && (
                                        <div className="form-view">
                                            {formFields.length===0 ? <div className="text-center py-10 text-gray-500"><i className="fas fa-wpforms text-4xl mb-3"></i><p>No fields.</p></div> : 
                                                <FormDataEntry fields={formFields} initialData={editingRecord||{}} onSave={editingRecord? updateFormData : saveFormData} renderInputField={renderInputField} isEditing={!!editingRecord} />
                                            }
                                        </div>
                                    )}
                                </>
                            )}
                            {activeTab==='data' && (
                                <div>
                                    <h3 className="text-lg font-bold mb-4">Saved Data {formData.length>0 && `(${formData.length} records)`}</h3>
                                    {formData.length>0 ? renderDataTable() : <div className="text-center py-10 text-gray-500"><i className="fas fa-database text-4xl mb-3"></i><p>No data yet.</p></div>}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Edit Record Modal */}
                    {editingRecord && (
                        <div className="modal active">
                            <div className="modal-content max-w-lg">
                                <div className="modal-header"><h2 className="text-xl font-bold">Edit Record</h2><button onClick={()=>setEditingRecord(null)}><i className="fas fa-times"></i></button></div>
                                <FormDataEntry fields={formFields} initialData={editingRecord} onSave={updateFormData} renderInputField={renderInputField} isEditing={true} />
                            </div>
                        </div>
                    )}

                    <div className="toast-container">{toasts.map(t=><Toast key={t.id} message={t.message} type={t.type} onClose={()=>setToasts(prev=>prev.filter(tt=>tt.id!==t.id))} />)}</div>
                </div>
            );
        }

        const FormDataEntry = ({ fields, initialData = {}, onSave, renderInputField, isEditing = false }) => {
            const [formData, setFormData] = useState(initialData);
            const handleChange = (fieldId, value) => setFormData({...formData, [fieldId]: value});
            const handleSubmit = (e) => {
                e.preventDefault();
                let valid = true;
                fields.forEach(f => { if (f.required && !formData[f.id] && f.type!=='formula') { alert(`${f.label} required`); valid = false; } });
                if (valid) { onSave(formData); if (!isEditing) setFormData({}); }
            };
            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    {fields.map(f => (
                        <div key={f.id} className="form-field-view">
                            <label>{f.label}{f.required && <span className="text-red-500 ml-1">*</span>}{f.type==='formula' && <span className="formula-badge ml-2">auto</span>}</label>
                            {renderInputField(f, formData[f.id], handleChange, false)}
                        </div>
                    ))}
                    <div className="flex justify-end pt-4"><button type="submit" className="px-4 py-2 bg-blue-500 text-white rounded">{isEditing ? 'Update' : 'Save'} Record</button></div>
                </form>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
