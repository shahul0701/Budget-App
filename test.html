<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
        authDomain: "budget-app-1365f.firebaseapp.com",
        projectId: "budget-app-1365f",
        storageBucket: "budget-app-1365f.firebasestorage.app",
        messagingSenderId: "1036194450411",
        appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Global variables
    let currentUser = null;
    let stores = [];
    let currentStore = null;
    let currentBranch = null;
    let salesData = [];
    let inventoryItems = [];
    let customers = new Map();
    let vendors = new Map();
    let salesChart, categoryChart;
    
    // Date filter
    let startDate = null;
    let endDate = null;

    // Check authentication
    auth.onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            loadUserStores();
        } else {
            window.location.href = 'index.html';
        }
    });

    // Load user's stores
    async function loadUserStores() {
        try {
            const snapshot = await db.collection('users').doc(currentUser.uid).collection('stores').get();
            
            if (snapshot.empty) {
                // No stores - show modal with add form
                document.getElementById('storeGrid').innerHTML = `
                    <div class="store-card add-store-card" onclick="showAddStoreForm()">
                        <div class="store-icon"><i class="fas fa-plus"></i></div>
                        <div class="store-name">Add Your First Business</div>
                        <div class="store-location">Click here to get started</div>
                    </div>
                `;
                document.getElementById('businessModal').classList.add('active');
            } else {
                stores = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                
                displayStores();
                
                // Check for last selected store
                const lastStore = localStorage.getItem(`lastStore_${currentUser.uid}`);
                const lastBranch = localStorage.getItem(`lastBranch_${currentUser.uid}`);
                
                if (lastStore) {
                    const store = stores.find(s => s.id === lastStore);
                    if (store) {
                        currentStore = store;
                        currentBranch = lastBranch || null;
                        hideBusinessModal();
                        loadDashboardData();
                        updateBranchSelector();
                        return;
                    }
                }
                
                // If no last store, show modal
                document.getElementById('businessModal').classList.add('active');
            }
        } catch (error) {
            console.error('Error loading stores:', error);
            showToast('Error loading stores: ' + error.message, 'error');
        }
    }

    // Display stores
    function displayStores() {
        const storeGrid = document.getElementById('storeGrid');
        
        if (stores.length === 0) {
            storeGrid.innerHTML = `
                <div class="store-card add-store-card" onclick="showAddStoreForm()">
                    <div class="store-icon"><i class="fas fa-plus"></i></div>
                    <div class="store-name">Add Your First Business</div>
                    <div class="store-location">Click here to get started</div>
                </div>
            `;
            return;
        }

        let html = '';
        stores.forEach(store => {
            const isSelected = currentStore?.id === store.id ? 'selected' : '';
            const branchCount = store.branches?.length || 1;
            
            html += `
                <div class="store-card ${isSelected}" onclick="selectStore('${store.id}')">
                    <div class="store-icon">
                        <i class="fas fa-${store.icon || 'store'}"></i>
                    </div>
                    <div class="store-name">${store.name}</div>
                    <div class="store-location">
                        <i class="fas fa-map-marker-alt"></i> ${store.address || 'Main Store'}
                    </div>
                    <div class="store-stats">
                        <div class="store-stat">
                            <div class="store-stat-value">${branchCount}</div>
                            <div class="store-stat-label">Branches</div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        html += `
            <div class="store-card add-store-card" onclick="showAddStoreForm()">
                <div class="store-icon"><i class="fas fa-plus"></i></div>
                <div class="store-name">Add New Business</div>
                <div class="store-location">Create another business</div>
            </div>
        `;
        
        storeGrid.innerHTML = html;
    }

    // Select store
    function selectStore(storeId) {
        currentStore = stores.find(s => s.id === storeId);
        displayStores();
    }

    // Show add store form
    function showAddStoreForm() {
        // Prevent event bubbling
        if (event) {
            event.stopPropagation();
        }
        
        // Hide the store grid and show the form
        document.getElementById('storeGrid').style.display = 'none';
        document.getElementById('addStoreForm').classList.add('active');
        
        // Clear previous branches and add one default
        document.getElementById('branchList').innerHTML = '';
        addBranchField(); // Add first branch field
        
        // Hide the footer buttons when form is shown
        document.querySelector('.business-footer').style.display = 'none';
    }

    // Add branch field
    function addBranchField() {
        if (event) {
            event.stopPropagation();
        }
        
        const branchList = document.getElementById('branchList');
        const branchId = 'branch_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        const branchDiv = document.createElement('div');
        branchDiv.className = 'branch-item';
        branchDiv.innerHTML = `
            <div class="branch-info">
                <input type="text" class="form-control" placeholder="Branch Name (e.g., Downtown Store)" id="branchName_${branchId}" style="margin-bottom: 5px;">
                <input type="text" class="form-control" placeholder="Address / Location" id="branchAddress_${branchId}">
            </div>
            <button type="button" class="remove-branch" onclick="removeBranch(this)">
                <i class="fas fa-times"></i>
            </button>
        `;
        
        branchList.appendChild(branchDiv);
    }

    // Remove branch field
    function removeBranch(button) {
        if (event) {
            event.stopPropagation();
        }
        button.closest('.branch-item').remove();
    }

    // Cancel add store
    function cancelAddStore() {
        // Hide the form and show the store grid
        document.getElementById('addStoreForm').classList.remove('active');
        document.getElementById('storeGrid').style.display = 'grid';
        document.querySelector('.business-footer').style.display = 'flex';
        
        // Clear form fields
        document.getElementById('businessName').value = '';
        document.getElementById('businessEmail').value = '';
        document.getElementById('businessPhone').value = '';
        document.getElementById('businessGST').value = '';
        document.getElementById('businessAddress').value = '';
        document.getElementById('branchList').innerHTML = '';
    }

    // Save new store
    async function saveNewStore() {
        const name = document.getElementById('businessName').value.trim();
        if (!name) {
            showToast('Please enter business name', 'error');
            return;
        }

        // Collect branches
        const branches = [];
        
        // Add main branch from form
        const mainAddress = document.getElementById('businessAddress').value.trim();
        branches.push({
            id: 'branch_main',
            name: 'Main Branch',
            address: mainAddress || 'Head Office',
            isMain: true,
            createdAt: new Date()
        });
        
        // Add additional branches
        const branchItems = document.querySelectorAll('.branch-item');
        
        branchItems.forEach((item, index) => {
            const nameInput = item.querySelector('input[id^="branchName_"]');
            const addressInput = item.querySelector('input[id^="branchAddress_"]');
            
            if (nameInput && nameInput.value.trim()) {
                branches.push({
                    id: 'branch_' + Date.now() + '_' + index,
                    name: nameInput.value.trim(),
                    address: addressInput?.value.trim() || '',
                    isMain: false,
                    createdAt: new Date()
                });
            }
        });

        const storeData = {
            name: name,
            email: document.getElementById('businessEmail').value.trim(),
            phone: document.getElementById('businessPhone').value.trim(),
            gst: document.getElementById('businessGST').value.trim(),
            address: mainAddress,
            branches: branches,
            icon: 'store',
            totalItems: 0,
            monthlySales: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            showToast('Creating business...', 'info');
            
            const docRef = await db.collection('users').doc(currentUser.uid).collection('stores').add(storeData);
            
            storeData.id = docRef.id;
            stores.push(storeData);
            
            // Select this store
            currentStore = storeData;
            currentBranch = branches[0].id;
            
            // Save to localStorage
            localStorage.setItem(`lastStore_${currentUser.uid}`, currentStore.id);
            localStorage.setItem(`lastBranch_${currentUser.uid}`, currentBranch);
            
            // Hide form and modal
            cancelAddStore(); // This will reset the form and show store grid
            hideBusinessModal();
            
            // Load dashboard data
            loadDashboardData();
            updateBranchSelector();
            
            showToast('Business created successfully!', 'success');
            
        } catch (error) {
            console.error('Error creating store:', error);
            showToast('Failed to create business: ' + error.message, 'error');
        }
    }

    // Select current store and continue
    function selectCurrentStore() {
        if (!currentStore) {
            showToast('Please select a business', 'error');
            return;
        }
        
        localStorage.setItem(`lastStore_${currentUser.uid}`, currentStore.id);
        if (currentBranch) {
            localStorage.setItem(`lastBranch_${currentUser.uid}`, currentBranch);
        }
        
        hideBusinessModal();
        loadDashboardData();
        updateBranchSelector();
    }

    // Hide business modal
    function hideBusinessModal() {
        document.getElementById('businessModal').classList.remove('active');
        document.getElementById('branchSelector').style.display = 'flex';
    }

    // Show business modal
    function showBusinessModal() {
        // Reset modal to show store grid
        document.getElementById('addStoreForm').classList.remove('active');
        document.getElementById('storeGrid').style.display = 'grid';
        document.querySelector('.business-footer').style.display = 'flex';
        
        loadUserStores(); // Reload stores
        document.getElementById('businessModal').classList.add('active');
        document.getElementById('branchSelector').style.display = 'none';
    }

    // Update branch selector
    function updateBranchSelector() {
        if (!currentStore) return;
        
        document.getElementById('currentStoreName').textContent = currentStore.name;
        
        const branchDropdown = document.getElementById('branchDropdown');
        branchDropdown.innerHTML = '<option value="">All Branches</option>';
        
        if (currentStore.branches && currentStore.branches.length > 0) {
            currentStore.branches.forEach(branch => {
                const option = document.createElement('option');
                option.value = branch.id;
                option.textContent = branch.name;
                if (branch.id === currentBranch) {
                    option.selected = true;
                }
                branchDropdown.appendChild(option);
            });
        }
        
        // Update subtitle
        const branch = currentStore.branches?.find(b => b.id === currentBranch);
        document.getElementById('dashboardSubtitle').innerHTML = 
            `Welcome to <strong>${currentStore.name}</strong> - ${branch ? branch.name : 'All Branches'}`;
    }

    // Change branch
    function changeBranch() {
        currentBranch = document.getElementById('branchDropdown').value || null;
        if (currentBranch) {
            localStorage.setItem(`lastBranch_${currentUser.uid}`, currentBranch);
        } else {
            localStorage.removeItem(`lastBranch_${currentUser.uid}`);
        }
        loadDashboardData();
        
        // Update subtitle
        const branch = currentStore.branches?.find(b => b.id === currentBranch);
        document.getElementById('dashboardSubtitle').innerHTML = 
            `Welcome to <strong>${currentStore.name}</strong> - ${branch ? branch.name : 'All Branches'}`;
    }

    // Set date filter
    function setDateFilter(period, element) {
        const today = new Date();
        const startInput = document.getElementById('startDate');
        const endInput = document.getElementById('endDate');
        
        // Update active state
        document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
        element.classList.add('active');
        
        switch(period) {
            case 'today':
                startDate = new Date(today.setHours(0,0,0,0));
                endDate = new Date(today.setHours(23,59,59,999));
                break;
            case 'week':
                const firstDay = new Date(today.setDate(today.getDate() - today.getDay()));
                startDate = new Date(firstDay.setHours(0,0,0,0));
                endDate = new Date();
                break;
            case 'month':
                startDate = new Date(today.getFullYear(), today.getMonth(), 1);
                endDate = new Date();
                break;
            case 'prevMonth':
                startDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                endDate = new Date(today.getFullYear(), today.getMonth(), 0, 23, 59, 59);
                break;
            case 'year':
                startDate = new Date(today.getFullYear(), 0, 1);
                endDate = new Date();
                break;
            case 'all':
                startDate = null;
                endDate = null;
                startInput.value = '';
                endInput.value = '';
                loadDashboardData();
                return;
        }
        
        startInput.value = startDate.toISOString().split('T')[0];
        endInput.value = endDate.toISOString().split('T')[0];
        loadDashboardData();
    }

    // Apply date filter
    function applyDateFilter() {
        startDate = document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : null;
        endDate = document.getElementById('endDate').value ? new Date(document.getElementById('endDate').value) : null;
        
        // Remove active class from quick filters
        document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
        
        loadDashboardData();
    }

    // Load dashboard data
    async function loadDashboardData() {
        if (!currentStore) return;
        
        try {
            showToast('Loading dashboard data...', 'info');
            
            // Build queries
            let salesQuery = db.collection('users').doc(currentUser.uid)
                .collection('stores').doc(currentStore.id)
                .collection('sales');
            
            let inventoryQuery = db.collection('users').doc(currentUser.uid)
                .collection('stores').doc(currentStore.id)
                .collection('inventory');
            
            if (currentBranch) {
                salesQuery = salesQuery.where('branchId', '==', currentBranch);
                inventoryQuery = inventoryQuery.where('branchId', '==', currentBranch);
            }
            
            // Load sales
            const salesSnapshot = await salesQuery.get();
            salesData = salesSnapshot.docs.map(doc => {
                const data = doc.data();
                return {
                    id: doc.id,
                    ...data,
                    date: data.date?.toDate() || new Date()
                };
            });
            
            // Filter by date
            let filteredSales = salesData;
            if (startDate) {
                filteredSales = filteredSales.filter(s => s.date >= startDate);
            }
            if (endDate) {
                filteredSales = filteredSales.filter(s => s.date <= endDate);
            }
            
            // Load inventory
            const inventorySnapshot = await inventoryQuery.get();
            inventoryItems = inventorySnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            
            // Process data
            processData(filteredSales);
            updateCharts(filteredSales);
            updateTables();
            
            showToast('Dashboard updated!', 'success');
            
        } catch (error) {
            console.error('Error:', error);
            showToast('Error loading data: ' + error.message, 'error');
        }
    }

    // Process data
    function processData(sales) {
        let totalSales = 0;
        let totalCost = 0;
        let totalTax = 0;
        customers.clear();
        vendors.clear();
        
        sales.forEach(sale => {
            totalSales += sale.total || 0;
            totalTax += sale.tax || 0;
            
            // Calculate cost from items
            if (sale.items) {
                sale.items.forEach(item => {
                    totalCost += (item.cost || 0) * (item.quantity || 0);
                    
                    // Track vendors if available
                    if (item.vendor) {
                        const vendor = vendors.get(item.vendor) || { items: 0, amount: 0, date: sale.date };
                        vendor.items += item.quantity || 0;
                        vendor.amount += (item.cost || 0) * (item.quantity || 0);
                        vendor.date = sale.date.toLocaleDateString();
                        vendors.set(item.vendor, vendor);
                    }
                });
            }
            
            // Track customers
            if (sale.customerName) {
                const customer = customers.get(sale.customerName) || { orders: 0, total: 0 };
                customer.orders++;
                customer.total += sale.total || 0;
                customers.set(sale.customerName, customer);
            }
        });
        
        const netIncome = totalSales - totalCost;
        const profitMargin = totalSales > 0 ? ((netIncome / totalSales) * 100).toFixed(1) : 0;
        const avgTaxRate = totalSales > 0 ? ((totalTax / totalSales) * 100).toFixed(1) : 0;
        
        // Update stats
        document.getElementById('totalSales').textContent = `₹${totalSales.toFixed(2)}`;
        document.getElementById('salesCount').textContent = `${sales.length} invoices`;
        document.getElementById('netIncome').textContent = `₹${netIncome.toFixed(2)}`;
        document.getElementById('profitMargin').textContent = `${profitMargin}% margin`;
        document.getElementById('totalTax').textContent = `₹${totalTax.toFixed(2)}`;
        document.getElementById('taxRate').textContent = `${avgTaxRate}% avg`;
        document.getElementById('totalCustomers').textContent = customers.size;
        document.getElementById('vendorsCount').textContent = `${vendors.size} vendors`;
    }

    // Update charts
    function updateCharts(sales) {
        // Sales trend chart
        const salesByDate = new Map();
        sales.forEach(sale => {
            const date = sale.date.toLocaleDateString();
            salesByDate.set(date, (salesByDate.get(date) || 0) + (sale.total || 0));
        });
        
        const sortedDates = Array.from(salesByDate.keys()).sort();
        const salesValues = sortedDates.map(date => salesByDate.get(date));
        
        if (salesChart) salesChart.destroy();
        
        const ctx1 = document.getElementById('salesChart').getContext('2d');
        salesChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: sortedDates.slice(-7),
                datasets: [{
                    label: 'Sales (₹)',
                    data: salesValues.slice(-7),
                    borderColor: '#4e54c8',
                    backgroundColor: 'rgba(78, 84, 200, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return '₹' + value;
                            }
                        }
                    }
                }
            }
        });
        
        // Category chart
        const categorySales = new Map();
        sales.forEach(sale => {
            if (sale.items) {
                sale.items.forEach(item => {
                    const cat = item.category || 'Other';
                    categorySales.set(cat, (categorySales.get(cat) || 0) + (item.total || 0));
                });
            }
        });
        
        if (categoryChart) categoryChart.destroy();
        
        const ctx2 = document.getElementById('categoryChart').getContext('2d');
        categoryChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: Array.from(categorySales.keys()),
                datasets: [{
                    data: Array.from(categorySales.values()),
                    backgroundColor: ['#4e54c8', '#00b09b', '#f46b45', '#ff416c', '#3498db', '#9b59b6', '#e74c3c', '#f1c40f']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            boxWidth: 12,
                            padding: 15
                        }
                    }
                }
            }
        });
    }

    // Update tables
    function updateTables() {
        // Recent sales
        const recentSales = salesData.slice(0, 5);
        if (recentSales.length === 0) {
            document.getElementById('recentSalesTable').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px;">No sales yet</td></tr>';
        } else {
            document.getElementById('recentSalesTable').innerHTML = recentSales.map(sale => `
                <tr>
                    <td><strong>${sale.invoiceNumber || 'INV-' + sale.id.slice(-6)}</strong></td>
                    <td>${sale.customerName || 'Walk-in Customer'}</td>
                    <td>₹${(sale.total || 0).toFixed(2)}</td>
                    <td><span class="badge badge-success">${sale.paymentMethod || 'Cash'}</span></td>
                </tr>
            `).join('');
        }
        
        // Top customers
        const topCustomers = Array.from(customers.entries())
            .sort((a, b) => b[1].total - a[1].total)
            .slice(0, 5);
        
        if (topCustomers.length === 0) {
            document.getElementById('topCustomersTable').innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 30px;">No customers yet</td></tr>';
        } else {
            document.getElementById('topCustomersTable').innerHTML = topCustomers.map(([name, data]) => `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td>${data.orders}</td>
                    <td>₹${data.total.toFixed(2)}</td>
                </tr>
            `).join('');
        }
        
        // Low stock items
        const lowStock = inventoryItems
            .filter(item => item.currentStock > 0 && item.currentStock <= (item.minStock || 5))
            .slice(0, 5);
        
        if (lowStock.length === 0) {
            document.getElementById('lowStockTable').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px;">No low stock items</td></tr>';
        } else {
            document.getElementById('lowStockTable').innerHTML = lowStock.map(item => {
                const branch = currentStore.branches?.find(b => b.id === item.branchId);
                return `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td class="text-warning">${item.currentStock}</td>
                        <td>${branch?.name || 'Main Branch'}</td>
                        <td><span class="badge badge-warning">Low Stock</span></td>
                    </tr>
                `;
            }).join('');
        }
        
        // Recent vendors
        const recentVendors = Array.from(vendors.entries()).slice(0, 5);
        if (recentVendors.length === 0) {
            document.getElementById('recentVendorsTable').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 30px;">No vendors yet</td></tr>';
        } else {
            document.getElementById('recentVendorsTable').innerHTML = recentVendors.map(([name, data]) => `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td>${data.items}</td>
                    <td>₹${data.amount.toFixed(2)}</td>
                    <td>${data.date || 'Today'}</td>
                </tr>
            `).join('');
        }
    }

    // Refresh dashboard
    function refreshDashboard() {
        loadDashboardData();
    }

    // Toast notification
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icon = type === 'success' ? 'check-circle' : 
                    type === 'error' ? 'exclamation-circle' : 
                    'info-circle';
        
        toast.innerHTML = `
            <i class="fas fa-${icon}"></i>
            <div style="flex: 1">${message}</div>
            <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
        `;
        
        container.appendChild(toast);
        setTimeout(() => {
            if (toast.parentElement) {
                toast.remove();
            }
        }, 3000);
    }

    // FIXED: Modal click handler
    window.addEventListener('click', function(event) {
        const modal = document.getElementById('businessModal');
        const addForm = document.getElementById('addStoreForm');
        
        // If clicking on modal background (not the content)
        if (event.target === modal) {
            // Check if add form is active
            if (addForm.classList.contains('active')) {
                // Don't close if form is active - let user cancel manually
                return;
            }
            
            // Only close if there are stores (not first time user)
            if (stores.length > 0) {
                modal.classList.remove('active');
            }
        }
    });

    // Prevent modal from closing when clicking inside the modal content
    document.querySelector('.business-modal-content')?.addEventListener('click', function(event) {
        event.stopPropagation();
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        // Show business modal by default
        setTimeout(() => {
            if (!currentStore) {
                document.getElementById('businessModal').classList.add('active');
            }
        }, 500);
    });
</script>
