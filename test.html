<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget & Forecasting Dashboard - Multiple Themes</title>
  
  <!-- Chart.js for visualizations -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Date Range Picker -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
  <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/moment/moment.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Theme Variables - Multiple Themes */
    :root {
      /* Default Theme (Modern) */
      --primary-color: #6366f1;
      --primary-dark: #4f46e5;
      --secondary-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --info-color: #3b82f6;
      --dark-color: #1f2937;
      --light-color: #f9fafb;
      --gray-color: #6b7280;
      --border-color: #e5e7eb;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --card-shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      --font-family: 'Inter', sans-serif;
      --border-radius: 12px;
      --transition-speed: 0.3s;
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --primary-color: #818cf8;
      --primary-dark: #6366f1;
      --secondary-color: #34d399;
      --danger-color: #f87171;
      --warning-color: #fbbf24;
      --info-color: #60a5fa;
      --dark-color: #f9fafb;
      --light-color: #111827;
      --gray-color: #9ca3af;
      --border-color: #374151;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.18);
      --card-shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
      --bg-gradient: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    }

    /* Forest Theme */
    [data-theme="forest"] {
      --primary-color: #059669;
      --primary-dark: #047857;
      --secondary-color: #10b981;
      --danger-color: #b91c1c;
      --warning-color: #d97706;
      --info-color: #0284c7;
      --dark-color: #064e3b;
      --light-color: #ecfdf5;
      --gray-color: #6b7280;
      --border-color: #a7f3d0;
      --card-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.1), 0 2px 4px -1px rgba(5, 150, 105, 0.06);
      --card-shadow-hover: 0 10px 15px -3px rgba(5, 150, 105, 0.2), 0 4px 6px -2px rgba(5, 150, 105, 0.1);
      --bg-gradient: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    }

    /* Ocean Theme */
    [data-theme="ocean"] {
      --primary-color: #0891b2;
      --primary-dark: #0e7490;
      --secondary-color: #2dd4bf;
      --danger-color: #e11d48;
      --warning-color: #f97316;
      --info-color: #3b82f6;
      --dark-color: #164e63;
      --light-color: #ecfeff;
      --gray-color: #6b7280;
      --border-color: #cffafe;
      --card-shadow: 0 4px 6px -1px rgba(8, 145, 178, 0.1), 0 2px 4px -1px rgba(8, 145, 178, 0.06);
      --card-shadow-hover: 0 10px 15px -3px rgba(8, 145, 178, 0.2), 0 4px 6px -2px rgba(8, 145, 178, 0.1);
      --bg-gradient: linear-gradient(135deg, #cffafe 0%, #a5f3fc 100%);
    }

    /* Sunset Theme */
    [data-theme="sunset"] {
      --primary-color: #e11d48;
      --primary-dark: #be123c;
      --secondary-color: #f97316;
      --danger-color: #dc2626;
      --warning-color: #fbbf24;
      --info-color: #3b82f6;
      --dark-color: #7f1d1d;
      --light-color: #fff1f2;
      --gray-color: #6b7280;
      --border-color: #fecdd3;
      --card-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.1), 0 2px 4px -1px rgba(225, 29, 72, 0.06);
      --card-shadow-hover: 0 10px 15px -3px rgba(225, 29, 72, 0.2), 0 4px 6px -2px rgba(225, 29, 72, 0.1);
      --bg-gradient: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%);
    }

    /* Midnight Theme */
    [data-theme="midnight"] {
      --primary-color: #8b5cf6;
      --primary-dark: #7c3aed;
      --secondary-color: #2dd4bf;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --info-color: #3b82f6;
      --dark-color: #e5e7eb;
      --light-color: #0f172a;
      --gray-color: #9ca3af;
      --border-color: #334155;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      --card-shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.6), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    body {
      font-family: var(--font-family);
      margin: 0;
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--dark-color);
      line-height: 1.6;
      transition: all var(--transition-speed) ease;
    }

    /* Theme Switcher */
    .theme-switcher {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: white;
      border-radius: 50px;
      padding: 8px;
      box-shadow: var(--card-shadow-hover);
      display: flex;
      gap: 5px;
      border: 1px solid var(--border-color);
    }

    .theme-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .theme-btn:hover {
      transform: scale(1.1);
    }

    .theme-btn.active {
      border-color: var(--dark-color);
      transform: scale(1.1);
    }

    .theme-btn.modern {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
    }

    .theme-btn.dark {
      background: linear-gradient(135deg, #1f2937, #111827);
    }

    .theme-btn.forest {
      background: linear-gradient(135deg, #059669, #047857);
    }

    .theme-btn.ocean {
      background: linear-gradient(135deg, #0891b2, #0e7490);
    }

    .theme-btn.sunset {
      background: linear-gradient(135deg, #e11d48, #be123c);
    }

    .theme-btn.midnight {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    }

    /* Font Switcher */
    .font-switcher {
      position: fixed;
      bottom: 80px;
      right: 20px;
      z-index: 9999;
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: var(--card-shadow-hover);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .font-btn {
      padding: 8px 16px;
      border: none;
      background: var(--light-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--dark-color);
      transition: all 0.2s;
      text-align: left;
      width: 120px;
    }

    .font-btn:hover {
      background: var(--primary-color);
      color: white;
    }

    .font-btn.active {
      background: var(--primary-color);
      color: white;
    }

    .font-btn.inter { font-family: 'Inter', sans-serif; }
    .font-btn.poppins { font-family: 'Poppins', sans-serif; }
    .font-btn.roboto { font-family: 'Roboto', sans-serif; }
    .font-btn.montserrat { font-family: 'Montserrat', sans-serif; }

    /* Budget Calculator */
    .budget-calculator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10000;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: var(--card-shadow-hover);
      width: 90%;
      max-width: 500px;
      display: none;
    }

    .budget-calculator.active {
      display: block;
      animation: modalSlideIn 0.3s ease;
    }

    .calculator-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      display: none;
    }

    .calculator-overlay.active {
      display: block;
    }

    .calculator-display {
      background: var(--light-color);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: right;
      font-size: 32px;
      font-weight: 700;
      border: 1px solid var(--border-color);
      min-height: 80px;
      word-break: break-word;
    }

    .calculator-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .calc-btn {
      padding: 20px;
      font-size: 18px;
      border: 1px solid var(--border-color);
      background: var(--light-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .calc-btn:hover {
      background: var(--primary-color);
      color: white;
    }

    .calc-btn.operator {
      background: var(--primary-color);
      color: white;
    }

    .calc-btn.operator:hover {
      background: var(--primary-dark);
    }

    .calc-btn.equals {
      background: var(--secondary-color);
      color: white;
      grid-column: span 2;
    }

    .calc-btn.clear {
      background: var(--danger-color);
      color: white;
    }

    /* Recurring Transactions */
    .recurring-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      background: rgba(16, 185, 129, 0.1);
      color: var(--secondary-color);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .recurring-settings {
      margin-top: 20px;
      padding: 20px;
      background: var(--light-color);
      border-radius: 12px;
    }

    .recurring-option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .recurring-option input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    /* Goal Tracking */
    .goal-progress {
      margin-top: 15px;
    }

    .goal-card {
      padding: 20px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(79, 70, 229, 0.1));
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .goal-name {
      font-weight: 600;
      font-size: 16px;
    }

    .goal-target {
      color: var(--gray-color);
      font-size: 14px;
    }

    .goal-progress-bar {
      height: 8px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
      margin: 10px 0;
    }

    .goal-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* Smart Alerts */
    .smart-alert {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      animation: slideIn 0.3s ease;
    }

    .smart-alert.warning {
      background: rgba(245, 158, 11, 0.1);
      border-left: 4px solid var(--warning-color);
    }

    .smart-alert.success {
      background: rgba(16, 185, 129, 0.1);
      border-left: 4px solid var(--secondary-color);
    }

    .smart-alert.info {
      background: rgba(59, 130, 246, 0.1);
      border-left: 4px solid var(--info-color);
    }

    .smart-alert.danger {
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid var(--danger-color);
    }

    .alert-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .alert-content {
      flex: 1;
    }

    .alert-title {
      font-weight: 600;
      margin-bottom: 5px;
    }

    .alert-message {
      font-size: 14px;
      color: var(--gray-color);
    }

    /* Cash Flow Timeline */
    .timeline {
      position: relative;
      padding: 20px 0;
    }

    .timeline-item {
      padding: 20px;
      background: var(--light-color);
      border-radius: 8px;
      margin-bottom: 15px;
      position: relative;
      border-left: 4px solid var(--primary-color);
    }

    .timeline-date {
      font-size: 12px;
      color: var(--gray-color);
      margin-bottom: 5px;
    }

    .timeline-amount {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .timeline-desc {
      font-size: 14px;
      color: var(--gray-color);
    }

    /* Export/Import Modal */
    .export-import-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10000;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: var(--card-shadow-hover);
      width: 90%;
      max-width: 600px;
      display: none;
    }

    .export-import-modal.active {
      display: block;
    }

    .format-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .format-option {
      padding: 20px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .format-option:hover {
      border-color: var(--primary-color);
    }

    .format-option.selected {
      border-color: var(--primary-color);
      background: rgba(99, 102, 241, 0.1);
    }

    .format-option i {
      font-size: 32px;
      margin-bottom: 10px;
      color: var(--primary-color);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .theme-switcher {
        bottom: 10px;
        right: 10px;
        flex-wrap: wrap;
        width: 200px;
      }

      .font-switcher {
        bottom: 70px;
        right: 10px;
      }

      .budget-calculator {
        width: 95%;
        padding: 20px;
      }

      .calculator-buttons {
        gap: 5px;
      }

      .calc-btn {
        padding: 15px;
        font-size: 16px;
      }

      .format-options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      messagingSenderId: "1036194450411",
      appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
      measurementId: "G-YFFJL2H54X"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Global variables
    let allTransactions = [];
    let allBudgets = [];
    let allGoals = [];
    let recurringTransactions = [];
    let userUID = null;

    // Theme management
    function initThemeSwitcher() {
      const themeBtns = document.querySelectorAll('.theme-btn');
      const savedTheme = localStorage.getItem('theme') || 'modern';
      
      document.body.setAttribute('data-theme', savedTheme);
      themeBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.theme === savedTheme) {
          btn.classList.add('active');
        }
      });

      themeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const theme = btn.dataset.theme;
          document.body.setAttribute('data-theme', theme);
          localStorage.setItem('theme', theme);
          
          themeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          showNotification(`Theme changed to ${theme}`, 'success');
        });
      });
    }

    // Font management
    function initFontSwitcher() {
      const fontBtns = document.querySelectorAll('.font-btn');
      const savedFont = localStorage.getItem('font') || 'Inter';
      
      document.body.style.fontFamily = savedFont + ', sans-serif';
      fontBtns.forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.font === savedFont) {
          btn.classList.add('active');
        }
      });

      fontBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const font = btn.dataset.font;
          document.body.style.fontFamily = font + ', sans-serif';
          localStorage.setItem('font', font);
          
          fontBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    }

    // Calculator functions
    window.openCalculator = function() {
      document.getElementById('calculatorOverlay').classList.add('active');
      document.getElementById('budgetCalculator').classList.add('active');
    };

    window.closeCalculator = function() {
      document.getElementById('calculatorOverlay').classList.remove('active');
      document.getElementById('budgetCalculator').classList.remove('active');
    };

    window.appendToCalculator = function(value) {
      const display = document.getElementById('calculatorDisplay');
      if (display.textContent === '0') {
        display.textContent = value;
      } else {
        display.textContent += value;
      }
    };

    window.clearCalculator = function() {
      document.getElementById('calculatorDisplay').textContent = '0';
    };

    window.calculateResult = function() {
      try {
        const display = document.getElementById('calculatorDisplay');
        const result = eval(display.textContent);
        display.textContent = result;
      } catch (error) {
        showNotification('Invalid calculation', 'error');
      }
    };

    // Goal management
    async function loadGoals() {
      try {
        const goalsSnap = await getDocs(collection(db, "users", userUID, "goals"));
        allGoals = goalsSnap.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        renderGoals();
      } catch (error) {
        console.error("Error loading goals:", error);
        allGoals = [];
      }
    }

    function renderGoals() {
      const goalCards = document.getElementById('goalCards');
      if (!goalCards) return;

      if (allGoals.length === 0) {
        goalCards.innerHTML = '<p style="text-align: center; color: var(--gray-color);">No goals set. Add a financial goal!</p>';
        return;
      }

      let html = '';
      allGoals.forEach(goal => {
        const progress = (goal.current / goal.target) * 100;
        const remaining = goal.target - goal.current;
        
        html += `
          <div class="goal-card">
            <div class="goal-header">
              <span class="goal-name">${goal.name}</span>
              <span class="goal-target">Target: ${formatCurrency(goal.target)}</span>
            </div>
            <div class="goal-progress">
              <div class="goal-progress-bar">
                <div class="goal-progress-fill" style="width: ${progress}%"></div>
              </div>
              <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                <span>Current: ${formatCurrency(goal.current)}</span>
                <span>Remaining: ${formatCurrency(remaining)}</span>
              </div>
            </div>
            <div style="margin-top: 10px; font-size: 13px; color: var(--gray-color);">
              Target Date: ${moment(goal.targetDate).format('MMM DD, YYYY')}
            </div>
          </div>
        `;
      });

      goalCards.innerHTML = html;
    }

    // Add goal function
    async function addGoal() {
      const name = prompt('Enter goal name:');
      if (!name) return;

      const target = parseFloat(prompt('Enter target amount (₹):'));
      if (isNaN(target) || target <= 0) return;

      const targetDate = prompt('Enter target date (YYYY-MM-DD):');
      if (!targetDate) return;

      const goalData = {
        name,
        target,
        current: 0,
        targetDate,
        created: new Date().toISOString()
      };

      try {
        await addDoc(collection(db, "users", userUID, "goals"), goalData);
        await loadGoals();
        showNotification('Goal added successfully!', 'success');
      } catch (error) {
        console.error("Error adding goal:", error);
        showNotification('Error adding goal', 'error');
      }
    }

    // Smart alerts based on spending patterns
    function generateSmartAlerts() {
      const alerts = [];
      const currentMonth = moment().format('YYYY-MM');
      
      // Check for unusual spending
      const monthlyAvg = calculateMonthlyAverage();
      const currentMonthTotal = calculateCurrentMonthTotal();
      
      if (currentMonthTotal > monthlyAvg * 1.5) {
        alerts.push({
          type: 'warning',
          icon: 'fa-exclamation-triangle',
          title: 'Unusual Spending Detected',
          message: `Your spending this month is ${((currentMonthTotal/monthlyAvg - 1)*100).toFixed(0)}% higher than average.`
        });
      }

      // Check budget limits
      allBudgets.forEach(budget => {
        const actual = calculateActualForBudget(budget);
        if (actual > budget.amount) {
          alerts.push({
            type: 'danger',
            icon: 'fa-times-circle',
            title: 'Budget Exceeded',
            message: `${budget.account} budget exceeded by ${formatCurrency(actual - budget.amount)}`
          });
        }
      });

      // Check savings rate
      const income = allTransactions.reduce((sum, tx) => sum + Number(tx.INCOME || 0), 0);
      const expenses = allTransactions.reduce((sum, tx) => sum + Number(tx.EXPENSE || 0), 0);
      const savingsRate = income > 0 ? ((income - expenses) / income * 100) : 0;

      if (savingsRate < 10) {
        alerts.push({
          type: 'warning',
          icon: 'fa-chart-line',
          title: 'Low Savings Rate',
          message: `Your savings rate is ${savingsRate.toFixed(1)}%. Aim for at least 20%.`
        });
      }

      // Check goals progress
      allGoals.forEach(goal => {
        const progress = (goal.current / goal.target) * 100;
        if (progress < 25) {
          alerts.push({
            type: 'info',
            icon: 'fa-bullseye',
            title: 'Goal Progress',
            message: `You're ${progress.toFixed(1)}% towards your ${goal.name} goal.`
          });
        }
      });

      renderSmartAlerts(alerts);
    }

    function renderSmartAlerts(alerts) {
      const container = document.getElementById('smartAlerts');
      if (!container) return;

      if (alerts.length === 0) {
        container.innerHTML = '';
        return;
      }

      let html = '';
      alerts.forEach(alert => {
        html += `
          <div class="smart-alert ${alert.type}">
            <div class="alert-icon">
              <i class="fas ${alert.icon}"></i>
            </div>
            <div class="alert-content">
              <div class="alert-title">${alert.title}</div>
              <div class="alert-message">${alert.message}</div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function calculateMonthlyAverage() {
      const monthlyTotals = {};
      
      allTransactions.forEach(tx => {
        if (!tx.DATE) return;
        const month = moment(tx.DATE).format('YYYY-MM');
        monthlyTotals[month] = (monthlyTotals[month] || 0) + Number(tx.EXPENSE || 0);
      });

      const totals = Object.values(monthlyTotals);
      return totals.length > 0 ? totals.reduce((a, b) => a + b, 0) / totals.length : 0;
    }

    function calculateCurrentMonthTotal() {
      const currentMonth = moment().format('YYYY-MM');
      return allTransactions
        .filter(tx => tx.DATE && moment(tx.DATE).format('YYYY-MM') === currentMonth)
        .reduce((sum, tx) => sum + Number(tx.EXPENSE || 0), 0);
    }

    // Export/Import functionality
    function exportData(format) {
      const data = {
        transactions: allTransactions,
        budgets: allBudgets,
        goals: allGoals,
        recurringTransactions: recurringTransactions,
        exportDate: new Date().toISOString()
      };

      let content, filename, type;

      switch(format) {
        case 'json':
          content = JSON.stringify(data, null, 2);
          filename = `budget_data_${moment().format('YYYY-MM-DD')}.json`;
          type = 'application/json';
          break;
        case 'csv':
          content = convertToCSV(data);
          filename = `budget_data_${moment().format('YYYY-MM-DD')}.csv`;
          type = 'text/csv';
          break;
        case 'pdf':
          // For demo, we'll use JSON as fallback
          content = JSON.stringify(data, null, 2);
          filename = `budget_data_${moment().format('YYYY-MM-DD')}.json`;
          type = 'application/json';
          break;
      }

      const blob = new Blob([content], { type });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      window.URL.revokeObjectURL(url);
      
      showNotification(`Data exported as ${format.toUpperCase()}`, 'success');
    }

    function convertToCSV(data) {
      let csv = 'Type,Data\n';
      
      // Add transactions
      data.transactions.forEach(tx => {
        csv += `Transaction,${JSON.stringify(tx)}\n`;
      });
      
      // Add budgets
      data.budgets.forEach(budget => {
        csv += `Budget,${JSON.stringify(budget)}\n`;
      });
      
      return csv;
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json,.csv';
      
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const data = JSON.parse(event.target.result);
            
            // Import transactions
            if (data.transactions && Array.isArray(data.transactions)) {
              for (const tx of data.transactions) {
                await addDoc(collection(db, "users", userUID, "transactions"), tx);
              }
            }
            
            // Import budgets
            if (data.budgets && Array.isArray(data.budgets)) {
              for (const budget of data.budgets) {
                await addDoc(collection(db, "users", userUID, "budgets"), budget);
              }
            }
            
            // Import goals
            if (data.goals && Array.isArray(data.goals)) {
              for (const goal of data.goals) {
                await addDoc(collection(db, "users", userUID, "goals"), goal);
              }
            }
            
            showNotification('Data imported successfully!', 'success');
            location.reload();
          } catch (error) {
            console.error('Error importing data:', error);
            showNotification('Error importing data', 'error');
          }
        };
        
        reader.readAsText(file);
      };
      
      input.click();
    }

    // Initialize all features
    function initializeFeatures() {
      initThemeSwitcher();
      initFontSwitcher();

      // Add event listeners
      document.getElementById('addRecurringBtn')?.addEventListener('click', () => {
        showNotification('Recurring transactions feature coming soon!', 'info');
      });

      document.getElementById('addGoalBtn')?.addEventListener('click', addGoal);

      document.getElementById('exportBtn')?.addEventListener('click', () => {
        const format = prompt('Export format (json, csv, pdf):', 'json');
        if (format && ['json', 'csv', 'pdf'].includes(format.toLowerCase())) {
          exportData(format.toLowerCase());
        }
      });

      document.getElementById('importBtn')?.addEventListener('click', importData);

      // Close calculator when clicking overlay
      document.getElementById('calculatorOverlay').addEventListener('click', closeCalculator);
    }

    // Authentication
    onAuthStateChanged(auth, async user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      userUID = user.uid;
      document.getElementById('userDisplay').textContent = user.displayName || user.email || 'User';
      
      try {
        await loadGoals();
        generateSmartAlerts();
        initializeFeatures();
      } catch (error) {
        console.error('Error initializing:', error);
        showNotification('Error loading data', 'error');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });

    // Helper functions
    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-IN', {
        style: 'currency',
        currency: 'INR',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(amount || 0);
    }

    function showNotification(message, type) {
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.innerHTML = `
        <div class="notification-content">
          <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
          <span>${message}</span>
        </div>
        <button class="notification-close"><i class="fas fa-times"></i></button>
      `;
      
      document.body.appendChild(notification);
      
      notification.querySelector('.notification-close').addEventListener('click', () => {
        notification.remove();
      });
      
      setTimeout(() => {
        if (notification.parentNode) {
          notification.remove();
        }
      }, 5000);
    }

    function calculateActualForBudget(budget) {
      // This is a placeholder - implement based on your data structure
      return 0;
    }
  </script>
