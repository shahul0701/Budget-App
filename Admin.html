<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Pro · full‑featured admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ==== reset & variables ==== */
    *{margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif;}
    :root{
      --primary:#6200ee; --primary-light:#f3e5f5; --secondary:#03dac6; --dark:#1a1a1a;
      --light:#ffffff; --gray:#f5f5f5; --success:#4caf50; --warning:#ff9800;
      --danger:#f44336; --info:#2196f3;
    }
    body{background:linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height:100vh; padding:20px;}

    .admin-container{max-width:1400px; margin:0 auto;}

    /* ==== header & buttons ==== */
    .admin-header{
      background:var(--light); border-radius:15px; padding:20px; margin-bottom:30px;
      box-shadow:0 10px 20px rgba(0,0,0,0.08); display:flex; justify-content:space-between;
      align-items:center; flex-wrap:wrap; gap:15px;
    }
    .admin-header h1{display:flex; align-items:center; gap:10px; color:var(--dark); font-size:24px;}
    .admin-header h1 i{color:var(--primary);}
    .admin-actions{display:flex; gap:10px; flex-wrap:wrap;}

    .btn{
      background:var(--primary); color:white; border:none; padding:12px 24px; border-radius:50px;
      font-size:14px; font-weight:600; cursor:pointer; transition:0.2s; display:inline-flex;
      align-items:center; gap:8px; border:2px solid transparent;
    }
    .btn:hover{background:#4a00c8; transform:translateY(-2px); box-shadow:0 6px 12px rgba(0,0,0,0.15);}
    .btn-outline{background:transparent; color:var(--primary); border-color:var(--primary);}
    .btn-outline:hover{background:var(--primary); color:white;}
    .btn-success{background:var(--success);}
    .main-app-link{
      background:var(--success); color:white; padding:12px 24px; border-radius:50px; text-decoration:none;
      display:inline-flex; align-items:center; gap:8px; font-weight:600;
    }
    .main-app-link:hover{background:#3d8b40; transform:translateY(-2px); box-shadow:0 6px 12px rgba(0,0,0,0.15);}

    /* ==== stats cards ==== */
    .stats-grid{
      display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:30px;
    }
    .stat-card{
      background:white; border-radius:15px; padding:20px; box-shadow:0 10px 20px rgba(0,0,0,0.08);
      display:flex; align-items:center; gap:15px; transition:0.2s;
    }
    .stat-card:hover{transform:translateY(-5px);}
    .stat-icon{
      width:60px; height:60px; background:var(--primary-light); border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--primary);
    }
    .stat-info h3{font-size:28px; margin-bottom:5px; color:var(--dark);}
    .stat-info p{color:#666; font-size:14px;}

    /* ==== form containers ==== */
    .banner-form-container, .banners-list-container{
      background:white; border-radius:15px; padding:30px; margin-bottom:30px; box-shadow:0 10px 20px rgba(0,0,0,0.08);
    }
    h2 i{margin-right:8px;}

    .form-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:25px;}

    .form-group{margin-bottom:20px;}
    .form-group label{display:block; margin-bottom:6px; font-weight:600; color:#2c3e50; font-size:14px;}
    .form-group input, .form-group select, .form-group textarea{
      width:100%; padding:12px 15px; border:2px solid #eee; border-radius:10px; font-size:14px;
      transition:0.2s; background:white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus{
      border-color:var(--primary); outline:none; box-shadow:0 0 0 3px rgba(98,0,238,0.1);
    }
    .form-group input[type="color"]{height:50px; padding:5px;}

    .checkbox-group{display:flex; align-items:center; gap:10px; margin:10px 0;}
    .checkbox-group input[type="checkbox"]{width:20px; height:20px; cursor:pointer;}

    .row-flex{display:flex; gap:20px; flex-wrap:wrap; align-items:center;}

    /* ==== live preview section ==== */
    .preview-section{
      background:linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius:15px; padding:30px; margin:20px 0;
    }
    .banner-preview{background:white; border-radius:12px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);}
    .preview-banner{max-width:100%; margin:0 auto; animation:slideDown 0.3s ease;}

    @keyframes slideDown{from{opacity:0; transform:translateY(-20px);} to{opacity:1; transform:translateY(0);}}

    /* ==== banner cards grid ==== */
    .banners-grid{
      display:grid; grid-template-columns:repeat(auto-fill, minmax(350px,1fr)); gap:20px; margin-top:20px;
    }
    .banner-card{
      background:white; border-radius:16px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.08);
      border:1px solid #eee; transition:0.2s;
    }
    .banner-card:hover{transform:translateY(-5px); box-shadow:0 15px 30px rgba(0,0,0,0.15);}

    .banner-card-header{
      padding:15px; background:var(--primary); color:white; display:flex;
      justify-content:space-between; align-items:center;
    }
    .banner-card-header.info{background:var(--info);}
    .banner-card-header.success{background:var(--success);}
    .banner-card-header.warning{background:var(--warning);}
    .banner-card-header.danger{background:var(--danger);}

    .banner-type-badge{background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:30px; font-size:12px; text-transform:capitalize;}
    .banner-status{display:flex; align-items:center; gap:5px; font-size:12px;}
    .status-dot{width:8px; height:8px; border-radius:50%; background:#4caf50;}
    .status-dot.inactive{background:#f44336;}

    .banner-card-body{padding:20px;}

    .banner-preview-mini{
      background:var(--primary); color:white; padding:12px; border-radius:8px; margin-bottom:15px; font-size:13px;
    }

    .banner-details p{margin:6px 0; display:flex; align-items:center; gap:8px; color:#555; font-size:13px;}
    .banner-details i{width:18px; color:var(--primary);}

    .banner-stats{
      display:flex; gap:15px; margin:15px 0; padding:10px 0; border-top:1px solid #eee; border-bottom:1px solid #eee;
    }
    .stat-item{text-align:center; flex:1;}
    .stat-value{font-size:18px; font-weight:bold; color:var(--dark);}
    .stat-label{font-size:11px; color:#666;}

    .banner-card-actions{
      display:flex; gap:6px; flex-wrap:wrap; margin-top:12px;
    }
    .action-btn{
      flex:1 0 auto; padding:8px 0; border:none; border-radius:30px; font-size:11px; font-weight:600;
      display:inline-flex; align-items:center; justify-content:center; gap:5px; cursor:pointer; transition:0.2s;
    }
    .action-btn.edit{background:#ede7f6; color:var(--primary);}
    .action-btn.delete{background:#ffebee; color:var(--danger);}
    .action-btn.toggle{background:#e8f5e9; color:#2e7d32;}
    .action-btn.stats{background:#e3f2fd; color:#0b5e8a;}
    .action-btn.duplicate{background:#fff3e0; color:#e65100;}
    .action-btn:hover{transform:translateY(-2px); filter:brightness(0.95);}

    /* ==== toast & schedule badges ==== */
    .toast-container{position:fixed; top:20px; right:20px; z-index:10000;}
    .toast{
      background:white; border-radius:12px; padding:15px 20px; margin-bottom:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2); display:flex; align-items:center; gap:12px;
      animation:slideIn 0.2s ease; border-left:4px solid;
    }
    .toast.success{border-left-color:var(--success);}
    .toast.error{border-left-color:var(--danger);}
    .toast.warning{border-left-color:var(--warning);}
    .toast.info{border-left-color:var(--primary);}
    @keyframes slideIn{from{transform:translateX(100%); opacity:0;} to{transform:translateX(0); opacity:1;}}

    .schedule-badge{padding:3px 8px; border-radius:30px; font-size:10px; font-weight:600; margin-left:5px; background:#eee;}
    .schedule-badge.scheduled{background:#fff3e0; color:#f57c00;}
    .schedule-badge.expired{background:#ffebee; color:#f44336;}

    @media (max-width:600px){ .form-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="admin-container">

  <!-- header -->
  <div class="admin-header">
    <h1><i class="fas fa-paint-brush"></i> Banner Pro · full control</h1>
    <div class="admin-actions">
      <a href="#" class="main-app-link" target="_blank"><i class="fas fa-external-link-alt"></i> view main app</a>
      <button class="btn btn-outline" onclick="exportBanners()"><i class="fas fa-download"></i> export</button>
      <button class="btn btn-outline" onclick="importBanners()"><i class="fas fa-upload"></i> import</button>
      <button class="btn" onclick="document.getElementById('bannerForm').scrollIntoView({behavior:'smooth'})"><i class="fas fa-plus"></i> new banner</button>
    </div>
  </div>

  <!-- stats cards -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-flag"></i></div><div class="stat-info"><h3 id="totalBanners">0</h3><p>total banners</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-eye"></i></div><div class="stat-info"><h3 id="totalViews">0</h3><p>views</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-mouse-pointer"></i></div><div class="stat-info"><h3 id="totalClicks">0</h3><p>clicks</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-percent"></i></div><div class="stat-info"><h3 id="avgCTR">0%</h3><p>CTR</p></div></div>
    <div class="stat-card"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><h3 id="activeBanners">0</h3><p>active now</p></div></div>
  </div>

  <!-- ===== FULL CUSTOMIZATION FORM ===== -->
  <div class="banner-form-container" id="bannerForm">
    <h2><i class="fas fa-sliders-h"></i> Banner designer – every detail</h2>
    <div class="form-grid">
      <!-- column 1: content & type -->
      <div>
        <div class="form-group">
          <label>✨ Type preset</label>
          <select id="bannerType" onchange="updatePreview()">
            <option value="info">Info (blue)</option><option value="success">Success (green)</option>
            <option value="warning">Warning (orange)</option><option value="danger">Danger (red)</option>
            <option value="custom">Custom (use colors below)</option>
          </select>
        </div>
        <div class="form-group">
          <label>🔤 Title</label>
          <input type="text" id="bannerTitle" value="🔥 Flash Sale" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>📄 Message</label>
          <textarea id="bannerMessage" rows="2" oninput="updatePreview()">Extra 20% off for members</textarea>
        </div>
        <div class="form-group">
          <label><i class="fas fa-icons"></i> Icon (FontAwesome)</label>
          <select id="bannerIcon" onchange="updatePreview()">
            <option value="fa-bell">bell</option><option value="fa-gift">gift</option><option value="fa-rocket">rocket</option>
            <option value="fa-star">star</option><option value="fa-fire">fire</option><option value="fa-info-circle">info</option>
            <option value="fa-exclamation-triangle">warning</option><option value="fa-check-circle">check</option>
          </select>
        </div>
        <div class="form-group">
          <label>⚡ Importance (priority)</label>
          <select id="importanceLevel">
            <option value="low">Low (gray)</option><option value="medium" selected>Medium (blue)</option>
            <option value="high">High (orange)</option><option value="critical">Critical (red)</option>
          </select>
        </div>
      </div>
      <!-- column 2: size & position -->
      <div>
        <div class="form-group">
          <label>📍 Position on page</label>
          <select id="bannerPosition">
            <option value="top">Top (below navbar)</option><option value="bottom">Bottom sticky</option>
            <option value="top-fixed">Top fixed (over content)</option><option value="inline">Inline (within flow)</option>
          </select>
        </div>
        <div class="form-group">
          <label>📐 Width (px/%)</label>
          <input type="text" id="bannerWidth" value="100%" placeholder="e.g. 800px">
        </div>
        <div class="form-group">
          <label>📏 Max width</label>
          <input type="text" id="bannerMaxWidth" value="1200px" placeholder="1200px">
        </div>
        <div class="form-group">
          <label>📏 Height (auto/px)</label>
          <input type="text" id="bannerHeight" value="auto" placeholder="70px">
        </div>
        <div class="form-group">
          <label>🖹 Title font size</label>
          <input type="text" id="titleFontSize" value="1.3rem" placeholder="1.3rem">
        </div>
        <div class="form-group">
          <label>🖻 Message font size</label>
          <input type="text" id="messageFontSize" value="1rem" placeholder="1rem">
        </div>
      </div>
      <!-- column 3: colors & style -->
      <div>
        <div class="form-group">
          <label>🎨 Text color</label>
          <input type="color" id="textColor" value="#ffffff">
        </div>
        <div class="form-group">
          <label>🌈 Background start</label>
          <input type="color" id="bgStart" value="#6200ee">
        </div>
        <div class="form-group">
          <label>🌈 Background end (gradient)</label>
          <input type="color" id="bgEnd" value="#03dac6">
        </div>
        <div class="form-group">
          <label>🔲 Border radius (px)</label>
          <input type="number" id="borderRadius" value="14" min="0" max="60">
        </div>
        <div class="form-group">
          <label>⏱️ Auto‑close (seconds, 0 = no)</label>
          <input type="number" id="bannerDuration" min="0" max="120" value="6">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="isActive" checked> <label for="isActive">Active immediately</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="showCloseBtn" checked> <label for="showCloseBtn">Show close button</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="enableShadow" checked> <label for="enableShadow">Drop shadow</label>
        </div>
      </div>
    </div>

    <!-- schedule block -->
    <div style="margin-top:25px; padding-top:20px; border-top:2px dashed #ccc;">
      <h3>⏰ Schedule (optional)</h3>
      <div class="form-grid">
        <div class="form-group"><label>📅 Start</label><input type="datetime-local" id="scheduleStart"></div>
        <div class="form-group"><label>📅 End</label><input type="datetime-local" id="scheduleEnd"></div>
      </div>
    </div>

    <!-- live preview (uses all fields) -->
    <div class="preview-section">
      <h3><i class="fas fa-eye"></i> live preview (exactly as configured)</h3>
      <div class="banner-preview">
        <div class="preview-banner" id="livePreview"></div>
      </div>
    </div>

    <!-- form actions -->
    <div style="display:flex; gap:15px; justify-content:flex-end; margin-top:20px;">
      <button class="btn btn-outline" onclick="resetForm()"><i class="fas fa-undo"></i> reset</button>
      <button class="btn btn-success" onclick="saveBanner()"><i class="fas fa-save"></i> save banner</button>
    </div>
  </div>

  <!-- banners list + filters -->
  <div class="banners-list-container">
    <h2><i class="fas fa-list"></i> manage banners <span style="font-size:14px; color:#666;" id="bannerCount"></span></h2>
    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px;">
      <select id="filterType"><option value="all">all types</option><option value="info">info</option><option value="success">success</option><option value="warning">warning</option><option value="danger">danger</option></select>
      <select id="filterStatus"><option value="all">all status</option><option value="active">active</option><option value="inactive">inactive</option><option value="scheduled">scheduled</option><option value="expired">expired</option></select>
      <input type="text" id="searchBanner" placeholder="🔍 search title/message" style="flex:1; padding:8px; border-radius:30px; border:1px solid #ccc;">
    </div>
    <div class="banners-grid" id="bannersGrid"></div>
  </div>
</div>

<!-- toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Chart.js (for analytics) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  (function(){
    // ---------- enhanced banner service ----------
    class BannerService {
      constructor() { this.storageKey='banners_pro_full'; this.banners=[]; this.load(); }
      load() {
        const saved = localStorage.getItem(this.storageKey);
        if(saved){ try{ this.banners=JSON.parse(saved); }catch(e){ this.banners=[]; } }
        else {
          // sample banner with all fields
          this.banners=[{
            id:'sample1', type:'info', title:'✨ Personalized offers', message:'Check your budget insights',
            icon:'fa-gift', importance:'medium', position:'top', width:'100%', maxWidth:'1100px', height:'auto',
            titleFontSize:'1.2rem', messageFontSize:'0.95rem', textColor:'#ffffff', bgStart:'#2196f3', bgEnd:'#64b5f6',
            borderRadius:14, duration:7, active:true, showClose:true, enableShadow:true,
            scheduleStart:null, scheduleEnd:null, views:342, clicks:51, createdAt:new Date().toISOString()
          }];
          this.save();
        }
      }
      save() { localStorage.setItem(this.storageKey, JSON.stringify(this.banners)); }
      getActiveBanners() {
        const now=new Date();
        return this.banners.filter(b=>b.active && (!b.scheduleStart || new Date(b.scheduleStart)<=now) && (!b.scheduleEnd || new Date(b.scheduleEnd)>=now));
      }
      trackView(id){ let b=this.banners.find(x=>x.id===id); if(b){ b.views=(b.views||0)+1; this.save(); } }
      trackClick(id){ let b=this.banners.find(x=>x.id===id); if(b){ b.clicks=(b.clicks||0)+1; this.save(); } }
      createBanner(data){ let n={ id:Date.now().toString(), ...data, views:0, clicks:0, createdAt:new Date().toISOString() }; this.banners.push(n); this.save(); return n; }
      updateBanner(id,data){ let i=this.banners.findIndex(b=>b.id===id); if(i>=0){ this.banners[i]={...this.banners[i], ...data}; this.save(); } }
      deleteBanner(id){ this.banners=this.banners.filter(b=>b.id!==id); this.save(); }
    }

    const bannerService = new BannerService();
    let banners = bannerService.banners;
    let currentEditId = null;
    let chartInstance = null;

    // ----- helpers -----
    function showToast(type, title, msg) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i>
        <div><strong>${title}</strong><br><small>${msg}</small></div>
        <i class="fas fa-times" style="margin-left:auto; cursor:pointer;" onclick="this.parentElement.remove()"></i>`;
      container.appendChild(toast);
      setTimeout(()=>{ if(toast.parentNode) toast.remove(); }, 4000);
    }

    function updateStats() {
      const total=banners.length;
      const totViews=banners.reduce((s,b)=>s+(b.views||0),0);
      const totClicks=banners.reduce((s,b)=>s+(b.clicks||0),0);
      const avg=totViews?((totClicks/totViews)*100).toFixed(1):0;
      const activeNow=bannerService.getActiveBanners().length;
      document.getElementById('totalBanners').innerText=total;
      document.getElementById('totalViews').innerText=totViews.toLocaleString();
      document.getElementById('totalClicks').innerText=totClicks.toLocaleString();
      document.getElementById('avgCTR').innerText=avg+'%';
      document.getElementById('activeBanners').innerText=activeNow;
      document.getElementById('bannerCount').innerText=`(${total} total, ${activeNow} active)`;
    }

    // ----- live preview (all fields) -----
    function updatePreview() {
      const title = document.getElementById('bannerTitle').value || 'Title';
      const msg = document.getElementById('bannerMessage').value || 'Message';
      const icon = document.getElementById('bannerIcon').value;
      const textColor = document.getElementById('textColor').value;
      const bgStart = document.getElementById('bgStart').value;
      const bgEnd = document.getElementById('bgEnd').value;
      const borderRadius = document.getElementById('borderRadius').value;
      const width = document.getElementById('bannerWidth').value;
      const maxW = document.getElementById('bannerMaxWidth').value;
      const height = document.getElementById('bannerHeight').value;
      const titleSize = document.getElementById('titleFontSize').value;
      const msgSize = document.getElementById('messageFontSize').value;
      const showClose = document.getElementById('showCloseBtn').checked;
      const enableShadow = document.getElementById('enableShadow').checked;
      const shadow = enableShadow ? '0 12px 25px rgba(0,0,0,0.3)' : 'none';

      const previewDiv = document.getElementById('livePreview');
      const gradient = `linear-gradient(135deg, ${bgStart}, ${bgEnd})`;
      const closeHtml = showClose ? '<button class="banner-close" style="background:rgba(255,255,255,0.2); border:none; color:white; width:36px; height:36px; border-radius:50%; cursor:pointer;"><i class="fas fa-times"></i></button>' : '';

      previewDiv.innerHTML = `
        <div style="display: flex; align-items: center; gap: 15px; background: ${gradient}; color: ${textColor}; padding: 18px 22px; border-radius: ${borderRadius}px; width: ${width}; max-width: ${maxW}; height: ${height}; margin:0 auto; box-shadow: ${shadow};">
          <div style="width:44px; height:44px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px;"><i class="fas ${icon}"></i></div>
          <div style="flex:1;"><div style="font-weight:700; font-size:${titleSize};">${title}</div><div style="font-size:${msgSize}; opacity:0.9;">${msg}</div></div>
          ${closeHtml}
        </div>
      `;
    }

    // reset form to defaults
    function resetForm() {
      document.getElementById('bannerType').value='info';
      document.getElementById('bannerTitle').value='🔥 Flash Sale';
      document.getElementById('bannerMessage').value='Extra 20% off for members';
      document.getElementById('bannerIcon').value='fa-fire';
      document.getElementById('importanceLevel').value='medium';
      document.getElementById('bannerPosition').value='top';
      document.getElementById('bannerWidth').value='100%';
      document.getElementById('bannerMaxWidth').value='1200px';
      document.getElementById('bannerHeight').value='auto';
      document.getElementById('titleFontSize').value='1.3rem';
      document.getElementById('messageFontSize').value='1rem';
      document.getElementById('textColor').value='#ffffff';
      document.getElementById('bgStart').value='#6200ee';
      document.getElementById('bgEnd').value='#03dac6';
      document.getElementById('borderRadius').value='14';
      document.getElementById('bannerDuration').value='6';
      document.getElementById('isActive').checked=true;
      document.getElementById('showCloseBtn').checked=true;
      document.getElementById('enableShadow').checked=true;
      document.getElementById('scheduleStart').value='';
      document.getElementById('scheduleEnd').value='';
      currentEditId=null;
      updatePreview();
    }

    // save (create or update)
    function saveBanner() {
      const bannerData = {
        type: document.getElementById('bannerType').value,
        title: document.getElementById('bannerTitle').value,
        message: document.getElementById('bannerMessage').value,
        icon: document.getElementById('bannerIcon').value,
        importance: document.getElementById('importanceLevel').value,
        position: document.getElementById('bannerPosition').value,
        width: document.getElementById('bannerWidth').value,
        maxWidth: document.getElementById('bannerMaxWidth').value,
        height: document.getElementById('bannerHeight').value,
        titleFontSize: document.getElementById('titleFontSize').value,
        messageFontSize: document.getElementById('messageFontSize').value,
        textColor: document.getElementById('textColor').value,
        bgStart: document.getElementById('bgStart').value,
        bgEnd: document.getElementById('bgEnd').value,
        borderRadius: parseInt(document.getElementById('borderRadius').value),
        duration: parseInt(document.getElementById('bannerDuration').value),
        active: document.getElementById('isActive').checked,
        showClose: document.getElementById('showCloseBtn').checked,
        enableShadow: document.getElementById('enableShadow').checked,
        scheduleStart: document.getElementById('scheduleStart').value || null,
        scheduleEnd: document.getElementById('scheduleEnd').value || null,
      };
      if (currentEditId) {
        bannerService.updateBanner(currentEditId, bannerData);
        showToast('success','Updated','Banner customized successfully');
      } else {
        bannerService.createBanner(bannerData);
        showToast('success','Created','New banner with full features');
      }
      banners = bannerService.banners;
      resetForm();
      renderBanners();
      updateStats();
    }

    // CRUD operations
    function editBanner(id) {
      const b = banners.find(x=>x.id===id); if(!b) return;
      currentEditId = id;
      document.getElementById('bannerType').value = b.type||'info';
      document.getElementById('bannerTitle').value = b.title||'';
      document.getElementById('bannerMessage').value = b.message||'';
      document.getElementById('bannerIcon').value = b.icon||'fa-bell';
      document.getElementById('importanceLevel').value = b.importance||'medium';
      document.getElementById('bannerPosition').value = b.position||'top';
      document.getElementById('bannerWidth').value = b.width||'100%';
      document.getElementById('bannerMaxWidth').value = b.maxWidth||'1200px';
      document.getElementById('bannerHeight').value = b.height||'auto';
      document.getElementById('titleFontSize').value = b.titleFontSize||'1.3rem';
      document.getElementById('messageFontSize').value = b.messageFontSize||'1rem';
      document.getElementById('textColor').value = b.textColor||'#ffffff';
      document.getElementById('bgStart').value = b.bgStart||'#6200ee';
      document.getElementById('bgEnd').value = b.bgEnd||'#03dac6';
      document.getElementById('borderRadius').value = b.borderRadius||14;
      document.getElementById('bannerDuration').value = b.duration||6;
      document.getElementById('isActive').checked = b.active;
      document.getElementById('showCloseBtn').checked = b.showClose!==false;
      document.getElementById('enableShadow').checked = b.enableShadow!==false;
      document.getElementById('scheduleStart').value = b.scheduleStart||'';
      document.getElementById('scheduleEnd').value = b.scheduleEnd||'';
      updatePreview();
      document.getElementById('bannerForm').scrollIntoView({behavior:'smooth'});
    }

    function deleteBanner(id) { if(confirm('Delete banner?')){ bannerService.deleteBanner(id); banners=bannerService.banners; renderBanners(); updateStats(); showToast('info','Deleted','banner removed'); } }

    function toggleBanner(id) { let b=banners.find(x=>x.id===id); if(b){ b.active=!b.active; bannerService.updateBanner(id,{active:b.active}); renderBanners(); updateStats(); showToast('info','Toggled',`active: ${b.active}`); } }

    function duplicateBanner(id) { 
      let b=banners.find(x=>x.id===id); 
      if(b){ let copy={...b, id:Date.now().toString(), title:b.title+' (copy)', views:0, clicks:0, createdAt:new Date().toISOString()}; 
      bannerService.banners.push(copy); bannerService.save(); banners=bannerService.banners; renderBanners(); updateStats(); showToast('success','Duplicated','banner cloned'); } 
    }

    function viewAnalytics(id) {
      let b=banners.find(x=>x.id===id); if(!b) return;
      alert(`Analytics for "${b.title}"\nViews: ${b.views||0}\nClicks: ${b.clicks||0}\nCTR: ${b.views?((b.clicks/b.views)*100).toFixed(1):0}%`);
    }

    // render cards with filters
    function renderBanners() {
      const filterType = document.getElementById('filterType').value;
      const filterStatus = document.getElementById('filterStatus').value;
      const search = document.getElementById('searchBanner').value.toLowerCase();
      let filtered = banners.filter(b => {
        if(filterType!=='all' && b.type!==filterType) return false;
        const now = new Date();
        const isActive = b.active;
        const isScheduled = b.scheduleStart && new Date(b.scheduleStart) > now;
        const isExpired = b.scheduleEnd && new Date(b.scheduleEnd) < now;
        if(filterStatus==='active' && (!isActive || isScheduled || isExpired)) return false;
        if(filterStatus==='inactive' && isActive) return false;
        if(filterStatus==='scheduled' && !isScheduled) return false;
        if(filterStatus==='expired' && !isExpired) return false;
        if(search && !b.title.toLowerCase().includes(search) && !b.message.toLowerCase().includes(search)) return false;
        return true;
      });
      const grid = document.getElementById('bannersGrid');
      if(!filtered.length) { grid.innerHTML='<div style="grid-column:1/-1; text-align:center; padding:50px;">no banners match</div>'; return; }
      grid.innerHTML = filtered.map(b=>{
        const ctr = b.views>0? ((b.clicks/b.views)*100).toFixed(1):0;
        return `<div class="banner-card">
          <div class="banner-card-header ${b.type}"><span class="banner-type-badge"><i class="fas ${b.icon||'fa-bell'}"></i> ${b.type}</span>
          <span class="banner-status"><span class="status-dot ${b.active?'active':'inactive'}"></span>${b.active?'active':'inactive'}</span></div>
          <div class="banner-card-body">
            <div class="banner-preview-mini" style="background:linear-gradient(135deg, ${b.bgStart||'#6200ee'}, ${b.bgEnd||'#03dac6'}); color:${b.textColor||'#fff'};">
              <div><i class="fas ${b.icon}"></i> ${b.title}</div><div style="font-size:11px;">${b.message.substring(0,35)}…</div></div>
            <div class="banner-details">
              <p><i class="fas fa-arrows-alt"></i> ${b.position} | ${b.width} | rad:${b.borderRadius}</p>
              <p><i class="fas fa-font"></i> title:${b.titleFontSize} / msg:${b.messageFontSize}</p>
            </div>
            <div class="banner-stats"><div class="stat-item"><div class="stat-value">${b.views||0}</div><div class="stat-label">views</div></div>
            <div class="stat-item"><div class="stat-value">${b.clicks||0}</div><div class="stat-label">clicks</div></div>
            <div class="stat-item"><div class="stat-value">${ctr}%</div><div class="stat-label">CTR</div></div></div>
            <div class="banner-card-actions">
              <button class="action-btn edit" onclick="editBanner('${b.id}')"><i class="fas fa-edit"></i> edit</button>
              <button class="action-btn toggle" onclick="toggleBanner('${b.id}')"><i class="fas ${b.active?'fa-pause':'fa-play'}"></i> ${b.active?'pause':'activate'}</button>
              <button class="action-btn stats" onclick="viewAnalytics('${b.id}')"><i class="fas fa-chart-bar"></i> stats</button>
              <button class="action-btn duplicate" onclick="duplicateBanner('${b.id}')"><i class="fas fa-copy"></i> copy</button>
              <button class="action-btn delete" onclick="deleteBanner('${b.id}')"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // export/import
    function exportBanners() {
      const dataStr = JSON.stringify(banners,null,2);
      const blob = new Blob([dataStr], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `banners_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url); showToast('success','exported','JSON saved');
    }
    function importBanners() {
      const input = document.createElement('input'); input.type='file'; input.accept='.json';
      input.onchange = e => {
        const file = e.target.files[0]; const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if(Array.isArray(imported)){ imported.forEach(b=> bannerService.createBanner(b)); banners = bannerService.banners; renderBanners(); updateStats(); showToast('success','imported',`${imported.length} banners`); }
            else throw new Error();
          } catch { showToast('error','invalid file',''); }
        }; reader.readAsText(file);
      }; input.click();
    }

    // wire listeners
    document.getElementById('filterType').addEventListener('change', renderBanners);
    document.getElementById('filterStatus').addEventListener('change', renderBanners);
    document.getElementById('searchBanner').addEventListener('input', renderBanners);
    // attach preview triggers
    ['bannerType','bannerTitle','bannerMessage','bannerIcon','textColor','bgStart','bgEnd','borderRadius','bannerWidth','bannerMaxWidth','bannerHeight','titleFontSize','messageFontSize','showCloseBtn','enableShadow'].forEach(id => {
      const el = document.getElementById(id);
      if(el) { el.addEventListener('input', updatePreview); el.addEventListener('change', updatePreview); }
    });

    // initial
    banners = bannerService.banners;
    updateStats();
    renderBanners();
    updatePreview();

    // expose global functions for onclick
    window.editBanner = editBanner; window.deleteBanner = deleteBanner; window.toggleBanner = toggleBanner; window.duplicateBanner = duplicateBanner;
    window.viewAnalytics = viewAnalytics; window.exportBanners = exportBanners; window.importBanners = importBanners;
    window.resetForm = resetForm; window.saveBanner = saveBanner; window.updatePreview = updatePreview;
  })();
</script>
</body>
</html>
