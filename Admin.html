<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Banner System - Complete Feature</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* Notification Banner Styles */
    .notification-banner {
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      color: #ffffff;
      padding: 15px 0;
      border-bottom: 4px solid #0f3460;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      width: 100%;
      z-index: 999;
      display: none;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .notification-banner.show {
      display: block;
    }

    .notification-content {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: scrollTicker linear infinite;
      animation-duration: 25s;
      font-weight: 500;
      font-size: 1.2rem;
      width: max-content;
    }

    .notification-content i {
      color: #e94560;
      margin: 0 20px;
      font-size: 1.5rem;
    }

    .notification-content span {
      display: inline-flex;
      align-items: center;
      gap: 30px;
      margin-right: 50px;
      padding: 5px 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 30px;
    }

    @keyframes scrollTicker {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-50%); }
    }

    .banner-control {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      padding: 5px 12px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
    }

    .banner-control button {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
      background: rgba(255,255,255,0.15);
    }

    .banner-control button:hover {
      background: #e94560;
      transform: scale(1.1);
    }

    /* Admin Panel Styles */
    .admin-panel {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 800px;
      margin: 30px auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .admin-panel h2 {
      color: #1a1a2e;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
      border-bottom: 3px solid #e94560;
      padding-bottom: 15px;
    }

    .admin-panel h2 i {
      color: #e94560;
    }

    .admin-section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .admin-section h3 {
      color: #16213e;
      margin-bottom: 20px;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      align-items: end;
    }

    .admin-field {
      margin-bottom: 15px;
    }

    .admin-field label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #333;
    }

    .admin-field input, 
    .admin-field select,
    .admin-field textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: 0.3s;
      background: white;
    }

    .admin-field input:focus, 
    .admin-field select:focus,
    .admin-field textarea:focus {
      border-color: #e94560;
      outline: none;
      box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
    }

    .admin-field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .message-input-group {
      display: flex;
      gap: 10px;
    }

    .message-input-group select {
      width: 100px;
      flex-shrink: 0;
    }

    .message-input-group input {
      flex: 1;
    }

    .admin-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
      border: 2px solid transparent;
    }

    .admin-btn:hover {
      background: #d43f57;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(233, 69, 96, 0.3);
    }

    .admin-btn.secondary {
      background: #4a4a4a;
    }

    .admin-btn.secondary:hover {
      background: #333;
    }

    .admin-btn.success {
      background: #2ecc71;
    }

    .admin-btn.success:hover {
      background: #27ae60;
    }

    .admin-btn.warning {
      background: #f39c12;
    }

    .admin-btn.warning:hover {
      background: #e67e22;
    }

    .admin-btn.danger {
      background: #e74c3c;
    }

    .admin-btn.danger:hover {
      background: #c0392b;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    /* Message List Styles */
    .message-list {
      margin-top: 25px;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      overflow: hidden;
    }

    .message-header {
      display: grid;
      grid-template-columns: 1fr 80px;
      background: #e94560;
      color: white;
      padding: 12px 15px;
      font-weight: 600;
    }

    .message-item {
      display: grid;
      grid-template-columns: 1fr 80px;
      padding: 12px 15px;
      border-bottom: 1px solid #e0e0e0;
      background: white;
      align-items: center;
    }

    .message-item:last-child {
      border-bottom: none;
    }

    .message-text {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .message-text i {
      color: #e94560;
      width: 25px;
      font-size: 1.1rem;
    }

    .message-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .message-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .edit-btn {
      color: #3498db;
      background: rgba(52, 152, 219, 0.1);
    }

    .edit-btn:hover {
      background: #3498db;
      color: white;
    }

    .delete-btn {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    .delete-btn:hover {
      background: #e74c3c;
      color: white;
    }

    /* Preview Section */
    .preview-section {
      background: #1a1a2e;
      border-radius: 15px;
      padding: 25px;
      color: white;
      margin-top: 25px;
    }

    .preview-section h3 {
      color: #e94560;
      margin-bottom: 15px;
    }

    .preview-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 8px 15px;
      border-radius: 30px;
      font-size: 14px;
      margin: 5px;
    }

    .preview-badge i {
      color: #e94560;
      margin-right: 5px;
    }

    /* Status Indicators */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .status-badge.active {
      background: #2ecc71;
    }

    .status-badge.paused {
      background: #f39c12;
    }

    .status-badge.hidden {
      background: #e74c3c;
    }

    /* Preview Banner Mini */
    .preview-banner-mini {
      background: linear-gradient(90deg, #1a1a2e, #16213e);
      border-radius: 10px;
      padding: 12px 15px;
      color: white;
      display: flex;
      align-items: center;
      gap: 15px;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .preview-content {
      animation: scrollPreview 20s linear infinite;
    }

    @keyframes scrollPreview {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #1a1a2e;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-panel {
        padding: 20px;
      }

      .message-header, .message-item {
        grid-template-columns: 1fr 60px;
      }

      .button-group {
        flex-direction: column;
      }

      .admin-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- Notification Banner -->
  <div class="notification-banner" id="notificationBanner">
    <div class="notification-content" id="tickerContent">
      <!-- Messages will be dynamically added here -->
    </div>
    <div class="banner-control">
      <button id="pauseBtn" title="Pause/Resume"><i class="fas fa-pause"></i></button>
      <button id="closeBtn" title="Hide Banner"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel">
    <h2>
      <i class="fas fa-cog"></i>
      Notification Banner Admin Control
    </h2>

    <!-- Status Bar -->
    <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
      <div class="status-badge active" id="bannerStatus">
        <i class="fas fa-circle"></i> Banner Active
      </div>
      <div class="status-badge" id="scrollStatus">
        <i class="fas fa-clock"></i> Duration: <span id="durationDisplay">25</span>s
      </div>
      <div class="status-badge" id="messageCount">
        <i class="fas fa-envelope"></i> Messages: <span id="messageCountDisplay">4</span>
      </div>
    </div>

    <!-- Settings Section -->
    <div class="admin-section">
      <h3><i class="fas fa-sliders-h"></i> Banner Settings</h3>
      <div class="admin-grid">
        <div class="admin-field">
          <label>Scroll Duration (seconds) <span style="color: #666; font-weight: normal;">(5-120s)</span></label>
          <input type="number" id="durationInput" min="5" max="120" value="25">
        </div>
        
        <div class="admin-field">
          <label>Banner Visibility</label>
          <div style="display: flex; gap: 10px;">
            <button class="admin-btn success" id="showBannerBtn" style="flex: 1;">
              <i class="fas fa-eye"></i> Show
            </button>
            <button class="admin-btn danger" id="hideBannerBtn" style="flex: 1;">
              <i class="fas fa-eye-slash"></i> Hide
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Message Section -->
    <div class="admin-section">
      <h3><i class="fas fa-plus-circle"></i> Add New Message</h3>
      <div class="message-input-group">
        <select id="messageIcon">
          <option value="fa-bell">🔔 Bell</option>
          <option value="fa-chart-line">📈 Chart</option>
          <option value="fa-wallet">💰 Wallet</option>
          <option value="fa-file-invoice">🧾 Invoice</option>
          <option value="fa-gift">🎁 Gift</option>
          <option value="fa-exclamation-triangle">⚠️ Alert</option>
          <option value="fa-star">⭐ Star</option>
          <option value="fa-fire">🔥 Fire</option>
          <option value="fa-calendar">📅 Calendar</option>
          <option value="fa-credit-card">💳 Card</option>
        </select>
        <input type="text" id="messageText" placeholder="Enter your notification message...">
        <button class="admin-btn" id="addMessageBtn">
          <i class="fas fa-plus"></i> Add
        </button>
      </div>
    </div>

    <!-- Message List -->
    <div class="admin-section">
      <h3><i class="fas fa-list"></i> Current Messages</h3>
      <div class="message-list" id="messageList">
        <div class="message-header">
          <span>Message</span>
          <span style="text-align: center;">Actions</span>
        </div>
        <!-- Messages will be dynamically added here -->
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="admin-section">
      <h3><i class="fas fa-bolt"></i> Quick Actions</h3>
      <div class="button-group">
        <button class="admin-btn success" id="pauseResumeBtn">
          <i class="fas fa-pause"></i> Pause Banner
        </button>
        <button class="admin-btn warning" id="resetBtn">
          <i class="fas fa-undo"></i> Reset to Default
        </button>
        <button class="admin-btn secondary" id="clearAllBtn">
          <i class="fas fa-trash"></i> Clear All Messages
        </button>
        <button class="admin-btn" id="exportSettingsBtn">
          <i class="fas fa-download"></i> Export Settings
        </button>
      </div>
    </div>

    <!-- Preview Section -->
    <div class="preview-section">
      <h3><i class="fas fa-eye"></i> Live Preview</h3>
      <div style="margin-bottom: 15px;">
        <span class="preview-badge"><i class="fas fa-clock"></i> Current Duration: <span id="previewDuration">25</span>s</span>
        <span class="preview-badge"><i class="fas fa-pause-circle" id="previewPauseIcon" style="display: none;"></i> <span id="previewStatus">Running</span></span>
      </div>
      <div class="preview-banner-mini">
        <i class="fas fa-bell" style="color: #e94560;"></i>
        <div class="preview-content" id="previewContent">
          <!-- Preview messages will scroll here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Message Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h3><i class="fas fa-edit"></i> Edit Message</h3>
      <div class="admin-field">
        <label>Icon</label>
        <select id="editIcon" style="width: 100%;">
          <option value="fa-bell">🔔 Bell</option>
          <option value="fa-chart-line">📈 Chart</option>
          <option value="fa-wallet">💰 Wallet</option>
          <option value="fa-file-invoice">🧾 Invoice</option>
          <option value="fa-gift">🎁 Gift</option>
          <option value="fa-exclamation-triangle">⚠️ Alert</option>
        </select>
      </div>
      <div class="admin-field">
        <label>Message Text</label>
        <input type="text" id="editText" placeholder="Enter message">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="admin-btn success" id="saveEditBtn" style="flex: 1;">
          <i class="fas fa-save"></i> Save
        </button>
        <button class="admin-btn secondary" id="cancelEditBtn" style="flex: 1;">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    class NotificationBanner {
      constructor() {
        this.messages = [
          { icon: 'fa-bell', text: '🔔 New feature: Multi-currency support!' },
          { icon: 'fa-chart-line', text: '📈 Your monthly spending is 12% lower' },
          { icon: 'fa-wallet', text: '💰 Demo budget tip: use 50/30/20 rule' },
          { icon: 'fa-file-invoice', text: '🧾 Reconcile your March statement' }
        ];
        
        this.duration = 25;
        this.isPaused = false;
        this.isVisible = true;
        this.currentEditIndex = -1;
        
        this.init();
      }

      init() {
        // Get DOM elements
        this.banner = document.getElementById('notificationBanner');
        this.ticker = document.getElementById('tickerContent');
        this.pauseBtn = document.getElementById('pauseBtn');
        this.closeBtn = document.getElementById('closeBtn');
        
        // Initialize banner
        this.renderMessages();
        this.setupEventListeners();
        this.show();
        this.updateAdminUI();
      }

      setupEventListeners() {
        this.pauseBtn.addEventListener('click', () => this.togglePause());
        this.closeBtn.addEventListener('click', () => this.hide());
        
        // Admin panel events
        document.getElementById('durationInput').addEventListener('change', (e) => {
          const val = parseInt(e.target.value);
          if (val >= 5 && val <= 120) {
            this.setDuration(val);
          } else {
            alert('Duration must be between 5 and 120 seconds');
            e.target.value = this.duration;
          }
        });

        document.getElementById('showBannerBtn').addEventListener('click', () => this.show());
        document.getElementById('hideBannerBtn').addEventListener('click', () => this.hide());
        
        document.getElementById('addMessageBtn').addEventListener('click', () => {
          const icon = document.getElementById('messageIcon').value;
          const text = document.getElementById('messageText').value.trim();
          if (text) {
            this.addMessage(icon, text);
            document.getElementById('messageText').value = '';
          } else {
            alert('Please enter a message');
          }
        });

        document.getElementById('pauseResumeBtn').addEventListener('click', () => this.togglePause());
        
        document.getElementById('resetBtn').addEventListener('click', () => {
          if (confirm('Reset to default messages?')) {
            this.resetToDefault();
          }
        });

        document.getElementById('clearAllBtn').addEventListener('click', () => {
          if (confirm('Delete all messages?')) {
            this.clearAllMessages();
          }
        });

        document.getElementById('exportSettingsBtn').addEventListener('click', () => this.exportSettings());

        // Edit modal
        document.getElementById('saveEditBtn').addEventListener('click', () => this.saveEdit());
        document.getElementById('cancelEditBtn').addEventListener('click', () => this.closeEditModal());
      }

      renderMessages() {
        if (!this.ticker) return;
        
        let html = '';
        // Duplicate messages for seamless loop
        for (let i = 0; i < 2; i++) {
          this.messages.forEach(msg => {
            html += `<span><i class="fas ${msg.icon}"></i> ${msg.text}</span>`;
          });
        }
        this.ticker.innerHTML = html;
        
        // Restart animation
        this.restartAnimation();
        this.updateMessageList();
        this.updatePreview();
      }

      restartAnimation() {
        this.ticker.style.animation = 'none';
        this.ticker.offsetHeight;
        this.ticker.style.animation = `scrollTicker linear infinite`;
        this.ticker.style.animationDuration = this.duration + 's';
        this.ticker.style.animationPlayState = this.isPaused ? 'paused' : 'running';
      }

      setDuration(seconds) {
        this.duration = seconds;
        this.restartAnimation();
        this.updateAdminUI();
      }

      togglePause() {
        this.isPaused = !this.isPaused;
        this.ticker.style.animationPlayState = this.isPaused ? 'paused' : 'running';
        
        const pauseBtn = document.getElementById('pauseResumeBtn');
        pauseBtn.innerHTML = this.isPaused ? 
          '<i class="fas fa-play"></i> Resume Banner' : 
          '<i class="fas fa-pause"></i> Pause Banner';
        
        this.pauseBtn.innerHTML = this.isPaused ? 
          '<i class="fas fa-play"></i>' : 
          '<i class="fas fa-pause"></i>';
        
        this.updateAdminUI();
      }

      show() {
        this.isVisible = true;
        this.banner.classList.add('show');
        this.updateAdminUI();
      }

      hide() {
        this.isVisible = false;
        this.banner.classList.remove('show');
        this.updateAdminUI();
      }

      addMessage(icon, text) {
        this.messages.push({ icon, text });
        this.renderMessages();
        this.updateAdminUI();
      }

      editMessage(index) {
        this.currentEditIndex = index;
        const msg = this.messages[index];
        document.getElementById('editIcon').value = msg.icon;
        document.getElementById('editText').value = msg.text;
        document.getElementById('editModal').classList.add('active');
      }

      saveEdit() {
        if (this.currentEditIndex >= 0) {
          const icon = document.getElementById('editIcon').value;
          const text = document.getElementById('editText').value.trim();
          if (text) {
            this.messages[this.currentEditIndex] = { icon, text };
            this.renderMessages();
            this.closeEditModal();
            this.updateAdminUI();
          }
        }
      }

      closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        this.currentEditIndex = -1;
      }

      deleteMessage(index) {
        if (confirm('Delete this message?')) {
          this.messages.splice(index, 1);
          this.renderMessages();
          this.updateAdminUI();
        }
      }

      clearAllMessages() {
        this.messages = [];
        this.renderMessages();
        this.updateAdminUI();
      }

      resetToDefault() {
        this.messages = [
          { icon: 'fa-bell', text: '🔔 New feature: Multi-currency support!' },
          { icon: 'fa-chart-line', text: '📈 Your monthly spending is 12% lower' },
          { icon: 'fa-wallet', text: '💰 Demo budget tip: use 50/30/20 rule' },
          { icon: 'fa-file-invoice', text: '🧾 Reconcile your March statement' }
        ];
        this.duration = 25;
        this.isPaused = false;
        this.isVisible = true;
        
        this.renderMessages();
        this.show();
        this.updateAdminUI();
        
        document.getElementById('durationInput').value = 25;
        document.getElementById('pauseResumeBtn').innerHTML = '<i class="fas fa-pause"></i> Pause Banner';
        this.pauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
      }

      exportSettings() {
        const settings = {
          messages: this.messages,
          duration: this.duration,
          isPaused: this.isPaused,
          isVisible: this.isVisible,
          exportedAt: new Date().toISOString()
        };
        
        const blob = new Blob([JSON.stringify(settings, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `banner-settings-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      updateMessageList() {
        const list = document.getElementById('messageList');
        let html = '<div class="message-header"><span>Message</span><span style="text-align: center;">Actions</span></div>';
        
        this.messages.forEach((msg, index) => {
          html += `
            <div class="message-item">
              <div class="message-text">
                <i class="fas ${msg.icon}"></i>
                <span>${msg.text}</span>
              </div>
              <div class="message-actions">
                <button class="edit-btn" onclick="banner.editMessage(${index})">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="delete-btn" onclick="banner.deleteMessage(${index})">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        });
        
        list.innerHTML = html;
      }

      updatePreview() {
        const preview = document.getElementById('previewContent');
        let html = '';
        this.messages.forEach(msg => {
          html += `<i class="fas ${msg.icon}" style="margin: 0 15px; color: #e94560;"></i> ${msg.text} &nbsp;&nbsp;&nbsp;`;
        });
        preview.innerHTML = html;
        
        document.getElementById('previewDuration').textContent = this.duration;
        document.getElementById('durationDisplay').textContent = this.duration;
        
        const previewPauseIcon = document.getElementById('previewPauseIcon');
        const previewStatus = document.getElementById('previewStatus');
        
        if (this.isPaused) {
          previewPauseIcon.style.display = 'inline-block';
          previewStatus.textContent = 'Paused';
        } else {
          previewPauseIcon.style.display = 'none';
          previewStatus.textContent = 'Running';
        }
      }

      updateAdminUI() {
        document.getElementById('messageCountDisplay').textContent = this.messages.length;
        document.getElementById('durationInput').value = this.duration;
        
        const bannerStatus = document.getElementById('bannerStatus');
        bannerStatus.className = `status-badge ${this.isVisible ? 'active' : 'hidden'}`;
        bannerStatus.innerHTML = `<i class="fas fa-circle"></i> Banner ${this.isVisible ? 'Active' : 'Hidden'}`;
        
        const scrollStatus = document.getElementById('scrollStatus');
        scrollStatus.className = `status-badge ${this.isPaused ? 'paused' : 'active'}`;
        scrollStatus.innerHTML = `<i class="fas fa-clock"></i> ${this.isPaused ? 'Paused' : 'Running'} · ${this.duration}s`;
      }
    }

    // Initialize banner when page loads
    let banner;
    window.addEventListener('load', () => {
      banner = new NotificationBanner();
      window.banner = banner; // Make globally accessible for button clicks
    });
  </script>
</body>
</html>
