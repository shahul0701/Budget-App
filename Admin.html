<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Admin Panel - Budget App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6200ee;
      --primary-light: #f3e5f5;
      --secondary: #03dac6;
      --dark: #1a1a1a;
      --light: #ffffff;
      --gray: #f5f5f5;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
      --info: #2196f3;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .admin-header {
      background: var(--light);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .admin-header h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--dark);
      font-size: 24px;
    }

    .admin-header h1 i {
      color: var(--primary);
    }

    .admin-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--primary);
      color: var(--light);
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid transparent;
    }

    .btn:hover {
      background: #4a00c8;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border-color: var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    .btn-success {
      background: var(--success);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--light);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 15px;
      transition: transform 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--primary);
    }

    .stat-info h3 {
      font-size: 28px;
      margin-bottom: 5px;
      color: var(--dark);
    }

    .stat-info p {
      color: #666;
      font-size: 14px;
    }

    /* Banner Form */
    .banner-form-container {
      background: var(--light);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .banner-form-container h2 {
      margin-bottom: 20px;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--dark);
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(98, 0, 238, 0.1);
    }

    .form-group input[type="color"] {
      height: 50px;
      padding: 5px;
    }

    .form-group input[type="datetime-local"] {
      color: #666;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin-bottom: 0;
      cursor: pointer;
    }

    /* Banner Preview */
    .preview-section {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 15px;
      padding: 30px;
      margin: 20px 0;
    }

    .preview-section h3 {
      margin-bottom: 15px;
      color: var(--dark);
    }

    .banner-preview {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .preview-banner {
      max-width: 600px;
      margin: 0 auto;
      animation: slideDown 0.5s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .preview-banner .banner {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      padding: 16px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
      position: relative;
      box-shadow: 0 10px 30px rgba(98, 0, 238, 0.3);
    }

    .preview-banner .banner-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .preview-banner .banner-content {
      flex: 1;
    }

    .preview-banner .banner-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .preview-banner .banner-message {
      font-size: 14px;
      opacity: 0.9;
    }

    .preview-banner .banner-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .preview-banner .banner-close:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: rotate(90deg);
    }

    .preview-banner .banner.info {
      background: linear-gradient(135deg, var(--info), #64b5f6);
    }
    
    .preview-banner .banner.success {
      background: linear-gradient(135deg, var(--success), #81c784);
    }
    
    .preview-banner .banner.warning {
      background: linear-gradient(135deg, var(--warning), #ffb74d);
    }
    
    .preview-banner .banner.danger {
      background: linear-gradient(135deg, var(--danger), #e57373);
    }

    /* Banners List */
    .banners-list-container {
      background: var(--light);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .banners-list-container h2 {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .banners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .banner-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      border: 1px solid #eee;
      transition: transform 0.3s;
    }

    .banner-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .banner-card-header {
      padding: 15px;
      background: var(--primary);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .banner-card-header.info { background: var(--info); }
    .banner-card-header.success { background: var(--success); }
    .banner-card-header.warning { background: var(--warning); }
    .banner-card-header.danger { background: var(--danger); }

    .banner-type-badge {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      text-transform: capitalize;
    }

    .banner-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    .status-dot.inactive {
      background: #f44336;
    }

    .banner-card-body {
      padding: 20px;
    }

    .banner-preview-mini {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .banner-preview-mini .mini-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .banner-details {
      margin: 15px 0;
      font-size: 13px;
    }

    .banner-details p {
      margin: 5px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
    }

    .banner-details i {
      width: 16px;
      color: var(--primary);
    }

    .banner-stats {
      display: flex;
      gap: 15px;
      margin: 15px 0;
      padding: 10px 0;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
    }

    .stat-item {
      text-align: center;
      flex: 1;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--dark);
    }

    .stat-label {
      font-size: 11px;
      color: #666;
    }

    .banner-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }

    .action-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.2s;
    }

    .action-btn.edit {
      background: var(--primary-light);
      color: var(--primary);
    }

    .action-btn.delete {
      background: #ffebee;
      color: var(--danger);
    }

    .action-btn.toggle {
      background: #e8f5e9;
      color: var(--success);
    }

    .action-btn.stats {
      background: #e3f2fd;
      color: var(--info);
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    /* Analytics Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .close-modal:hover {
      background: #f5f5f5;
      transform: rotate(90deg);
    }

    /* Analytics Charts */
    .analytics-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 20px 0;
    }

    .analytics-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .analytics-card h4 {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .analytics-card .number {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }

    .chart-container {
      height: 300px;
      margin: 20px 0;
    }

    /* Toast Notification */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
    }

    .toast {
      background: white;
      border-radius: 10px;
      padding: 15px 20px;
      margin-bottom: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease;
      border-left: 4px solid;
    }

    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--danger); }
    .toast.warning { border-left-color: var(--warning); }
    .toast.info { border-left-color: var(--primary); }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        text-align: center;
      }
      
      .banners-grid {
        grid-template-columns: 1fr;
      }
      
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .analytics-stats {
        grid-template-columns: 1fr;
      }
      
      .modal-content {
        width: 95%;
        padding: 20px;
      }
    }

    /* Schedule Indicator */
    .schedule-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 30px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 5px;
    }
    
    .schedule-badge.scheduled {
      background: #fff3e0;
      color: #f57c00;
    }
    
    .schedule-badge.expired {
      background: #ffebee;
      color: #f44336;
    }
    
    .schedule-badge.active {
      background: #e8f5e9;
      color: #4caf50;
    }

    /* Main App Link */
    .main-app-link {
      background: var(--success);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .main-app-link:hover {
      background: #3d8b40;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Admin Header -->
    <div class="admin-header">
      <h1>
        <i class="fas fa-flag"></i>
        Banner Management System
      </h1>
      <div class="admin-actions">
        <a href="index.html" class="main-app-link" target="_blank">
          <i class="fas fa-external-link-alt"></i> View Main App
        </a>
        <button class="btn btn-outline" onclick="exportBanners()">
          <i class="fas fa-download"></i> Export
        </button>
        <button class="btn btn-outline" onclick="importBanners()">
          <i class="fas fa-upload"></i> Import
        </button>
        <button class="btn" onclick="document.getElementById('bannerForm').scrollIntoView({behavior: 'smooth'})">
          <i class="fas fa-plus"></i> Create Banner
        </button>
      </div>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-flag"></i>
        </div>
        <div class="stat-info">
          <h3 id="totalBanners">0</h3>
          <p>Total Banners</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-eye"></i>
        </div>
        <div class="stat-info">
          <h3 id="totalViews">0</h3>
          <p>Total Views</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-mouse-pointer"></i>
        </div>
        <div class="stat-info">
          <h3 id="totalClicks">0</h3>
          <p>Total Clicks</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-percent"></i>
        </div>
        <div class="stat-info">
          <h3 id="avgCTR">0%</h3>
          <p>Avg. CTR</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-clock"></i>
        </div>
        <div class="stat-info">
          <h3 id="activeBanners">0</h3>
          <p>Active Now</p>
        </div>
      </div>
    </div>

    <!-- Banner Creation Form -->
    <div class="banner-form-container" id="bannerForm">
      <h2>
        <i class="fas fa-plus-circle"></i>
        Create New Banner
      </h2>
      
      <div class="form-grid">
        <div>
          <div class="form-group">
            <label>Banner Type</label>
            <select id="bannerType" onchange="updatePreview()">
              <option value="info">Information</option>
              <option value="success">Success</option>
              <option value="warning">Warning</option>
              <option value="danger">Danger</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="bannerTitle" placeholder="Enter banner title" value="Special Announcement!" oninput="updatePreview()">
          </div>
          
          <div class="form-group">
            <label>Message</label>
            <textarea id="bannerMessage" rows="3" placeholder="Enter banner message" oninput="updatePreview()">Check out our new features and updates!</textarea>
          </div>
          
          <div class="form-group">
            <label>Icon</label>
            <select id="bannerIcon" onchange="updatePreview()">
              <option value="fa-bell">Bell</option>
              <option value="fa-check-circle">Check Circle</option>
              <option value="fa-exclamation-circle">Exclamation Circle</option>
              <option value="fa-exclamation-triangle">Warning Triangle</option>
              <option value="fa-info-circle">Info Circle</option>
              <option value="fa-star">Star</option>
              <option value="fa-gift">Gift</option>
              <option value="fa-rocket">Rocket</option>
              <option value="fa-fire">Fire</option>
            </select>
          </div>
        </div>
        
        <div>
          <div class="form-group">
            <label>Custom Background (Gradient)</label>
            <select id="gradientPreset" onchange="updatePreview()">
              <option value="primary">Primary Gradient</option>
              <option value="secondary">Secondary Gradient</option>
              <option value="sunset">Sunset</option>
              <option value="ocean">Ocean</option>
              <option value="forest">Forest</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          
          <div class="form-group" id="customColors" style="display: none;">
            <label>Start Color</label>
            <input type="color" id="gradientStart" value="#6200ee" onchange="updatePreview()">
            <label style="margin-top: 10px;">End Color</label>
            <input type="color" id="gradientEnd" value="#03dac6" onchange="updatePreview()">
          </div>
          
          <div class="form-group">
            <label>Duration (seconds)</label>
            <input type="number" id="bannerDuration" min="1" max="60" value="5" onchange="updatePreview()">
          </div>
          
          <div class="form-group">
            <label>Display Position</label>
            <select id="bannerPosition">
              <option value="top">Top (Below Navbar)</option>
              <option value="bottom">Bottom</option>
            </select>
          </div>
          
          <div class="form-group checkbox-group">
            <input type="checkbox" id="isActive" checked>
            <label for="isActive">Active (Show immediately)</label>
          </div>
        </div>
      </div>
      
      <!-- Schedule Settings -->
      <div style="margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee;">
        <h3 style="margin-bottom: 15px;">Schedule Settings (Optional)</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Start Date & Time</label>
            <input type="datetime-local" id="scheduleStart">
          </div>
          <div class="form-group">
            <label>End Date & Time</label>
            <input type="datetime-local" id="scheduleEnd">
          </div>
        </div>
      </div>
      
      <!-- Live Preview -->
      <div class="preview-section">
        <h3>Live Preview</h3>
        <div class="banner-preview">
          <div class="preview-banner" id="livePreview"></div>
        </div>
      </div>
      
      <!-- Form Actions -->
      <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px;">
        <button class="btn btn-outline" onclick="resetForm()">
          <i class="fas fa-undo"></i> Reset
        </button>
        <button class="btn btn-success" onclick="saveBanner()">
          <i class="fas fa-save"></i> Save Banner
        </button>
      </div>
    </div>
    
    <!-- Banners List -->
    <div class="banners-list-container">
      <h2>
        <i class="fas fa-list"></i>
        Manage Banners
        <span style="font-size: 14px; font-weight: normal; margin-left: 10px; color: #666;" id="bannerCount"></span>
      </h2>
      
      <!-- Filter Bar -->
      <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
        <select id="filterType" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd;">
          <option value="all">All Types</option>
          <option value="info">Info</option>
          <option value="success">Success</option>
          <option value="warning">Warning</option>
          <option value="danger">Danger</option>
        </select>
        
        <select id="filterStatus" style="padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd;">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="scheduled">Scheduled</option>
          <option value="expired">Expired</option>
        </select>
        
        <input type="text" id="searchBanner" placeholder="Search banners..." style="flex: 1; padding: 8px 15px; border-radius: 8px; border: 1px solid #ddd;">
      </div>
      
      <!-- Banners Grid -->
      <div class="banners-grid" id="bannersGrid">
        <!-- Banners will be loaded here dynamically -->
      </div>
    </div>
  </div>
  
  <!-- Analytics Modal -->
  <div class="modal" id="analyticsModal">
    <div class="modal-content">
      <button class="close-modal" onclick="closeAnalytics()">&times;</button>
      <h2 style="margin-bottom: 20px;">Banner Analytics</h2>
      
      <div class="analytics-stats" id="analyticsStats">
        <!-- Analytics stats will be populated here -->
      </div>
      
      <div class="chart-container">
        <canvas id="analyticsChart"></canvas>
      </div>
      
      <div style="margin-top: 20px;">
        <h3>Performance Details</h3>
        <table style="width: 100%; margin-top: 15px; border-collapse: collapse;">
          <thead>
            <tr style="border-bottom: 2px solid #eee;">
              <th style="text-align: left; padding: 10px;">Date</th>
              <th style="text-align: right; padding: 10px;">Views</th>
              <th style="text-align: right; padding: 10px;">Clicks</th>
              <th style="text-align: right; padding: 10px;">CTR</th>
            </tr>
          </thead>
          <tbody id="analyticsTable">
            <!-- Analytics table data -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Banner Service - Shared between admin and main app
    class BannerService {
      constructor() {
        this.banners = [];
        this.storageKey = 'banners';
        this.listeners = [];
        this.loadBanners();
      }

      // Load banners from localStorage
      loadBanners() {
        const saved = localStorage.getItem(this.storageKey);
        if (saved) {
          try {
            this.banners = JSON.parse(saved);
          } catch (e) {
            this.banners = [];
          }
        } else {
          // Default banners if none exist
          this.banners = [
            {
              id: 'default-1',
              type: 'info',
              title: 'Welcome to Budget App!',
              message: 'Take control of your finances today',
              icon: 'fa-info-circle',
              duration: 5,
              position: 'top',
              active: true,
              views: 0,
              clicks: 0,
              createdAt: new Date().toISOString(),
              gradient: 'primary'
            },
            {
              id: 'default-2',
              type: 'success',
              title: 'New Feature Available',
              message: 'Check out our new reporting tools',
              icon: 'fa-rocket',
              duration: 4,
              position: 'top',
              active: true,
              views: 0,
              clicks: 0,
              createdAt: new Date().toISOString(),
              gradient: 'secondary'
            }
          ];
          this.saveBanners();
        }
        return this.banners;
      }

      // Save banners to localStorage
      saveBanners() {
        localStorage.setItem(this.storageKey, JSON.stringify(this.banners));
        this.notifyListeners();
      }

      // Get all active banners based on current time and status
      getActiveBanners() {
        const now = new Date();
        return this.banners.filter(banner => {
          // Check if banner is active
          if (!banner.active) return false;

          // Check schedule if exists
          if (banner.scheduleStart) {
            const startDate = new Date(banner.scheduleStart);
            if (startDate > now) return false;
          }

          if (banner.scheduleEnd) {
            const endDate = new Date(banner.scheduleEnd);
            if (endDate < now) return false;
          }

          return true;
        });
      }

      // Track banner view
      trackView(bannerId) {
        const banner = this.banners.find(b => b.id === bannerId);
        if (banner) {
          banner.views = (banner.views || 0) + 1;
          this.saveBanners();
        }
      }

      // Track banner click
      trackClick(bannerId) {
        const banner = this.banners.find(b => b.id === bannerId);
        if (banner) {
          banner.clicks = (banner.clicks || 0) + 1;
          this.saveBanners();
        }
      }

      // Add listener for banner changes
      addListener(callback) {
        this.listeners.push(callback);
        callback(this.getActiveBanners());
      }

      // Notify all listeners of changes
      notifyListeners() {
        const activeBanners = this.getActiveBanners();
        this.listeners.forEach(callback => callback(activeBanners));
      }

      // Get banner by ID
      getBanner(id) {
        return this.banners.find(b => b.id === id);
      }

      // Create new banner
      createBanner(bannerData) {
        const newBanner = {
          id: Date.now().toString(),
          ...bannerData,
          views: 0,
          clicks: 0,
          createdAt: new Date().toISOString()
        };
        this.banners.push(newBanner);
        this.saveBanners();
        return newBanner;
      }

      // Update banner
      updateBanner(id, bannerData) {
        const index = this.banners.findIndex(b => b.id === id);
        if (index !== -1) {
          this.banners[index] = { ...this.banners[index], ...bannerData };
          this.saveBanners();
        }
      }

      // Delete banner
      deleteBanner(id) {
        this.banners = this.banners.filter(b => b.id !== id);
        this.saveBanners();
      }
    }

    // Create global instance
    const bannerService = new BannerService();
    
    // Banner Data Store
    let banners = bannerService.banners;
    let currentEditId = null;
    let chart = null;
    
    // Update statistics
    function updateStats() {
      const total = banners.length;
      const totalViews = banners.reduce((sum, b) => sum + (b.views || 0), 0);
      const totalClicks = banners.reduce((sum, b) => sum + (b.clicks || 0), 0);
      const avgCTR = totalViews > 0 ? ((totalClicks / totalViews) * 100).toFixed(1) : 0;
      const activeNow = bannerService.getActiveBanners().length;
      
      document.getElementById('totalBanners').textContent = total;
      document.getElementById('totalViews').textContent = totalViews.toLocaleString();
      document.getElementById('totalClicks').textContent = totalClicks.toLocaleString();
      document.getElementById('avgCTR').textContent = avgCTR + '%';
      document.getElementById('activeBanners').textContent = activeNow;
      document.getElementById('bannerCount').textContent = `(${total} banners, ${activeNow} active)`;
    }
    
    // Update live preview
    function updatePreview() {
      const type = document.getElementById('bannerType').value;
      const title = document.getElementById('bannerTitle').value || 'Banner Title';
      const message = document.getElementById('bannerMessage').value || 'Banner message';
      const icon = document.getElementById('bannerIcon').value;
      const gradientPreset = document.getElementById('gradientPreset').value;
      
      // Show/hide custom colors
      document.getElementById('customColors').style.display = gradientPreset === 'custom' ? 'block' : 'none';
      
      const preview = document.getElementById('livePreview');
      
      let gradientStyle = '';
      if (gradientPreset === 'custom') {
        const start = document.getElementById('gradientStart').value;
        const end = document.getElementById('gradientEnd').value;
        gradientStyle = `background: linear-gradient(135deg, ${start}, ${end});`;
      } else {
        // Use preset gradients
        const gradients = {
          primary: 'linear-gradient(135deg, #6200ee, #03dac6)',
          secondary: 'linear-gradient(135deg, #f093fb, #f5576c)',
          sunset: 'linear-gradient(135deg, #ff6b6b, #feca57)',
          ocean: 'linear-gradient(135deg, #48c6ef, #6f86d6)',
          forest: 'linear-gradient(135deg, #11998e, #38ef7d)'
        };
        gradientStyle = `background: ${gradients[gradientPreset] || gradients.primary};`;
      }
      
      preview.innerHTML = `
        <div class="banner ${type}" style="${gradientStyle}">
          <div class="banner-icon">
            <i class="fas ${icon}"></i>
          </div>
          <div class="banner-content">
            <div class="banner-title">${title}</div>
            <div class="banner-message">${message}</div>
          </div>
          <button class="banner-close" onclick="event.stopPropagation()">
            <i class="fas fa-times"></i>
          </button>
        </div>
      `;
    }
    
    // Reset form
    function resetForm() {
      document.getElementById('bannerType').value = 'info';
      document.getElementById('bannerTitle').value = 'Special Announcement!';
      document.getElementById('bannerMessage').value = 'Check out our new features and updates!';
      document.getElementById('bannerIcon').value = 'fa-bell';
      document.getElementById('gradientPreset').value = 'primary';
      document.getElementById('bannerDuration').value = '5';
      document.getElementById('bannerPosition').value = 'top';
      document.getElementById('isActive').checked = true;
      document.getElementById('scheduleStart').value = '';
      document.getElementById('scheduleEnd').value = '';
      document.getElementById('customColors').style.display = 'none';
      currentEditId = null;
      updatePreview();
    }
    
    // Save banner
    function saveBanner() {
      const bannerData = {
        id: currentEditId || Date.now().toString(),
        type: document.getElementById('bannerType').value,
        title: document.getElementById('bannerTitle').value,
        message: document.getElementById('bannerMessage').value,
        icon: document.getElementById('bannerIcon').value,
        gradient: document.getElementById('gradientPreset').value,
        customColors: document.getElementById('gradientPreset').value === 'custom' ? {
          start: document.getElementById('gradientStart').value,
          end: document.getElementById('gradientEnd').value
        } : null,
        duration: parseInt(document.getElementById('bannerDuration').value),
        position: document.getElementById('bannerPosition').value,
        active: document.getElementById('isActive').checked,
        scheduleStart: document.getElementById('scheduleStart').value || null,
        scheduleEnd: document.getElementById('scheduleEnd').value || null,
        views: currentEditId ? (banners.find(b => b.id === currentEditId)?.views || 0) : 0,
        clicks: currentEditId ? (banners.find(b => b.id === currentEditId)?.clicks || 0) : 0,
        createdAt: currentEditId ? (banners.find(b => b.id === currentEditId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
      };
      
      if (currentEditId) {
        // Update existing banner
        bannerService.updateBanner(currentEditId, bannerData);
        showToast('success', 'Banner Updated', 'Banner has been updated successfully');
      } else {
        // Create new banner
        bannerService.createBanner(bannerData);
        showToast('success', 'Banner Created', 'New banner has been created successfully');
      }
      
      // Refresh banners from service
      banners = bannerService.banners;
      
      resetForm();
      renderBanners();
      updateStats();
    }
    
    // Edit banner
    function editBanner(id) {
      const banner = banners.find(b => b.id === id);
      if (!banner) return;
      
      currentEditId = id;
      document.getElementById('bannerType').value = banner.type;
      document.getElementById('bannerTitle').value = banner.title;
      document.getElementById('bannerMessage').value = banner.message;
      document.getElementById('bannerIcon').value = banner.icon;
      document.getElementById('gradientPreset').value = banner.gradient || 'primary';
      document.getElementById('bannerDuration').value = banner.duration;
      document.getElementById('bannerPosition').value = banner.position;
      document.getElementById('isActive').checked = banner.active;
      document.getElementById('scheduleStart').value = banner.scheduleStart || '';
      document.getElementById('scheduleEnd').value = banner.scheduleEnd || '';
      
      if (banner.customColors) {
        document.getElementById('gradientStart').value = banner.customColors.start;
        document.getElementById('gradientEnd').value = banner.customColors.end;
      }
      
      updatePreview();
      document.getElementById('bannerForm').scrollIntoView({behavior: 'smooth'});
    }
    
    // Delete banner
    function deleteBanner(id) {
      if (confirm('Are you sure you want to delete this banner?')) {
        bannerService.deleteBanner(id);
        banners = bannerService.banners;
        showToast('success', 'Banner Deleted', 'Banner has been deleted successfully');
        renderBanners();
        updateStats();
      }
    }
    
    // Toggle banner status
    function toggleBanner(id) {
      const banner = banners.find(b => b.id === id);
      if (banner) {
        banner.active = !banner.active;
        bannerService.updateBanner(id, { active: banner.active });
        showToast('info', 'Status Updated', `Banner is now ${banner.active ? 'active' : 'inactive'}`);
        renderBanners();
        updateStats();
      }
    }
    
    // View analytics
    function viewAnalytics(id) {
      const banner = banners.find(b => b.id === id);
      if (!banner) return;
      
      // Populate analytics stats
      const stats = document.getElementById('analyticsStats');
      stats.innerHTML = `
        <div class="analytics-card">
          <h4>Total Views</h4>
          <div class="number">${banner.views || 0}</div>
        </div>
        <div class="analytics-card">
          <h4>Total Clicks</h4>
          <div class="number">${banner.clicks || 0}</div>
        </div>
        <div class="analytics-card">
          <h4>Click-through Rate</h4>
          <div class="number">${banner.views > 0 ? ((banner.clicks / banner.views) * 100).toFixed(1) : 0}%</div>
        </div>
        <div class="analytics-card">
          <h4>Conversion Rate</h4>
          <div class="number">${banner.views > 0 ? ((banner.clicks / banner.views) * 100 * 0.8).toFixed(1) : 0}%</div>
        </div>
      `;
      
      // Populate analytics table
      const table = document.getElementById('analyticsTable');
      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      let tableHtml = '';
      
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const views = Math.floor((banner.views || 0) / 7 * (0.8 + Math.random() * 0.4));
        const clicks = Math.floor(views * 0.1 * (0.5 + Math.random()));
        const ctr = ((clicks / views) * 100).toFixed(1);
        
        tableHtml += `
          <tr>
            <td style="padding: 10px;">${date.toLocaleDateString()}</td>
            <td style="text-align: right; padding: 10px;">${views}</td>
            <td style="text-align: right; padding: 10px;">${clicks}</td>
            <td style="text-align: right; padding: 10px;">${ctr}%</td>
          </tr>
        `;
      }
      table.innerHTML = tableHtml;
      
      // Create/update chart
      if (chart) chart.destroy();
      
      const ctx = document.getElementById('analyticsChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
          datasets: [
            {
              label: 'Views',
              data: [120, 150, 180, 140, 200, 250, 210],
              borderColor: '#6200ee',
              backgroundColor: 'rgba(98, 0, 238, 0.1)',
              tension: 0.3,
              fill: true
            },
            {
              label: 'Clicks',
              data: [12, 18, 22, 15, 25, 30, 28],
              borderColor: '#4caf50',
              backgroundColor: 'rgba(76, 175, 80, 0.1)',
              tension: 0.3,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' }
          },
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
      
      document.getElementById('analyticsModal').classList.add('active');
    }
    
    // Close analytics modal
    function closeAnalytics() {
      document.getElementById('analyticsModal').classList.remove('active');
    }
    
    // Render banners
    function renderBanners() {
      const filterType = document.getElementById('filterType').value;
      const filterStatus = document.getElementById('filterStatus').value;
      const searchTerm = document.getElementById('searchBanner').value.toLowerCase();
      
      let filteredBanners = banners.filter(banner => {
        // Type filter
        if (filterType !== 'all' && banner.type !== filterType) return false;
        
        // Status filter
        if (filterStatus !== 'all') {
          const now = new Date();
          const isActive = banner.active;
          const isScheduled = banner.scheduleStart && new Date(banner.scheduleStart) > now;
          const isExpired = banner.scheduleEnd && new Date(banner.scheduleEnd) < now;
          
          if (filterStatus === 'active' && (!isActive || isScheduled || isExpired)) return false;
          if (filterStatus === 'inactive' && isActive) return false;
          if (filterStatus === 'scheduled' && !isScheduled) return false;
          if (filterStatus === 'expired' && !isExpired) return false;
        }
        
        // Search
        if (searchTerm && !banner.title.toLowerCase().includes(searchTerm) && 
            !banner.message.toLowerCase().includes(searchTerm)) {
          return false;
        }
        
        return true;
      });
      
      const grid = document.getElementById('bannersGrid');
      
      if (filteredBanners.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 50px; background: #f8f9fa; border-radius: 12px;">
            <i class="fas fa-flag" style="font-size: 48px; color: #ccc; margin-bottom: 15px;"></i>
            <h3 style="color: #666;">No banners found</h3>
            <p style="color: #999; margin-bottom: 20px;">Try adjusting your filters or create a new banner</p>
            <button class="btn" onclick="resetForm()">
              <i class="fas fa-plus"></i> Create Banner
            </button>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = filteredBanners.map(banner => {
        const now = new Date();
        const isScheduled = banner.scheduleStart && new Date(banner.scheduleStart) > now;
        const isExpired = banner.scheduleEnd && new Date(banner.scheduleEnd) < now;
        const status = banner.active && !isScheduled && !isExpired ? 'active' : 'inactive';
        const ctr = banner.views > 0 ? ((banner.clicks / banner.views) * 100).toFixed(1) : 0;
        
        let scheduleBadge = '';
        if (isScheduled) {
          scheduleBadge = '<span class="schedule-badge scheduled"><i class="far fa-clock"></i> Scheduled</span>';
        } else if (isExpired) {
          scheduleBadge = '<span class="schedule-badge expired"><i class="fas fa-hourglass-end"></i> Expired</span>';
        }
        
        return `
          <div class="banner-card">
            <div class="banner-card-header ${banner.type}">
              <span class="banner-type-badge">
                <i class="fas ${banner.icon}"></i> ${banner.type}
              </span>
              <span class="banner-status">
                <span class="status-dot ${status}"></span>
                ${status}
                ${scheduleBadge}
              </span>
            </div>
            <div class="banner-card-body">
              <div class="banner-preview-mini" style="background: linear-gradient(135deg, var(--${banner.type}), #${banner.type === 'success' ? '4caf50' : 'f44336'})">
                <div class="mini-title"><i class="fas ${banner.icon}"></i> ${banner.title}</div>
                <div style="font-size: 11px; opacity: 0.9;">${banner.message.substring(0, 40)}${banner.message.length > 40 ? '...' : ''}</div>
              </div>
              
              <div class="banner-details">
                <p><i class="fas fa-calendar"></i> Created: ${new Date(banner.createdAt).toLocaleDateString()}</p>
                <p><i class="fas fa-clock"></i> Duration: ${banner.duration}s</p>
                <p><i class="fas fa-arrows-alt"></i> Position: ${banner.position}</p>
                ${banner.scheduleStart ? `<p><i class="fas fa-play"></i> Start: ${new Date(banner.scheduleStart).toLocaleString()}</p>` : ''}
                ${banner.scheduleEnd ? `<p><i class="fas fa-stop"></i> End: ${new Date(banner.scheduleEnd).toLocaleString()}</p>` : ''}
              </div>
              
              <div class="banner-stats">
                <div class="stat-item">
                  <div class="stat-value">${banner.views || 0}</div>
                  <div class="stat-label">Views</div>
                </div>
                <div class="stat-item">
                  <div class="stat-value">${banner.clicks || 0}</div>
                  <div class="stat-label">Clicks</div>
                </div>
                <div class="stat-item">
                  <div class="stat-value">${ctr}%</div>
                  <div class="stat-label">CTR</div>
                </div>
              </div>
              
              <div class="banner-card-actions">
                <button class="action-btn edit" onclick="editBanner('${banner.id}')">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="action-btn toggle" onclick="toggleBanner('${banner.id}')">
                  <i class="fas ${banner.active ? 'fa-pause' : 'fa-play'}"></i>
                  ${banner.active ? 'Pause' : 'Activate'}
                </button>
                <button class="action-btn stats" onclick="viewAnalytics('${banner.id}')">
                  <i class="fas fa-chart-bar"></i> Stats
                </button>
                <button class="action-btn delete" onclick="deleteBanner('${banner.id}')">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Show toast notification
    function showToast(type, title, message) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
      };
      
      toast.innerHTML = `
        <i class="fas ${icons[type]}"></i>
        <div style="flex: 1;">
          <div style="font-weight: 600; margin-bottom: 3px;">${title}</div>
          <div style="font-size: 13px; color: #666;">${message}</div>
        </div>
        <div class="toast-close" onclick="this.parentElement.remove()" style="cursor: pointer; padding: 5px;">
          <i class="fas fa-times"></i>
        </div>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentElement) {
          toast.style.animation = 'slideIn 0.3s reverse';
          setTimeout(() => toast.remove(), 300);
        }
      }, 5000);
    }
    
    // Export banners
    function exportBanners() {
      const dataStr = JSON.stringify(banners, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
      const exportFileDefaultName = `banners_export_${new Date().toISOString().slice(0,10)}.json`;
      
      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
      
      showToast('success', 'Export Complete', `Exported ${banners.length} banners to JSON`);
    }
    
    // Import banners
    function importBanners() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      
      input.onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
          try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
              imported.forEach(banner => {
                bannerService.createBanner(banner);
              });
              banners = bannerService.banners;
              showToast('success', 'Import Complete', `Imported ${imported.length} banners`);
              renderBanners();
              updateStats();
            } else {
              showToast('error', 'Import Failed', 'Invalid file format');
            }
          } catch (error) {
            showToast('error', 'Import Failed', 'Error parsing file');
          }
        };
        
        reader.readAsText(file);
      };
      
      input.click();
    }
    
    // Event listeners
    document.getElementById('filterType').addEventListener('change', renderBanners);
    document.getElementById('filterStatus').addEventListener('change', renderBanners);
    document.getElementById('searchBanner').addEventListener('input', renderBanners);
    
    // Initialize
    banners = bannerService.banners;
    updateStats();
    renderBanners();
    updatePreview();
    
    // Make functions globally available
