<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Notification Banner Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4361ee;
      --secondary: #3f37c9;
      --success: #4cc9f0;
      --danger: #f72585;
      --warning: #f8961e;
      --info: #4895ef;
      --dark: #1a1a2e;
      --light: #f8f9fa;
      --gray: #adb5bd;
      --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    /* Notification Banner Styles */
    .notification-banner {
      background: var(--gradient);
      color: white;
      padding: 15px 0;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-radius: 12px;
      margin-bottom: 30px;
      display: none;
    }

    .notification-banner.show {
      display: block;
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .notification-content {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: scrollTicker linear infinite;
      font-weight: 500;
      font-size: 1.1rem;
      width: max-content;
    }

    .notification-content span {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      margin-right: 40px;
      padding: 8px 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .notification-content i {
      font-size: 1.3rem;
      filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
    }

    @keyframes scrollTicker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .banner-control {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.3);
      padding: 8px 15px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .banner-control button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .banner-control button:hover {
      background: var(--danger);
      transform: scale(1.1) rotate(360deg);
    }

    /* Admin Panel Styles */
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .admin-header {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .admin-header h1 {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 32px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .admin-header h1 i {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 40px;
    }

    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
      transition: transform 0.3s;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: var(--gradient);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .stat-icon {
      width: 50px;
      height: 50px;
      background: var(--gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      margin-bottom: 15px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .stat-label {
      color: var(--gray);
      font-size: 14px;
      font-weight: 500;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 30px;
      margin-bottom: 30px;
    }

    .admin-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .card-header h2 {
      font-size: 20px;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 i {
      color: var(--primary);
    }

    .badge {
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      background: #f0f0f0;
      color: var(--dark);
    }

    .badge.primary { background: var(--primary); color: white; }
    .badge.success { background: var(--success); color: white; }
    .badge.danger { background: var(--danger); color: white; }
    .badge.warning { background: var(--warning); color: white; }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--dark);
    }

    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .form-control:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1);
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    .input-group select {
      width: 120px;
      flex-shrink: 0;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      border: 2px solid transparent;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #3aa8d8;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #d61c6e;
      transform: translateY(-2px);
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }

    .btn-sm {
      padding: 8px 15px;
      font-size: 13px;
    }

    .btn-lg {
      padding: 15px 30px;
      font-size: 16px;
    }

    /* Message List Styles */
    .messages-container {
      max-height: 400px;
      overflow-y: auto;
      border-radius: 12px;
      border: 2px solid #f0f0f0;
    }

    .message-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.3s;
    }

    .message-item:hover {
      background: #f8f9fa;
    }

    .message-item:last-child {
      border-bottom: none;
    }

    .message-icon {
      width: 45px;
      height: 45px;
      background: var(--gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      margin-right: 15px;
      flex-shrink: 0;
    }

    .message-content {
      flex: 1;
    }

    .message-text {
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .message-meta {
      font-size: 12px;
      color: var(--gray);
      display: flex;
      gap: 15px;
    }

    .message-actions {
      display: flex;
      gap: 8px;
      margin-left: 15px;
      flex-shrink: 0;
    }

    .message-actions button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 16px;
    }

    .btn-edit {
      background: #e3f2fd;
      color: var(--primary);
    }

    .btn-edit:hover {
      background: var(--primary);
      color: white;
    }

    .btn-delete {
      background: #ffebee;
      color: var(--danger);
    }

    .btn-delete:hover {
      background: var(--danger);
      color: white;
    }

    .btn-duplicate {
      background: #e8f5e9;
      color: var(--success);
    }

    .btn-duplicate:hover {
      background: var(--success);
      color: white;
    }

    /* Timeline Preview */
    .timeline-preview {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 15px;
      padding: 30px;
      color: white;
      margin-top: 20px;
    }

    .timeline-bar {
      background: rgba(255,255,255,0.2);
      height: 10px;
      border-radius: 10px;
      margin: 20px 0;
      overflow: hidden;
    }

    .timeline-progress {
      height: 100%;
      background: white;
      width: 0%;
      transition: width 0.3s;
      border-radius: 10px;
    }

    .message-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }

    .chip {
      padding: 8px 15px;
      background: rgba(255,255,255,0.15);
      border-radius: 30px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Schedule Picker */
    .schedule-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    /* Color Picker */
    .color-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .color-option {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all 0.3s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.active {
      border-color: var(--dark);
      transform: scale(1.1);
    }

    .color-option.primary { background: var(--primary); }
    .color-option.success { background: var(--success); }
    .color-option.danger { background: var(--danger); }
    .color-option.warning { background: var(--warning); }
    .color-option.info { background: var(--info); }

    /* Analytics Chart */
    .chart-container {
      height: 300px;
      margin-top: 20px;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 30px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: var(--primary);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(30px);
    }

    /* Priority Slider */
    .priority-slider {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .priority-slider input {
      flex: 1;
    }

    .priority-value {
      width: 50px;
      text-align: center;
      font-weight: 600;
      color: var(--primary);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .modal-header h3 {
      font-size: 22px;
      color: var(--dark);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--gray);
      transition: color 0.3s;
    }

    .modal-close:hover {
      color: var(--danger);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }

      .admin-header {
        flex-direction: column;
        text-align: center;
      }

      .input-group {
        flex-direction: column;
      }

      .input-group select {
        width: 100%;
      }

      .schedule-picker {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Notification Banner -->
  <div class="notification-banner" id="notificationBanner">
    <div class="notification-content" id="tickerContent">
      <!-- Messages will be dynamically added here -->
    </div>
    <div class="banner-control">
      <button id="pauseBtn" title="Pause/Resume"><i class="fas fa-pause"></i></button>
      <button id="closeBtn" title="Hide Banner"><i class="fas fa-times"></i></button>
      <button id="settingsBtn" title="Settings"><i class="fas fa-cog"></i></button>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
      <h1>
        <i class="fas fa-crown"></i>
        Notification Banner Admin Panel
      </h1>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-outline" id="fullscreenBtn">
          <i class="fas fa-expand"></i> Fullscreen
        </button>
        <button class="btn btn-primary" id="saveAllBtn">
          <i class="fas fa-save"></i> Save All
        </button>
      </div>
    </div>

    <!-- Statistics -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-bullhorn"></i></div>
        <div class="stat-value" id="totalMessages">0</div>
        <div class="stat-label">Total Messages</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-eye"></i></div>
        <div class="stat-value" id="totalViews">0</div>
        <div class="stat-label">Total Views</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-clock"></i></div>
        <div class="stat-value" id="activeTime">0</div>
        <div class="stat-label">Active Time (min)</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
        <div class="stat-value" id="engagement">0%</div>
        <div class="stat-label">Engagement Rate</div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="admin-grid">
      <!-- Message Manager -->
      <div class="admin-card">
        <div class="card-header">
          <h2><i class="fas fa-envelope"></i> Message Manager</h2>
          <span class="badge primary" id="messageCount">0 messages</span>
        </div>

        <!-- Add New Message -->
        <div class="form-group">
          <label>Add New Message</label>
          <div class="input-group">
            <select class="form-control" id="messageIcon">
              <option value="fa-bell">🔔 Bell</option>
              <option value="fa-chart-line">📈 Chart</option>
              <option value="fa-wallet">💰 Wallet</option>
              <option value="fa-gift">🎁 Gift</option>
              <option value="fa-star">⭐ Star</option>
              <option value="fa-fire">🔥 Fire</option>
              <option value="fa-calendar">📅 Calendar</option>
              <option value="fa-credit-card">💳 Card</option>
              <option value="fa-piggy-bank">🐷 Piggy</option>
              <option value="fa-arrow-trend-up">📊 Trend</option>
            </select>
            <input type="text" class="form-control" id="messageText" placeholder="Enter message...">
            <button class="btn btn-primary" id="addMessageBtn">
              <i class="fas fa-plus"></i> Add
            </button>
          </div>
        </div>

        <!-- Message List -->
        <div class="messages-container" id="messageList">
          <!-- Messages will be dynamically added here -->
        </div>

        <!-- Bulk Actions -->
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="btn btn-sm btn-outline" id="sortAscBtn">
            <i class="fas fa-sort-amount-down"></i> Sort A-Z
          </button>
          <button class="btn btn-sm btn-outline" id="sortDescBtn">
            <i class="fas fa-sort-amount-up"></i> Sort Z-A
          </button>
          <button class="btn btn-sm btn-danger" id="clearAllBtn">
            <i class="fas fa-trash"></i> Clear All
          </button>
        </div>
      </div>

      <!-- Banner Settings -->
      <div class="admin-card">
        <div class="card-header">
          <h2><i class="fas fa-sliders-h"></i> Banner Settings</h2>
          <label class="toggle-switch">
            <input type="checkbox" id="bannerToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Duration Control -->
        <div class="form-group">
          <label>Scroll Duration <span id="durationValue">25s</span></label>
          <input type="range" class="form-control" id="durationSlider" min="5" max="60" value="25">
        </div>

        <!-- Speed Control -->
        <div class="form-group">
          <label>Animation Speed <span id="speedValue">Normal</span></label>
          <select class="form-control" id="speedSelect">
            <option value="0.5">Very Slow</option>
            <option value="0.75">Slow</option>
            <option value="1" selected>Normal</option>
            <option value="1.25">Fast</option>
            <option value="1.5">Very Fast</option>
          </select>
        </div>

        <!-- Banner Style -->
        <div class="form-group">
          <label>Banner Theme</label>
          <div class="color-options">
            <div class="color-option primary active" onclick="selectTheme('primary')"></div>
            <div class="color-option success" onclick="selectTheme('success')"></div>
            <div class="color-option danger" onclick="selectTheme('danger')"></div>
            <div class="color-option warning" onclick="selectTheme('warning')"></div>
            <div class="color-option info" onclick="selectTheme('info')"></div>
          </div>
        </div>

        <!-- Position -->
        <div class="form-group">
          <label>Banner Position</label>
          <select class="form-control" id="positionSelect">
            <option value="top">Top</option>
            <option value="bottom">Bottom</option>
          </select>
        </div>

        <!-- Border Radius -->
        <div class="form-group">
          <label>Border Radius <span id="radiusValue">12px</span></label>
          <input type="range" class="form-control" id="radiusSlider" min="0" max="30" value="12">
        </div>

        <!-- Opacity -->
        <div class="form-group">
          <label>Background Opacity <span id="opacityValue">100%</span></label>
          <input type="range" class="form-control" id="opacitySlider" min="50" max="100" value="100">
        </div>
      </div>

      <!-- Advanced Settings -->
      <div class="admin-card">
        <div class="card-header">
          <h2><i class="fas fa-cog"></i> Advanced Settings</h2>
          <span class="badge success">PRO</span>
        </div>

        <!-- Schedule -->
        <div class="form-group">
          <label>Schedule Banner</label>
          <div class="schedule-picker">
            <input type="datetime-local" class="form-control" id="scheduleStart">
            <input type="datetime-local" class="form-control" id="scheduleEnd">
          </div>
        </div>

        <!-- Priority -->
        <div class="form-group">
          <label>Priority Level</label>
          <div class="priority-slider">
            <input type="range" class="form-control" id="prioritySlider" min="1" max="10" value="5">
            <span class="priority-value" id="priorityValue">5</span>
          </div>
        </div>

        <!-- Target Audience -->
        <div class="form-group">
          <label>Target Audience</label>
          <select class="form-control" id="targetSelect">
            <option value="all">All Users</option>
            <option value="loggedin">Logged In Only</option>
            <option value="guests">Guests Only</option>
            <option value="premium">Premium Users</option>
          </select>
        </div>

        <!-- Repeat Interval -->
        <div class="form-group">
          <label>Repeat Every</label>
          <select class="form-control" id="repeatSelect">
            <option value="0">Never</option>
            <option value="5">5 minutes</option>
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="60">1 hour</option>
          </select>
        </div>

        <!-- Max Displays -->
        <div class="form-group">
          <label>Max Displays per User</label>
          <input type="number" class="form-control" id="maxDisplays" value="3" min="1" max="10">
        </div>
      </div>

      <!-- Analytics & Preview -->
      <div class="admin-card">
        <div class="card-header">
          <h2><i class="fas fa-chart-bar"></i> Analytics & Preview</h2>
          <span class="badge" id="liveStatus">Live</span>
        </div>

        <!-- Live Preview -->
        <div class="timeline-preview" id="livePreview">
          <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span><i class="fas fa-eye"></i> Live Preview</span>
            <span id="previewTimer">00:00</span>
          </div>
          <div class="message-chips" id="previewChips">
            <!-- Preview chips will be added here -->
          </div>
          <div class="timeline-bar">
            <div class="timeline-progress" id="timelineProgress" style="width: 0%;"></div>
          </div>
        </div>

        <!-- Chart -->
        <div class="chart-container">
          <canvas id="analyticsChart"></canvas>
        </div>

        <!-- Performance Metrics -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
          <div>
            <div style="font-size: 12px; color: var(--gray);">Click-through Rate</div>
            <div style="font-size: 24px; font-weight: 700; color: var(--success);">12.5%</div>
          </div>
          <div>
            <div style="font-size: 12px; color: var(--gray);">Conversion Rate</div>
            <div style="font-size: 24px; font-weight: 700; color: var(--primary);">8.3%</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Actions Bar -->
    <div style="background: white; border-radius: 15px; padding: 20px; margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
      <button class="btn btn-primary" id="testBannerBtn">
        <i class="fas fa-play"></i> Test Banner
      </button>
      <button class="btn btn-success" id="exportDataBtn">
        <i class="fas fa-download"></i> Export Data
      </button>
      <button class="btn btn-warning" id="importDataBtn">
        <i class="fas fa-upload"></i> Import Data
      </button>
      <button class="btn btn-danger" id="resetDefaultBtn">
        <i class="fas fa-undo"></i> Reset to Default
      </button>
      <button class="btn btn-outline" id="previewFullBtn">
        <i class="fas fa-eye"></i> Full Preview
      </button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-edit"></i> Edit Message</h3>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="form-group">
        <label>Icon</label>
        <select class="form-control" id="editIcon">
          <option value="fa-bell">🔔 Bell</option>
          <option value="fa-chart-line">📈 Chart</option>
          <option value="fa-wallet">💰 Wallet</option>
          <option value="fa-gift">🎁 Gift</option>
          <option value="fa-star">⭐ Star</option>
          <option value="fa-fire">🔥 Fire</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <input type="text" class="form-control" id="editText" placeholder="Enter message">
      </div>
      <div class="form-group">
        <label>Priority</label>
        <input type="number" class="form-control" id="editPriority" min="1" max="10" value="5">
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-primary" style="flex: 1;" id="saveEditBtn">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <button class="btn btn-outline" style="flex: 1;" onclick="closeEditModal()">
          <i class="fas fa-times"></i> Cancel
        </button>
      </div>
    </div>
  </div>

  <script>
    class AdvancedNotificationBanner {
      constructor() {
        this.messages = [
          { icon: 'fa-bell', text: '🔔 New feature: Multi-currency support!', priority: 5, views: 0 },
          { icon: 'fa-chart-line', text: '📈 Your monthly spending is 12% lower', priority: 4, views: 0 },
          { icon: 'fa-wallet', text: '💰 Demo budget tip: use 50/30/20 rule', priority: 3, views: 0 },
          { icon: 'fa-gift', text: '🎁 Special offer: Premium plan 30% off', priority: 5, views: 0 }
        ];
        
        this.settings = {
          duration: 25,
          speed: 1,
          theme: 'primary',
          position: 'top',
          radius: 12,
          opacity: 100,
          isPaused: false,
          isVisible: true,
          scheduleStart: null,
          scheduleEnd: null,
          priority: 5,
          target: 'all',
          repeatInterval: 0,
          maxDisplays: 3
        };
        
        this.stats = {
          totalViews: 0,
          totalClicks: 0,
          startTime: Date.now(),
          messageHistory: []
        };
        
        this.currentEditIndex = -1;
        this.chart = null;
        
        this.init();
      }

      init() {
        this.banner = document.getElementById('notificationBanner');
        this.ticker = document.getElementById('tickerContent');
        
        this.setupEventListeners();
        this.renderMessages();
        this.updateStats();
        this.initChart();
        this.show();
        this.updateUI();
      }

      setupEventListeners() {
        // Banner controls
        document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
        document.getElementById('closeBtn').addEventListener('click', () => this.hide());
        document.getElementById('settingsBtn').addEventListener('click', () => this.scrollToSettings());

        // Message management
        document.getElementById('addMessageBtn').addEventListener('click', () => this.addMessage());
        document.getElementById('clearAllBtn').addEventListener('click', () => this.clearAllMessages());
        document.getElementById('sortAscBtn').addEventListener('click', () => this.sortMessages('asc'));
        document.getElementById('sortDescBtn').addEventListener('click', () => this.sortMessages('desc'));

        // Settings controls
        document.getElementById('bannerToggle').addEventListener('change', (e) => {
          e.target.checked ? this.show() : this.hide();
        });

        document.getElementById('durationSlider').addEventListener('input', (e) => {
          this.settings.duration = e.target.value;
          document.getElementById('durationValue').textContent = e.target.value + 's';
          this.updateAnimation();
        });

        document.getElementById('speedSelect').addEventListener('change', (e) => {
          this.settings.speed = parseFloat(e.target.value);
          this.updateAnimation();
        });

        document.getElementById('positionSelect').addEventListener('change', (e) => {
          this.settings.position = e.target.value;
          this.updateBannerStyle();
        });

        document.getElementById('radiusSlider').addEventListener('input', (e) => {
          this.settings.radius = e.target.value;
          document.getElementById('radiusValue').textContent = e.target.value + 'px';
          this.updateBannerStyle();
        });

        document.getElementById('opacitySlider').addEventListener('input', (e) => {
          this.settings.opacity = e.target.value;
          document.getElementById('opacityValue').textContent = e.target.value + '%';
          this.updateBannerStyle();
        });

        document.getElementById('prioritySlider').addEventListener('input', (e) => {
          this.settings.priority = e.target.value;
          document.getElementById('priorityValue').textContent = e.target.value;
        });

        // Quick actions
        document.getElementById('testBannerBtn').addEventListener('click', () => this.testBanner());
        document.getElementById('exportDataBtn').addEventListener('click', () => this.exportData());
        document.getElementById('importDataBtn').addEventListener('click', () => this.importData());
        document.getElementById('resetDefaultBtn').addEventListener('click', () => this.resetToDefault());
        document.getElementById('previewFullBtn').addEventListener('click', () => this.previewFull());
        document.getElementById('fullscreenBtn').addEventListener('click', () => this.toggleFullscreen());
        document.getElementById('saveAllBtn').addEventListener('click', () => this.saveAll());

        // Edit modal
        document.getElementById('saveEditBtn').addEventListener('click', () => this.saveEdit());

        // Track clicks on banner
        this.ticker.addEventListener('click', () => {
          this.stats.totalClicks++;
          this.updateStats();
        });
      }

      renderMessages() {
        if (!this.ticker) return;
        
        let html = '';
        // Sort messages by priority
        const sortedMessages = [...this.messages].sort((a, b) => b.priority - a.priority);
        
        // Duplicate for seamless loop
        for (let i = 0; i < 2; i++) {
          sortedMessages.forEach(msg => {
            html += `<span><i class="fas ${msg.icon}"></i> ${msg.text}</span>`;
          });
        }
        this.ticker.innerHTML = html;
        
        this.updateMessageList();
        this.updatePreview();
        this.updateStats();
      }

      updateMessageList() {
        const list = document.getElementById('messageList');
        if (!list) return;
        
        let html = '';
        this.messages.forEach((msg, index) => {
          html += `
            <div class="message-item">
              <div class="message-icon">
                <i class="fas ${msg.icon}"></i>
              </div>
              <div class="message-content">
                <div class="message-text">${msg.text}</div>
                <div class="message-meta">
                  <span><i class="fas fa-flag"></i> Priority ${msg.priority}</span>
                  <span><i class="fas fa-eye"></i> ${msg.views || 0} views</span>
                </div>
              </div>
              <div class="message-actions">
                <button class="btn-edit" onclick="banner.editMessage(${index})">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn-duplicate" onclick="banner.duplicateMessage(${index})">
                  <i class="fas fa-copy"></i>
                </button>
                <button class="btn-delete" onclick="banner.deleteMessage(${index})">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        });
        
        list.innerHTML = html;
        document.getElementById('totalMessages').textContent = this.messages.length;
        document.getElementById('messageCount').textContent = this.messages.length + ' messages';
        document.getElementById('messageCountDisplay').textContent = this.messages.length;
      }

      updatePreview() {
        const previewChips = document.getElementById('previewChips');
        if (!previewChips) return;
        
        let html = '';
        this.messages.slice(0, 5).forEach(msg => {
          html += `<span class="chip"><i class="fas ${msg.icon}"></i> ${msg.text.substring(0, 20)}...</span>`;
        });
        previewChips.innerHTML = html;
      }

      updateAnimation() {
        if (!this.ticker) return;
        
        this.ticker.style.animation = 'none';
        this.ticker.offsetHeight;
        const speed = this.settings.speed;
        const duration = this.settings.duration / speed;
        this.ticker.style.animation = `scrollTicker linear infinite`;
        this.ticker.style.animationDuration = duration + 's';
        this.ticker.style.animationPlayState = this.settings.isPaused ? 'paused' : 'running';
      }

      updateBannerStyle() {
        if (!this.banner) return;
        
        // Update gradient based on theme
        const themes = {
          primary: 'linear-gradient(135deg, #4361ee 0%, #3f37c9 100%)',
          success: 'linear-gradient(135deg, #4cc9f0 0%, #4895ef 100%)',
          danger: 'linear-gradient(135deg, #f72585 0%, #b5179e 100%)',
          warning: 'linear-gradient(135deg, #f8961e 0%, #f3722c 100%)',
          info: 'linear-gradient(135deg, #4895ef 0%, #4361ee 100%)'
        };
        
        this.banner.style.background = themes[this.settings.theme] || themes.primary;
        this.banner.style.borderRadius = this.settings.radius + 'px';
        this.banner.style.opacity = this.settings.opacity / 100;
        
        if (this.settings.position === 'bottom') {
          this.banner.style.position = 'fixed';
          this.banner.style.bottom = '0';
          this.banner.style.top = 'auto';
          this.banner.style.width = 'calc(100% - 40px)';
          this.banner.style.margin = '20px';
        } else {
          this.banner.style.position = 'relative';
          this.banner.style.top = 'auto';
          this.banner.style.bottom = 'auto';
        }
      }

      updateUI() {
        document.getElementById('durationSlider').value = this.settings.duration;
        document.getElementById('durationValue').textContent = this.settings.duration + 's';
        document.getElementById('speedSelect').value = this.settings.speed;
        document.getElementById('positionSelect').value = this.settings.position;
        document.getElementById('radiusSlider').value = this.settings.radius;
        document.getElementById('radiusValue').textContent = this.settings.radius + 'px';
        document.getElementById('opacitySlider').value = this.settings.opacity;
        document.getElementById('opacityValue').textContent = this.settings.opacity + '%';
        document.getElementById('prioritySlider').value = this.settings.priority;
        document.getElementById('priorityValue').textContent = this.settings.priority;
        document.getElementById('bannerToggle').checked = this.settings.isVisible;
        
        // Update theme selection
        document.querySelectorAll('.color-option').forEach(opt => {
          opt.classList.remove('active');
          if (opt.classList.contains(this.settings.theme)) {
            opt.classList.add('active');
          }
        });
      }

      updateStats() {
        this.stats.totalViews = this.messages.reduce((sum, msg) => sum + (msg.views || 0), 0);
        document.getElementById('totalViews').textContent = this.stats.totalViews;
        
        const activeMinutes = Math.floor((Date.now() - this.stats.startTime) / 60000);
        document.getElementById('activeTime').textContent = activeMinutes;
        
        const engagement = this.stats.totalViews > 0 
          ? Math.round((this.stats.totalClicks / this.stats.totalViews) * 100) 
          : 0;
        document.getElementById('engagement').textContent = engagement + '%';
      }

      initChart() {
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        this.chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            datasets: [{
              label: 'Views',
              data: [65, 59, 80, 81, 56, 55, 40],
              borderColor: '#4361ee',
              backgroundColor: 'rgba(67, 97, 238, 0.1)',
              tension: 0.4,
              fill: true
            }, {
              label: 'Clicks',
              data: [28, 48, 40, 19, 86, 27, 90],
              borderColor: '#f72585',
              backgroundColor: 'rgba(247, 37, 133, 0.1)',
              tension: 0.4,
              fill: true
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false
              }
            }
          }
        });
      }

      // Message Management Methods
      addMessage() {
        const icon = document.getElementById('messageIcon').value;
        const text = document.getElementById('messageText').value.trim();
        
        if (text) {
          this.messages.push({ 
            icon, 
            text, 
            priority: 5,
            views: 0 
          });
          this.renderMessages();
          document.getElementById('messageText').value = '';
          this.showToast('success', 'Message added successfully');
        } else {
          this.showToast('error', 'Please enter a message');
        }
      }

      editMessage(index) {
        this.currentEditIndex = index;
        const msg = this.messages[index];
        document.getElementById('editIcon').value = msg.icon;
        document.getElementById('editText').value = msg.text;
        document.getElementById('editPriority').value = msg.priority || 5;
        document.getElementById('editModal').classList.add('active');
      }

      saveEdit() {
        if (this.currentEditIndex >= 0) {
          const icon = document.getElementById('editIcon').value;
          const text = document.getElementById('editText').value.trim();
          const priority = parseInt(document.getElementById('editPriority').value);
          
          if (text) {
            this.messages[this.currentEditIndex] = { 
              ...this.messages[this.currentEditIndex],
              icon, 
              text,
              priority 
            };
            this.renderMessages();
            this.closeEditModal();
            this.showToast('success', 'Message updated successfully');
          }
        }
      }

      closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        this.currentEditIndex = -1;
      }

      duplicateMessage(index) {
        const msg = { ...this.messages[index], views: 0 };
        this.messages.splice(index + 1, 0, msg);
        this.renderMessages();
        this.showToast('success', 'Message duplicated');
      }

      deleteMessage(index) {
        if (confirm('Delete this message?')) {
          this.messages.splice(index, 1);
          this.renderMessages();
          this.showToast('success', 'Message deleted');
        }
      }

      clearAllMessages() {
        if (confirm('Delete all messages?')) {
          this.messages = [];
          this.renderMessages();
          this.showToast('success', 'All messages cleared');
        }
      }

      sortMessages(order) {
        if (order === 'asc') {
          this.messages.sort((a, b) => a.text.localeCompare(b.text));
        } else {
          this.messages.sort((a, b) => b.text.localeCompare(a.text));
        }
        this.renderMessages();
      }

      // Banner Control Methods
      togglePause() {
        this.settings.isPaused = !this.settings.isPaused;
        this.updateAnimation();
        
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.innerHTML = this.settings.isPaused ? 
          '<i class="fas fa-play"></i>' : 
          '<i class="fas fa-pause"></i>';
        
        this.showToast('info', this.settings.isPaused ? 'Banner paused' : 'Banner resumed');
      }

      show() {
        this.settings.isVisible = true;
        this.banner.classList.add('show');
        this.updateUI();
      }

      hide() {
        this.settings.isVisible = false;
        this.banner.classList.remove('show');
        this.updateUI();
        this.showToast('info', 'Banner hidden');
      }

      // Advanced Features
      testBanner() {
        this.show();
        setTimeout(() => {
          this.showToast('success', 'Banner test completed');
        }, 3000);
      }

      exportData() {
        const data = {
          messages: this.messages,
          settings: this.settings,
          stats: this.stats,
          exportedAt: new Date().toISOString()
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `banner-data-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        
        this.showToast('success', 'Data exported successfully');
      }

      importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        
        input.onchange = (e) => {
          const file = e.target.files[0];
          const reader = new FileReader();
          
          reader.onload = (event) => {
            try {
              const data = JSON.parse(event.target.result);
              this.messages = data.messages || this.messages;
              this.settings = { ...this.settings, ...data.settings };
              this.renderMessages();
              this.updateUI();
              this.updateAnimation();
              this.updateBannerStyle();
              this.showToast('success', 'Data imported successfully');
            } catch (error) {
              this.showToast('error', 'Invalid import file');
            }
          };
          
          reader.readAsText(file);
        };
        
        input.click();
      }

      resetToDefault() {
        if (confirm('Reset all settings to default?')) {
          this.messages = [
            { icon: 'fa-bell', text: '🔔 New feature: Multi-currency support!', priority: 5, views: 0 },
            { icon: 'fa-chart-line', text: '📈 Your monthly spending is 12% lower', priority: 4, views: 0 },
            { icon: 'fa-wallet', text: '💰 Demo budget tip: use 50/30/20 rule', priority: 3, views: 0 },
            { icon: 'fa-gift', text: '🎁 Special offer: Premium plan 30% off', priority: 5, views: 0 }
          ];
          
          this.settings = {
            duration: 25,
            speed: 1,
            theme: 'primary',
            position: 'top',
            radius: 12,
            opacity: 100,
            isPaused: false,
            isVisible: true,
            scheduleStart: null,
            scheduleEnd: null,
            priority: 5,
            target: 'all',
            repeatInterval: 0,
            maxDisplays: 3
          };
          
          this.renderMessages();
          this.updateUI();
          this.updateAnimation();
          this.updateBannerStyle();
          this.show();
          this.showToast('success', 'Reset to default settings');
        }
      }

      previewFull() {
        this.show();
        this.showToast('info', 'Full preview mode active');
      }

      toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
          this.showToast('info', 'Fullscreen mode activated');
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }

      saveAll() {
        localStorage.setItem('bannerMessages', JSON.stringify(this.messages));
        localStorage.setItem('bannerSettings', JSON.stringify(this.settings));
        localStorage.setItem('bannerStats', JSON.stringify(this.stats));
        this.showToast('success', 'All settings saved locally');
      }

      scrollToSettings() {
        document.querySelector('.admin-container').scrollIntoView({ behavior: 'smooth' });
      }

      showToast(type, message) {
        // Simple toast implementation
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          background: ${type === 'success' ? '#4cc9f0' : '#f72585'};
          color: white;
          padding: 12px 25px;
          border-radius: 50px;
          font-weight: 500;
          box-shadow: 0 5px 15px rgba(0,0,0,0.2);
          z-index: 9999;
          animation: slideIn 0.3s ease;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.style.animation = 'slideOut 0.3s ease';
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }
    }

    // Theme selection function
    window.selectTheme = function(theme) {
      document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
      event.target.classList.add('active');
      if (banner) {
        banner.settings.theme = theme;
        banner.updateBannerStyle();
      }
    };

    // Close edit modal function
    window.closeEditModal = function() {
      if (banner) banner.closeEditModal();
    };

    // Initialize
    let banner;
    window.addEventListener('load', () => {
      banner = new AdvancedNotificationBanner();
      window.banner = banner;
    });

    // Add CSS animations
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
