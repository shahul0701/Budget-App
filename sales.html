<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f0f2f5;
    }

    .navbar {
      background: linear-gradient(135deg, #1a2a3a 0%, #0f172a 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      max-width: 1600px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .sales-layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 2rem;
    }

    @media (max-width: 1000px) {
      .sales-layout {
        grid-template-columns: 1fr;
      }
    }

    /* Left Panel */
    .builder-panel {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      position: sticky;
      top: 100px;
      height: fit-content;
    }

    .panel-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1.2rem 1.5rem;
    }

    .builder-content {
      padding: 1.2rem;
      max-height: 65vh;
      overflow-y: auto;
    }

    /* Section Styles */
    .form-section {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .section-header {
      padding: 0.8rem 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
    }

    .section-title {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-fields {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .section-fields.open {
      max-height: 500px;
      padding: 1rem;
    }

    .fields-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
    }

    .field-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.4rem 0;
    }

    .field-item input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Templates Section */
    .templates-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #e2e8f0;
    }

    .template-list {
      max-height: 250px;
      overflow-y: auto;
    }

    .template-card {
      background: #f8fafc;
      border-radius: 10px;
      padding: 0.8rem;
      margin-bottom: 0.6rem;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }

    .template-card:hover {
      border-color: #667eea;
      background: white;
    }

    /* Right Panel */
    .sales-panel {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .sales-header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .sales-form-container {
      padding: 1.5rem;
      max-height: 70vh;
      overflow-y: auto;
    }

    /* Form Cards */
    .form-card {
      background: #f8fafc;
      border-radius: 16px;
      margin-bottom: 1.2rem;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .form-card-header {
      padding: 0.8rem 1.2rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-card-body {
      padding: 1.2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .input-group {
      margin-bottom: 0;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 0.7rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.85rem;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    /* Items Table */
    .items-table-wrapper {
      overflow-x: auto;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .items-table th,
    .items-table td {
      padding: 0.6rem;
      border: 1px solid #e2e8f0;
      text-align: left;
    }

    .items-table th {
      background: #f1f5f9;
    }

    .btn-add-item {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-top: 0.8rem;
    }

    /* Summary */
    .summary-card {
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
      border-radius: 16px;
      padding: 1.2rem;
      margin-top: 1.2rem;
      border: 1px solid #e2e8f0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.85rem;
    }

    .summary-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: #667eea;
      border-top: 2px solid #e2e8f0;
      margin-top: 0.5rem;
      padding-top: 0.8rem;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn-save {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn-reset {
      background: #f1f5f9;
      color: #475569;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
    }

    .message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 10px;
      display: none;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      max-width: 550px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .badge {
      background: #eef2ff;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #667eea;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 1.5rem;
      color: #94a3b8;
    }
  </style>
</head>

      <div class="sales-form-container">

            <div class="summary-row"><span>Amount Paid</span><span id="displayPaid">₹0.00</span></div>
            <div class="summary-row"><span>Balance Due</span><span id="balanceDue">₹0.00</span></div>
          </div>
          <div class="action-buttons">
            <button type="button" class="btn-reset" onclick="resetForm()">Reset</button>
            <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Sale</button>
          </div>
          <div id="formMessage" class="message"></div>
        </form>
      </div>
    </div>
  </div>
</div>

    <div style="margin: 1rem 0;"><strong>Selected Fields:</strong></div>

        { id: 'training', label: 'Training Required', type: 'select', options: ['No', 'Online', 'On-site', 'Documentation'] },
        { id: 'assembly', label: 'Assembly Required', type: 'select', options: ['No', 'Free Assembly', 'Paid Assembly'] },
        { id: 'demo', label: 'Demo Required', type: 'select', options: ['No', 'Yes'] },
        { id: 'supportPlan', label: 'Support Plan', type: 'select', options: ['None', 'Basic', 'Premium', '24/7 Enterprise'] }
      ]
    },
    {
      id: 'loyalty', name: '⭐ Loyalty & Rewards', icon: 'fa-gem',
      fields: [
        { id: 'loyaltyPoints', label: 'Loyalty Points Used', type: 'number', default: 0 },
        { id: 'loyaltyPointsEarned', label: 'Points Earned', type: 'number', default: 0 },
        { id: 'referralCode', label: 'Referral Code', type: 'text' },
        { id: 'membershipId', label: 'Membership ID', type: 'text' },
        { id: 'rewardPoints', label: 'Reward Points Balance', type: 'number', default: 0 },
        { id: 'cashback', label: 'Cashback Amount', type: 'number', step: 0.01, default: 0 },
        { id: 'voucherCode', label: 'Voucher Code', type: 'text' },
        { id: 'voucherDiscount', label: 'Voucher Discount', type: 'number', step: 0.01, default: 0 }
      ]
    },
    {
      id: 'notes', name: '📝 Notes & Attachments', icon: 'fa-file-alt',
      fields: [
        { id: 'instructions', label: 'Special Instructions', type: 'textarea' },
        { id: 'internalNotes', label: 'Internal Notes', type: 'textarea' },
        { id: 'termsAndConditions', label: 'Terms & Conditions', type: 'textarea' },
        { id: 'cancellationPolicy', label: 'Cancellation Policy', type: 'textarea' },
        { id: 'returnPolicy', label: 'Return Policy', type: 'textarea' },
        { id: 'signature', label: 'Customer Signature', type: 'text' }
      ]
    }
  ];

  function getCompanyId() {
    const companyData = sessionStorage.getItem('currentCompany');
    if (!companyData) { window.location.href = 'login.html'; return null; }
    currentCompany = JSON.parse(companyData);
    return currentCompany.id;
  }

  function generateInvoiceNumber() {
    const date = new Date();
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const invNum = String(invoiceCounter).padStart(4, '0');
    invoiceCounter++;
    return `INV-${year}${month}-${invNum}`;
  }

  function buildBuilderUI() {
    const container = document.getElementById('builderContainer');
    let html = '';
    
    sections.forEach((section, idx) => {
      html += `
        <div class="form-section">
          <div class="section-header" onclick="toggleSection(${idx})">
            <div class="section-title"><i class="fas ${section.icon}"></i> ${section.name}</div>
            <div>
              <span class="badge" onclick="event.stopPropagation(); toggleAllFields('${section.id}', true)">Select All</span>
              <span class="badge" onclick="event.stopPropagation(); toggleAllFields('${section.id}', false)">Clear</span>
              <i class="fas fa-chevron-down"></i>
            </div>
          </div>
          <div class="section-fields" id="sectionFields_${idx}">
            <div class="fields-list">
              ${section.fields.map(field => `
                <div class="field-item">
                  <input type="checkbox" id="field_${field.id}" ${currentSelectedFields[field.id] ? 'checked' : ''} onchange="updateFieldSelection('${field.id}', this.checked)">
                  <label for="field_${field.id}">${field.label} ${field.required ? '<span style="color:#ef4444;">*</span>' : ''}</label>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = html;
    if (document.getElementById('sectionFields_0')) document.getElementById('sectionFields_0').classList.add('open');
  }

  window.toggleSection = function(idx) {
    const section = document.getElementById(`sectionFields_${idx}`);
    if (section) section.classList.toggle('open');
  };

  window.toggleAllFields = function(sectionId, select) {
    const section = sections.find(s => s.id === sectionId);
    if (section) {
      section.fields.forEach(field => {
        currentSelectedFields[field.id] = select;
        const checkbox = document.getElementById(`field_${field.id}`);
        if (checkbox) checkbox.checked = select;
      });
    }
    renderSalesForm();
  };

  window.updateFieldSelection = function(fieldId, isChecked) {
    currentSelectedFields[fieldId] = isChecked;
    renderSalesForm();
  };

  function renderSalesForm() {
    const container = document.getElementById('dynamicFormContainer');
    let html = '';
    let hasItems = false;
    let hasPricing = false;
    
    sections.forEach(section => {
      const visibleFields = section.fields.filter(f => currentSelectedFields[f.id]);
      if (visibleFields.length === 0) return;
      
      if (section.id === 'items') {
        hasItems = true;
        html += `
          <div class="form-card">
            <div class="form-card-header"><i class="fas ${section.icon}"></i> ${section.name}</div>
            <div class="form-card-body">
              <div class="items-table-wrapper">
                <table class="items-table">
                  <thead><tr><th>#</th><th>Product/Service</th><th>Description</th><th>HSN/SAC</th><th>Qty</th><th>Unit</th><th>Price</th><th>Disc%</th><th>Tax%</th><th>Amount</th><th></th></tr></thead>
                  <tbody id="itemsBody"></tbody>
                </table>
              </div>
              <button type="button" class="btn-add-item" onclick="addItem()"><i class="fas fa-plus"></i> Add Item</button>
            </div>
          </div>
        `;
      } else {
        let fieldsHtml = '<div class="form-row">';
        visibleFields.forEach(field => {
          let inputHtml = '';
          if (field.type === 'select') {
            inputHtml = `<select id="${field.id}">${field.options.map(opt => `<option>${opt}</option>`).join('')}</select>`;
          } else if (field.type === 'textarea') {
            inputHtml = `<textarea id="${field.id}" rows="2"></textarea>`;
          } else if (field.type === 'date') {
            inputHtml = `<input type="date" id="${field.id}" value="${new Date().toISOString().split('T')[0]}">`;
          } else {
            inputHtml = `<input type="${field.type}" id="${field.id}" value="${field.default || ''}" step="${field.step || ''}">`;
          }
          fieldsHtml += `
            <div class="input-group">
              <label>${field.label}</label>
              ${inputHtml}
            </div>
          `;
        });
        fieldsHtml += '</div>';
        
        html += `
          <div class="form-card">
            <div class="form-card-header"><i class="fas ${section.icon}"></i> ${section.name}</div>
            <div class="form-card-body">${fieldsHtml}</div>
          </div>
        `;
        
        if (section.id === 'pricing') hasPricing = true;
      }
    });
    
    container.innerHTML = html;
    document.getElementById('summaryContainer').style.display = (hasItems || hasPricing) ? 'block' : 'none';
    
    // Set auto invoice number
    if (currentSelectedFields.invoiceNo) {
      const invoiceField = document.getElementById('invoiceNo');
      if (invoiceField && !invoiceField.value) {
        invoiceField.value = generateInvoiceNumber();
      }
    }
    
    if (hasItems) {
      const tbody = document.getElementById('itemsBody');
      if (tbody && tbody.children.length === 0) addItem();
    }
    
    attachCalcEvents();
  }

  function attachCalcEvents() {
    const calcIds = ['shippingCharges', 'packingCharges', 'handlingCharges', 'installationCharges', 'deliveryCharges', 'serviceCharges', 'fuelSurcharge', 'additionalCharges', 'globalDiscount', 'globalDiscountAmount', 'amountPaid'];
    calcIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.removeEventListener('change', calculateTotal);
        el.removeEventListener('keyup', calculateTotal);
        el.addEventListener('change', calculateTotal);
        el.addEventListener('keyup', calculateTotal);
      }
    });
  }

  function addItem() {
    const tbody = document.getElementById('itemsBody');
    if (!tbody) return;
    const rowCount = tbody.children.length;
    const newRow = document.createElement('tr');
    newRow.innerHTML = `
      <td>${rowCount + 1}</td>
      <td><input type="text" class="item-name" placeholder="Item name" style="width:100%"></td>
      <td><input type="text" class="item-desc" placeholder="Description" style="width:100%"></td>
      <td><input type="text" class="item-hsn" placeholder="HSN/SAC" style="width:80px"></td>
      <td><input type="number" class="item-qty" value="1" min="1" style="width:70px"></td>
      <td><select class="item-unit" style="width:70px"><option>pcs</option><option>kg</option><option>g</option><option>L</option><option>box</option><option>set</option><option>hour</option><option>day</option></select></td>
      <td><input type="number" class="item-price" value="0" step="0.01" style="width:90px"></td>
      <td><input type="number" class="item-discount" value="0" step="0.01" style="width:70px"></td>
      <td><select class="item-tax" style="width:70px"><option>0</option><option>5</option><option>12</option><option>18</option><option>28</option></select></td>
      <td class="item-amount">0.00</td>
      <td><button type="button" onclick="removeItem(this)"><i class="fas fa-trash" style="color:#dc2626"></i></button></td>
    `;
    tbody.appendChild(newRow);
    attachItemEvents(newRow);
    calculateTotal();
  }

  window.removeItem = function(btn) {
    const row = btn.closest('tr');
    const tbody = document.getElementById('itemsBody');
    if (tbody.children.length > 1) {
      row.remove();
      renumberRows();
      calculateTotal();
    }
  };

  function renumberRows() {
    const rows = document.getElementById('itemsBody').children;
    for (let i = 0; i < rows.length; i++) rows[i].cells[0].innerHTML = i + 1;
  }

  function attachItemEvents(row) {
    row.querySelectorAll('input, select').forEach(input => {
      input.addEventListener('change', calculateTotal);
      input.addEventListener('keyup', calculateTotal);
    });
  }

  function calculateTotal() {
    let subtotal = 0, totalDiscount = 0, totalTax = 0;
    const rows = document.getElementById('itemsBody')?.children || [];
    
    for (let row of rows) {
      const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
      const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
      const discount = parseFloat(row.querySelector('.item-discount')?.value) || 0;
      const tax = parseFloat(row.querySelector('.item-tax')?.value) || 0;
      
      const itemTotal = qty * price;
      const discountAmount = itemTotal * (discount / 100);
      const afterDiscount = itemTotal - discountAmount;
      const taxAmount = afterDiscount * (tax / 100);
      
      subtotal += itemTotal;
      totalDiscount += discountAmount;
      totalTax += taxAmount;
      
      const amountCell = row.querySelector('.item-amount');
      if (amountCell) amountCell.innerHTML = (afterDiscount + taxAmount).toFixed(2);
    }
    
    const charges = ['shippingCharges', 'packingCharges', 'handlingCharges', 'installationCharges', 'deliveryCharges', 'serviceCharges', 'fuelSurcharge', 'additionalCharges'];
    let totalCharges = 0;
    charges.forEach(id => { totalCharges += parseFloat(document.getElementById(id)?.value) || 0; });
    
    let globalDiscount = parseFloat(document.getElementById('globalDiscount')?.value) || 0;
    let globalDiscountAmount = parseFloat(document.getElementById('globalDiscountAmount')?.value) || 0;
    
    let grandTotal = subtotal - totalDiscount + totalTax + totalCharges;
    if (globalDiscount > 0) grandTotal -= grandTotal * (globalDiscount / 100);
    if (globalDiscountAmount > 0) grandTotal -= globalDiscountAmount;
    
    const currency = document.getElementById('currency')?.value?.split(' ')[0] || '₹';
    const symbol = currency === 'INR' ? '₹' : currency === 'USD' ? '$' : currency === 'EUR' ? '€' : '₹';
    
    document.getElementById('displaySubtotal').innerHTML = `${symbol}${subtotal.toFixed(2)}`;
    document.getElementById('displayDiscount').innerHTML = `${symbol}${totalDiscount.toFixed(2)}`;
    document.getElementById('displayTax').innerHTML = `${symbol}${totalTax.toFixed(2)}`;
    document.getElementById('displayCharges').innerHTML = `${symbol}${totalCharges.toFixed(2)}`;
    document.getElementById('grandTotal').innerHTML = `${symbol}${grandTotal.toFixed(2)}`;
    
    const amountPaid = parseFloat(document.getElementById('amountPaid')?.value) || 0;
    document.getElementById('displayPaid').innerHTML = `${symbol}${amountPaid.toFixed(2)}`;
    document.getElementById('balanceDue').innerHTML = `${symbol}${(grandTotal - amountPaid).toFixed(2)}`;
  }

  // Template Functions
  function loadTemplates() {
    const saved = localStorage.getItem(`sales_templates_${currentCompany?.id}`);
    templates = saved ? JSON.parse(saved) : [];
    renderTemplatesList();
  }

  function saveTemplates() {
    localStorage.setItem(`sales_templates_${currentCompany?.id}`, JSON.stringify(templates));
    renderTemplatesList();
  }

  function renderTemplatesList() {
    const container = document.getElementById('templatesList');
    if (templates.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><br>No templates saved</div>';
      return;
    }
    
    container.innerHTML = templates.map((t, i) => `
      <div class="template-card" onclick="loadTemplate(${i})">
        <div class="template-name"><strong>${escapeHtml(t.name)}</strong></div>
        <div style="font-size:0.7rem; color:#64748b;">${t.description || 'No description'}</div>
        <div style="font-size:0.65rem; margin-top:0.3rem;">${Object.keys(t.fields).length} fields selected</div>
        <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
          <span class="badge" onclick="event.stopPropagation(); openEditTemplate(${i})">✏️ Edit</span>
          <span class="badge" onclick="event.stopPropagation(); deleteTemplate(${i})" style="background:#fee2e2; color:#dc2626;">🗑️ Delete</span>
        </div>
      </div>
    `).join('');
  }

  window.saveCurrentAsTemplate = function() {
    const selectedFields = { ...currentSelectedFields };
    if (Object.keys(selectedFields).length === 0) {
      alert('Please select at least one field');
      return;
    }
    const name = prompt('Enter template name:');
    if (!name) return;
    const desc = prompt('Enter description (optional):');
    
    templates.push({
      id: Date.now(),
      name: name,
      description: desc || '',
      fields: selectedFields,
      createdAt: new Date().toISOString()
    });
    saveTemplates();
    alert('Template saved!');
  };

  window.loadTemplate = function(index) {
    const template = templates[index];
    currentSelectedFields = { ...template.fields };
    
    sections.forEach(section => {
      section.fields.forEach(field => {
        const checkbox = document.getElementById(`field_${field.id}`);
        if (checkbox) checkbox.checked = currentSelectedFields[field.id] || false;
      });
    });
    
    renderSalesForm();
    document.getElementById('activeTemplateBadge').innerHTML = `<i class="fas fa-check-circle"></i> ${escapeHtml(template.name)}`;
  };

  window.openEditTemplate = function(index) {
    editTemplateIndex = index;
    const template = templates[index];
    document.getElementById('editTemplateName').value = template.name;
    document.getElementById('editTemplateDesc').value = template.description || '';
    
    let fieldsHtml = '<div style="display:flex; flex-direction:column; gap:0.3rem;">';
    for (const [fieldId, selected] of Object.entries(template.fields)) {
      const field = getFieldById(fieldId);
      if (field) {
        fieldsHtml += `
          <div class="field-item">
            <input type="checkbox" id="edit_field_${fieldId}" ${selected ? 'checked' : ''}>
            <label>${field.label}</label>
          </div>
        `;
      }
    }
    fieldsHtml += '</div>';
    document.getElementById('editTemplateFields').innerHTML = fieldsHtml;
    document.getElementById('editTemplateModal').classList.add('show');
  };

  window.updateTemplate = function() {
    const newName = document.getElementById('editTemplateName').value.trim();
    if (!newName) { alert('Template name required'); return; }
    const newDesc = document.getElementById('editTemplateDesc').value;
    
    const updatedFields = {};
    for (const [fieldId] of Object.entries(templates[editTemplateIndex].fields)) {
      const checkbox = document.getElementById(`edit_field_${fieldId}`);
      if (checkbox) updatedFields[fieldId] = checkbox.checked;
    }
    
    templates[editTemplateIndex] = {
      ...templates[editTemplateIndex],
      name: newName,
      description: newDesc,
      fields: updatedFields
    };
    
    saveTemplates();
    closeEditModal();
    alert('Template updated!');
  };

  window.deleteTemplate = function(index) {
    if (confirm('Delete this template?')) {
      templates.splice(index, 1);
      saveTemplates();
    }
  };

  window.closeEditModal = function() {
    document.getElementById('editTemplateModal').classList.remove('show');
    editTemplateIndex = null;
  };

  function getFieldById(fieldId) {
    for (const section of sections) {
      const field = section.fields.find(f => f.id === fieldId);
      if (field) return field;
    }
    return null;
  }

  // Save Sale
  document.getElementById('salesForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const companyId = getCompanyId();
    if (!companyId) return;
    
    const items = [];
    const rows = document.getElementById('itemsBody')?.children || [];
    for (let row of rows) {
      if (row.querySelector('.item-name')?.value) {
        items.push({
          name: row.querySelector('.item-name')?.value,
          description: row.querySelector('.item-desc')?.value,
          hsn: row.querySelector('.item-hsn')?.value,
          quantity: parseFloat(row.querySelector('.item-qty')?.value) || 0,
          unit: row.querySelector('.item-unit')?.value,
          unitPrice: parseFloat(row.querySelector('.item-price')?.value) || 0,
          discount: parseFloat(row.querySelector('.item-discount')?.value) || 0,
          tax: parseFloat(row.querySelector('.item-tax')?.value) || 0,
          amount: parseFloat(row.querySelector('.item-amount')?.innerHTML) || 0
        });
      }
    }
    
    const saleData = {
      invoiceNo: document.getElementById('invoiceNo')?.value || generateInvoiceNumber(),
      invoiceDate: document.getElementById('invoiceDate')?.value || new Date().toISOString().split('T')[0],
      customerName: document.getElementById('customerName')?.value || 'Walk-in Customer',
      customerPhone: document.getElementById('customerPhone')?.value || '',
      customerType: document.getElementById('customerType')?.value || 'Walk-in',
      items: items,
      grandTotal: parseFloat(document.getElementById('grandTotal')?.innerHTML.replace(/[^0-9.-]/g, '')) || 0,
      createdAt: Date.now()
    };
    
    try {
      await addDoc(collection(db, `companies/${companyId}/sales`), saleData);
      const msg = document.getElementById('formMessage');
      msg.innerHTML = '<i class="fas fa-check-circle"></i> Sale saved successfully!';
      msg.className = 'message success';
      setTimeout(() => msg.className = 'message', 3000);
      resetForm();
    } catch (error) {
      const msg = document.getElementById('formMessage');
      msg.innerHTML = '❌ Error saving sale';
      msg.className = 'message error';
    }
  });

  function resetForm() {
    document.querySelectorAll('#dynamicFormContainer input, #dynamicFormContainer select, #dynamicFormContainer textarea').forEach(el => {
      if (el.type === 'number') el.value = '0';
      else if (el.type === 'text' || el.type === 'email') el.value = '';
      else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    });
    if (document.getElementById('invoiceDate')) document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
    if (document.getElementById('invoiceNo') && currentSelectedFields.invoiceNo) {
      document.getElementById('invoiceNo').value = generateInvoiceNumber();
    }
    const itemsBody = document.getElementById('itemsBody');
    if (itemsBody) {
      itemsBody.innerHTML = '';
      if (currentSelectedFields.items) addItem();
    }
    calculateTotal();
  }

  window.resetForm = resetForm;
  window.calculateTotal = calculateTotal;
  window.addItem = addItem;
  window.removeItem = removeItem;

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  // Initialize
  if (getCompanyId()) {
    // Set default selected fields (basic and customer essentials)
    const defaultFields = ['invoiceNo', 'invoiceDate', 'customerName', 'customerPhone', 'customerType', 'items'];
    sections.forEach(section => {
      section.fields.forEach(field => {
        if (defaultFields.includes(field.id)) {
          currentSelectedFields[field.id] = true;
        }
      });
    });
    
    buildBuilderUI();
    loadTemplates();
    renderSalesForm();
    setInterval(calculateTotal, 200);
  }
</script>
