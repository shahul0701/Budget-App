<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Sales System | BudgetFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f0f2f5;
    }

    .navbar {
      background: linear-gradient(135deg, #1a2a3a 0%, #0f172a 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      max-width: 1800px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 2rem;
    }

    @media (max-width: 1100px) {
      .two-column {
        grid-template-columns: 1fr;
      }
    }

    /* Main Panel */
    .main-panel {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .panel-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1.2rem 1.5rem;
    }

    /* Form Cards */
    .form-card {
      background: #f8fafc;
      border-radius: 16px;
      margin: 1.2rem;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    .form-card-header {
      padding: 0.8rem 1.2rem;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-card-body {
      padding: 1.2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .input-group {
      margin-bottom: 0;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 0.7rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.85rem;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    /* Items Table */
    .items-table-wrapper {
      overflow-x: auto;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    .items-table th,
    .items-table td {
      padding: 0.6rem;
      border: 1px solid #e2e8f0;
      text-align: left;
    }

    .items-table th {
      background: #f1f5f9;
    }

    .items-table input,
    .items-table select {
      width: 100%;
      padding: 0.4rem;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
    }

    .btn-add-item {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-top: 0.8rem;
    }

    /* Summary - Dynamic */
    .summary-card {
      background: linear-gradient(135deg, #f8fafc 0%, #ffffff 100%);
      border-radius: 16px;
      padding: 1.2rem;
      margin: 1.2rem;
      border: 1px solid #e2e8f0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.85rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .summary-total {
      font-size: 1.1rem;
      font-weight: 700;
      color: #667eea;
      border-top: 2px solid #667eea;
      margin-top: 0.5rem;
      padding-top: 0.8rem;
      border-bottom: none;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin: 1.2rem;
    }

    .btn-save {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn-reset {
      background: #f1f5f9;
      color: #475569;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
    }

    /* Templates Panel */
    .templates-panel {
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      position: sticky;
      top: 100px;
      height: fit-content;
    }

    .templates-header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white;
      padding: 1.2rem 1.5rem;
    }

    .templates-list {
      padding: 1rem;
      max-height: 65vh;
      overflow-y: auto;
    }

    .template-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .template-card:hover {
      border-color: #667eea;
      transform: translateX(3px);
    }

    .template-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #1e293b;
    }

    .template-desc {
      font-size: 0.7rem;
      color: #64748b;
      margin: 0.3rem 0;
    }

    .template-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin: 0.5rem 0;
    }

    .badge {
      background: #eef2ff;
      padding: 0.2rem 0.5rem;
      border-radius: 12px;
      font-size: 0.6rem;
      color: #667eea;
    }

    .template-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .btn-sm {
      padding: 0.25rem 0.6rem;
      font-size: 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }

    .btn-use {
      background: #667eea;
      color: white;
    }

    .btn-edit {
      background: #f1f5f9;
      color: #334155;
    }

    .btn-delete {
      background: #fee2e2;
      color: #dc2626;
    }

    .btn-save-template {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      width: 100%;
      margin-top: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
    }

    .message {
      margin: 1rem;
      padding: 0.8rem;
      border-radius: 10px;
      display: none;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .form-builder-section {
      margin-bottom: 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .builder-header {
      padding: 0.7rem 1rem;
      background: #f8fafc;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .builder-fields {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0 1rem;
    }

    .builder-fields.open {
      max-height: 400px;
      padding: 0.8rem;
    }

    .field-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.3rem 0;
    }

    .field-checkbox input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .field-checkbox label {
      font-size: 0.8rem;
      color: #334155;
      cursor: pointer;
      flex: 1;
    }
  </style>
</head>
<body>
<div class="navbar">
  <h2><i class="fas fa-chart-line"></i> Ultimate Sales System - Only Selected Fields Appear</h2>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
</div>

<div class="container">
  <div class="two-column">
    <!-- MAIN SALES FORM -->
    <div class="main-panel">
      <div class="panel-header">
        <h3><i class="fas fa-file-invoice"></i> Sales Invoice - Only Selected Fields Show</h3>
      </div>
      <form id="salesForm">
        <div id="dynamicFormContainer"></div>
        <div id="summaryContainer" class="summary-card" style="display: none;"></div>
        <div class="action-buttons">
          <button type="button" class="btn-reset" onclick="resetForm()">Reset Form</button>
          <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Sale</button>
        </div>
        <div id="formMessage" class="message"></div>
      </form>
    </div>

    <!-- TEMPLATES PANEL -->
    <div class="templates-panel">
      <div class="templates-header">
        <h3><i class="fas fa-copy"></i> Saved Templates</h3>
        <p style="font-size: 0.7rem; opacity: 0.8;">Click to load - Only selected fields appear</p>
      </div>
      <div class="templates-list">
        <div id="templatesList"></div>
        <button class="btn-save-template" onclick="openFormBuilder()">
          <i class="fas fa-plus"></i> Create New Template
        </button>
      </div>
    </div>
  </div>
</div>

<!-- FORM BUILDER MODAL -->
<div id="formBuilderModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 1rem;"><i class="fas fa-paint-brush"></i> Form Builder - Select Fields</h3>
    <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 1rem;">Choose which fields will appear in your sales form</p>
    <div id="builderContainer"></div>
    <div class="input-group" style="margin: 1rem 0;">
      <label>Template Name</label>
      <input type="text" id="newTemplateName" placeholder="e.g., Simple Invoice, Retail Bill">
    </div>
    <div class="input-group">
      <label>Description</label>
      <textarea id="newTemplateDesc" rows="2" placeholder="Optional description"></textarea>
    </div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
      <button class="btn-reset" onclick="closeBuilderModal()">Cancel</button>
      <button class="btn-save" onclick="saveNewTemplate()">Save Template</button>
    </div>
  </div>
</div>

<!-- EDIT TEMPLATE MODAL -->
<div id="editTemplateModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 1rem;"><i class="fas fa-edit"></i> Edit Template</h3>
    <div class="input-group"><label>Template Name</label><input type="text" id="editTemplateName"></div>
    <div class="input-group"><label>Description</label><textarea id="editTemplateDesc" rows="2"></textarea></div>
    <div style="margin: 1rem 0;"><strong>Select Fields:</strong></div>
    <div id="editTemplateFields" style="max-height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.8rem;"></div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
      <button class="btn-reset" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="updateTemplate()">Update Template</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
    measurementId: "G-YFFJL2H54X"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let currentCompany = null;
  let templates = [];
  let currentSelectedFields = {};
  let editTemplateIndex = null;
  let invoiceCounter = 1;

  // ALL AVAILABLE SECTIONS
  const sections = [
    {
      id: 'basic', name: '📋 Basic Information', icon: 'fa-info-circle',
      fields: [
        { id: 'invoiceNo', label: 'Invoice Number', type: 'text' },
        { id: 'invoiceDate', label: 'Invoice Date', type: 'date' },
        { id: 'dueDate', label: 'Due Date', type: 'date' },
        { id: 'orderType', label: 'Order Type', type: 'select', options: ['Standard', 'Rush', 'Wholesale', 'Retail', 'Export'] },
        { id: 'salesPerson', label: 'Sales Person', type: 'text' }
      ]
    },
    {
      id: 'customer', name: '👥 Customer Information', icon: 'fa-user',
      fields: [
        { id: 'customerType', label: 'Customer Type', type: 'select', options: ['Regular', 'Walk-in', 'Loyal Customer', 'VIP', 'Corporate'] },
        { id: 'customerName', label: 'Customer Name', type: 'text' },
        { id: 'customerEmail', label: 'Email', type: 'email' },
        { id: 'customerPhone', label: 'Phone', type: 'tel' },
        { id: 'customerGST', label: 'GST Number', type: 'text' }
      ]
    },
    {
      id: 'items', name: '📦 Products & Services', icon: 'fa-box',
      fields: [{ id: 'items', label: 'Items Table', type: 'dynamic' }]
    },
    {
      id: 'pricing', name: '💰 Pricing & Charges', icon: 'fa-dollar-sign',
      fields: [
        { id: 'currency', label: 'Currency', type: 'select', options: ['INR (₹)', 'USD ($)', 'EUR (€)'] },
        { id: 'shippingCharges', label: 'Shipping Charges', type: 'number', default: 0 },
        { id: 'packingCharges', label: 'Packing Charges', type: 'number', default: 0 },
        { id: 'globalDiscount', label: 'Discount %', type: 'number', default: 0 }
      ]
    },
    {
      id: 'payment', name: '💳 Payment Details', icon: 'fa-credit-card',
      fields: [
        { id: 'paymentMethod', label: 'Payment Method', type: 'select', options: ['Cash', 'Card', 'UPI', 'Bank Transfer'] },
        { id: 'paymentStatus', label: 'Payment Status', type: 'select', options: ['Paid', 'Pending', 'Partial'] },
        { id: 'amountPaid', label: 'Amount Paid', type: 'number', default: 0 }
      ]
    },
    {
      id: 'notes', name: '📝 Notes', icon: 'fa-file-alt',
      fields: [
        { id: 'instructions', label: 'Special Instructions', type: 'textarea' }
      ]
    }
  ];

  function getCompanyId() {
    const companyData = sessionStorage.getItem('currentCompany');
    if (!companyData) { window.location.href = 'login.html'; return null; }
    currentCompany = JSON.parse(companyData);
    return currentCompany.id;
  }

  function generateInvoiceNumber() {
    const date = new Date();
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    return `INV-${year}${month}-${String(invoiceCounter++).padStart(4, '0')}`;
  }

  function buildBuilderUI(containerId, selectedFields = {}) {
    const container = document.getElementById(containerId);
    let html = '';
    sections.forEach((section) => {
      html += `
        <div class="form-builder-section">
          <div class="builder-header" onclick="toggleBuilderSection(this)">
            <div><i class="fas ${section.icon}"></i> ${section.name} (${section.fields.length} fields)</div>
            <div>
              <span class="badge" onclick="event.stopPropagation(); toggleAllFieldsInBuilder('${section.id}', true)">Select All</span>
              <span class="badge" onclick="event.stopPropagation(); toggleAllFieldsInBuilder('${section.id}', false)">Clear All</span>
              <i class="fas fa-chevron-down"></i>
            </div>
          </div>
          <div class="builder-fields">
            ${section.fields.map(field => `
              <div class="field-checkbox">
                <input type="checkbox" id="builder_${field.id}" ${selectedFields[field.id] ? 'checked' : ''}>
                <label for="builder_${field.id}">${field.label}</label>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function getBuilderSelectedFields() {
    const selected = {};
    sections.forEach(section => {
      section.fields.forEach(field => {
        const checkbox = document.getElementById(`builder_${field.id}`);
        if (checkbox && checkbox.checked) selected[field.id] = true;
      });
    });
    return selected;
  }

  window.toggleBuilderSection = function(header) {
    header.nextElementSibling.classList.toggle('open');
  };

  window.toggleAllFieldsInBuilder = function(sectionId, select) {
    const section = sections.find(s => s.id === sectionId);
    if (section) {
      section.fields.forEach(field => {
        const checkbox = document.getElementById(`builder_${field.id}`);
        if (checkbox) checkbox.checked = select;
      });
    }
  };

  // Render Sales Form
  function renderSalesForm(selectedFields) {
    const container = document.getElementById('dynamicFormContainer');
    let html = '';
    let hasItems = false;
    
    sections.forEach(section => {
      const visibleFields = section.fields.filter(f => selectedFields[f.id]);
      if (visibleFields.length === 0) return;
      
      if (section.id === 'items') {
        hasItems = true;
        html += `
          <div class="form-card">
            <div class="form-card-header"><i class="fas ${section.icon}"></i> ${section.name}</div>
            <div class="form-card-body">
              <div class="items-table-wrapper">
                <table class="items-table">
                  <thead><tr><th>#</th><th>Product</th><th>Description</th><th>Qty</th><th>Price</th><th>Disc%</th><th>Tax%</th><th>Amount</th><th></th></tr></thead>
                  <tbody id="itemsBody"></tbody>
                </table>
              </div>
              <button type="button" class="btn-add-item" onclick="addItem()"><i class="fas fa-plus"></i> Add Item</button>
            </div>
          </div>
        `;
      } else {
        let fieldsHtml = '<div class="form-row">';
        visibleFields.forEach(field => {
          let inputHtml = '';
          if (field.type === 'select') {
            inputHtml = `<select id="${field.id}">${field.options.map(opt => `<option>${opt}</option>`).join('')}</select>`;
          } else if (field.type === 'textarea') {
            inputHtml = `<textarea id="${field.id}" rows="2"></textarea>`;
          } else if (field.type === 'date') {
            inputHtml = `<input type="date" id="${field.id}" value="${new Date().toISOString().split('T')[0]}">`;
          } else {
            inputHtml = `<input type="${field.type}" id="${field.id}" value="${field.default || ''}">`;
          }
          fieldsHtml += `
            <div class="input-group">
              <label>${field.label}</label>
              ${inputHtml}
            </div>
          `;
        });
        fieldsHtml += '</div>';
        html += `
          <div class="form-card">
            <div class="form-card-header"><i class="fas ${section.icon}"></i> ${section.name}</div>
            <div class="form-card-body">${fieldsHtml}</div>
          </div>
        `;
      }
    });
    
    if (html === '') {
      container.innerHTML = `
        <div class="form-card" style="text-align: center; padding: 2rem;">
          <i class="fas fa-folder-open" style="font-size: 2rem; margin-bottom: 1rem;"></i>
          <p>No fields selected. Create a template to start.</p>
          <button type="button" class="btn-save-template" style="width: auto;" onclick="openFormBuilder()">Create New Template</button>
        </div>
      `;
      document.getElementById('summaryContainer').style.display = 'none';
      return;
    }
    
    container.innerHTML = html;
    
    if (selectedFields.invoiceNo) {
      const invoiceField = document.getElementById('invoiceNo');
      if (invoiceField && !invoiceField.value) invoiceField.value = generateInvoiceNumber();
    }
    if (selectedFields.invoiceDate) {
      const dateField = document.getElementById('invoiceDate');
      if (dateField && !dateField.value) dateField.value = new Date().toISOString().split('T')[0];
    }
    
    if (hasItems) {
      const tbody = document.getElementById('itemsBody');
      if (tbody && tbody.children.length === 0) addItem();
    }
    
    attachEvents();
    updateSummary(selectedFields);
  }

  function attachEvents() {
    const ids = ['shippingCharges', 'packingCharges', 'globalDiscount', 'amountPaid'];
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.removeEventListener('change', calculateTotal);
        el.removeEventListener('keyup', calculateTotal);
        el.addEventListener('change', () => { calculateTotal(); updateSummary(currentSelectedFields); });
        el.addEventListener('keyup', () => { calculateTotal(); updateSummary(currentSelectedFields); });
      }
    });
  }

  function addItem() {
    const tbody = document.getElementById('itemsBody');
    if (!tbody) return;
    const rowCount = tbody.children.length;
    const newRow = document.createElement('tr');
    newRow.innerHTML = `
       <td>${rowCount + 1}</td>
       <td><input type="text" class="item-name" placeholder="Item name" style="width:100%"></td>
       <td><input type="text" class="item-desc" placeholder="Description" style="width:100%"></td>
       <td><input type="number" class="item-qty" value="1" min="1" style="width:70px"></td>
       <td><input type="number" class="item-price" value="0" step="0.01" style="width:90px"></td>
       <td><input type="number" class="item-discount" value="0" step="0.01" style="width:70px"></td>
       <td><select class="item-tax" style="width:70px"><option>0</option><option>5</option><option>12</option><option>18</option></select></td>
       <td class="item-amount">0.00</td>
       <td><button type="button" onclick="removeItem(this)"><i class="fas fa-trash" style="color:#dc2626"></i></button></td>
    `;
    tbody.appendChild(newRow);
    attachItemEvents(newRow);
    calculateTotal();
    updateSummary(currentSelectedFields);
  }

  window.removeItem = function(btn) {
    const row = btn.closest('tr');
    const tbody = document.getElementById('itemsBody');
    if (tbody.children.length > 1) {
      row.remove();
      renumberRows();
      calculateTotal();
      updateSummary(currentSelectedFields);
    }
  };

  function renumberRows() {
    const rows = document.getElementById('itemsBody').children;
    for (let i = 0; i < rows.length; i++) rows[i].cells[0].innerHTML = i + 1;
  }

  function attachItemEvents(row) {
    row.querySelectorAll('input, select').forEach(input => {
      input.addEventListener('change', () => { calculateTotal(); updateSummary(currentSelectedFields); });
      input.addEventListener('keyup', () => { calculateTotal(); updateSummary(currentSelectedFields); });
    });
  }

  function calculateTotal() {
    let subtotal = 0, totalDiscount = 0, totalTax = 0;
    const rows = document.getElementById('itemsBody')?.children || [];
    for (let row of rows) {
      const qty = parseFloat(row.querySelector('.item-qty')?.value) || 0;
      const price = parseFloat(row.querySelector('.item-price')?.value) || 0;
      const discount = parseFloat(row.querySelector('.item-discount')?.value) || 0;
      const tax = parseFloat(row.querySelector('.item-tax')?.value) || 0;
      const itemTotal = qty * price;
      const discountAmount = itemTotal * (discount / 100);
      const afterDiscount = itemTotal - discountAmount;
      const taxAmount = afterDiscount * (tax / 100);
      subtotal += itemTotal;
      totalDiscount += discountAmount;
      totalTax += taxAmount;
      const amountCell = row.querySelector('.item-amount');
      if (amountCell) amountCell.innerHTML = (afterDiscount + taxAmount).toFixed(2);
    }
    
    const shipping = parseFloat(document.getElementById('shippingCharges')?.value) || 0;
    const packing = parseFloat(document.getElementById('packingCharges')?.value) || 0;
    const globalDiscount = parseFloat(document.getElementById('globalDiscount')?.value) || 0;
    let grandTotal = subtotal - totalDiscount + totalTax + shipping + packing;
    grandTotal -= grandTotal * (globalDiscount / 100);
    
    const currency = document.getElementById('currency')?.value?.split(' ')[0] || '₹';
    const symbol = currency === 'INR' ? '₹' : currency === 'USD' ? '$' : '€';
    
    window.currentTotals = { subtotal, totalDiscount, totalTax, shipping, packing, grandTotal };
    return { subtotal, totalDiscount, totalTax, shipping, packing, grandTotal, symbol };
  }

  // DYNAMIC SUMMARY - Only shows fields that are selected AND have values > 0
  function updateSummary(selectedFields) {
    const totals = calculateTotal();
    const container = document.getElementById('summaryContainer');
    if (!container) return;
    
    let summaryHtml = '';
    let hasValues = false;
    
    // Subtotal - always show if items exist
    if (totals.subtotal > 0 || (selectedFields.items && document.getElementById('itemsBody')?.children.length > 0)) {
      summaryHtml += `<div class="summary-row"><span>Subtotal</span><span>${totals.symbol}${totals.subtotal.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    // Item Discount - show if > 0
    if (totals.totalDiscount > 0) {
      summaryHtml += `<div class="summary-row"><span>Item Discount</span><span>${totals.symbol}${totals.totalDiscount.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    // Tax - show if > 0
    if (totals.totalTax > 0) {
      summaryHtml += `<div class="summary-row"><span>Tax</span><span>${totals.symbol}${totals.totalTax.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    // Shipping Charges - only if field is selected AND value > 0
    if (selectedFields.shippingCharges && totals.shipping > 0) {
      summaryHtml += `<div class="summary-row"><span>Shipping Charges</span><span>${totals.symbol}${totals.shipping.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    // Packing Charges - only if field is selected AND value > 0
    if (selectedFields.packingCharges && totals.packing > 0) {
      summaryHtml += `<div class="summary-row"><span>Packing Charges</span><span>${totals.symbol}${totals.packing.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    // Global Discount - only if field is selected AND value > 0
    const globalDiscountValue = parseFloat(document.getElementById('globalDiscount')?.value) || 0;
    if (selectedFields.globalDiscount && globalDiscountValue > 0) {
      const discountAmount = totals.grandTotal * (globalDiscountValue / 100);
      summaryHtml += `<div class="summary-row"><span>Discount (${globalDiscountValue}%)</span><span>${totals.symbol}${discountAmount.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    // Grand Total - always show if any values exist
    if (hasValues || totals.grandTotal > 0) {
      summaryHtml += `<div class="summary-row summary-total"><span>Grand Total</span><span>${totals.symbol}${totals.grandTotal.toFixed(2)}</span></div>`;
    }
    
    // Amount Paid - only if field is selected
    const amountPaid = parseFloat(document.getElementById('amountPaid')?.value) || 0;
    if (selectedFields.amountPaid && amountPaid > 0) {
      summaryHtml += `<div class="summary-row"><span>Amount Paid</span><span>${totals.symbol}${amountPaid.toFixed(2)}</span></div>`;
      const balance = totals.grandTotal - amountPaid;
      summaryHtml += `<div class="summary-row"><span>Balance Due</span><span>${totals.symbol}${balance.toFixed(2)}</span></div>`;
      hasValues = true;
    } else if (selectedFields.amountPaid && amountPaid === 0 && totals.grandTotal > 0) {
      summaryHtml += `<div class="summary-row"><span>Amount Paid</span><span>${totals.symbol}0.00</span></div>`;
      summaryHtml += `<div class="summary-row"><span>Balance Due</span><span>${totals.symbol}${totals.grandTotal.toFixed(2)}</span></div>`;
      hasValues = true;
    }
    
    if (!hasValues && totals.grandTotal === 0) {
      container.style.display = 'none';
    } else {
      container.style.display = 'block';
      container.innerHTML = summaryHtml;
    }
  }

  // Template Functions
  function loadTemplates() {
    const saved = localStorage.getItem(`sales_templates_${currentCompany?.id}`);
    templates = saved ? JSON.parse(saved) : [];
    renderTemplatesList();
  }

  function saveTemplates() {
    localStorage.setItem(`sales_templates_${currentCompany?.id}`, JSON.stringify(templates));
    renderTemplatesList();
  }

  function renderTemplatesList() {
    const container = document.getElementById('templatesList');
    if (templates.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i><br>No templates saved<br>Click "Create New Template" to start</div>';
      return;
    }
    container.innerHTML = templates.map((t, i) => `
      <div class="template-card">
        <div class="template-name">📄 ${escapeHtml(t.name)}</div>
        <div class="template-desc">${escapeHtml(t.description || 'No description')}</div>
        <div class="template-badges">
          ${Object.keys(t.fields).slice(0, 4).map(f => `<span class="badge">${getFieldLabel(f)}</span>`).join('')}
          ${Object.keys(t.fields).length > 4 ? `<span class="badge">+${Object.keys(t.fields).length - 4}</span>` : ''}
        </div>
        <div class="template-actions">
          <button class="btn-sm btn-use" onclick="loadTemplate(${i})"><i class="fas fa-play"></i> Use</button>
          <button class="btn-sm btn-edit" onclick="openEditTemplate(${i})"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteTemplate(${i})"><i class="fas fa-trash"></i> Delete</button>
        </div>
      </div>
    `).join('');
  }

  window.openFormBuilder = function() {
    buildBuilderUI('builderContainer', {});
    document.getElementById('newTemplateName').value = '';
    document.getElementById('newTemplateDesc').value = '';
    document.getElementById('formBuilderModal').classList.add('show');
  };

  window.saveNewTemplate = function() {
    const name = document.getElementById('newTemplateName').value.trim();
    if (!name) { alert('Please enter template name'); return; }
    const desc = document.getElementById('newTemplateDesc').value;
    const selectedFields = getBuilderSelectedFields();
    if (Object.keys(selectedFields).length === 0) { alert('Please select at least one field'); return; }
    templates.push({ id: Date.now(), name, description: desc, fields: selectedFields, createdAt: new Date().toISOString() });
    saveTemplates();
    closeBuilderModal();
    alert(`Template "${name}" saved with ${Object.keys(selectedFields).length} fields!`);
  };

  window.loadTemplate = function(index) {
    const template = templates[index];
    currentSelectedFields = { ...template.fields };
    renderSalesForm(currentSelectedFields);
    document.getElementById('formMessage').innerHTML = `<i class="fas fa-check-circle"></i> Loaded: ${escapeHtml(template.name)}`;
    document.getElementById('formMessage').className = 'message success';
    setTimeout(() => document.getElementById('formMessage').className = 'message', 3000);
  };

  window.openEditTemplate = function(index) {
    editTemplateIndex = index;
    const template = templates[index];
    document.getElementById('editTemplateName').value = template.name;
    document.getElementById('editTemplateDesc').value = template.description || '';
    let fieldsHtml = '';
    sections.forEach(section => {
      fieldsHtml += `<div style="margin-top: 0.5rem;"><strong>${section.name}</strong></div>`;
      section.fields.forEach(field => {
        fieldsHtml += `
          <div class="field-checkbox">
            <input type="checkbox" id="edit_${field.id}" ${template.fields[field.id] ? 'checked' : ''}>
            <label>${field.label}</label>
          </div>
        `;
      });
    });
    document.getElementById('editTemplateFields').innerHTML = fieldsHtml;
    document.getElementById('editTemplateModal').classList.add('show');
  };

  window.updateTemplate = function() {
    const newName = document.getElementById('editTemplateName').value.trim();
    if (!newName) { alert('Template name required'); return; }
    const newDesc = document.getElementById('editTemplateDesc').value;
    const updatedFields = {};
    sections.forEach(section => {
      section.fields.forEach(field => {
        const checkbox = document.getElementById(`edit_${field.id}`);
        if (checkbox && checkbox.checked) updatedFields[field.id] = true;
      });
    });
    if (Object.keys(updatedFields).length === 0) { alert('Please select at least one field'); return; }
    templates[editTemplateIndex] = { ...templates[editTemplateIndex], name: newName, description: newDesc, fields: updatedFields };
    saveTemplates();
    closeEditModal();
    alert('Template updated!');
  };

  window.deleteTemplate = function(index) {
    if (confirm('Delete this template?')) {
      templates.splice(index, 1);
      saveTemplates();
    }
  };

  function getFieldLabel(fieldId) {
    for (const section of sections) {
      const field = section.fields.find(f => f.id === fieldId);
      if (field) return field.label;
    }
    return fieldId;
  }

  window.closeBuilderModal = () => document.getElementById('formBuilderModal').classList.remove('show');
  window.closeEditModal = () => document.getElementById('editTemplateModal').classList.remove('show');

  // Save Sale
  document.getElementById('salesForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const companyId = getCompanyId();
    if (!companyId) return;
    
    const items = [];
    const rows = document.getElementById('itemsBody')?.children || [];
    for (let row of rows) {
      if (row.querySelector('.item-name')?.value) {
        items.push({
          name: row.querySelector('.item-name')?.value,
          quantity: parseFloat(row.querySelector('.item-qty')?.value) || 0,
          unitPrice: parseFloat(row.querySelector('.item-price')?.value) || 0,
          amount: parseFloat(row.querySelector('.item-amount')?.innerHTML) || 0
        });
      }
    }
    
    const totals = calculateTotal();
    const saleData = {
      invoiceNo: document.getElementById('invoiceNo')?.value || generateInvoiceNumber(),
      invoiceDate: document.getElementById('invoiceDate')?.value || new Date().toISOString().split('T')[0],
      customerName: document.getElementById('customerName')?.value || 'Walk-in Customer',
      customerPhone: document.getElementById('customerPhone')?.value || '',
      items: items,
      grandTotal: totals.grandTotal,
      createdAt: Date.now()
    };
    
    try {
      await addDoc(collection(db, `companies/${companyId}/sales`), saleData);
      const msg = document.getElementById('formMessage');
      msg.innerHTML = '<i class="fas fa-check-circle"></i> Sale saved successfully!';
      msg.className = 'message success';
      setTimeout(() => msg.className = 'message', 3000);
      resetForm();
    } catch (error) {
      const msg = document.getElementById('formMessage');
      msg.innerHTML = '❌ Error saving sale';
      msg.className = 'message error';
    }
  });

  function resetForm() {
    if (currentSelectedFields.invoiceNo) {
      const invoiceField = document.getElementById('invoiceNo');
      if (invoiceField) invoiceField.value = generateInvoiceNumber();
    }
    if (currentSelectedFields.invoiceDate) {
      const dateField = document.getElementById('invoiceDate');
      if (dateField) dateField.value = new Date().toISOString().split('T')[0];
    }
    document.querySelectorAll('#dynamicFormContainer input, #dynamicFormContainer select, #dynamicFormContainer textarea').forEach(el => {
      if (el.type === 'number' && el.id !== 'invoiceNo') el.value = '0';
      else if (el.type === 'text' && !el.id.includes('invoice')) el.value = '';
      else if (el.tagName === 'SELECT') el.selectedIndex = 0;
    });
    const itemsBody = document.getElementById('itemsBody');
    if (itemsBody) {
      itemsBody.innerHTML = '';
      if (currentSelectedFields.items) addItem();
    }
    calculateTotal();
    updateSummary(currentSelectedFields);
  }

  window.resetForm = resetForm;
  window.calculateTotal = calculateTotal;
  window.addItem = addItem;
  window.removeItem = removeItem;
  window.updateSummary = updateSummary;

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  // Initialize
  if (getCompanyId()) {
    loadTemplates();
    renderSalesForm({});
    setInterval(() => { calculateTotal(); updateSummary(currentSelectedFields); }, 200);
  }
</script>
</body>
</html>
