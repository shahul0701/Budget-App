<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pro Sales Manager | Ultimate Invoice System with Custom Templates</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%); min-height: 100vh; }
    
    /* Navbar */
    .navbar { background: linear-gradient(135deg, #0f2b3d 0%, #1a3a4f 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-area i { font-size: 28px; color: #ffd966; }
    .navbar h2 { font-size: 1.4rem; font-weight: 700; }
    
    /* Tabs */
    .tabs-container { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 2rem; display: flex; gap: 0.3rem; overflow-x: auto; position: sticky; top: 70px; z-index: 99; }
    .tab-btn { padding: 1rem 1.5rem; background: none; border: none; font-size: 0.85rem; font-weight: 600; color: #5a6e8a; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .tab-btn:hover { color: #2c7da0; }
    .tab-btn.active { color: #2c7da0; border-bottom-color: #2c7da0; background: #f0f9ff; }
    
    .tab-content { display: none; padding: 2rem; animation: fadeIn 0.3s; max-width: 1600px; margin: 0 auto; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .stat-card { background: white; padding: 1.3rem; border-radius: 24px; border: 1px solid #e9eef3; box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(135deg, #2c7da0, #61a5c2); }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: #0a2540; }
    .stat-label { color: #5a6e8a; font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
    
    /* Buttons */
    .btn-primary { background: linear-gradient(135deg, #2c7da0, #1f5068); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(44,125,160,0.4); }
    .btn-secondary { background: #f1f5f9; color: #2d3e50; border: 1px solid #e2e8f0; padding: 0.6rem 1.3rem; border-radius: 40px; cursor: pointer; font-weight: 500; }
    .btn-danger { background: #fee2e2; color: #dc2626; border: none; padding: 0.3rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.7rem; }
    .add-sale-btn { background: linear-gradient(135deg, #2c7da0, #1f5068); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 40px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
    
    /* Form Styles */
    .form-card { background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 1.2rem; border: 1px solid #e9eef3; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; }
    .input-group label { display: block; font-weight: 700; font-size: 0.7rem; color: #5a6e8a; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 16px; font-size: 0.85rem; transition: all 0.2s; }
    .input-group input:focus, .input-group select:focus { outline: none; border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.1); }
    
    /* Items Table */
    .items-editor { width: 100%; border-collapse: collapse; background: #fefefe; border-radius: 20px; overflow: hidden; }
    .items-editor th, .items-editor td { padding: 0.7rem; border: 1px solid #e9eef3; }
    .items-editor input { width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 12px; }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 32px; padding: 2rem; max-width: 900px; width: 94%; max-height: 88vh; overflow-y: auto; }
    
    /* Template Builder Sections */
    .template-section { margin-bottom: 1.5rem; border: 1px solid #e2e8f0; border-radius: 20px; overflow: hidden; }
    .template-section-header { background: #f8fafc; padding: 1rem 1.2rem; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .template-section-header i { transition: transform 0.2s; }
    .template-section-header.collapsed i { transform: rotate(-90deg); }
    .template-section-content { padding: 1.2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; background: white; }
    .template-section-content.collapsed { display: none; }
    .field-option { display: flex; align-items: center; gap: 10px; padding: 0.5rem; border-radius: 12px; transition: background 0.2s; }
    .field-option:hover { background: #f8fafc; }
    .field-option input { width: 18px; height: 18px; cursor: pointer; }
    .field-option label { font-size: 0.85rem; cursor: pointer; flex: 1; color: #334155; }
    
    /* Bill Summary */
    .bill-summary { background: linear-gradient(135deg, #f8fafc, #ffffff); padding: 1.2rem; border-radius: 24px; margin: 1rem 0; border: 1px solid #e2e8f0; }
    .summary-line { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #e2e8f0; }
    .summary-total { font-size: 1.2rem; font-weight: 800; color: #2c7da0; border-top: 2px solid #2c7da0; margin-top: 0.5rem; padding-top: 0.5rem; }
    
    .badge-success { background: #d1fae5; color: #0b5e42; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; }
    .badge-warning { background: #fed7aa; color: #9b4a1a; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; }
    .data-table-container { background: white; border-radius: 24px; overflow-x: auto; border: 1px solid #e9eef3; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 800px; }
    .data-table th, .data-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #edf2f7; }
    .search-box input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; border: 1.5px solid #e2e8f0; border-radius: 60px; background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%2394a3b8"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>') no-repeat 1rem center; background-size: 1.2rem; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .message { position: fixed; bottom: 24px; right: 24px; padding: 1rem 1.8rem; border-radius: 50px; z-index: 1001; animation: slideIn 0.3s; font-weight: 500; }
    .message.success { background: #0b5e42; color: white; }
    .message.error { background: #c2410c; color: white; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    hr { margin: 1rem 0; }
    .template-card { background: white; border-radius: 20px; padding: 1.2rem; border: 1px solid #e9eef3; cursor: pointer; transition: all 0.2s; }
    .template-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); border-color: #2c7da0; }
  </style>
</head>
<body>
<div class="navbar">
  <div class="logo-area"><i class="fas fa-file-invoice-dollar"></i><h2>Pro Sales Manager</h2></div>
  <button class="btn-secondary" style="background: rgba(255,255,255,0.15); color: white; border: none;" onclick="window.location.href='dashboard.html'"><i class="fas fa-chart-pie"></i> Dashboard</button>
</div>

<div class="tabs-container">
  <button class="tab-btn active" onclick="switchTab('invoices')"><i class="fas fa-receipt"></i> Invoices</button>
  <button class="tab-btn" onclick="switchTab('create')"><i class="fas fa-plus-circle"></i> Create Invoice</button>
  <button class="tab-btn" onclick="switchTab('templates')"><i class="fas fa-copy"></i> Templates</button>
  <button class="tab-btn" onclick="switchTab('analytics')"><i class="fas fa-chart-line"></i> Analytics</button>
</div>

<!-- Invoices Tab -->
<div id="invoicesTab" class="tab-content active">
  <div class="flex-between"><h2><i class="fas fa-receipt"></i> All Invoices</h2><button class="add-sale-btn" onclick="switchTab('create')"><i class="fas fa-plus"></i> New Invoice</button></div>
  <div class="stats-grid" id="salesStats"></div>
  <div class="search-box"><input type="text" id="searchSales" placeholder="Search by invoice #, customer, phone, GST..." onkeyup="filterSales()"></div>
  <div id="salesList" class="data-table-container" style="margin-top: 1rem;"></div>
</div>

<!-- Create Invoice Tab -->
<div id="createTab" class="tab-content">
  <div class="flex-between"><h2><i class="fas fa-file-invoice"></i> Create Invoice</h2><div><button class="btn-secondary" onclick="resetInvoiceForm()"><i class="fas fa-redo"></i> Reset</button></div></div>
  <form id="salesForm"><div id="dynamicFormFields"></div><div id="billSummary" class="bill-summary"></div><div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;"><button type="button" class="btn-secondary" onclick="resetInvoiceForm()">Clear</button><button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Invoice</button></div></form>
</div>

<!-- Templates Tab -->
<div id="templatesTab" class="tab-content">
  <div class="flex-between"><h2><i class="fas fa-copy"></i> Invoice Templates</h2><button class="add-sale-btn" onclick="openTemplateBuilder()"><i class="fas fa-plus"></i> Create Template</button></div>
  <div id="templatesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem;"></div>
</div>

<!-- Analytics Tab -->
<div id="analyticsTab" class="tab-content">
  <h2><i class="fas fa-chart-line"></i> Sales Analytics</h2>
  <div class="stats-grid" id="analyticsStats"></div>
  <div class="data-table-container" style="padding: 1.2rem;"><canvas id="revenueChart" style="max-height: 400px;"></canvas></div>
  <div class="data-table-container" style="margin-top: 1rem; padding: 1.2rem;"><canvas id="topProductsChart" style="max-height: 400px;"></canvas></div>
</div>

<!-- Template Builder Modal -->
<div id="templateBuilderModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-palette"></i> Create Custom Invoice Template</h3>
    <div class="input-group" style="margin: 1rem 0;"><label>Template Name</label><input type="text" id="templateName" placeholder="e.g., Professional Invoice, GST Invoice, Quick Sale"></div>
    <div id="templateSectionsContainer"></div>
    <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
      <button class="btn-secondary" onclick="closeTemplateBuilder()">Cancel</button>
      <button class="btn-primary" onclick="saveTemplate()">Save Template</button>
    </div>
  </div>
</div>

<!-- Edit Sale Modal -->
<div id="editSaleModal" class="modal"><div class="modal-content"><h3>Edit Invoice</h3><div id="editSaleForm"></div><div style="display:flex;gap:1rem;margin-top:1rem;"><button class="btn-secondary" onclick="closeEditSaleModal()">Cancel</button><button class="btn-primary" onclick="updateSale()">Update</button><button class="btn-danger" onclick="deleteSale()">Delete</button></div></div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A", authDomain: "budget-app-1365f.firebaseapp.com", projectId: "budget-app-1365f", storageBucket: "budget-app-1365f.firebasestorage.app", messagingSenderId: "1036194450411", appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let currentCompany = null, templates = [], allSales = [], currentItems = [], currentTemplate = null, currentEditSaleId = null, charts = {};
  
  function getCompanyId() { const data = sessionStorage.getItem('currentCompany'); if (!data) { window.location.href = 'login.html'; return null; } currentCompany = JSON.parse(data); return currentCompany.id; }
  
  // COMPLETE SALES FIELDS - EVERY FIELD INDIVIDUALLY SELECTABLE
  const allSalesFields = {
    "📄 Invoice Details": [
      { id: "invoiceNo", label: "Invoice Number", type: "text", default: "" },
      { id: "invoiceDate", label: "Invoice Date", type: "date", default: new Date().toISOString().split('T')[0] },
      { id: "dueDate", label: "Due Date", type: "date", default: "" },
      { id: "poNumber", label: "PO / Reference Number", type: "text", default: "" },
      { id: "salesPerson", label: "Sales Person Name", type: "text", default: "" },
      { id: "placeOfSupply", label: "Place of Supply", type: "text", default: "" },
      { id: "orderDate", label: "Order Date", type: "date", default: "" }
    ],
    "👥 Customer Information": [
      { id: "customerName", label: "Customer Name", type: "text", required: true, default: "" },
      { id: "customerPhone", label: "Phone / Mobile", type: "tel", default: "" },
      { id: "customerEmail", label: "Email Address", type: "email", default: "" },
      { id: "customerGST", label: "GST / VAT / TAX ID", type: "text", default: "" },
      { id: "billingAddress", label: "Billing Address", type: "textarea", default: "" },
      { id: "shippingAddress", label: "Shipping Address", type: "textarea", default: "" },
      { id: "customerPan", label: "PAN Number", type: "text", default: "" },
      { id: "customerState", label: "State / Province", type: "text", default: "" }
    ],
    "📦 Line Items": [
      { id: "items", label: "Products / Services", type: "dynamic", default: "" }
    ],
    "💰 Discounts & Charges": [
      { id: "currency", label: "Currency", type: "select", options: ["₹ INR", "$ USD", "€ EUR", "£ GBP"], default: "₹ INR" },
      { id: "discountType", label: "Discount Type", type: "select", options: ["Percentage", "Fixed Amount"], default: "Percentage" },
      { id: "discountValue", label: "Discount Value", type: "number", default: "0" },
      { id: "shippingCharges", label: "Shipping Charges", type: "number", default: "0" },
      { id: "packingCharges", label: "Packing Charges", type: "number", default: "0" },
      { id: "handlingCharges", label: "Handling Charges", type: "number", default: "0" },
      { id: "freightCharges", label: "Freight / Courier", type: "number", default: "0" },
      { id: "insuranceCharges", label: "Insurance Charges", type: "number", default: "0" },
      { id: "roundOff", label: "Round Off Adjustment", type: "number", default: "0" }
    ],
    "🏛️ Tax Settings (GST/VAT)": [
      { id: "taxType", label: "Tax Regime", type: "select", options: ["GST", "VAT", "Sales Tax", "Service Tax", "None"], default: "GST" },
      { id: "cgst", label: "CGST (%)", type: "number", default: "0" },
      { id: "sgst", label: "SGST (%)", type: "number", default: "0" },
      { id: "igst", label: "IGST (%)", type: "number", default: "0" },
      { id: "cess", label: "Cess (%)", type: "number", default: "0" },
      { id: "additionalTax", label: "Additional Tax (%)", type: "number", default: "0" },
      { id: "vat", label: "VAT Rate (%)", type: "number", default: "0" },
      { id: "serviceTax", label: "Service Tax (%)", type: "number", default: "0" }
    ],
    "💳 Payment Information": [
      { id: "paymentMethod", label: "Payment Method", type: "select", options: ["Cash", "Credit Card", "Debit Card", "UPI", "Bank Transfer", "Cheque", "Net Banking", "Wallet"], default: "Cash" },
      { id: "paymentStatus", label: "Payment Status", type: "select", options: ["Paid", "Pending", "Partial", "Overdue"], default: "Pending" },
      { id: "amountPaid", label: "Amount Paid", type: "number", default: "0" },
      { id: "transactionId", label: "Transaction / Reference ID", type: "text", default: "" },
      { id: "paymentDate", label: "Payment Date", type: "date", default: "" },
      { id: "bankName", label: "Bank Name", type: "text", default: "" },
      { id: "chequeNo", label: "Cheque / DD Number", type: "text", default: "" }
    ],
    "🚚 Shipping & Delivery": [
      { id: "shippingMethod", label: "Shipping Method", type: "select", options: ["Standard", "Express", "Overnight", "Pickup"], default: "Standard" },
      { id: "courierName", label: "Courier / Carrier Name", type: "text", default: "" },
      { id: "trackingNumber", label: "Tracking Number", type: "text", default: "" },
      { id: "dispatchDate", label: "Dispatch Date", type: "date", default: "" },
      { id: "expectedDelivery", label: "Expected Delivery", type: "date", default: "" },
      { id: "ewayBillNo", label: "E-way Bill Number", type: "text", default: "" },
      { id: "transportMode", label: "Transport Mode", type: "select", options: ["Road", "Rail", "Air", "Ship"], default: "Road" }
    ],
    "📝 Notes & Legal": [
      { id: "notes", label: "Additional Notes / Instructions", type: "textarea", default: "" },
      { id: "terms", label: "Terms & Conditions", type: "textarea", default: "Payment due within 15 days. E&OE." },
      { id: "bankDetails", label: "Bank Account Details", type: "textarea", default: "" },
      { id: "signature", label: "Authorized Signature", type: "text", default: "" },
      { id: "companyStamp", label: "Company Stamp / Seal", type: "text", default: "" }
    ]
  };
  
  // Load Templates
  function loadTemplates() { const saved = localStorage.getItem(`sales_templates_${currentCompany?.id}`); templates = saved ? JSON.parse(saved) : getDefaultTemplates(); renderTemplates(); }
  
  function getDefaultTemplates() { return [
    { id: Date.now(), name: "Standard Invoice", selectedFields: { invoiceNo:true, invoiceDate:true, dueDate:true, customerName:true, customerPhone:true, items:true, currency:true, discountType:true, discountValue:true, shippingCharges:true, cgst:true, sgst:true, paymentMethod:true, amountPaid:true, paymentStatus:true, terms:true } },
    { id: Date.now()+1, name: "GST Invoice (India)", selectedFields: { invoiceNo:true, invoiceDate:true, dueDate:true, customerName:true, customerGST:true, billingAddress:true, items:true, currency:true, shippingCharges:true, cgst:true, sgst:true, igst:true, cess:true, placeOfSupply:true, ewayBillNo:true, paymentMethod:true, amountPaid:true, terms:true } },
    { id: Date.now()+2, name: "Quick Sale / Receipt", selectedFields: { invoiceNo:true, invoiceDate:true, customerName:true, customerPhone:true, items:true, currency:true, amountPaid:true, paymentMethod:true, paymentStatus:true } }
  ];}
  
  function renderTemplates() { document.getElementById('templatesGrid').innerHTML = templates.map(t => `<div class="template-card" onclick="useTemplate(${t.id})"><div class="template-name"><i class="fas fa-file-alt"></i> ${escapeHtml(t.name)}</div><div class="template-desc" style="font-size:0.7rem; color:#64748b; margin:0.5rem 0;">${Object.keys(t.selectedFields).length} fields selected</div><div style="display:flex; flex-wrap:wrap; gap:4px;">${Object.keys(t.selectedFields).slice(0,5).map(f => `<span class="badge" style="background:#eef2ff; padding:2px 8px; border-radius:12px; font-size:0.6rem;">${getFieldLabel(f)}</span>`).join('')}</div><button class="btn-danger" style="margin-top:0.8rem;" onclick="event.stopPropagation(); deleteTemplate(${t.id})">Delete</button></div>`).join(''); }
  
  window.useTemplate = (id) => { currentTemplate = templates.find(t => t.id === id); renderInvoiceForm(currentTemplate.selectedFields); switchTab('create'); };
  window.deleteTemplate = (id) => { if(confirm('Delete this template?')){ templates = templates.filter(t => t.id !== id); localStorage.setItem(`sales_templates_${currentCompany?.id}`, JSON.stringify(templates)); renderTemplates(); showMessage('Template deleted','success'); } };
  
  function getFieldLabel(id) { for(const section of Object.values(allSalesFields)) { const field = section.find(f => f.id === id); if(field) return field.label; } return id; }
  
  // Template Builder UI - Each field individually selectable
  function openTemplateBuilder() { renderTemplateBuilder(); document.getElementById('templateBuilderModal').classList.add('show'); }
  function closeTemplateBuilder() { document.getElementById('templateBuilderModal').classList.remove('show'); }
  
  function renderTemplateBuilder() { let html = ''; let sectionIndex = 0; for(const [sectionName, fields] of Object.entries(allSalesFields)) { html += `<div class="template-section"><div class="template-section-header" onclick="toggleSection(this)"><span><i class="fas fa-chevron-down"></i> ${sectionName}</span><span>${fields.length} fields</span></div><div class="template-section-content" id="section-${sectionIndex}">`; fields.forEach(field => { html += `<div class="field-option"><input type="checkbox" id="field_${field.id}" ${currentTemplate?.selectedFields?.[field.id] !== undefined ? (currentTemplate.selectedFields[field.id] ? 'checked' : '') : 'checked'}> <label for="field_${field.id}">${field.label}</label></div>`; }); html += `</div></div>`; sectionIndex++; } document.getElementById('templateSectionsContainer').innerHTML = html; document.getElementById('templateName').value = currentTemplate?.name || ''; }
  
  window.toggleSection = (header) => { const content = header.nextElementSibling; const icon = header.querySelector('i'); content.classList.toggle('collapsed'); if(content.classList.contains('collapsed')) icon.style.transform = 'rotate(-90deg)'; else icon.style.transform = 'rotate(0deg)'; };
  
  function saveTemplate() { const name = document.getElementById('templateName').value.trim(); if(!name){ showMessage('Please enter template name','error'); return; } const selectedFields = {}; for(const section of Object.values(allSalesFields)) { section.forEach(field => { const checkbox = document.getElementById(`field_${field.id}`); if(checkbox && checkbox.checked) selectedFields[field.id] = true; }); } if(Object.keys(selectedFields).length === 0){ showMessage('Please select at least one field','error'); return; } templates.push({ id: Date.now(), name: name, selectedFields: selectedFields }); localStorage.setItem(`sales_templates_${currentCompany?.id}`, JSON.stringify(templates)); renderTemplates(); closeTemplateBuilder(); showMessage('Template saved successfully!','success'); }
  
  // Render Invoice Form based on selected fields
  function renderInvoiceForm(selectedFields) { let html = ''; currentItems = [{ id: 1, name: '', qty: 1, price: 0, discount: 0 }]; for(const [sectionName, fields] of Object.entries(allSalesFields)) { const visible = fields.filter(f => selectedFields[f.id]); if(visible.length === 0) continue; if(sectionName === "📦 Line Items") { html += `<div class="form-card"><h4><i class="fas fa-box"></i> Products / Services</h4><table class="items-editor"><thead><tr><th>#</th><th>Item / Service</th><th>Qty</th><th>Unit Price</th><th>Disc %</th><th>Amount</th><th></th></tr></thead><tbody id="itemsBody"></tbody></table><button type="button" class="btn-primary" style="margin-top:0.5rem; padding:0.4rem 1rem;" onclick="addItem()">+ Add Item</button></div>`; } else { html += `<div class="form-card"><h4><i class="fas fa-${sectionName.includes('Invoice')?'file':sectionName.includes('Customer')?'user':sectionName.includes('Discount')?'tag':sectionName.includes('Tax')?'calculator':sectionName.includes('Payment')?'credit-card':sectionName.includes('Shipping')?'truck':'note'}"></i> ${sectionName}</h4><div class="form-grid">`; visible.forEach(f => { let input = ''; const currentVal = f.default || ''; if(f.type === 'select') input = `<select id="${f.id}">${f.options.map(o => `<option ${currentVal === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`; else if(f.type === 'textarea') input = `<textarea id="${f.id}" rows="2">${currentVal}</textarea>`; else if(f.type === 'date') input = `<input type="date" id="${f.id}" value="${currentVal || new Date().toISOString().split('T')[0]}">`; else input = `<input type="${f.type}" id="${f.id}" value="${currentVal}">`; html += `<div class="input-group"><label>${f.label} ${f.required ? '*' : ''}</label>${input}</div>`; }); html += `</div></div>`; } } document.getElementById('dynamicFormFields').innerHTML = html; if(selectedFields.items) renderItemsTable(); attachTaxEvents(); calculateFullBill(); const invNoInput = document.getElementById('invoiceNo'); if(invNoInput && !invNoInput.value) { const prefix = 'INV'; const nextNo = parseInt(localStorage.getItem('nextInvNo')||'1001'); invNoInput.value = `${prefix}-${nextNo}`; } }
  
  function renderItemsTable() { const tbody = document.getElementById('itemsBody'); if(!tbody) return; tbody.innerHTML = currentItems.map((item, idx) => `<tr><td>${idx+1}</td><td><input class="item-name" data-idx="${idx}" value="${escapeHtml(item.name)}" placeholder="Product/Service"></td><td><input class="item-qty" data-idx="${idx}" type="number" value="${item.qty}" min="1"></td><td><input class="item-price" data-idx="${idx}" type="number" value="${item.price}" step="0.01">发展<td><input class="item-discount" data-idx="${idx}" type="number" value="${item.discount}" step="0.01" style="width:70px;">%</td><td class="item-amount">0.00</td><td><button type="button" onclick="removeItem(${idx})"><i class="fas fa-trash"></i></button></td></tr>`).join(''); attachItemEvents(); }
  
  window.addItem = () => { currentItems.push({ id: Date.now(), name: '', qty: 1, price: 0, discount: 0 }); renderItemsTable(); calculateFullBill(); };
  window.removeItem = (idx) => { if(currentItems.length > 1){ currentItems.splice(idx, 1); renderItemsTable(); calculateFullBill(); } };
  function attachItemEvents() { document.querySelectorAll('.item-name, .item-qty, .item-price, .item-discount').forEach(el => { el.removeEventListener('input', updateItem); el.addEventListener('input', updateItem); }); }
  function updateItem(e) { const idx = parseInt(e.target.dataset.idx); const field = e.target.className.split(' ')[0].replace('item-', ''); if(currentItems[idx]){ if(field === 'name') currentItems[idx][field] = e.target.value; else currentItems[idx][field] = parseFloat(e.target.value) || 0; calculateFullBill(); } }
  function attachTaxEvents() { const fields = ['discountValue','shippingCharges','packingCharges','handlingCharges','freightCharges','insuranceCharges','cgst','sgst','igst','cess','additionalTax','vat','serviceTax','amountPaid','discountType']; fields.forEach(id => { const el = document.getElementById(id); if(el) { el.removeEventListener('input', calculateFullBill); el.addEventListener('input', calculateFullBill); } }); }
  
  function calculateFullBill() { let subtotal = 0, totalItemDiscount = 0; currentItems.forEach((item, idx) => { const itemTotal = item.qty * item.price; const discAmount = itemTotal * (item.discount / 100); subtotal += itemTotal; totalItemDiscount += discAmount; const amountCell = document.querySelectorAll('.item-amount')[idx]; if(amountCell) amountCell.textContent = (itemTotal - discAmount).toFixed(2); }); const discountType = document.getElementById('discountType')?.value || 'Percentage'; const discountVal = parseFloat(document.getElementById('discountValue')?.value) || 0; let afterDiscount = subtotal - totalItemDiscount; let globalDiscount = 0; if(discountVal > 0){ if(discountType === 'Percentage'){ globalDiscount = afterDiscount * (discountVal / 100); afterDiscount -= globalDiscount; } else { globalDiscount = discountVal; afterDiscount -= discountVal; } } const shipping = parseFloat(document.getElementById('shippingCharges')?.value) || 0; const packing = parseFloat(document.getElementById('packingCharges')?.value) || 0; const handling = parseFloat(document.getElementById('handlingCharges')?.value) || 0; const freight = parseFloat(document.getElementById('freightCharges')?.value) || 0; const insurance = parseFloat(document.getElementById('insuranceCharges')?.value) || 0; let afterCharges = afterDiscount + shipping + packing + handling + freight + insurance; const cgst = parseFloat(document.getElementById('cgst')?.value) || 0; const sgst = parseFloat(document.getElementById('sgst')?.value) || 0; const igst = parseFloat(document.getElementById('igst')?.value) || 0; const cess = parseFloat(document.getElementById('cess')?.value) || 0; const addTax = parseFloat(document.getElementById('additionalTax')?.value) || 0; let cgstAmt=0, sgstAmt=0, igstAmt=0, cessAmt=0, addTaxAmt=0; if(cgst>0 || sgst>0){ cgstAmt = afterCharges * (cgst/100); sgstAmt = afterCharges * (sgst/100); } else if(igst>0) igstAmt = afterCharges * (igst/100); if(cess>0) cessAmt = afterCharges * (cess/100); if(addTax>0) addTaxAmt = afterCharges * (addTax/100); const grandTotal = afterCharges + cgstAmt + sgstAmt + igstAmt + cessAmt + addTaxAmt; const amountPaid = parseFloat(document.getElementById('amountPaid')?.value) || 0; const currency = document.getElementById('currency')?.value?.split(' ')[0] || '₹'; window.currentBill = { subtotal, totalItemDiscount, globalDiscount, shipping, packing, handling, freight, insurance, cgstAmt, sgstAmt, igstAmt, cessAmt, addTaxAmt, grandTotal, amountPaid, balanceDue: grandTotal - amountPaid, currency, cgst, sgst, igst, cess, addTax }; let summaryHtml = `<h4>Invoice Summary</h4><div class="summary-line"><strong>Subtotal:</strong> <span>${currency} ${subtotal.toFixed(2)}</span></div>`; if(totalItemDiscount>0) summaryHtml += `<div class="summary-line"><strong>Item Discount:</strong> <span>-${currency} ${totalItemDiscount.toFixed(2)}</span></div>`; if(globalDiscount>0) summaryHtml += `<div class="summary-line"><strong>Global Discount:</strong> <span>-${currency} ${globalDiscount.toFixed(2)}</span></div>`; if(shipping>0) summaryHtml += `<div class="summary-line"><strong>Shipping:</strong> <span>+${currency} ${shipping.toFixed(2)}</span></div>`; if(packing>0) summaryHtml += `<div class="summary-line"><strong>Packing:</strong> <span>+${currency} ${packing.toFixed(2)}</span></div>`; if(cgstAmt>0) summaryHtml += `<div class="summary-line"><strong>CGST (${cgst}%):</strong> <span>+${currency} ${cgstAmt.toFixed(2)}</span></div>`; if(sgstAmt>0) summaryHtml += `<div class="summary-line"><strong>SGST (${sgst}%):</strong> <span>+${currency} ${sgstAmt.toFixed(2)}</span></div>`; if(igstAmt>0) summaryHtml += `<div class="summary-line"><strong>IGST (${igst}%):</strong> <span>+${currency} ${igstAmt.toFixed(2)}</span></div>`; if(cessAmt>0) summaryHtml += `<div class="summary-line"><strong>Cess:</strong> <span>+${currency} ${cessAmt.toFixed(2)}</span></div>`; summaryHtml += `<div class="summary-line summary-total"><strong>GRAND TOTAL:</strong> <span>${currency} ${grandTotal.toFixed(2)}</span></div><div class="summary-line"><strong>Paid:</strong> ${currency} ${amountPaid.toFixed(2)}</div><div class="summary-line"><strong>Balance Due:</strong> ${currency} ${(grandTotal-amountPaid).toFixed(2)}</div>`; document.getElementById('billSummary').innerHTML = summaryHtml; }
  
  document.getElementById('salesForm').addEventListener('submit', async (e) => { e.preventDefault(); const cid = getCompanyId(); if(!cid) return; const invoiceNo = document.getElementById('invoiceNo')?.value || `INV-${Date.now()}`; const saleData = { ...window.currentBill, invoiceNo, invoiceDate: document.getElementById('invoiceDate')?.value, dueDate: document.getElementById('dueDate')?.value, customerName: document.getElementById('customerName')?.value, customerPhone: document.getElementById('customerPhone')?.value, customerGST: document.getElementById('customerGST')?.value, customerEmail: document.getElementById('customerEmail')?.value, billingAddress: document.getElementById('billingAddress')?.value, items: currentItems.filter(i => i.name), paymentMethod: document.getElementById('paymentMethod')?.value, paymentStatus: window.currentBill.amountPaid >= window.currentBill.grandTotal ? 'Paid' : (window.currentBill.amountPaid > 0 ? 'Partial' : 'Pending'), notes: document.getElementById('notes')?.value, terms: document.getElementById('terms')?.value, createdAt: Date.now() }; try{ await addDoc(collection(db, `companies/${cid}/sales`), saleData); const nextNo = parseInt(localStorage.getItem('nextInvNo')||'1001'); localStorage.setItem('nextInvNo', (nextNo+1).toString()); showMessage('Invoice saved successfully!','success'); resetInvoiceForm(); loadSales(); switchTab('invoices'); } catch(err){ showMessage('Error: '+err.message,'error'); } });
  
  window.resetInvoiceForm = () => { if(currentTemplate) renderInvoiceForm(currentTemplate.selectedFields); else renderInvoiceForm({ invoiceNo:true, invoiceDate:true, customerName:true, items:true, currency:true, paymentMethod:true, amountPaid:true }); };
  
  async function loadSales() { const cid = getCompanyId(); if(!cid) return; const snap = await getDocs(query(collection(db, `companies/${cid}/sales`), orderBy('createdAt','desc'))); allSales = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderSales(); updateStats(); updateCharts(); }
  
  function renderSales() { const container = document.getElementById('salesList'); const search = document.getElementById('searchSales')?.value.toLowerCase() || ''; const filtered = allSales.filter(s => (s.invoiceNo||'').toLowerCase().includes(search) || (s.customerName||'').toLowerCase().includes(search)); if(!filtered.length) { container.innerHTML = '<div style="text-align:center;padding:3rem;">No invoices found</div>'; return; } container.innerHTML = `<table class="data-table"><thead><tr><th>Invoice #</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th><th></th></tr></thead><tbody>${filtered.map(s => `<tr><td><strong>${escapeHtml(s.invoiceNo)}</strong></td><td>${s.invoiceDate||'-'}</td><td>${escapeHtml(s.customerName)}<br><small>${s.customerPhone||''}</small></td><td>${s.items?.length||0}</td><td>${s.currency||'₹'} ${(s.grandTotal||0).toFixed(2)}</td><td>${s.currency||'₹'} ${(s.amountPaid||0).toFixed(2)}</td><td style="color:#dc2626;">${s.currency||'₹'} ${((s.grandTotal||0)-(s.amountPaid||0)).toFixed(2)}</td><td><span class="${s.paymentStatus==='Paid'?'badge-success':'badge-warning'}">${s.paymentStatus||'Pending'}</span></td><td><button class="btn-secondary" style="padding:0.2rem 0.8rem;" onclick="editSale('${s.id}')">Edit</button></td></tr>`).join('')}</tbody></table>`; }
  
  function updateStats() { const totalRev = allSales.reduce((s,i)=>s+(i.grandTotal||0),0); const totalPaid = allSales.reduce((s,i)=>s+(i.amountPaid||0),0); document.getElementById('salesStats').innerHTML = `<div class="stat-card"><div class="stat-value">${allSales.length}</div><div class="stat-label">Total Invoices</div></div><div class="stat-card"><div class="stat-value">₹${totalRev.toFixed(2)}</div><div class="stat-label">Total Revenue</div></div><div class="stat-card"><div class="stat-value">₹${totalPaid.toFixed(2)}</div><div class="stat-label">Collected</div></div><div class="stat-card"><div class="stat-value">₹${(totalRev-totalPaid).toFixed(2)}</div><div class="stat-label">Receivables</div></div>`; document.getElementById('analyticsStats').innerHTML = `<div class="stat-card"><div class="stat-value">${allSales.length}</div><div class="stat-label">Total Orders</div></div><div class="stat-card"><div class="stat-value">₹${totalRev.toFixed(2)}</div><div class="stat-label">Revenue</div></div><div class="stat-card"><div class="stat-value">${allSales.length>0?(totalRev/allSales.length).toFixed(2):0}</div><div class="stat-label">Avg Order</div></div>`; }
  
  function updateCharts() { const last7 = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().split('T')[0]; }); const daily = last7.map(d=>allSales.filter(s=>s.invoiceDate===d).reduce((sum,i)=>sum+(i.grandTotal||0),0)); if(charts.rev) charts.rev.destroy(); charts.rev = new Chart(document.getElementById('revenueChart'), { type:'line', data:{ labels:last7, datasets:[{ label:'Daily Revenue (₹)', data:daily, borderColor:'#2c7da0', tension:0.3, fill:true, backgroundColor:'rgba(44,125,160,0.1)' }] } }); const productSales = {}; allSales.forEach(s=>{ if(s.items) s.items.forEach(item=>{ if(item.name) productSales[item.name] = (productSales[item.name]||0) + (item.qty||0); }); }); const topProducts = Object.entries(productSales).sort((a,b)=>b[1]-a[1]).slice(0,5); if(charts.products) charts.products.destroy(); charts.products = new Chart(document.getElementById('topProductsChart'), { type:'bar', data:{ labels:topProducts.map(p=>p[0]), datasets:[{ label:'Quantity Sold', data:topProducts.map(p=>p[1]), backgroundColor:'#61a5c2' }] } }); }
  
  window.editSale = async (id) => { currentEditSaleId = id; const sale = allSales.find(s => s.id === id); if(!sale) return; document.getElementById('editSaleForm').innerHTML = `<div class="form-grid"><div class="input-group"><label>Invoice #</label><input id="edit_inv" value="${escapeHtml(sale.invoiceNo)}"></div><div class="input-group"><label>Customer</label><input id="edit_cust" value="${escapeHtml(sale.customerName)}"></div><div class="input-group"><label>Phone</label><input id="edit_phone" value="${escapeHtml(sale.customerPhone||'')}"></div><div class="input-group"><label>Paid Amount</label><input type="number" id="edit_paid" value="${sale.amountPaid||0}"></div></div>`; document.getElementById('editSaleModal').classList.add('show'); };
  window.updateSale = async () => { const cid = getCompanyId(); if(!cid||!currentEditSaleId) return; await updateDoc(doc(db,`companies/${cid}/sales`,currentEditSaleId),{ invoiceNo:document.getElementById('edit_inv').value, customerName:document.getElementById('edit_cust').value, customerPhone:document.getElementById('edit_phone').value, amountPaid:parseFloat(document.getElementById('edit_paid').value)||0, paymentStatus:parseFloat(document.getElementById('edit_paid').value)>=(allSales.find(s=>s.id===currentEditSaleId)?.grandTotal||0)?'Paid':'Partial' }); showMessage('Updated','success'); closeEditSaleModal(); loadSales(); };
  window.deleteSale = async () => { if(!confirm('Delete this invoice?')) return; const cid = getCompanyId(); if(!cid||!currentEditSaleId) return; await deleteDoc(doc(db,`companies/${cid}/sales`,currentEditSaleId)); showMessage('Deleted','success'); closeEditSaleModal(); loadSales(); };
  
  window.filterSales = () => renderSales();
  window.switchTab = (t) => { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.getElementById(`${t}Tab`).classList.add('active'); event.target.classList.add('active'); if(t === 'analytics') { loadSales(); setTimeout(updateCharts,100); } if(t === 'invoices') loadSales(); };
  window.closeEditSaleModal = () => document.getElementById('editSaleModal').classList.remove('show');
  window.openTemplateBuilder = openTemplateBuilder;
  window.closeTemplateBuilder = closeTemplateBuilder;
  
  function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function showMessage(msg,t) { const d=document.createElement('div'); d.className=`message ${t}`; d.innerHTML=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
  
  if(getCompanyId()) { loadTemplates(); loadSales(); resetInvoiceForm(); }
</script>
</body>
</html>
