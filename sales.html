<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Ultimate Business Suite | Complete Sales & Tax Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, #1a2a3a 0%, #0f172a 100%); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; position: sticky; top: 0; z-index: 100; }
    .tabs-container { background: white; border-bottom: 2px solid #e2e8f0; padding: 0 1rem; display: flex; gap: 0.3rem; overflow-x: auto; position: sticky; top: 70px; z-index: 99; }
    .tab-btn { padding: 0.8rem 1.2rem; background: none; border: none; font-size: 0.9rem; font-weight: 600; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .tab-btn:hover { color: #667eea; }
    .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
    .tab-content { display: none; padding: 1.5rem; animation: fadeIn 0.3s; max-width: 1800px; margin: 0 auto; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .sales-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .add-sale-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 0.7rem 1.3rem; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: white; padding: 1rem; border-radius: 16px; border: 1px solid #e2e8f0; }
    .stat-icon { font-size: 1.5rem; color: #667eea; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .stat-label { color: #64748b; font-size: 0.7rem; }
    
    .sales-table-container { background: white; border-radius: 16px; overflow-x: auto; border: 1px solid #e2e8f0; }
    .sales-table { width: 100%; border-collapse: collapse; min-width: 700px; }
    .sales-table th, .sales-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .sales-table th { background: #f8fafc; font-weight: 600; }
    
    .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .template-card { background: white; border-radius: 16px; padding: 1.2rem; border: 1px solid #e2e8f0; transition: all 0.3s; cursor: pointer; }
    .template-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: #667eea; }
    .template-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.3rem; }
    .template-desc { font-size: 0.75rem; color: #64748b; }
    .badge { background: #eef2ff; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.6rem; color: #667eea; display: inline-block; margin: 0.2rem; }
    
    .form-card { background: white; border-radius: 16px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #e2e8f0; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 0.8rem; }
    .input-group label { display: block; font-weight: 600; font-size: 0.65rem; color: #64748b; margin-bottom: 0.2rem; text-transform: uppercase; }
    .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 0.6rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.8rem; }
    .input-group input:focus { outline: none; border-color: #667eea; }
    
    .items-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
    .items-table th, .items-table td { padding: 0.5rem; border: 1px solid #e2e8f0; text-align: left; }
    .items-table input, .items-table select { width: 100%; padding: 0.3rem; border: 1px solid #e2e8f0; border-radius: 4px; }
    
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 500; }
    .btn-secondary { background: #f1f5f9; color: #475569; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; }
    .btn-danger { background: #fee2e2; color: #dc2626; border: none; padding: 0.2rem 0.6rem; border-radius: 4px; cursor: pointer; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 20px; padding: 1.5rem; max-width: 1000px; width: 90%; max-height: 85vh; overflow-y: auto; }
    
    .field-group { margin-bottom: 0.8rem; border: 1px solid #e2e8f0; border-radius: 10px; }
    .field-group-header { background: #f8fafc; padding: 0.6rem 1rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; }
    .field-group-content { padding: 0.8rem; display: none; }
    .field-group-content.open { display: block; }
    .field-checkbox { display: flex; align-items: center; gap: 8px; padding: 0.3rem 0; }
    .field-checkbox input { width: 16px; height: 16px; }
    .field-checkbox label { font-size: 0.8rem; flex: 1; }
    
    .badge-success { background: #d1fae5; color: #065f46; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.65rem; }
    .badge-warning { background: #fed7aa; color: #9b2c1d; padding: 0.2rem 0.5rem; border-radius: 12px; font-size: 0.65rem; }
    .message { position: fixed; bottom: 20px; right: 20px; padding: 0.8rem 1.2rem; border-radius: 10px; z-index: 1001; animation: slideIn 0.3s; }
    .message.success { background: #10b981; color: white; }
    .message.error { background: #ef4444; color: white; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    
    .search-box input { width: 100%; padding: 0.6rem; border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 1rem; }
    .bill-summary { background: linear-gradient(135deg, #f8fafc, #ffffff); padding: 1rem; border-radius: 12px; margin: 1rem 0; border: 1px solid #e2e8f0; }
    .summary-line { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px dashed #e2e8f0; }
    .summary-total { font-size: 1.2rem; font-weight: bold; color: #667eea; border-top: 2px solid #667eea; margin-top: 0.5rem; padding-top: 0.5rem; }
    hr { margin: 0.8rem 0; }
  </style>
</head>
<body>
<div class="navbar">
  <h2><i class="fas fa-chart-line"></i> Ultimate Business Suite</h2>
  <button class="btn-secondary" style="background: rgba(255,255,255,0.15); color: white;" onclick="window.location.href='dashboard.html'">← Dashboard</button>
</div>

<div class="tabs-container">
  <button class="tab-btn active" onclick="switchTab('sales')"><i class="fas fa-shopping-cart"></i> Sales</button>
  <button class="tab-btn" onclick="switchTab('analytics')"><i class="fas fa-chart-line"></i> Analytics</button>
  <button class="tab-btn" onclick="switchTab('customers')"><i class="fas fa-users"></i> Customers</button>
  <button class="tab-btn" onclick="switchTab('templates')"><i class="fas fa-copy"></i> Templates</button>
</div>

<!-- Sales Tab -->
<div id="salesTab" class="tab-content active">
  <div class="sales-header">
    <h2><i class="fas fa-shopping-cart"></i> Sales Records</h2>
    <button class="add-sale-btn" onclick="showTemplateSelector()"><i class="fas fa-plus-circle"></i> New Sale</button>
  </div>
  <div class="stats-cards" id="salesStats"></div>
  <div class="search-box"><input type="text" id="searchSales" placeholder="🔍 Search by invoice, customer, phone..." onkeyup="filterSales()"></div>
  <div id="salesList" class="sales-table-container"></div>
</div>

<!-- Analytics Tab -->
<div id="analyticsTab" class="tab-content">
  <h2>Business Analytics</h2>
  <div class="stats-cards" id="analyticsStats"></div>
  <div class="sales-table-container"><canvas id="weeklyChart" style="max-height: 350px;"></canvas></div>
  <div class="sales-table-container" style="margin-top: 1rem;"><canvas id="taxChart" style="max-height: 350px;"></canvas></div>
</div>

<!-- Customers Tab -->
<div id="customersTab" class="tab-content">
  <h2>Customer Management</h2>
  <div class="search-box"><input type="text" id="customerSearch" placeholder="🔍 Search customers..." onkeyup="filterCustomers()"></div>
  <div id="customerList"></div>
</div>

<!-- Templates Tab -->
<div id="templatesTab" class="tab-content">
  <div class="sales-header">
    <h2><i class="fas fa-copy"></i> Form Templates</h2>
    <button class="add-sale-btn" onclick="openTemplateCreator()"><i class="fas fa-plus"></i> Create Template</button>
  </div>
  <div id="templatesGrid" class="template-grid"></div>
</div>

<!-- Template Selector Modal -->
<div id="templateSelectorModal" class="modal">
  <div class="modal-content" style="max-width: 500px;">
    <h3>Select Template</h3>
    <div id="templateSelectorList"></div>
    <button class="btn-secondary" onclick="closeTemplateSelector()" style="margin-top: 1rem;">Cancel</button>
  </div>
</div>

<!-- Sales Form Modal -->
<div id="salesFormModal" class="modal">
  <div class="modal-content" style="max-width: 1100px;">
    <h3 id="formTitle"><i class="fas fa-file-invoice"></i> Create New Sale</h3>
    <hr>
    <form id="salesForm">
      <div id="dynamicFormFields"></div>
      <div id="billSummary" class="bill-summary"></div>
      <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
        <button type="button" class="btn-secondary" onclick="closeSalesForm()">Cancel</button>
        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Sale</button>
      </div>
    </form>
  </div>
</div>

<!-- Template Creator Modal -->
<div id="templateCreatorModal" class="modal">
  <div class="modal-content">
    <h3>Create Template</h3>
    <input type="text" id="templateName" placeholder="Template Name" style="width:100%; padding:0.6rem; margin-bottom:0.5rem;">
    <textarea id="templateDesc" rows="2" placeholder="Description" style="width:100%; margin-bottom:1rem;"></textarea>
    <div id="templateFieldsContainer"></div>
    <div style="display:flex;gap:1rem;margin-top:1rem;">
      <button class="btn-secondary" onclick="closeTemplateCreator()">Cancel</button>
      <button class="btn-primary" onclick="saveTemplate()">Save</button>
    </div>
  </div>
</div>

<!-- Edit Sale Modal -->
<div id="editSaleModal" class="modal">
  <div class="modal-content">
    <h3>Edit Sale</h3>
    <div id="editSaleForm"></div>
    <div style="display:flex;gap:1rem;margin-top:1rem;">
      <button class="btn-secondary" onclick="closeEditSaleModal()">Cancel</button>
      <button class="btn-primary" onclick="updateSale()">Update</button>
      <button class="btn-danger" onclick="deleteSale()">Delete</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let currentCompany = null;
  let templates = [];
  let allSales = [];
  let currentTemplate = null;
  let currentItems = [];
  let currentEditSaleId = null;
  let editTemplateId = null;
  let charts = {};

  // COMPLETE BUSINESS FIELDS WITH TAX OPTIONS
  const businessFields = {
    "📋 Invoice Details": [
      { id: "invoiceNo", label: "Invoice Number", type: "text" },
      { id: "invoiceDate", label: "Invoice Date", type: "date" },
      { id: "dueDate", label: "Due Date", type: "date" },
      { id: "poNumber", label: "PO Number", type: "text" },
      { id: "salesPerson", label: "Sales Person", type: "text" }
    ],
    "👥 Customer Details": [
      { id: "customerName", label: "Customer Name", type: "text", required: true },
      { id: "customerPhone", label: "Phone", type: "tel" },
      { id: "customerEmail", label: "Email", type: "email" },
      { id: "customerGST", label: "GST Number", type: "text" },
      { id: "billingAddress", label: "Billing Address", type: "textarea" }
    ],
    "📦 Products & Services": [
      { id: "items", label: "Items/Services", type: "dynamic" }
    ],
    "💰 Discounts & Charges": [
      { id: "currency", label: "Currency", type: "select", options: ["INR (₹)", "USD ($)", "EUR (€)"] },
      { id: "discountType", label: "Discount Type", type: "select", options: ["Percentage", "Fixed Amount"] },
      { id: "discountValue", label: "Discount Value", type: "number", default: 0 },
      { id: "shippingCharges", label: "Shipping Charges", type: "number", default: 0 },
      { id: "packingCharges", label: "Packing Charges", type: "number", default: 0 },
      { id: "handlingCharges", label: "Handling Charges", type: "number", default: 0 }
    ],
    "💰 Tax/GST Settings": [
      { id: "taxType", label: "Tax Type", type: "select", options: ["GST", "VAT", "Sales Tax", "Service Tax", "None"] },
      { id: "cgst", label: "CGST (%)", type: "number", default: 0 },
      { id: "sgst", label: "SGST (%)", type: "number", default: 0 },
      { id: "igst", label: "IGST (%)", type: "number", default: 0 },
      { id: "taxRate", label: "Tax Rate (%)", type: "number", default: 0 },
      { id: "cess", label: "Cess (%)", type: "number", default: 0 }
    ],
    "💳 Payment": [
      { id: "paymentMethod", label: "Payment Method", type: "select", options: ["Cash", "Card", "UPI", "Bank Transfer"] },
      { id: "paymentStatus", label: "Status", type: "select", options: ["Paid", "Pending", "Partial"] },
      { id: "amountPaid", label: "Amount Paid", type: "number", default: 0 }
    ],
    "📝 Notes": [
      { id: "notes", label: "Additional Notes", type: "textarea" }
    ]
  };

  function getCompanyId() {
    const data = sessionStorage.getItem('currentCompany');
    if (!data) { window.location.href = 'login.html'; return null; }
    currentCompany = JSON.parse(data);
    return currentCompany.id;
  }

  // Templates
  function loadTemplates() {
    const saved = localStorage.getItem(`business_templates_${currentCompany?.id}`);
    templates = saved ? JSON.parse(saved) : [
      { id: Date.now(), name: "Standard Invoice", fields: { invoiceNo: true, invoiceDate: true, customerName: true, items: true, cgst: true, sgst: true, paymentMethod: true, amountPaid: true } },
      { id: Date.now()+1, name: "Quick Sale", fields: { customerName: true, items: true, amountPaid: true } },
      { id: Date.now()+2, name: "GST Invoice", fields: { invoiceNo: true, invoiceDate: true, customerName: true, customerGST: true, items: true, cgst: true, sgst: true, shippingCharges: true, paymentMethod: true, amountPaid: true } }
    ];
    renderTemplates();
  }
  
  function renderTemplates() {
    const grid = document.getElementById('templatesGrid');
    grid.innerHTML = templates.map(t => `
      <div class="template-card" onclick="useTemplate(${t.id})">
        <div class="template-name">📄 ${escapeHtml(t.name)}</div>
        <div class="template-desc">${Object.keys(t.fields).length} fields selected</div>
        <div class="template-badges">${Object.keys(t.fields).slice(0,4).map(f => `<span class="badge">${getFieldLabel(f)}</span>`).join('')}</div>
        <button class="btn-danger" style="margin-top:0.5rem;" onclick="event.stopPropagation(); deleteTemplate(${t.id})">Delete</button>
      </div>
    `).join('');
  }
  
  window.useTemplate = (id) => { currentTemplate = templates.find(t => t.id === id); renderSalesForm(currentTemplate.fields); document.getElementById('salesFormModal').classList.add('show'); closeTemplateSelector(); };
  window.showTemplateSelector = () => { document.getElementById('templateSelectorList').innerHTML = templates.map(t => `<div class="template-card" onclick="useTemplate(${t.id})"><div class="template-name">${escapeHtml(t.name)}</div><div class="template-desc">${Object.keys(t.fields).length} fields</div></div>`).join(''); document.getElementById('templateSelectorModal').classList.add('show'); };
  window.openTemplateCreator = () => { editTemplateId = null; document.getElementById('templateName').value = ''; renderTemplateFields({}); document.getElementById('templateCreatorModal').classList.add('show'); };
  
  function renderTemplateFields(selected) {
    let html = '';
    for (const [cat, fields] of Object.entries(businessFields)) {
      html += `<div class="field-group"><div class="field-group-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>${cat}</span><i class="fas fa-chevron-down"></i></div><div class="field-group-content open">`;
      fields.forEach(f => { html += `<div class="field-checkbox"><input type="checkbox" id="field_${f.id}" ${selected[f.id] !== undefined ? (selected[f.id] ? 'checked' : '') : 'checked'}> <label>${f.label}</label></div>`; });
      html += `</div></div>`;
    }
    document.getElementById('templateFieldsContainer').innerHTML = html;
  }
  
  window.saveTemplate = () => {
    const name = document.getElementById('templateName').value.trim();
    if(!name){ showMessage('Template name required', 'error'); return; }
    const fields = {};
    for(const fieldsList of Object.values(businessFields)) fieldsList.forEach(f => { if(document.getElementById(`field_${f.id}`)?.checked) fields[f.id] = true; });
    if(Object.keys(fields).length === 0){ showMessage('Select at least one field', 'error'); return; }
    if(editTemplateId){ const idx = templates.findIndex(t=>t.id===editTemplateId); if(idx!==-1) templates[idx] = { ...templates[idx], name, fields }; }
    else { templates.push({ id: Date.now(), name, fields }); }
    localStorage.setItem(`business_templates_${currentCompany?.id}`, JSON.stringify(templates));
    renderTemplates();
    closeTemplateCreator();
    showMessage('Template saved', 'success');
  };
  
  window.deleteTemplate = (id) => { if(confirm('Delete template?')){ templates = templates.filter(t=>t.id!==id); localStorage.setItem(`business_templates_${currentCompany?.id}`, JSON.stringify(templates)); renderTemplates(); showMessage('Deleted', 'success'); } };

  // Sales Form with Tax Calculations
  async function renderSalesForm(selectedFields) {
    let html = '';
    currentItems = [{ id: 1, name: '', qty: 1, price: 0, discount: 0 }];
    
    for (const [cat, fields] of Object.entries(businessFields)) {
      const visible = fields.filter(f => selectedFields[f.id]);
      if(visible.length === 0) continue;
      
      if(cat === "📦 Products & Services") {
        html += `<div class="form-card"><h4><i class="fas fa-box"></i> Products/Services</h4>
          <table class="items-table"><thead><tr><th>#</th><th>Item Name</th><th>Qty</th><th>Price (₹)</th><th>Disc%</th><th>Amount</th><th></th></tr></thead>
          <tbody id="itemsBody"></tbody></table>
          <button type="button" class="btn-primary" style="margin-top:0.5rem;padding:0.3rem 0.8rem;" onclick="addItem()"><i class="fas fa-plus"></i> Add Item</button>
        </div>`;
      } else {
        html += `<div class="form-card"><h4>${cat}</h4><div class="form-row">`;
        visible.forEach(f => {
          let input = '';
          if(f.type === 'select') input = `<select id="${f.id}">${f.options.map(o=>`<option>${o}</option>`).join('')}</select>`;
          else if(f.type === 'textarea') input = `<textarea id="${f.id}" rows="2"></textarea>`;
          else if(f.type === 'date') input = `<input type="date" id="${f.id}" value="${new Date().toISOString().split('T')[0]}">`;
          else input = `<input type="${f.type}" id="${f.id}" value="${f.default || ''}">`;
          html += `<div class="input-group"><label>${f.label}</label>${input}</div>`;
        });
        html += `</div></div>`;
      }
    }
    
    document.getElementById('dynamicFormFields').innerHTML = html;
    if(selectedFields.items) renderItemsTable();
    if(selectedFields.invoiceNo && document.getElementById('invoiceNo') && !document.getElementById('invoiceNo').value) {
      document.getElementById('invoiceNo').value = `INV-${Date.now()}`;
    }
    if(selectedFields.invoiceDate && document.getElementById('invoiceDate') && !document.getElementById('invoiceDate').value) {
      document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
    }
    attachTaxEvents();
    calculateFullBill();
  }

  function renderItemsTable() {
    const tbody = document.getElementById('itemsBody');
    if(!tbody) return;
    tbody.innerHTML = currentItems.map((item, idx) => `
      <tr>
        <td>${idx+1}</td>
        <td><input class="item-name" data-idx="${idx}" value="${escapeHtml(item.name)}" placeholder="Product/Service" style="width:200px;"></td>
        <td><input class="item-qty" data-idx="${idx}" type="number" value="${item.qty}" min="1" style="width:70px;"></td>
        <td><input class="item-price" data-idx="${idx}" type="number" value="${item.price}" step="0.01" style="width:90px;"></td>
        <td><input class="item-discount" data-idx="${idx}" type="number" value="${item.discount}" step="0.01" style="width:70px;"></td>
        <td class="item-amount">0.00</td>
        <td><button type="button" onclick="removeItem(${idx})"><i class="fas fa-trash"></i></button></td>
      </tr>
    `).join('');
    attachItemEvents();
  }

  window.addItem = () => { currentItems.push({ id: Date.now(), name: '', qty: 1, price: 0, discount: 0 }); renderItemsTable(); calculateFullBill(); };
  window.removeItem = (idx) => { if(currentItems.length > 1){ currentItems.splice(idx, 1); renderItemsTable(); calculateFullBill(); } };
  
  function attachItemEvents() {
    document.querySelectorAll('.item-name, .item-qty, .item-price, .item-discount').forEach(el => {
      el.removeEventListener('input', updateItem);
      el.addEventListener('input', updateItem);
    });
  }
  
  function updateItem(e) {
    const idx = parseInt(e.target.dataset.idx);
    const field = e.target.className.split(' ')[0].replace('item-', '');
    if(currentItems[idx]){
      if(field === 'name') currentItems[idx][field] = e.target.value;
      else currentItems[idx][field] = parseFloat(e.target.value) || 0;
      calculateFullBill();
    }
  }
  
  function attachTaxEvents() {
    const taxFields = ['discountValue', 'shippingCharges', 'packingCharges', 'handlingCharges', 'cgst', 'sgst', 'igst', 'taxRate', 'cess', 'amountPaid', 'discountType'];
    taxFields.forEach(id => {
      const el = document.getElementById(id);
      if(el) { el.removeEventListener('input', () => calculateFullBill()); el.addEventListener('input', () => calculateFullBill()); }
    });
  }
  
  function calculateFullBill() {
    // Calculate item totals
    let subtotal = 0, totalItemDiscount = 0;
    currentItems.forEach((item, idx) => {
      const itemTotal = item.qty * item.price;
      const discAmount = itemTotal * (item.discount / 100);
      subtotal += itemTotal;
      totalItemDiscount += discAmount;
      const amountCell = document.querySelectorAll('.item-amount')[idx];
      if(amountCell) amountCell.textContent = (itemTotal - discAmount).toFixed(2);
    });
    
    // Apply global discount
    const discountType = document.getElementById('discountType')?.value || 'Percentage';
    const discountVal = parseFloat(document.getElementById('discountValue')?.value) || 0;
    let afterDiscount = subtotal - totalItemDiscount;
    let globalDiscountAmount = 0;
    if(discountVal > 0) {
      if(discountType === 'Percentage') {
        globalDiscountAmount = afterDiscount * (discountVal / 100);
        afterDiscount -= globalDiscountAmount;
      } else {
        globalDiscountAmount = discountVal;
        afterDiscount -= discountVal;
      }
    }
    
    // Add charges
    const shipping = parseFloat(document.getElementById('shippingCharges')?.value) || 0;
    const packing = parseFloat(document.getElementById('packingCharges')?.value) || 0;
    const handling = parseFloat(document.getElementById('handlingCharges')?.value) || 0;
    let totalCharges = shipping + packing + handling;
    let afterCharges = afterDiscount + totalCharges;
    
    // Apply Taxes (GST/VAT/etc)
    const taxType = document.getElementById('taxType')?.value || 'None';
    const cgst = parseFloat(document.getElementById('cgst')?.value) || 0;
    const sgst = parseFloat(document.getElementById('sgst')?.value) || 0;
    const igst = parseFloat(document.getElementById('igst')?.value) || 0;
    const taxRate = parseFloat(document.getElementById('taxRate')?.value) || 0;
    const cess = parseFloat(document.getElementById('cess')?.value) || 0;
    
    let cgstAmount = 0, sgstAmount = 0, igstAmount = 0, taxAmount = 0, cessAmount = 0;
    
    if(cgst > 0 || sgst > 0) {
      cgstAmount = afterCharges * (cgst / 100);
      sgstAmount = afterCharges * (sgst / 100);
    } else if(igst > 0) {
      igstAmount = afterCharges * (igst / 100);
    } else if(taxRate > 0) {
      taxAmount = afterCharges * (taxRate / 100);
    }
    
    if(cess > 0) cessAmount = afterCharges * (cess / 100);
    
    let grandTotal = afterCharges + cgstAmount + sgstAmount + igstAmount + taxAmount + cessAmount;
    const amountPaid = parseFloat(document.getElementById('amountPaid')?.value) || 0;
    const balanceDue = grandTotal - amountPaid;
    const currency = document.getElementById('currency')?.value?.split(' ')[0] === 'USD' ? '$' : 
                     document.getElementById('currency')?.value?.split(' ')[0] === 'EUR' ? '€' : '₹';
    
    // Store totals for saving
    window.currentBill = {
      subtotal, totalItemDiscount, globalDiscountAmount, totalCharges,
      cgstAmount, sgstAmount, igstAmount, taxAmount, cessAmount,
      grandTotal, amountPaid, balanceDue, currency, taxType,
      cgst, sgst, igst, taxRate, cess
    };
    
    // Build Bill Summary HTML
    let summaryHtml = `<h4 style="margin-bottom:0.8rem;"><i class="fas fa-receipt"></i> Bill Summary</h4>`;
    summaryHtml += `<div class="summary-line"><strong>Subtotal:</strong> <span>${currency} ${subtotal.toFixed(2)}</span></div>`;
    if(totalItemDiscount > 0) summaryHtml += `<div class="summary-line"><strong>Item Discount:</strong> <span>- ${currency} ${totalItemDiscount.toFixed(2)}</span></div>`;
    if(globalDiscountAmount > 0) summaryHtml += `<div class="summary-line"><strong>Global Discount (${discountVal}${discountType === 'Percentage' ? '%' : ''}):</strong> <span>- ${currency} ${globalDiscountAmount.toFixed(2)}</span></div>`;
    if(shipping > 0) summaryHtml += `<div class="summary-line"><strong>Shipping Charges:</strong> <span>+ ${currency} ${shipping.toFixed(2)}</span></div>`;
    if(packing > 0) summaryHtml += `<div class="summary-line"><strong>Packing Charges:</strong> <span>+ ${currency} ${packing.toFixed(2)}</span></div>`;
    if(handling > 0) summaryHtml += `<div class="summary-line"><strong>Handling Charges:</strong> <span>+ ${currency} ${handling.toFixed(2)}</span></div>`;
    
    // Show tax breakdown
    if(cgstAmount > 0) summaryHtml += `<div class="summary-line"><strong>CGST (${cgst}%):</strong> <span>+ ${currency} ${cgstAmount.toFixed(2)}</span></div>`;
    if(sgstAmount > 0) summaryHtml += `<div class="summary-line"><strong>SGST (${sgst}%):</strong> <span>+ ${currency} ${sgstAmount.toFixed(2)}</span></div>`;
    if(igstAmount > 0) summaryHtml += `<div class="summary-line"><strong>IGST (${igst}%):</strong> <span>+ ${currency} ${igstAmount.toFixed(2)}</span></div>`;
    if(taxAmount > 0) summaryHtml += `<div class="summary-line"><strong>${taxType} (${taxRate}%):</strong> <span>+ ${currency} ${taxAmount.toFixed(2)}</span></div>`;
    if(cessAmount > 0) summaryHtml += `<div class="summary-line"><strong>Cess (${cess}%):</strong> <span>+ ${currency} ${cessAmount.toFixed(2)}</span></div>`;
    
    summaryHtml += `<div class="summary-line summary-total"><strong>GRAND TOTAL:</strong> <span>${currency} ${grandTotal.toFixed(2)}</span></div>`;
    summaryHtml += `<div class="summary-line"><strong>Amount Paid:</strong> <span>${currency} ${amountPaid.toFixed(2)}</span></div>`;
    summaryHtml += `<div class="summary-line" style="font-weight:bold; border-bottom:none;"><strong>Balance Due:</strong> <span style="color:${balanceDue > 0 ? '#dc2626' : '#10b981'}">${currency} ${balanceDue.toFixed(2)}</span></div>`;
    
    if(taxType && taxType !== 'None') {
      summaryHtml += `<div style="margin-top:0.5rem; padding-top:0.5rem; border-top:1px solid #e2e8f0; font-size:0.7rem; color:#64748b;">
        <i class="fas fa-info-circle"></i> Tax Type: ${taxType} | GSTIN: ${document.getElementById('customerGST')?.value || 'Not Provided'}
      </div>`;
    }
    
    document.getElementById('billSummary').innerHTML = summaryHtml;
  }

  // Save Sale
  document.getElementById('salesForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const companyId = getCompanyId();
    if(!companyId) return;
    
    const saleData = {
      invoiceNo: document.getElementById('invoiceNo')?.value || `INV-${Date.now()}`,
      invoiceDate: document.getElementById('invoiceDate')?.value || new Date().toISOString().split('T')[0],
      dueDate: document.getElementById('dueDate')?.value || '',
      customerName: document.getElementById('customerName')?.value || 'Walk-in Customer',
      customerPhone: document.getElementById('customerPhone')?.value || '',
      customerEmail: document.getElementById('customerEmail')?.value || '',
      customerGST: document.getElementById('customerGST')?.value || '',
      items: currentItems.filter(i => i.name),
      subtotal: window.currentBill.subtotal,
      itemDiscount: window.currentBill.totalItemDiscount,
      globalDiscount: window.currentBill.globalDiscountAmount,
      shippingCharges: parseFloat(document.getElementById('shippingCharges')?.value) || 0,
      packingCharges: parseFloat(document.getElementById('packingCharges')?.value) || 0,
      handlingCharges: parseFloat(document.getElementById('handlingCharges')?.value) || 0,
      taxType: window.currentBill.taxType,
      cgst: window.currentBill.cgst,
      sgst: window.currentBill.sgst,
      igst: window.currentBill.igst,
      taxRate: window.currentBill.taxRate,
      cess: window.currentBill.cess,
      cgstAmount: window.currentBill.cgstAmount,
      sgstAmount: window.currentBill.sgstAmount,
      igstAmount: window.currentBill.igstAmount,
      taxAmount: window.currentBill.taxAmount,
      cessAmount: window.currentBill.cessAmount,
      grandTotal: window.currentBill.grandTotal,
      amountPaid: window.currentBill.amountPaid,
      balanceDue: window.currentBill.balanceDue,
      paymentMethod: document.getElementById('paymentMethod')?.value || 'Cash',
      paymentStatus: window.currentBill.amountPaid >= window.currentBill.grandTotal ? 'Paid' : (window.currentBill.amountPaid > 0 ? 'Partial' : 'Pending'),
      notes: document.getElementById('notes')?.value || '',
      createdAt: Date.now()
    };
    
    try {
      await addDoc(collection(db, `companies/${companyId}/sales`), saleData);
      showMessage('Sale saved successfully!', 'success');
      closeSalesForm();
      loadAllSales();
    } catch(error) {
      showMessage('Error: ' + error.message, 'error');
    }
  });

  // Load Sales Data
  async function loadAllSales() {
    const companyId = getCompanyId();
    if(!companyId) return;
    const snapshot = await getDocs(query(collection(db, `companies/${companyId}/sales`), orderBy('createdAt','desc')));
    allSales = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderSales(allSales);
    updateStats();
    updateCharts();
  }

  function renderSales(sales) {
    const container = document.getElementById('salesList');
    if(!sales.length) { container.innerHTML = '<div style="text-align:center;padding:2rem;">No sales yet</div>'; return; }
    container.innerHTML = `<table class="sales-table"><thead>发展<th>Invoice</th><th>Date</th><th>Customer</th><th>Items</th><th>Subtotal</th><th>Tax</th><th>Total</th><th>Paid</th><th>Status</th><th></th></thead><tbody>
      ${sales.map(s => `
        <tr>
          <td><strong>${escapeHtml(s.invoiceNo)}</strong></td>
          <td>${s.invoiceDate || '-'}</td>
          <td>${escapeHtml(s.customerName)}</td>
          <td>${s.items?.length || 0}</td>
          <td>${s.currency || '₹'} ${(s.subtotal || 0).toFixed(2)}</td>
          <td>${s.currency || '₹'} ${((s.cgstAmount || 0) + (s.sgstAmount || 0) + (s.igstAmount || 0) + (s.taxAmount || 0)).toFixed(2)}</td>
          <td><strong>${s.currency || '₹'} ${(s.grandTotal || 0).toFixed(2)}</strong></td>
          <td>${s.currency || '₹'} ${(s.amountPaid || 0).toFixed(2)}</td>
          <td><span class="${s.paymentStatus === 'Paid' ? 'badge-success' : 'badge-warning'}">${s.paymentStatus || 'Pending'}</span></td>
          <td><button class="btn-secondary" style="padding:0.2rem 0.5rem;" onclick="editSale('${s.id}')">Edit</button></td>
        </tr>
      `).join('')}
    </tbody></table>`;
  }

  function updateStats() {
    const totalRevenue = allSales.reduce((s,item) => s + (item.grandTotal || 0), 0);
    const today = new Date().toISOString().split('T')[0];
    const todaySales = allSales.filter(s => s.invoiceDate === today);
    document.getElementById('salesStats').innerHTML = `
      <div class="stat-card"><div class="stat-value">${allSales.length}</div><div class="stat-label">Total Sales</div></div>
      <div class="stat-card"><div class="stat-value">₹${totalRevenue.toFixed(2)}</div><div class="stat-label">Revenue</div></div>
      <div class="stat-card"><div class="stat-value">${todaySales.length}</div><div class="stat-label">Today</div></div>
      <div class="stat-card"><div class="stat-value">₹${todaySales.reduce((s,item)=>s+(item.grandTotal||0),0).toFixed(2)}</div><div class="stat-label">Today Revenue</div></div>`;
    document.getElementById('analyticsStats').innerHTML = `
      <div class="stat-card"><div class="stat-value">${allSales.length}</div><div class="stat-label">Invoices</div></div>
      <div class="stat-card"><div class="stat-value">₹${totalRevenue.toFixed(2)}</div><div class="stat-label">Total Revenue</div></div>
      <div class="stat-card"><div class="stat-value">${allSales.length>0 ? (totalRevenue/allSales.length).toFixed(2) : 0}</div><div class="stat-label">Avg Order</div></div>`;
  }

  function updateCharts() {
    const last7 = Array.from({length:7}, (_,i) => { const d = new Date(); d.setDate(d.getDate() - (6-i)); return d.toISOString().split('T')[0]; });
    const daily = last7.map(d => allSales.filter(s => s.invoiceDate === d).reduce((sum,item) => sum + (item.grandTotal || 0), 0));
    if(charts.weekly) charts.weekly.destroy();
    charts.weekly = new Chart(document.getElementById('weeklyChart'), { type:'line', data:{ labels:last7, datasets:[{ label:'Daily Sales (₹)', data:daily, borderColor:'#667eea', tension:0.3, fill:true }] } });
    
    const gstSales = allSales.filter(s => s.taxType === 'GST').length;
    const vatSales = allSales.filter(s => s.taxType === 'VAT').length;
    if(charts.tax) charts.tax.destroy();
    charts.tax = new Chart(document.getElementById('taxChart'), { type:'pie', data:{ labels:['GST Invoices', 'VAT Invoices', 'Other'], datasets:[{ data:[gstSales, vatSales, allSales.length - gstSales - vatSales], backgroundColor:['#667eea', '#764ba2', '#10b981'] }] } });
  }

  async function loadCustomers() {
    const companyId = getCompanyId();
    if(!companyId) return;
    const snapshot = await getDocs(collection(db, `companies/${companyId}/sales`));
    const cust = new Map();
    snapshot.docs.forEach(doc => { const s = doc.data(); const n = s.customerName; if(n){ if(!cust.has(n)) cust.set(n, { name:n, phone:s.customerPhone, total:0, count:0 }); const c = cust.get(n); c.total += s.grandTotal || 0; c.count++; } });
    window.customers = Array.from(cust.values()).sort((a,b)=>b.total - a.total);
    renderCustomers();
  }
  
  function renderCustomers() { const search = document.getElementById('customerSearch')?.value.toLowerCase() || ''; const filtered = window.customers?.filter(c => c.name.toLowerCase().includes(search) || (c.phone||'').includes(search)) || []; document.getElementById('customerList').innerHTML = filtered.map(c => `<div class="form-card"><div><strong>${escapeHtml(c.name)}</strong><br>${c.phone || 'No phone'}</div><div style="text-align:right;"><strong>₹${c.total.toFixed(2)}</strong><br>${c.count} orders</div></div>`).join(''); }
  
  window.filterSales = () => { const s = document.getElementById('searchSales').value.toLowerCase(); renderSales(allSales.filter(sale => (sale.invoiceNo||'').toLowerCase().includes(s) || (sale.customerName||'').toLowerCase().includes(s))); };
  window.filterCustomers = () => renderCustomers();
  
  window.editSale = async (id) => { currentEditSaleId = id; const sale = allSales.find(s => s.id === id); if(!sale) return; document.getElementById('editSaleForm').innerHTML = `<div class="form-row"><div class="input-group"><label>Invoice</label><input id="edit_inv" value="${escapeHtml(sale.invoiceNo)}"></div><div class="input-group"><label>Customer</label><input id="edit_cust" value="${escapeHtml(sale.customerName)}"></div><div class="input-group"><label>Phone</label><input id="edit_phone" value="${escapeHtml(sale.customerPhone||'')}"></div><div class="input-group"><label>Paid</label><input type="number" id="edit_paid" value="${sale.amountPaid||0}"></div></div>`; document.getElementById('editSaleModal').classList.add('show'); };
  
  window.updateSale = async () => { const companyId = getCompanyId(); if(!companyId||!currentEditSaleId) return; await updateDoc(doc(db,`companies/${companyId}/sales`,currentEditSaleId),{ invoiceNo:document.getElementById('edit_inv').value, customerName:document.getElementById('edit_cust').value, customerPhone:document.getElementById('edit_phone').value, amountPaid:parseFloat(document.getElementById('edit_paid').value)||0, paymentStatus:parseFloat(document.getElementById('edit_paid').value) >= (allSales.find(s=>s.id===currentEditSaleId)?.grandTotal||0) ? 'Paid' : 'Partial' }); showMessage('Updated','success'); closeEditSaleModal(); loadAllSales(); loadCustomers(); };
  
  window.deleteSale = async () => { if(!confirm('Delete?')) return; const companyId = getCompanyId(); if(!companyId||!currentEditSaleId) return; await deleteDoc(doc(db,`companies/${companyId}/sales`,currentEditSaleId)); showMessage('Deleted','success'); closeEditSaleModal(); loadAllSales(); loadCustomers(); };
  
  function getFieldLabel(id) { for(const f of Object.values(businessFields)) for(const fi of f) if(fi.id === id) return fi.label; return id; }
  function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function showMessage(msg,t) { const d=document.createElement('div'); d.className=`message ${t}`; d.innerHTML=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
  
  window.switchTab = (t) => { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); document.getElementById(`${t}Tab`).classList.add('active'); event.target.classList.add('active'); if(t==='customers') loadCustomers(); };
  window.closeTemplateSelector = () => document.getElementById('templateSelectorModal').classList.remove('show');
  window.closeSalesForm = () => document.getElementById('salesFormModal').classList.remove('show');
  window.closeTemplateCreator = () => document.getElementById('templateCreatorModal').classList.remove('show');
  window.closeEditSaleModal = () => document.getElementById('editSaleModal').classList.remove('show');
  window.calculateFullBill = calculateFullBill;
  
  if(getCompanyId()) { loadTemplates(); loadAllSales(); loadCustomers(); }
</script>
</body>
</html>
