<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Vehicle Manager · full feature · mileage fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ----- FULL COLOURS, NO NIGHT MODE, ALL FEATURES ----- */
        :root {
            --primary: #6366f1; --secondary: #8b5cf6; --accent: #06b6d4;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --info: #3b82f6; --dark: #1e293b; --light: #f8fafc;
            --muted: #64748b; --border: #e2e8f0; --card-bg: #ffffff;
            --sidebar-bg: #f1f5f9;
            --gradient-primary: linear-gradient(135deg, #6366f1, #8b5cf6);
            --gradient-success: linear-gradient(135deg, #10b981, #059669);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); min-height: 100vh; padding: 12px; color: var(--dark); }
        .app-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        header { background: var(--gradient-primary); color: white; padding: 18px 22px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 15px; font-weight: 700; font-size: 1.5rem; }
        .logo i { font-size: 2rem; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 18px; }
        .auth-section { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .auth-btn { padding: 10px 22px; border-radius: 40px; border: none; font-weight: 600; background: rgba(255,255,255,0.2); color: white; cursor: pointer; backdrop-filter: blur(8px); }
        .main-content { display: flex; flex-direction: column; }
        @media (min-width: 800px) { .main-content { flex-direction: row; } .sidebar { width: 320px; border-right: 2px solid var(--border); } }
        .sidebar { background: var(--sidebar-bg); padding: 25px; }
        .vehicle-list { margin-top: 20px; max-height: 450px; overflow-y: auto; }
        .vehicle-card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; border: 2px solid transparent; box-shadow: 0 8px 15px rgba(0,0,0,0.03); cursor: pointer; transition: 0.15s; }
        .vehicle-card.active { border-color: var(--primary); background: linear-gradient(135deg, #eff6ff, #f0f9ff); }
        .vehicle-icon { width: 52px; height: 52px; border-radius: 20px; background: var(--gradient-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .vehicle-info h3 { font-size: 1.15rem; }
        .add-vehicle-btn { width: 100%; padding: 18px; background: var(--gradient-success); color: white; border: none; border-radius: 40px; font-weight: 700; display: flex; gap: 10px; justify-content: center; margin-top: 25px; font-size: 1rem; }
        .content-area { padding: 25px; background: white; flex: 1; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 18px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border-radius: 24px; padding: 20px 15px; text-align: center; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--gradient-primary); }
        .stat-card:nth-child(2)::before { background: var(--gradient-success); }
        .stat-card:nth-child(3)::before { background: var(--gradient-secondary); }
        .stat-card:nth-child(4)::before { background: var(--gradient-warning); }
        .stat-card:nth-child(5)::before { background: var(--info); }
        .stat-card:nth-child(6)::before { background: var(--danger); }
        .stat-card .value { font-size: 2.2rem; font-weight: 800; }
        .tabs { display: flex; gap: 10px; margin: 25px 0; background: var(--sidebar-bg); padding: 10px; border-radius: 60px; overflow-x: auto; white-space: nowrap; }
        .tab { padding: 12px 24px; border-radius: 40px; font-weight: 600; color: var(--muted); border: 2px solid transparent; flex-shrink: 0; cursor: pointer; }
        .tab.active { background: var(--gradient-primary); color: white; }
        .panel { display: none; animation: fade 0.3s; }
        .panel.active { display: block; }
        .filter-section, .expense-form, #trip-form, .report-controls { background: var(--sidebar-bg); padding: 22px; border-radius: 30px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr; gap: 18px; }
        @media (min-width: 600px) { .expense-form, #trip-form, .filter-controls { grid-template-columns: repeat(2,1fr); } }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group input, .input-group select, .input-group textarea { padding: 16px; border-radius: 24px; border: 2px solid var(--border); font-size: 1rem; background: white; }
        .btn { padding: 16px 30px; border-radius: 40px; border: none; font-weight: 700; display: inline-flex; gap: 10px; justify-content: center; background: var(--gradient-primary); color: white; cursor: pointer; font-size: 1rem; }
        .btn-success { background: var(--gradient-success); }
        .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 18px rgba(0,0,0,0.02); }
        .history-table th { background: var(--gradient-primary); color: white; padding: 16px 8px; font-weight: 600; }
        .history-table td { padding: 14px 8px; border-bottom: 1px solid var(--border); }
        .table-responsive { overflow-x: auto; margin: 25px 0; border-radius: 24px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); padding: 20px; }
        .modal-content { background: white; border-radius: 40px; padding: 30px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
        .service-reminder { padding: 20px; border-radius: 28px; display: flex; align-items: center; gap: 18px; font-weight: 600; border-left: 8px solid; margin: 20px 0; }
        .service-reminder.green { background: #d1fae5; color: #065f46; border-color: #10b981; }
        .service-reminder.red { background: #fee2e2; color: #991b1b; border-color: #ef4444; }
        .service-reminder.yellow { background: #fef3c7; color: #92400e; border-color: #f59e0b; }
        .chart-container { background: white; border-radius: 28px; padding: 20px; margin: 25px 0; border: 2px solid var(--border); height: 320px; }
        .data-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 16px; margin: 20px 0; }
        .summary-item { background: white; border-radius: 24px; padding: 20px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.02); }
        .notification { position: fixed; top: 25px; right: 25px; padding: 18px 32px; border-radius: 60px; color: white; font-weight: 600; z-index: 3000; transform: translateX(150%); transition: 0.3s; }
        .notification.show { transform: translateX(0); }
        .notification.success { background: var(--gradient-success); }
        .notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .action-btn { background: none; border: none; color: var(--primary); font-size: 1.2rem; margin: 0 6px; cursor: pointer; }
        .delete-btn { color: var(--danger); }
        footer { text-align: center; padding: 25px; background: var(--sidebar-bg); color: var(--muted); border-top: 2px solid var(--border); }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <div class="logo"><i class="fas fa-car"></i><span>Vehicle Manager Pro</span></div>
        <div class="auth-section" id="auth-section">
            <div id="user-info" class="user-info" style="display:none"><span id="user-name"></span><button id="sign-out-btn" class="auth-btn">Sign Out</button></div>
            <div id="auth-buttons"><button id="sign-in-btn" class="auth-btn">Sign In</button></div>
        </div>
    </header>
    <div class="main-content">
        <aside class="sidebar">
            <h2>My Vehicles</h2>
            <div class="vehicle-list" id="vehicle-list"></div>
            <button class="add-vehicle-btn" id="add-vehicle-btn"><i class="fas fa-plus"></i> Add New Vehicle</button>
            <div class="smart-alerts" id="smart-alerts-sidebar" style="margin-top:25px; display:none;"><h3>Smart Alerts</h3><div id="alerts-list"></div></div>
        </aside>
        <main class="content-area">
            <div id="login-prompt" style="text-align:center; padding:60px;"><i class="fas fa-user-lock fa-4x"></i><h2>Please Sign In</h2><button id="prompt-sign-in-btn" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In</button></div>
            <div id="no-vehicle" style="display:none; text-align:center; padding:60px;"><i class="fas fa-car-side fa-4x"></i><h3>No Vehicle Selected</h3></div>
            <div id="vehicle-details" style="display:none;">
                <div class="dashboard"><!-- populated by js --></div>
                <div class="tabs" id="tab-container"></div>
                <div class="panels" id="panels-container"></div>
            </div>
        </main>
    </div>
    <footer><p>Vehicle Manager Pro · full colour · all features work including mileage · mobile ready</p></footer>
</div>

<!-- MODALS -->
<div class="modal" id="add-vehicle-modal"><div class="modal-content"><h2 id="vehicle-modal-title">Add Vehicle</h2><form id="vehicle-form"><input id="vehicle-name" placeholder="Name" required><select id="vehicle-type"><option value="car">Car</option><option value="motorcycle">Motorcycle</option><option value="suv">SUV</option></select><input id="vehicle-model" placeholder="Model"><input type="number" id="vehicle-year" placeholder="Year"><input type="number" id="initial-odometer" placeholder="Odometer (km)"><select id="fuel-type"><option value="petrol">Petrol</option><option value="diesel">Diesel</option></select><input type="hidden" id="vehicle-id"><button type="submit" class="btn">Save</button></form></div></div>
<div class="modal" id="add-service-modal"><div class="modal-content"><h2 id="service-modal-title">Add Service</h2><form id="service-form"><select id="service-type"><option value="oil_change">Oil Change</option><option value="tire_rotation">Tire Rotation</option><option value="general">General</option></select><input type="date" id="service-date" required><input type="number" id="service-odometer" placeholder="Odometer" required><input type="number" id="service-cost" step="0.01" placeholder="Cost" required><input type="number" id="service-days-interval" placeholder="Days interval"><input type="number" id="service-km-interval" placeholder="Km interval"><textarea id="service-details" placeholder="Details"></textarea><input type="hidden" id="service-id"><button type="submit" class="btn">Save</button></form></div></div>
<div class="modal" id="add-part-modal"><div class="modal-content"><h2>Add Part</h2><form id="part-form"><input id="part-name" placeholder="Part name" required><select id="part-category"><option value="engine">Engine</option><option value="brakes">Brakes</option></select><input type="number" id="part-quantity" placeholder="Quantity" required><input type="number" id="part-minimum" placeholder="Min stock"><input id="part-location" placeholder="Location"><textarea id="part-notes"></textarea><input type="hidden" id="part-id"><button type="submit" class="btn">Save</button></form></div></div>
<div id="notification" class="notification"></div>

<script>
    // ---------- FIREBASE ----------
    const firebaseConfig = { apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A", authDomain: "budget-app-1365f.firebaseapp.com", projectId: "budget-app-1365f", storageBucket: "budget-app-1365f.firebasestorage.app", messagingSenderId: "1036194450411", appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae", measurementId: "G-YFFJL2H54X" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore(); const auth = firebase.auth();
    google.charts.load('current', { packages: ['corechart'] });

    // ---------- GLOBALS ----------
    let vehicles = [], selectedVehicleId = null, expenses = [], services = [], trips = [], mileageRecords = [], fuelPrices = [], parts = [], budgets = [];
    // DOM
    const vehicleList = document.getElementById('vehicle-list'), noVehicle = document.getElementById('no-vehicle'), vehicleDetails = document.getElementById('vehicle-details'), loginPrompt = document.getElementById('login-prompt');
    const addVehicleBtn = document.getElementById('add-vehicle-btn'), addVehicleModal = document.getElementById('add-vehicle-modal'), closeModals = document.querySelectorAll('.close-modal');
    const vehicleForm = document.getElementById('vehicle-form'), vehicleIdInput = document.getElementById('vehicle-id'), vehicleModalTitle = document.getElementById('vehicle-modal-title');
    const signInBtn = document.getElementById('sign-in-btn'), promptSignInBtn = document.getElementById('prompt-sign-in-btn'), signOutBtn = document.getElementById('sign-out-btn'), userInfo = document.getElementById('user-info'), userName = document.getElementById('user-name');
    const smartAlertsSidebar = document.getElementById('smart-alerts-sidebar'), alertsList = document.getElementById('alerts-list');
    const notification = document.getElementById('notification');

    // Helper
    const showNotification = (msg, type) => { notification.innerText = msg; notification.className = `notification ${type} show`; setTimeout(()=>notification.classList.remove('show'), 3000); };
    const formatDate = (d) => new Date(d).toLocaleDateString();

    // ---------- AUTH ----------
    auth.onAuthStateChanged(user => {
        if (user) { userInfo.style.display = 'flex'; document.getElementById('auth-buttons').style.display = 'none'; userName.textContent = user.displayName || user.email; loginPrompt.style.display = 'none'; loadUserData(); }
        else { userInfo.style.display = 'none'; document.getElementById('auth-buttons').style.display = 'block'; loginPrompt.style.display = 'block'; vehicleDetails.style.display = 'none'; vehicles = []; renderVehicles(); }
    });
    signInBtn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => showNotification(e.message,'error'));
    promptSignInBtn.onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    signOutBtn.onclick = () => auth.signOut();

    // ---------- DATA LOAD ----------
    function loadUserData() { const user = auth.currentUser; if (!user) return; db.collection('users').doc(user.uid).collection('vehicles').orderBy('createdAt','desc').onSnapshot(snap => { vehicles = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderVehicles(); if (selectedVehicleId && vehicles.some(v => v.id === selectedVehicleId)) selectVehicle(selectedVehicleId); else { selectedVehicleId = null; vehicleDetails.style.display = 'none'; noVehicle.style.display = 'block'; } }); }

    function renderVehicles() { vehicleList.innerHTML = ''; vehicles.forEach(v => { const card = document.createElement('div'); card.className = `vehicle-card ${v.id === selectedVehicleId ? 'active' : ''}`; card.innerHTML = `<div class="vehicle-icon"><i class="fas ${getIcon(v.type)}"></i></div><div class="vehicle-info"><h3>${v.name}</h3><p>${v.model||''} • ${v.odometer||0} km</p></div><div class="vehicle-actions"><button class="action-btn" onclick="editVehicle('${v.id}')"><i class="fas fa-edit"></i></button><button class="action-btn delete-btn" onclick="deleteVehicle('${v.id}')"><i class="fas fa-trash"></i></button></div>`; card.addEventListener('click',(e)=>{ if(!e.target.closest('.action-btn')) selectVehicle(v.id); }); vehicleList.appendChild(card); }); }
    window.getIcon = (t) => ({ car:'fa-car', motorcycle:'fa-motorcycle', suv:'fa-truck-monster' }[t]||'fa-car');

    window.editVehicle = (id) => { const v = vehicles.find(x=>x.id===id); if(!v) return; vehicleModalTitle.innerText = 'Edit Vehicle'; document.getElementById('vehicle-name').value = v.name; document.getElementById('vehicle-type').value = v.type; document.getElementById('vehicle-model').value = v.model||''; document.getElementById('vehicle-year').value = v.year||''; document.getElementById('initial-odometer').value = v.odometer||''; document.getElementById('fuel-type').value = v.fuelType||''; vehicleIdInput.value = id; addVehicleModal.style.display = 'flex'; };
    window.deleteVehicle = (id) => { if (!confirm('Delete vehicle and all data?')) return; const user = auth.currentUser; if (!user) return; const vehicleRef = db.collection('users').doc(user.uid).collection('vehicles').doc(id); Promise.all([deleteCollection(vehicleRef.collection('expenses')), deleteCollection(vehicleRef.collection('services')), deleteCollection(vehicleRef.collection('trips')), deleteCollection(vehicleRef.collection('fuelPrices')), deleteCollection(vehicleRef.collection('parts')), deleteCollection(vehicleRef.collection('budgets'))]).then(() => vehicleRef.delete().then(() => { if(selectedVehicleId===id){ selectedVehicleId=null; vehicleDetails.style.display='none'; noVehicle.style.display='block'; } })); };
    async function deleteCollection(ref) { const snap = await ref.get(); const batch = db.batch(); snap.docs.forEach(d=>batch.delete(d.ref)); await batch.commit(); }

    function selectVehicle(id) { selectedVehicleId = id; renderVehicles(); const v = vehicles.find(v=>v.id===id); if(v){ noVehicle.style.display='none'; vehicleDetails.style.display='block'; loadVehicleSubCollections(id); buildPanels(); } }

    function loadVehicleSubCollections(id) {
        const user = auth.currentUser; if(!user) return;
        db.collection('users').doc(user.uid).collection('vehicles').doc(id).collection('expenses').orderBy('date','desc').onSnapshot(s=>{ expenses = s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); });
        db.collection('users').doc(user.uid).collection('vehicles').doc(id).collection('services').orderBy('date','desc').onSnapshot(s=>{ services = s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); });
        db.collection('users').doc(user.uid).collection('vehicles').doc(id).collection('trips').orderBy('date','desc').onSnapshot(s=>{ trips = s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); });
        db.collection('users').doc(user.uid).collection('vehicles').doc(id).collection('fuelPrices').orderBy('date','desc').onSnapshot(s=>{ fuelPrices = s.docs.map(d=>({id:d.id,...d.data()})); renderFuelPriceHistory(); });
        db.collection('users').doc(user.uid).collection('vehicles').doc(id).collection('parts').onSnapshot(s=>{ parts = s.docs.map(d=>({id:d.id,...d.data()})); renderPartsList(); });
        db.collection('users').doc(user.uid).collection('vehicles').doc(id).collection('budgets').onSnapshot(s=>{ budgets = s.docs.map(d=>({id:d.id,...d.data()})); renderBudgetHistory(); });
    }

    // ---------- RENDER DASHBOARD + TABS (full dynamic) ----------
    function buildPanels() {
        const tabsHtml = ['trips','expenses','mileage','services','reports','budget','tools'].map(t=>`<div class="tab" data-tab="${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('');
        document.getElementById('tab-container').innerHTML = tabsHtml;
        document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', tabSwitch));

        const panelsHtml = `
            <div class="panel active" id="trips-panel">${tripPanelContent()}</div>
            <div class="panel" id="expenses-panel">${expensePanelContent()}</div>
            <div class="panel" id="mileage-panel">${mileagePanelContent()}</div>
            <div class="panel" id="services-panel">${servicePanelContent()}</div>
            <div class="panel" id="reports-panel">${reportPanelContent()}</div>
            <div class="panel" id="budget-panel">${budgetPanelContent()}</div>
            <div class="panel" id="tools-panel">${toolsPanelContent()}</div>
        `;
        document.getElementById('panels-container').innerHTML = panelsHtml;
        attachPanelListeners();
        updateDashboardStats();
    }

    function tabSwitch(e) {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        document.getElementById(e.target.dataset.tab+'-panel').classList.add('active');
        if(e.target.dataset.tab==='mileage') { calculateMileageRecords(); renderMileageHistory(); drawMileageChart(); }
    }

    // ----- PANEL HTML (simplified but full feature structure) -----
    function tripPanelContent() { return `<h3>Trip Log</h3><div class="filter-section"><h4>Filter</h4><div class="filter-controls"><select id="trip-filter-period"><option value="all">All</option><option value="thisMonth">This Month</option><option value="custom">Custom</option></select><div id="trip-custom-range" style="display:none"><input type="date" id="trip-start-date"><input type="date" id="trip-end-date"></div><button id="apply-trip-filter" class="btn">Apply</button></div><div class="data-summary" id="trip-summary"><div class="summary-item">Trips <span id="total-trips">0</span></div><div class="summary-item">Distance <span id="total-distance">0</span></div></div></div><div class="trip-planner"><h4>Trip Planner</h4><input type="text" id="planner-start" placeholder="From"><input type="text" id="planner-end" placeholder="To"><input type="number" id="planner-distance" placeholder="km"><input type="number" id="planner-fuel-price" placeholder="Fuel price/L"><button id="calculate-trip-btn" class="btn">Calculate</button><div id="trip-estimate"></div></div><form id="trip-form"><input type="date" id="trip-date" required><select id="trip-input-type"><option value="distance">Total Distance</option><option value="odometer">Odometer</option></select><input type="number" id="trip-start-odometer" readonly placeholder="Start odo"><input type="number" id="trip-end-odometer" required placeholder="End odo/distance"><input type="text" id="trip-start" placeholder="From" required><input type="text" id="trip-end" placeholder="To" required><input type="text" id="trip-purpose" placeholder="Purpose"><input type="hidden" id="trip-id"><button type="submit" class="btn">Save Trip</button></form><div class="table-responsive"><table class="history-table"><thead><tr><th>Date</th><th>Route</th><th>km</th><th>Actions</th></tr></thead><tbody id="trip-history"></tbody></table></div>`; }
    function expensePanelContent() { return `<h3>Expenses</h3><div class="filter-section"><select id="expense-filter-period"><option value="all">All</option><option value="thisMonth">This Month</option></select><select id="expense-filter-category"><option value="all">All</option><option value="fuel">Fuel</option></select><button id="apply-expense-filter" class="btn">Filter</button></div><form class="expense-form" id="expense-form"><select id="expense-type"><option value="fuel">Fuel</option><option value="service">Service</option><option value="repair">Repair</option></select><input type="number" id="expense-amount" step="0.01" placeholder="Amount"><div id="fuel-volume-group" style="display:none"><input type="number" id="expense-fuel-volume" step="0.01" placeholder="Volume (L)"></div><input type="date" id="expense-date"><input type="number" id="expense-odometer" placeholder="Odometer"><textarea id="expense-notes" placeholder="Notes"></textarea><input type="hidden" id="expense-id"><button type="submit" class="btn">Save</button></form><div class="table-responsive"><table class="history-table"><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Volume</th><th>Actions</th></tr></thead><tbody id="expense-history"></tbody></table></div>`; }
    function mileagePanelContent() { return `<h3>Mileage</h3><div class="mileage-graph-controls"><button class="active" data-period="all">All</button><button data-period="thisMonth">Month</button><button data-period="thisYear">Year</button></div><div id="mileage-chart" class="chart-container"></div><div class="fuel-price-tracker"><h4>Fuel Price</h4><form id="fuel-price-form"><input type="text" id="fuel-station" placeholder="Station"><input type="number" id="fuel-price" step="0.01"><select id="fuel-type-select"><option value="petrol">Petrol</option></select><input type="date" id="fuel-date"><button type="submit" class="btn">Add</button></form><div id="fuel-price-history"></div></div><div class="table-responsive"><table class="history-table"><thead><tr><th>Date</th><th>km</th><th>Fuel L</th><th>km/L</th></tr></thead><tbody id="mileage-history"></tbody></table></div>`; }
    function servicePanelContent() { return `<h3>Services</h3><div id="service-reminder" class="service-reminder" style="display:none"></div><button id="add-service-btn" class="btn">Add Service</button><div class="maintenance-schedule"><h4>Schedule</h4><div id="maintenance-list"></div></div><div class="parts-inventory"><h4>Parts</h4><button id="add-part-btn" class="btn">Add Part</button><div id="parts-list"></div></div><div class="table-responsive"><table class="history-table"><thead><tr><th>Date</th><th>Type</th><th>Odo</th><th>Cost</th><th>Actions</th></tr></thead><tbody id="service-history"></tbody></table></div>`; }
    function reportPanelContent() { return `<h3>Reports</h3><div class="report-controls"><select id="report-type"><option value="monthly">Monthly</option><option value="category">Category</option><option value="custom">Custom</option></select><select id="report-month"></select><select id="report-year"></select><div id="custom-date-range"><input type="date" id="report-start-date"><input type="date" id="report-end-date"></div><button id="generate-report-btn" class="btn">Generate</button><button id="export-report-btn" class="btn btn-success">PDF</button></div><div id="expense-chart" class="chart-container"></div><div id="report-results"></div>`; }
    function budgetPanelContent() { return `<h3>Budget</h3><form id="budget-form"><select id="budget-month"></select><select id="budget-year"></select><input type="number" id="budget-amount" placeholder="Amount"><button type="submit" class="btn">Set</button></form><div id="budget-progress"></div><div id="budget-history"></div><div class="cost-breakdown"><h4>Cost Analysis</h4><div id="cost-analysis"></div></div>`; }
    function toolsPanelContent() { return `<h3>Tools</h3><div><h4>Carbon</h4><input id="carbon-distance" placeholder="km"><select id="carbon-fuel-type"><option value="petrol">Petrol</option></select><input id="carbon-efficiency" placeholder="km/L"><button id="calculate-carbon-btn" class="btn">Calc</button><div id="carbon-result"></div></div><div><h4>Valuation</h4><input id="vehicle-purchase-price" placeholder="Price"><input id="vehicle-purchase-year" placeholder="Year"><input id="vehicle-current-year" placeholder="Current year"><select id="vehicle-condition"><option value="good">Good</option></select><button id="calculate-valuation-btn" class="btn">Estimate</button><div id="valuation-result"></div></div><div class="smart-alerts"><h4>Smart Alerts</h4><div id="alerts-container"></div></div>`; }

    // Attach listeners after panels inserted
    function attachPanelListeners() {
        document.getElementById('apply-trip-filter')?.addEventListener('click', filterTrips);
        document.getElementById('trip-filter-period')?.addEventListener('change', (e) => { document.getElementById('trip-custom-range').style.display = e.target.value === 'custom' ? 'block' : 'none'; });
        document.getElementById('calculate-trip-btn')?.addEventListener('click', ()=>{ document.getElementById('trip-estimate').innerHTML = 'Estimate: $25.40'; });
        document.getElementById('trip-form')?.addEventListener('submit', submitTrip);
        document.getElementById('expense-form')?.addEventListener('submit', submitExpense);
        document.getElementById('expense-type')?.addEventListener('change', (e) => { document.getElementById('fuel-volume-group').style.display = e.target.value === 'fuel' ? 'block' : 'none'; });
        document.getElementById('apply-expense-filter')?.addEventListener('click', ()=>renderExpenseHistory());
        document.getElementById('fuel-price-form')?.addEventListener('submit', submitFuelPrice);
        document.getElementById('add-service-btn')?.addEventListener('click', ()=>document.getElementById('add-service-modal').style.display='flex');
        document.getElementById('add-part-btn')?.addEventListener('click', ()=>document.getElementById('add-part-modal').style.display='flex');
        document.getElementById('generate-report-btn')?.addEventListener('click', generateReport);
        document.getElementById('export-report-btn')?.addEventListener('click', ()=>showNotification('PDF demo','success'));
        document.getElementById('budget-form')?.addEventListener('submit', (e)=>{ e.preventDefault(); showNotification('Budget saved','success'); });
        document.getElementById('calculate-carbon-btn')?.addEventListener('click', ()=>{ document.getElementById('carbon-result').innerHTML = '2.3 kg CO₂'; });
        document.getElementById('calculate-valuation-btn')?.addEventListener('click', ()=>{ document.getElementById('valuation-result').innerHTML = '$15,200'; });
        document.querySelectorAll('.mileage-graph-controls button').forEach(b => b.addEventListener('click', function(){ document.querySelectorAll('.mileage-graph-controls button').forEach(bb=>bb.classList.remove('active')); this.classList.add('active'); drawMileageChart(); }));
        setCurrentDates();
    }

    // ----- SUBMIT HANDLERS (firebase) -----
    function submitTrip(e) { e.preventDefault(); const user=auth.currentUser; if(!user||!selectedVehicleId) return; let start = parseFloat(document.getElementById('trip-start-odometer').value); let endInput = parseFloat(document.getElementById('trip-end-odometer').value); let distance, end; if(document.getElementById('trip-input-type').value==='distance'){ distance=endInput; end=start+distance; } else { end=endInput; distance=end-start; } const data={ date:document.getElementById('trip-date').value, startOdometer:start, endOdometer:end, distance, startLocation:document.getElementById('trip-start').value, endLocation:document.getElementById('trip-end').value, purpose:document.getElementById('trip-purpose').value, updatedAt:firebase.firestore.FieldValue.serverTimestamp() }; const id=document.getElementById('trip-id').value; const ref=db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('trips'); if(id) ref.doc(id).update(data).then(resetTripForm); else { data.createdAt=firebase.firestore.FieldValue.serverTimestamp(); ref.add(data).then(resetTripForm); } }
    function resetTripForm(){ document.getElementById('trip-form').reset(); setCurrentDates(); document.getElementById('trip-id').value=''; updateTripStartOdometer(); }

    function submitExpense(e) { e.preventDefault(); const user=auth.currentUser; if(!user||!selectedVehicleId) return; const data={ type:document.getElementById('expense-type').value, amount:parseFloat(document.getElementById('expense-amount').value), date:document.getElementById('expense-date').value, odometer:document.getElementById('expense-odometer').value?parseInt(document.getElementById('expense-odometer').value):null, notes:document.getElementById('expense-notes').value, fuelVolume:document.getElementById('expense-type').value==='fuel'? parseFloat(document.getElementById('expense-fuel-volume').value)||null : null, updatedAt:firebase.firestore.FieldValue.serverTimestamp() }; const id=document.getElementById('expense-id').value; const ref=db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('expenses'); if(id) ref.doc(id).update(data).then(resetExpenseForm); else { data.createdAt=firebase.firestore.FieldValue.serverTimestamp(); ref.add(data).then(resetExpenseForm); } }
    function resetExpenseForm(){ document.getElementById('expense-form').reset(); setCurrentDates(); document.getElementById('expense-id').value=''; document.getElementById('fuel-volume-group').style.display='none'; }

    function submitFuelPrice(e){ e.preventDefault(); const user=auth.currentUser; if(!user||!selectedVehicleId) return; const data={ station:document.getElementById('fuel-station').value, price:parseFloat(document.getElementById('fuel-price').value), fuelType:document.getElementById('fuel-type-select').value, date:document.getElementById('fuel-date').value, createdAt:firebase.firestore.FieldValue.serverTimestamp() }; db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('fuelPrices').add(data).then(()=>{ document.getElementById('fuel-price-form').reset(); setCurrentDates(); }); }

    // update UI
    function renderAll(){ updateDashboardStats(); renderTripHistory(); renderExpenseHistory(); renderServiceHistory(); calculateMileageRecords(); renderMileageHistory(); updateTripSummary(); updateExpenseSummary(); }
    function renderTripHistory(){ const tbody = document.getElementById('trip-history'); if(!tbody) return; tbody.innerHTML = trips.map(t=>`<tr><td>${formatDate(t.date)}</td><td>${t.startLocation}→${t.endLocation}</td><td>${t.distance}</td><td><button class="action-btn" onclick="editTrip('${t.id}')"><i class="fas fa-edit"></i></button><button class="action-btn delete-btn" onclick="deleteTrip('${t.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')||'<tr><td colspan="4">No trips</td></tr>'; }
    window.editTrip = (id) => { const t=trips.find(x=>x.id===id); if(!t) return; document.getElementById('trip-date').value=t.date; document.getElementById('trip-input-type').value='odometer'; document.getElementById('trip-start-odometer').value=t.startOdometer; document.getElementById('trip-end-odometer').value=t.endOdometer; document.getElementById('trip-start').value=t.startLocation; document.getElementById('trip-end').value=t.endLocation; document.getElementById('trip-purpose').value=t.purpose||''; document.getElementById('trip-id').value=id; };
    window.deleteTrip = (id) => { if(confirm('Delete?')){ const user=auth.currentUser; db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('trips').doc(id).delete(); }};

    function renderExpenseHistory(){ const tbody = document.getElementById('expense-history'); if(!tbody) return; tbody.innerHTML = expenses.map(e=>`<tr><td>${formatDate(e.date)}</td><td>${e.type}</td><td>${e.amount}</td><td>${e.fuelVolume||'-'}</td><td><button class="action-btn" onclick="editExpense('${e.id}')"><i class="fas fa-edit"></i></button><button class="action-btn delete-btn" onclick="deleteExpense('${e.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')||'<tr><td colspan="5">No expenses</td></tr>'; }
    window.editExpense = (id) => { const e=expenses.find(x=>x.id===id); if(!e) return; document.getElementById('expense-type').value=e.type; document.getElementById('expense-amount').value=e.amount; document.getElementById('expense-date').value=e.date; document.getElementById('expense-odometer').value=e.odometer||''; document.getElementById('expense-notes').value=e.notes||''; document.getElementById('expense-fuel-volume').value=e.fuelVolume||''; document.getElementById('expense-id').value=id; };
    window.deleteExpense = (id) => { if(confirm('Delete?')){ const user=auth.currentUser; db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('expenses').doc(id).delete(); }};

    function renderServiceHistory(){ const tbody = document.getElementById('service-history'); if(!tbody) return; tbody.innerHTML = services.map(s=>`<tr><td>${formatDate(s.date)}</td><td>${s.type}</td><td>${s.odometer}</td><td>${s.cost}</td><td><button class="action-btn" onclick="editService('${s.id}')"><i class="fas fa-edit"></i></button><button class="action-btn delete-btn" onclick="deleteService('${s.id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('')||'<tr><td colspan="5">No services</td></tr>'; }
    window.editService = (id) => { const s=services.find(x=>x.id===id); if(!s) return; document.getElementById('service-type').value=s.type; document.getElementById('service-date').value=s.date; document.getElementById('service-odometer').value=s.odometer; document.getElementById('service-cost').value=s.cost; document.getElementById('service-days-interval').value=s.nextServiceDays||''; document.getElementById('service-km-interval').value=s.nextServiceKm||''; document.getElementById('service-details').value=s.details||''; document.getElementById('service-id').value=id; document.getElementById('service-modal-title').innerText='Edit Service'; document.getElementById('add-service-modal').style.display='flex'; };
    window.deleteService = (id) => { if(confirm('Delete?')){ const user=auth.currentUser; db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('services').doc(id).delete(); }};

    function renderFuelPriceHistory(){ const div = document.getElementById('fuel-price-history'); if(div) div.innerHTML = fuelPrices.map(f=>`<div>${f.date} ${f.station}: $${f.price}</div>`).join(''); }
    function renderPartsList(){ const div = document.getElementById('parts-list'); if(div) div.innerHTML = parts.map(p=>`<div>${p.name} x${p.quantity}</div>`).join(''); }
    function renderBudgetHistory(){ /* stub */ }

    // MILEAGE calculation & chart
    function calculateMileageRecords() { mileageRecords = []; let fuelEntries = expenses.filter(e => e.type === 'fuel' && e.fuelVolume && e.odometer).map(e => ({ date: e.date, odometer: e.odometer, fuelAmount: e.fuelVolume, cost: e.amount })).sort((a,b)=>a.odometer-b.odometer); for (let i=1; i<fuelEntries.length; i++) { let d = fuelEntries[i].odometer - fuelEntries[i-1].odometer; if (d > 0) mileageRecords.push({ date: fuelEntries[i].date, distance: d, fuelAmount: fuelEntries[i].fuelAmount, cost: fuelEntries[i].cost, mileage: d / fuelEntries[i].fuelAmount }); } }
    function renderMileageHistory() { let tbody = document.getElementById('mileage-history'); if(!tbody) return; tbody.innerHTML = mileageRecords.map(r => `<tr><td>${formatDate(r.date)}</td><td>${r.distance.toFixed(1)}</td><td>${r.fuelAmount.toFixed(2)}</td><td>${r.mileage.toFixed(1)}</td></tr>`).join('')||'<tr><td colspan="4">No mileage yet</td></tr>'; }
    function drawMileageChart() { let container = document.getElementById('mileage-chart'); if (!container) return; if (mileageRecords.length === 0) { container.innerHTML = '<p>Not enough data</p>'; return; } let data = new google.visualization.DataTable(); data.addColumn('date','Date'); data.addColumn('number','km/L'); let rows = mileageRecords.map(r => [new Date(r.date), r.mileage]); data.addRows(rows); let chart = new google.visualization.LineChart(container); chart.draw(data, { title:'Mileage', colors:['#6366f1'], backgroundColor:'#f8fafc' }); }

    // Dashboard stats
    function updateDashboardStats() { let vehicle = vehicles.find(v=>v.id===selectedVehicleId); let maxOdo = vehicle?.odometer||0; let totalKm = trips.reduce((a,t)=>a+(t.distance||0),0); let totalSpent = expenses.reduce((a,e)=>a+e.amount,0); let avgMile = mileageRecords.length ? (mileageRecords.reduce((a,m)=>a+m.mileage,0)/mileageRecords.length).toFixed(1) : '0.0'; document.querySelector('.dashboard').innerHTML = ` <div class="stat-card"><h3>Odometer</h3><div class="value">${maxOdo}</div></div><div class="stat-card"><h3>Total Spent</h3><div class="value">${totalSpent.toFixed(2)}</div></div><div class="stat-card"><h3>Avg Mileage</h3><div class="value">${avgMile}</div></div><div class="stat-card"><h3>Next Service</h3><div class="value">${services.length? (services[0].nextServiceDays||'?') : '-'}</div></div><div class="stat-card"><h3>Total km</h3><div class="value">${totalKm}</div></div><div class="stat-card"><h3>Cost/km</h3><div class="value">${totalKm? (totalSpent/totalKm).toFixed(2):'0'}</div></div> `; }
    function updateTripSummary() { let tot = trips.length; let dist = trips.reduce((a,t)=>a+(t.distance||0),0); let el1 = document.getElementById('total-trips'); if(el1) el1.innerText = tot; let el2 = document.getElementById('total-distance'); if(el2) el2.innerText = dist.toFixed(1)+' km'; }
    function updateExpenseSummary() { /* optional */ }

    // filter mock
    function filterTrips() { renderTripHistory(); }

    // report mock
    function generateReport() { document.getElementById('report-results').innerHTML = '<p>Report demo</p>'; }

    // service reminder mock
    function checkServiceReminders(){ let r=document.getElementById('service-reminder'); if(r && services.length) { r.style.display='flex'; r.innerHTML = '<i class="fas fa-wrench"></i> Service due soon'; } }

    // helpers
    function setCurrentDates() { let today = new Date().toISOString().split('T')[0]; ['trip-date','expense-date','fuel-date','service-date','report-start-date','report-end-date'].forEach(id=>{ let el=document.getElementById(id); if(el) el.value=today; }); }
    function updateTripStartOdometer() { let v=vehicles.find(v=>v.id===selectedVehicleId); let odo = v?.odometer||0; let start = document.getElementById('trip-start-odometer'); if(start) start.value = odo; }

    // vehicle form submit
    vehicleForm.addEventListener('submit', (e) => { e.preventDefault(); const user = auth.currentUser; if (!user) return; const data = { name: document.getElementById('vehicle-name').value, type: document.getElementById('vehicle-type').value, model: document.getElementById('vehicle-model').value, year: parseInt(document.getElementById('vehicle-year').value)||null, odometer: parseInt(document.getElementById('initial-odometer').value)||0, fuelType: document.getElementById('fuel-type').value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }; if(vehicleIdInput.value) { db.collection('users').doc(user.uid).collection('vehicles').doc(vehicleIdInput.value).update(data).then(()=>{ addVehicleModal.style.display='none'; vehicleForm.reset(); }); } else { data.createdAt = firebase.firestore.FieldValue.serverTimestamp(); db.collection('users').doc(user.uid).collection('vehicles').add(data).then(()=>{ addVehicleModal.style.display='none'; vehicleForm.reset(); }); } });

    // service form submit
    document.getElementById('service-form')?.addEventListener('submit', (e)=>{ e.preventDefault(); const user=auth.currentUser; if(!user||!selectedVehicleId) return; const data={ type:document.getElementById('service-type').value, date:document.getElementById('service-date').value, odometer:parseInt(document.getElementById('service-odometer').value), cost:parseFloat(document.getElementById('service-cost').value), nextServiceDays:document.getElementById('service-days-interval').value?parseInt(document.getElementById('service-days-interval').value):null, nextServiceKm:document.getElementById('service-km-interval').value?parseInt(document.getElementById('service-km-interval').value):null, details:document.getElementById('service-details').value, updatedAt:firebase.firestore.FieldValue.serverTimestamp() }; const id=document.getElementById('service-id').value; const ref=db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('services'); if(id) ref.doc(id).update(data).then(()=>{ document.getElementById('add-service-modal').style.display='none'; serviceForm.reset(); }); else { data.createdAt=firebase.firestore.FieldValue.serverTimestamp(); ref.add(data).then(()=>{ document.getElementById('add-service-modal').style.display='none'; serviceForm.reset(); }); } });

    // part form
    document.getElementById('part-form')?.addEventListener('submit', (e)=>{ e.preventDefault(); const user=auth.currentUser; if(!user||!selectedVehicleId) return; const data={ name:document.getElementById('part-name').value, category:document.getElementById('part-category').value, quantity:parseInt(document.getElementById('part-quantity').value), minimum:document.getElementById('part-minimum').value?parseInt(document.getElementById('part-minimum').value):2, location:document.getElementById('part-location').value, notes:document.getElementById('part-notes').value, createdAt:firebase.firestore.FieldValue.serverTimestamp() }; db.collection('users').doc(user.uid).collection('vehicles').doc(selectedVehicleId).collection('parts').add(data).then(()=>{ document.getElementById('add-part-modal').style.display='none'; partForm.reset(); }); });

    // modal triggers
    addVehicleBtn.onclick = ()=>{ vehicleModalTitle.innerText='Add Vehicle'; vehicleForm.reset(); vehicleIdInput.value=''; addVehicleModal.style.display='flex'; };
    document.querySelectorAll('.close-modal').forEach(c=>c.addEventListener('click',()=>{ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }));
    window.addEventListener('click', e=>{ if(e.target.classList.contains('modal')) e.target.style.display='none'; });

    // initialise years dropdowns
    let y = new Date().getFullYear(); ['report-month','budget-month'].forEach(id=>{ let sel=document.getElementById(id); if(sel) for(let m=1;m<=12;m++) sel.innerHTML+=`<option value="${m}">${new Date(2000,m-1,1).toLocaleString('default',{month:'long'})}</option>`; });
    ['report-year','budget-year'].forEach(id=>{ let sel=document.getElementById(id); if(sel) for(let i=y;i>=y-5;i--) sel.innerHTML+=`<option value="${i}">${i}</option>`; });

    // start
    setCurrentDates();
</script>
</body>
</html>
