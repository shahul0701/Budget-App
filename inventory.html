<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetFlow | Company Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    .header p {
      opacity: 0.8;
      font-size: 0.9rem;
    }

    .user-info {
      background: #f8fafc;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
      flex-wrap: wrap;
      gap: 10px;
    }

    .user-name {
      font-weight: 600;
      color: #1e293b;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e2e8f0;
      background: #ffffff;
    }

    .tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      background: #f9fafb;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s;
      color: #475569;
    }

    .tab.active {
      background: white;
      color: #3b82f6;
      border-bottom: 3px solid #3b82f6;
    }

    .form-container {
      padding: 2rem;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #1f2937;
      font-size: 0.85rem;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 0.95rem;
      transition: all 0.3s;
      background: #ffffff;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px -5px rgba(59,130,246,0.4);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-edit {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      margin-right: 8px;
    }

    .btn-edit:hover {
      background: #d97706;
    }

    .error-msg {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 6px;
    }

    .success-msg {
      color: #10b981;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      padding: 10px;
      background: #d1fae5;
      border-radius: 12px;
    }

    .company-list {
      max-height: 550px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .company-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      transition: all 0.25s;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .company-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .company-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .company-name {
      font-weight: 700;
      font-size: 1.15rem;
      color: #0f172a;
    }

    .company-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .company-type {
      font-size: 0.7rem;
      color: #3b82f6;
      margin-top: 6px;
      display: inline-block;
      background: #eff6ff;
      padding: 3px 10px;
      border-radius: 30px;
      font-weight: 500;
    }

    .company-details {
      font-size: 0.8rem;
      color: #475569;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h3 {
      font-size: 1.35rem;
      color: #0f172a;
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #94a3b8;
      transition: 0.2s;
    }

    .close-modal:hover {
      color: #1e293b;
    }

    .company-access-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
      margin-right: 8px;
      transition: 0.2s;
    }

    .company-access-btn:hover {
      background: #059669;
      transform: scale(0.98);
    }

    .badge-info {
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #334155;
    }

    hr {
      margin: 16px 0;
      border-color: #eef2ff;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="header">
      <h1>💰 BudgetFlow Pro</h1>
      <p>Secure Company Management & Dashboard Access</p>
    </div>
    
    <div id="userInfoBar" class="user-info">
      <div class="user-name">
        <i class="fas fa-user-astronaut"></i> Welcome, <strong id="currentUserName">Loading...</strong>
      </div>
      <button class="logout-btn" onclick="performLogout()"><i class="fas fa-door-open"></i> Sign Out</button>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTabUI('companies')"><i class="fas fa-building"></i> My Companies</button>
      <button class="tab" onclick="switchTabUI('create')"><i class="fas fa-plus-circle"></i> New Company</button>
    </div>

    <div class="form-container">
      <!-- Companies Dashboard List -->
      <div id="companiesPanel" class="form active">
        <h3 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;"><i class="fas fa-chart-line"></i> Your Business Portfolio</h3>
        <div id="companyListContainer">
          <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading your companies...</div>
        </div>
      </div>

      <!-- Create Company Form -->
      <div id="createPanel" class="form">
        <h3 style="margin-bottom: 1.2rem;"><i class="fas fa-flag-checkered"></i> Register a New Company</h3>
        <div class="input-group">
          <label><i class="fas fa-tag"></i> Company Name *</label>
          <input type="text" id="newCompanyName" placeholder="e.g., Innovate Labs, Stellar Agency">
        </div>
        <div class="input-group">
          <label><i class="fas fa-layer-group"></i> Industry Type</label>
          <select id="newCompanyType">
            <option value="Startup">🚀 Startup / Tech</option>
            <option value="Agency">🎨 Creative Agency</option>
            <option value="Retail">🛍️ Retail & Ecomm</option>
            <option value="Manufacturing">🏭 Manufacturing</option>
            <option value="Finance">📊 Financial Services</option>
            <option value="Health">⚕️ Health & Wellness</option>
            <option value="Other">🌐 Other</option>
          </select>
        </div>
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Company Password *</label>
          <input type="password" id="companyPwd" placeholder="Minimum 6 characters">
        </div>
        <div class="input-group">
          <label><i class="fas fa-check-circle"></i> Confirm Password</label>
          <input type="password" id="confirmCompanyPwd" placeholder="Re-enter password">
        </div>
        <div class="input-group">
          <label><i class="fas fa-info-circle"></i> Extra Details (VAT, Address, etc)</label>
          <textarea rows="2" id="companyExtraDetails" placeholder="Optional: address, registration number, notes..."></textarea>
        </div>
        <button class="btn-primary" onclick="createNewCompany()"><i class="fas fa-save"></i> Create Company</button>
        <div id="createCompanyMessage"></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Company Modal (Full update) -->
<div id="editCompanyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-pen-alt"></i> Edit Company Details</h3>
      <button class="close-modal" onclick="closeEditCompanyModal()">&times;</button>
    </div>
    <div class="input-group">
      <label>Company Name</label>
      <input type="text" id="editCompName">
    </div>
    <div class="input-group">
      <label>Company Type</label>
      <select id="editCompType">
        <option value="Startup">🚀 Startup</option>
        <option value="Agency">🎨 Agency</option>
        <option value="Retail">🛍️ Retail</option>
        <option value="Manufacturing">🏭 Manufacturing</option>
        <option value="Finance">📊 Finance</option>
        <option value="Other">🌐 Other</option>
      </select>
    </div>
    <div class="input-group">
      <label>Company Details</label>
      <textarea rows="2" id="editCompDetails"></textarea>
    </div>
    <div class="input-group">
      <label>New Password (leave empty to keep existing)</label>
      <input type="password" id="editCompNewPwd" placeholder="Min 6 characters if changed">
    </div>
    <button class="btn-primary" onclick="updateCompanyDetails()"><i class="fas fa-sync-alt"></i> Update Company</button>
    <div id="editCompanyFeedback"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, query, getDocs, addDoc, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhjgu6vpBRhMVjMs5RgSL4aViJq6GYy1A",
    authDomain: "budget-app-1365f.firebaseapp.com",
    databaseURL: "https://budget-app-1365f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "budget-app-1365f",
    storageBucket: "budget-app-1365f.firebasestorage.app",
    messagingSenderId: "1036194450411",
    appId: "1:1036194450411:web:78ca39a5a82ab9db6c67ae",
    measurementId: "G-YFFJL2H54X"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentGlobalUser = null;
  let companiesArray = [];
  let editingCompanyIdGlobal = null;

  // Auth watcher -> redirect to index.html if no user
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentGlobalUser = {
        id: user.uid,
        email: user.email,
        displayName: user.displayName || user.email.split('@')[0]
      };
      document.getElementById('currentUserName').innerText = currentGlobalUser.displayName;
      loadCompaniesForCurrentUser();
    } else {
      // NOT LOGGED IN -> immediately redirect to login.html (index.html)
      window.location.replace("index.html");
    }
  });

  window.switchTabUI = function(tabId) {
    const companiesDiv = document.getElementById('companiesPanel');
    const createDiv = document.getElementById('createPanel');
    const tabs = document.querySelectorAll('.tab');
    
    if (tabId === 'companies') {
      companiesDiv.classList.add('active');
      createDiv.classList.remove('active');
      tabs[0].classList.add('active');
      tabs[1].classList.remove('active');
      loadCompaniesForCurrentUser(); // refresh list
    } else {
      companiesDiv.classList.remove('active');
      createDiv.classList.add('active');
      tabs[0].classList.remove('active');
      tabs[1].classList.add('active');
      // reset creation form
      document.getElementById('newCompanyName').value = '';
      document.getElementById('companyPwd').value = '';
      document.getElementById('confirmCompanyPwd').value = '';
      document.getElementById('companyExtraDetails').value = '';
      document.getElementById('createCompanyMessage').innerHTML = '';
    }
  };

  // Load only companies owned by logged-in user
  async function loadCompaniesForCurrentUser() {
    if (!currentGlobalUser) return;
    const container = document.getElementById('companyListContainer');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Fetching your companies...</div>';
    
    try {
      const companiesRef = collection(db, 'companies');
      const q = query(companiesRef, where("userId", "==", currentGlobalUser.id));
      const querySnap = await getDocs(q);
      
      if (querySnap.empty) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <h4>No companies yet</h4>
            <p style="margin-top: 8px;">Create your first company to unlock the dashboard.</p>
            <button class="btn-primary" style="margin-top: 16px; width: auto; padding: 8px 24px;" onclick="switchTabUI('create')">+ Create Company</button>
          </div>
        `;
        companiesArray = [];
        return;
      }
      
      companiesArray = [];
      let html = `<div class="company-list">`;
      querySnap.forEach(docSnap => {
        const comp = docSnap.data();
        const compId = docSnap.id;
        companiesArray.push({ id: compId, ...comp });
        const createdDate = comp.createdAt ? new Date(comp.createdAt).toLocaleDateString() : 'recent';
        html += `
          <div class="company-card" data-id="${compId}">
            <div class="company-header">
              <div>
                <div class="company-name"><i class="fas fa-building"></i> ${escapeHtml(comp.companyName)}</div>
                <div><span class="company-type">${escapeHtml(comp.companyType || 'Business')}</span></div>
              </div>
              <div class="company-actions">
                <button class="company-access-btn" onclick="accessCompanyDashboard('${compId}', '${escapeHtml(comp.companyName)}')">
                  <i class="fas fa-chalkboard-user"></i> Go to Dashboard
                </button>
                <button class="btn-edit" onclick="openEditCompany('${compId}')">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn-danger" onclick="deleteCompanyPermanently('${compId}', '${escapeHtml(comp.companyName)}')">
                  <i class="fas fa-trash-alt"></i> Delete
                </button>
              </div>
            </div>
            ${comp.details ? `<div class="company-details"><i class="fas fa-sticky-note"></i> ${escapeHtml(comp.details)}</div>` : ''}
            <div class="company-details" style="border-top: none; margin-top: 6px;">
              <i class="far fa-calendar-alt"></i> Created: ${createdDate}
            </div>
          </div>
        `;
      });
      html += `</div>`;
      container.innerHTML = html;
    } catch (err) {
      console.error("Load companies error:", err);
      container.innerHTML = `<div class="empty-state" style="color:#dc2626;"><i class="fas fa-exclamation-triangle"></i> Failed to load. Refresh page.</div>`;
    }
  }

  // ACCESS COMPANY: password verification & REDIRECT TO dashboard.html
  window.accessCompanyDashboard = function(companyId, companyName) {
    const company = companiesArray.find(c => c.id === companyId);
    if (!company) {
      alert("Company data missing. Please refresh.");
      return;
    }
    
    const enteredPassword = prompt(`🔐 Enter security password for "${companyName}":`);
    if (enteredPassword === null) return;
    
    if (enteredPassword === company.password) {
      // Store session for dashboard
      const companySession = {
        id: company.id,
        name: company.companyName,
        type: company.companyType,
        details: company.details || '',
        userId: currentGlobalUser.id,
        userEmail: currentGlobalUser.email,
        accessGrantedAt: new Date().toISOString()
      };
      sessionStorage.setItem('activeCompany', JSON.stringify(companySession));
      sessionStorage.setItem('companyAuth', 'true');
      sessionStorage.setItem('companyLoginTimestamp', Date.now().toString());
      
      // Show success + redirect to dashboard.html
      alert(`✅ Access granted!\nWelcome to ${company.companyName} dashboard.`);
      window.location.href = "dashboard.html";
    } else {
      alert("❌ Invalid password! Access denied.");
    }
  };

  // CREATE new company
  window.createNewCompany = async function() {
    if (!currentGlobalUser) {
      alert("Session expired. Please login again.");
      return;
    }
    const name = document.getElementById('newCompanyName').value.trim();
    const compType = document.getElementById('newCompanyType').value;
    const pwd = document.getElementById('companyPwd').value;
    const confirmPwd = document.getElementById('confirmCompanyPwd').value;
    const details = document.getElementById('companyExtraDetails').value;
    const msgDiv = document.getElementById('createCompanyMessage');
    
    if (!name) {
      msgDiv.innerHTML = '<div class="error-msg"><i class="fas fa-ban"></i> Company name required</div>';
      return;
    }
    if (!pwd) {
      msgDiv.innerHTML = '<div class="error-msg">Password is mandatory</div>';
      return;
    }
    if (pwd !== confirmPwd) {
      msgDiv.innerHTML = '<div class="error-msg">Passwords do not match</div>';
      return;
    }
    if (pwd.length < 6) {
      msgDiv.innerHTML = '<div class="error-msg">Password must be at least 6 characters</div>';
      return;
    }
    
    try {
      const companiesRef = collection(db, 'companies');
      const duplicateQuery = query(companiesRef, where("userId", "==", currentGlobalUser.id), where("companyName", "==", name));
      const existing = await getDocs(duplicateQuery);
      if (!existing.empty) {
        msgDiv.innerHTML = '<div class="error-msg">You already own a company with this exact name!</div>';
        return;
      }
      
      await addDoc(collection(db, 'companies'), {
        companyName: name,
        companyType: compType,
        password: pwd,
        details: details,
        userId: currentGlobalUser.id,
        userEmail: currentGlobalUser.email,
        createdAt: new Date().toISOString(),
        timestamp: Date.now()
      });
      
      msgDiv.innerHTML = '<div class="success-msg"><i class="fas fa-check-circle"></i> Company created! Redirecting...</div>';
      document.getElementById('newCompanyName').value = '';
      document.getElementById('companyPwd').value = '';
      document.getElementById('confirmCompanyPwd').value = '';
      document.getElementById('companyExtraDetails').value = '';
      
      setTimeout(() => {
        switchTabUI('companies');
        msgDiv.innerHTML = '';
      }, 1500);
    } catch (err) {
      console.error(err);
      msgDiv.innerHTML = '<div class="error-msg">Server error. Try again later.</div>';
    }
  };

  // Edit modal open
  window.openEditCompany = function(companyId) {
    const company = companiesArray.find(c => c.id === companyId);
    if (!company) return;
    editingCompanyIdGlobal = companyId;
    document.getElementById('editCompName').value = company.companyName;
    document.getElementById('editCompType').value = company.companyType;
    document.getElementById('editCompDetails').value = company.details || '';
    document.getElementById('editCompNewPwd').value = '';
    document.getElementById('editCompanyFeedback').innerHTML = '';
    document.getElementById('editCompanyModal').classList.add('active');
  };
  
  window.updateCompanyDetails = async function() {
    if (!editingCompanyIdGlobal) return;
    const newName = document.getElementById('editCompName').value.trim();
    const newType = document.getElementById('editCompType').value;
    const newDetails = document.getElementById('editCompDetails').value;
    const newPassword = document.getElementById('editCompNewPwd').value;
    const feedbackDiv = document.getElementById('editCompanyFeedback');
    
    if (!newName) {
      feedbackDiv.innerHTML = '<div class="error-msg">Company name required</div>';
      return;
    }
    if (newPassword && newPassword.length < 6) {
      feedbackDiv.innerHTML = '<div class="error-msg">Password must be at least 6 characters</div>';
      return;
    }
    
    try {
      const companyRef = doc(db, 'companies', editingCompanyIdGlobal);
      const updatePayload = {
        companyName: newName,
        companyType: newType,
        details: newDetails,
        updatedAt: new Date().toISOString()
      };
      if (newPassword) {
        updatePayload.password = newPassword;
      }
      await updateDoc(companyRef, updatePayload);
      feedbackDiv.innerHTML = '<div class="success-msg">✅ Company updated successfully!</div>';
      setTimeout(() => {
        closeEditCompanyModal();
        loadCompaniesForCurrentUser();
      }, 1200);
    } catch (err) {
      feedbackDiv.innerHTML = '<div class="error-msg">Update failed: ' + err.message + '</div>';
    }
  };
  
  window.deleteCompanyPermanently = async function(companyId, companyName) {
    const confirmDel = confirm(`⚠️ PERMANENT ACTION\n\nDelete "${companyName}" and all its data?\nThis cannot be undone.`);
    if (!confirmDel) return;
    try {
      await deleteDoc(doc(db, 'companies', companyId));
      alert(`"${companyName}" removed successfully.`);
      loadCompaniesForCurrentUser();
    } catch (err) {
      alert("Error deleting company: " + err.message);
    }
  };
  
  window.closeEditCompanyModal = function() {
    document.getElementById('editCompanyModal').classList.remove('active');
    editingCompanyIdGlobal = null;
  };
  
  window.performLogout = async function() {
    try {
      await signOut(auth);
      sessionStorage.removeItem('activeCompany');
      sessionStorage.removeItem('companyAuth');
      window.location.href = "index.html";
    } catch(e) {
      console.warn(e);
      window.location.href = "index.html";
    }
  };
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  
  // Close modal on outside click
  window.onclick = function(event) {
    const modal = document.getElementById('editCompanyModal');
    if (event.target === modal) {
      closeEditCompanyModal();
    }
  };
</script>
</body>
